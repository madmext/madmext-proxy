<section style="padding:18px;border:1px solid #2d2e30;border-radius:18px;background:#0f1011;color:#e5e7eb;font-family:Inter,Arial,sans-serif;min-height:720px">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px">
    <div>
      <h2 style="margin:0 0 6px;font-size:24px">Madmext AI Ajans</h2>
      <p style="margin:0;color:#9ca3af;font-size:13px;line-height:1.5">Şu an güvenli Claude motoru aktif. GPT bağlantısı için ayrı /openai endpoint’i eklenecek.</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="mxEngine" onchange="mxSetEngine(this.value)" style="background:#111827;color:#fff;border:1px solid #374151;border-radius:10px;padding:10px">
        <option value="claude">Claude</option>
      </select>
      <button onclick="mxDaily()" style="background:#1877f2;color:#fff;border:0;border-radius:10px;padding:10px 12px;font-weight:700">Günlük Ajans Raporu</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.1fr .9fr;gap:16px">
    <div style="background:linear-gradient(145deg,#172033,#0b0d12);border:1px solid #263244;border-radius:18px;padding:20px;min-height:560px;position:relative;overflow:hidden">
      <div style="position:absolute;left:50%;top:50%;width:220px;height:150px;transform:translate(-50%,-50%);border:2px solid #60a5fa;border-radius:24px;background:rgba(24,119,242,.12);box-shadow:0 0 45px rgba(24,119,242,.25);display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;color:#93c5fd">Toplantı<br>Merkezi</div>
      <div id="agents" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;position:relative;z-index:2"></div>
    </div>
    <aside style="background:#090a0c;border:1px solid #22252a;border-radius:18px;padding:16px;min-height:560px;display:flex;flex-direction:column">
      <div style="border:1px solid rgba(96,165,250,.35);background:rgba(24,119,242,.08);border-radius:14px;padding:14px;margin-bottom:12px">
        <h3 id="agentName" style="margin:0 0 6px">Aria — Strateji</h3>
        <p id="agentDesc" style="margin:0;color:#9ca3af;font-size:12px;line-height:1.5">Reklam stratejisi ve bütçe yönü çıkarır.</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <button onclick="mxTask('Kendi alanın için bugünkü fırsatları araştır ve aksiyon listesi çıkar.')">Araştırma Başlat</button>
        <button onclick="mxTask('Kısa ve uygulanabilir rapor oluştur.')">Rapor Oluştur</button>
        <button onclick="mxTask('Bu hafta öncelik verilmesi gereken işleri sırala.')">Öncelik Çıkar</button>
        <button onclick="mxTask('Riskleri, eksikleri ve ölçülecek metrikleri yaz.')">Risk Kontrol</button>
      </div>
      <pre id="report" style="flex:1;background:#050608;border:1px solid #1f2937;border-radius:12px;padding:14px;color:#d1d5db;white-space:pre-wrap;font-size:12px;line-height:1.6;overflow:auto">Ajans hazır. Ajan seç ve rapor başlat.</pre>
      <div style="font-size:11px;color:#9ca3af;margin-top:10px">Claude için Railway Variables: ANTHROPIC_KEY</div>
    </aside>
  </div>

  <style>
    #agents button{min-height:92px;text-align:left;border:1px solid #374151;border-radius:14px;background:#111827;color:#e5e7eb;padding:12px;cursor:pointer;box-shadow:0 18px 34px rgba(0,0,0,.22)}
    #agents button.active,#agents button:hover{border-color:#60a5fa;background:#172033}
    aside button{background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:10px;padding:10px;font-size:12px;text-align:left;cursor:pointer}
    aside button:hover{border-color:#60a5fa}
  </style>

  <script>
    const AGENTS={aria:['Aria — Strateji','Reklam stratejisi ve bütçe yönü çıkarır.'],nova:['Nova — Pazar Araştırma','Rakip, trend ve kategori fırsatlarını inceler.'],orion:['Orion — Proje Yönetimi','İşleri öncelik ve takip sırasına koyar.'],luna:['Luna — İçerik','Reklam metni, ürün ve kategori söylemi üretir.'],pixel:['Pixel — Tasarım','Kreatif fikir, banner ve görsel açı önerir.'],rex:['Rex — Video','Reels, TikTok ve UGC video akışı hazırlar.'],sage:['Sage — SEO','Kategori, ürün ve blog SEO fırsatı çıkarır.'],vibe:['Vibe — Sosyal Medya','Sosyal medya takvimi ve paylaşım önerir.'],byte:['Byte — Web & Veri','Trafik, dönüşüm ve site verisini yorumlar.']};
    let current='aria';let engine='claude';
    function renderAgents(){agents.innerHTML='';Object.keys(AGENTS).forEach(k=>{let b=document.createElement('button');b.className=k===current?'active':'';b.onclick=()=>selectAgent(k);b.innerHTML='<b>'+AGENTS[k][0]+'</b><br><span style="color:#9ca3af;font-size:11px">'+AGENTS[k][1]+'</span>';agents.appendChild(b);});}
    function selectAgent(k){current=k;agentName.textContent=AGENTS[k][0];agentDesc.textContent=AGENTS[k][1];report.textContent=AGENTS[k][0]+' seçildi.';renderAgents();}
    function mxSetEngine(v){engine='claude';}
    async function ask(prompt){let payload={model:'claude-sonnet-4-5',max_tokens:1600,messages:[{role:'user',content:prompt}]};let r=await fetch('/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let d=await r.json();if(!r.ok)throw new Error((d.error&&(d.error.message||d.error))||'AI hatası');if(d.content&&d.content[0]&&d.content[0].text)return d.content[0].text;if(d.response)return d.response;return JSON.stringify(d,null,2);}
    async function mxTask(task){report.textContent=AGENTS[current][0]+' Claude ile çalışıyor...';let p='Sen Madmext ADS sanal ajansındaki '+AGENTS[current][0]+' ajanısın. Görevin: '+task+' Marka: madmext.com, moda e-ticaret, Meta Ads, Google Ads, SEO, sosyal medya, kreatif, pazaryeri reklamları. Türkçe yaz. Format: kısa özet, fırsatlar, aksiyonlar, öncelik, metrikler.';try{report.textContent=await ask(p)}catch(e){report.textContent='Hata: '+e.message}}
    async function mxDaily(){report.textContent='Günlük ajans raporu Claude ile hazırlanıyor...';let p='Madmext ADS için 9 ajanlı günlük ajans raporu hazırla. Ajanlar: Strateji, Pazar Araştırma, Proje Yönetimi, İçerik, Tasarım, Video, SEO, Sosyal Medya, Web & Veri. Türkçe, kısa, aksiyon odaklı yaz.';try{report.textContent=await ask(p)}catch(e){report.textContent='Hata: '+e.message}}
    mxEngine.value=engine;renderAgents();
  </script>
</section>
