<style>
html,body{margin:0!important;padding:0!important;background:#050607!important;overflow:hidden!important;width:100%!important;height:100%!important}*{box-sizing:border-box}.mxai{height:100vh!important;min-height:100vh!important;width:100vw!important;margin:0!important;background:#0f1011;color:#e5e7eb;border:0!important;border-radius:0!important;overflow:hidden;font-family:Inter,Arial,sans-serif;display:grid;grid-template-columns:220px minmax(0,1fr) 320px}.mxnav{background:#111214;border-right:1px solid #2d2e30;padding:14px;overflow:auto}.mxmain{min-width:0;display:flex;flex-direction:column}.mxside{background:#090a0c;border-left:1px solid #2d2e30;padding:14px;overflow:auto}.mxh{padding:14px 18px;border-bottom:1px solid #2d2e30;display:flex;justify-content:space-between;align-items:center;gap:12px}.mxh h2{margin:0;font-size:18px}.mxh p{margin:3px 0 0;color:#9ca3af;font-size:11px}.tab{width:100%;display:flex;gap:9px;align-items:center;background:transparent;border:0;color:#9ca3af;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-weight:700}.tab.active,.tab:hover{background:#1a1b1d;color:white}.view{padding:16px;overflow:auto;min-height:0;flex:1}.card{background:#17191c;border:1px solid #2d2e30;border-radius:14px;padding:12px;margin-bottom:12px}.card h3,.card h4{margin:0 0 9px;font-size:13px}.small{color:#9ca3af;font-size:11px;line-height:1.45}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.agent{background:#111827;border:1px solid #374151;border-radius:13px;padding:11px;text-align:left;color:#e5e7eb;cursor:pointer}.agent.active,.agent:hover{border-color:#60a5fa;background:#172033}.agent b{display:block;font-size:13px}.agent span{display:block;color:#9ca3af;font-size:11px;margin-top:3px}.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}.badge{border:1px solid #334155;background:#0b1220;color:#cbd5e1;border-radius:999px;padding:3px 6px;font-size:9px}.bgreen{border-color:#166534;color:#86efac}.bblue{border-color:#1d4ed8;color:#93c5fd}.byellow{border-color:#854d0e;color:#facc15}.bpurple{border-color:#6d28d9;color:#c4b5fd}input,select,textarea{width:100%;box-sizing:border-box;background:#090a0c;color:#e5e7eb;border:1px solid #374151;border-radius:10px;padding:8px;font-size:12px}textarea{min-height:64px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{background:#1f2937;color:#fff;border:1px solid #374151;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer}.btn.blue{background:#1877f2;border-color:#1877f2}.btn.green{background:#16a34a;border-color:#16a34a}.btn.red{background:#991b1b;border-color:#991b1b}.btn.xs{font-size:10px;padding:4px 7px}.mini{background:#090a0c;border:1px solid #374151;border-radius:9px;padding:8px;margin-top:6px;font-size:11px;line-height:1.45;color:#d1d5db}.chat{height:360px;overflow:auto;background:#090a0c;border:1px solid #2d2e30;border-radius:14px;padding:12px}.msg{padding:10px;border-radius:12px;margin-bottom:8px;white-space:pre-wrap;font-size:12px;line-height:1.5}.msg.u{background:#1877f2;margin-left:auto;max-width:86%}.msg.a{background:#1a1b1d;border:1px solid #2d2e30;max-width:90%}.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px}.checks label{background:#090a0c;border:1px solid #374151;border-radius:8px;padding:7px;font-size:11px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-box{width:min(1120px,96vw);height:min(760px,92vh);background:#0f1011;border:1px solid #374151;border-radius:18px;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.modal-head,.modal-foot{padding:12px 16px;border-bottom:1px solid #2d2e30;display:flex;justify-content:space-between;gap:8px;align-items:center}.modal-foot{border-bottom:0;border-top:1px solid #2d2e30;justify-content:flex-end;flex-wrap:wrap}.modal-body{padding:16px;overflow:auto}.talk{border:1px solid #374151;background:#111827;border-radius:12px;padding:10px;margin-bottom:8px;white-space:pre-wrap;font-size:12px;line-height:1.5}.talk b{color:#93c5fd}.talk.summary{border-color:#16a34a;background:#102014}@media(max-width:1000px){html,body{overflow:auto!important}.mxai{height:auto!important;min-height:100vh!important;width:100%!important;grid-template-columns:1fr}.mxnav{display:flex;gap:6px;overflow:auto;border-right:0;border-bottom:1px solid #2d2e30}.tab{min-width:max-content}.mxside{border-left:0;border-top:1px solid #2d2e30}.row{grid-template-columns:1fr}}
</style>
<nav class="mxnav"><div style="font-weight:900;margin:0 0 10px">AI Ajans</div><button class="tab active" data-tab="agents">🤖 Ajanlar</button><button class="tab" data-tab="groups">👥 Çalışma Grupları</button><button class="tab" data-tab="meetings">🗣 Toplantılar</button><button class="tab" data-tab="tasks">✅ Görevler</button><button class="tab" data-tab="settings">⚙️ Ayarlar</button></nav>
<main class="mxmain"><div class="mxh"><div><h2 id="pageTitle">Ajanlar</h2><p id="pageSub">Ajan listesi, sohbet ve hızlı aksiyonlar.</p></div><button class="btn" onclick="window.location.href='/'">← Panele Dön</button><button class="btn blue" onclick="dailyReport()">Günlük Rapor</button></div><div id="view" class="view"></div></main>
<aside class="mxside"><div class="card"><h4>Seçili Ajan</h4><div id="agentProfile" class="mini">Hazırlanıyor...</div></div><div class="card"><h4>İşlem Kaydı</h4><div id="activityLog"></div></div></aside>
<div id="meetingModal" class="modal"><div class="modal-box"><div class="modal-head"><div><b id="modalTitle">Toplantı</b><div id="modalSub" class="small"></div></div><button class="btn" onclick="closeMeeting()">Kapat</button></div><div id="modalBody" class="modal-body"></div><div class="modal-foot"><button class="btn" onclick="copyMeeting()">Kopyala</button><button class="btn red" onclick="deleteOpenMeeting()">Bu Toplantıyı Sil</button><button class="btn blue" onclick="closeMeeting()">Tamam</button></div></div></div>
<script>
const AGENTS={aria:['Aria — Strateji','Reklam stratejisi ve bütçe yönü çıkarır.'],nova:['Nova — Pazar Araştırma','Rakip, trend ve kategori fırsatlarını inceler.'],orion:['Orion — Proje Yönetimi','İşleri öncelik ve takip sırasına koyar.'],luna:['Luna — İçerik','Reklam metni, ürün ve kategori söylemi üretir.'],pixel:['Pixel — Tasarım','Kreatif fikir, banner ve görsel açı önerir.'],rex:['Rex — Video','Reels, TikTok ve UGC video akışı hazırlar.'],sage:['Sage — SEO','Kategori, ürün ve blog SEO fırsatı çıkarır.'],vibe:['Vibe — Sosyal Medya','Sosyal medya takvimi ve paylaşım önerir.'],byte:['Byte — Web & Veri','Trafik, dönüşüm ve site verisini yorumlar.'],hera:['Hera — İK','Yeni ajan adaylarını ve görev uyumunu değerlendirir.']};
let current='aria',tab='agents',openMeetingId=null;const K='mxAj_',OLD='mxAgencyTasks_';function r(k,d){try{return JSON.parse(localStorage.getItem(K+k)||JSON.stringify(d))}catch(e){return d}}function w(k,v){localStorage.setItem(K+k,JSON.stringify(v))}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function log(x){let a=r('log',[]);a.unshift({text:x,time:new Date().toLocaleString('tr')});w('log',a.slice(0,60))}function loadCustom(){r('custom',[]).forEach(a=>AGENTS[a.id]=[a.name,a.desc])}function hist(){return r('hist_'+current,[])}function saveHist(v){w('hist_'+current,v.slice(-30))}function oldTasks(id){try{return JSON.parse(localStorage.getItem(OLD+id)||'[]')}catch(e){return []}}function tasks(id=current){let a=r('tasks_'+id,[]);let o=oldTasks(id).map(t=>({...t,status:t.status||'Açık'}));let keys=new Set(a.map(t=>t.text+'|'+t.due));o.forEach(t=>{if(!keys.has(t.text+'|'+t.due))a.push(t)});return a}function saveTasks(v,id=current){w('tasks_'+id,v.slice(0,80))}function meta(){return r('meta',{})}function saveMeta(v){w('meta',v)}function managers(){return r('managers',{})}function saveManagers(v){w('managers',v)}function groups(){return r('groups',[])}function saveGroups(v){w('groups',v.slice(0,40))}function meetings(){return r('meetings',[])}function saveMeetings(v){w('meetings',v.slice(0,50))}function file(id=current){return localStorage.getItem(K+'file_'+id)||localStorage.getItem('mxAgencyFile_'+id)||''}function saveFile(v,id=current){localStorage.setItem(K+'file_'+id,v)}
function badges(id){let m=meta()[id]||{},man=managers(),out='';if(man[id])out+='<span class="badge bpurple">👤 '+esc(AGENTS[man[id]][0].split(' — ')[0])+'</span>';let ch=Object.keys(man).filter(a=>man[a]===id).length;if(ch)out+='<span class="badge bgreen">👥 '+ch+' bağlı</span>';if(m.group)out+='<span class="badge bblue">🏷 '+esc(m.group)+'</span>';if(m.perm)out+='<span class="badge byellow">🔐 '+esc(m.perm)+'</span>';if(m.role)out+='<span class="badge">🧩 '+esc(m.role)+'</span>';let tc=tasks(id).filter(t=>t.status==='Açık').length;if(tc)out+='<span class="badge bgreen">✅ '+tc+' görev</span>';if(localStorage.getItem(K+'tg_'+id))out+='<span class="badge bblue">✈️ TG</span>';return '<div class="badges">'+out+'</div>'}
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render()}function selectAgent(id){current=id;render()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function render(){pageTitle.textContent={agents:'Ajanlar',groups:'Çalışma Grupları',meetings:'Toplantılar',tasks:'Görevler',settings:'Ayarlar'}[tab];pageSub.textContent={agents:'Sohbet, ajan künyesi ve hızlı aksiyonlar.',groups:'Grup oluştur, ajan ata, yetki ver.',meetings:'Toplantı kur, eski toplantıları aç, konuşmalı ilerlet.',tasks:'Açık görevleri gör ve yönet.',settings:'Dosya, Telegram ve İK ayarları.'}[tab];if(tab==='agents')renderAgentsView();if(tab==='groups')renderGroupsView();if(tab==='meetings')renderMeetingsView();if(tab==='tasks')renderTasksView();if(tab==='settings')renderSettingsView();renderSide()}
function renderSide(){let m=meta()[current]||{},man=managers();agentProfile.innerHTML='<b>'+AGENTS[current][0]+'</b><br>'+AGENTS[current][1]+'<br><br>Grup: '+(m.group||'Yok')+'<br>Yetki: '+(m.perm||'Yok')+'<br>Görev Grubu: '+(m.role||'Yok')+'<br>Yönetici: '+(man[current]?AGENTS[man[current]][0]:'Yok')+'<br>Açık görev: '+tasks().filter(t=>t.status==='Açık').length+badges(current);let a=r('log',[]);activityLog.innerHTML=a.length?'':'<div class="mini">Kayıt yok.</div>';a.slice(0,10).forEach(x=>activityLog.innerHTML+='<div class="mini"><b>'+x.time+'</b><br>'+esc(x.text)+'</div>')}
function renderAgentCards(){return '<div class="grid">'+Object.keys(AGENTS).map(id=>'<button class="agent '+(id===current?'active':'')+'" onclick="selectAgent(\''+id+'\')"><b>'+esc(AGENTS[id][0])+'</b><span>'+esc(AGENTS[id][1])+'</span>'+badges(id)+'</button>').join('')+'</div>'}
function renderAgentsView(){let h=hist();view.innerHTML=renderAgentCards()+'<div class="card"><h3>'+esc(AGENTS[current][0])+' Sohbet</h3><div id="chatBox" class="chat">'+(h.length?h.map(m=>'<div class="msg '+(m.role==='user'?'u':'a')+'">'+esc((m.role==='user'?'Sen: ':'Ajan: ')+m.text)+'</div>').join(''):'<div class="msg a">Ajan odası hazır.</div>')+'</div><div class="row" style="grid-template-columns:1fr auto;margin-top:8px"><textarea id="msgBox" placeholder="Seçili ajana mesaj yaz..."></textarea><button class="btn blue" onclick="sendMsg()">Gönder</button></div></div>'}
function renderGroupsView(){let gs=groups(),m=meta();view.innerHTML='<div class="card"><h3>Çalışma Grubu Oluştur / Ata</h3><input id="groupName" placeholder="Grup adı"><div class="row" style="margin-top:8px"><select id="groupAgent">'+Object.keys(AGENTS).map(id=>'<option value="'+id+'" '+(id===current?'selected':'')+'>'+AGENTS[id][0]+'</option>').join('')+'</select><select id="groupPick">'+(gs.length?gs.map(g=>'<option>'+esc(g.name)+'</option>').join(''):'<option>Genel Ekip</option>')+'</select></div><div class="row" style="margin-top:8px"><select id="agentPerm"><option>Yönetici</option><option>Analist</option><option>Üretici</option><option>Araştırmacı</option><option>Takipçi</option></select><select id="agentRole"><option>Reklam</option><option>SEO</option><option>Sosyal</option><option>Kreatif</option><option>Video</option><option>Veri</option><option>İK</option></select></div><div class="row" style="margin-top:8px"><button class="btn blue" onclick="createGroup()">Grup Oluştur</button><button class="btn green" onclick="assignGroup()">Ajanı Ata</button></div></div>'+renderAgentCards()}
function renderMeetingsView(){view.innerHTML='<div class="card"><h3>Toplantı Başlat</h3><textarea id="meetTopic" placeholder="Toplantı konusu"></textarea><div class="checks">'+Object.keys(AGENTS).map(id=>'<label><input type="checkbox" value="'+id+'" '+(id===current?'checked':'')+'> '+AGENTS[id][0]+'</label>').join('')+'</div><button class="btn blue" style="margin-top:8px" onclick="startMeeting()">Toplantıyı Başlat</button></div>'}
function renderTasksView(){view.innerHTML=Object.keys(AGENTS).map(id=>'<div class="card"><h3>'+AGENTS[id][0]+'</h3>'+(tasks(id).length?tasks(id).map((t,i)=>'<div class="mini">'+esc(t.text||'')+' <button class="btn xs red" onclick="deleteTask(\''+id+'\','+i+')">Sil</button></div>').join(''):'<div class="mini">Görev yok.</div>')+'</div>').join('')}
function renderSettingsView(){view.innerHTML='<div class="card"><h3>Ayarlar</h3><textarea id="fileNote">'+esc(file())+'</textarea><button class="btn blue" onclick="saveFileNote()">Kaydet</button></div>'}
function createGroup(){let n=groupName.value.trim();if(!n)return;let gs=groups();gs.push({name:n});saveGroups(gs);log('Grup oluşturuldu: '+n);render()}function assignGroup(){let id=groupAgent.value,m=meta();m[id]={...(m[id]||{}),group:groupPick.value,perm:agentPerm.value,role:agentRole.value};saveMeta(m);log(AGENTS[id][0]+' gruba atandı');render()}function deleteTask(id,i){let a=tasks(id);a.splice(i,1);saveTasks(a,id);render()}function saveFileNote(){saveFile(fileNote.value);log('Dosya notu güncellendi');render()}async function ask(prompt){let r=await fetch('/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,messages:[{role:'user',content:prompt}]})});let d=await r.json();return d.content?.[0]?.text||'Cevap alınamadı'}async function sendMsg(){let v=msgBox.value.trim();if(!v)return;let h=hist();h.push({role:'user',text:v});saveHist(h);renderAgentsView();let a=await ask(AGENTS[current][0]+' olarak yanıtla: '+v);h=hist();h.push({role:'assistant',text:a});saveHist(h);renderAgentsView()}function dailyReport(){msgBox.value='Günlük rapor çıkar';sendMsg()}function closeMeeting(){meetingModal.classList.remove('open')}function copyMeeting(){}function deleteOpenMeeting(){}function startMeeting(){modalTitle.textContent='Toplantı';modalBody.innerHTML='<div class="talk">Toplantı hazır.</div>';meetingModal.classList.add('open')}loadCustom();render();
</script>
