dius:10px;padding:8px;font-size:12px}textarea{min-height:64px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{background:#1f2937;color:#fff;border:1px solid #374151;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer}.btn.blue{background:#1877f2;border-color:#1877f2}.btn.green{background:#16a34a;border-color:#16a34a}.btn.red{background:#991b1b;border-color:#991b1b}.btn.xs{font-size:10px;padding:4px 7px}.mini{background:#090a0c;border:1px solid #374151;border-radius:9px;padding:8px;margin-top:6px;font-size:11px;line-height:1.45;color:#d1d5db}.chat{height:360px;overflow:auto;background:#090a0c;border:1px solid #2d2e30;border-radius:14px;padding:12px}.msg{padding:10px;border-radius:12px;margin-bottom:8px;white-space:pre-wrap;font-size:12px;line-height:1.5}.msg.u{background:#1877f2;margin-left:auto;max-width:86%}.msg.a{background:#1a1b1d;border:1px solid #2d2e30;max-width:90%}.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px}.checks label{background:#090a0c;border:1px solid #374151;border-radius:8px;padding:7px;font-size:11px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-box{width:min(1120px,96vw);height:min(760px,92vh);background:#0f1011;border:1px solid #374151;border-radius:18px;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.modal-head,.modal-foot{padding:12px 16px;border-bottom:1px solid #2d2e30;display:flex;justify-content:space-between;gap:8px;align-items:center}.modal-foot{border-bottom:0;border-top:1px solid #2d2e30;justify-content:flex-end;flex-wrap:wrap}.modal-body{padding:16px;overflow:auto}.talk{border:1px solid #374151;background:#111827;border-radius:12px;padding:10px;margin-bottom:8px;white-space:pre-wrap;font-size:12px;line-height:1.5}.talk b{color:#93c5fd}.talk.summary{border-color:#16a34a;background:#102014}@media(max-width:1000px){.mxai{height:auto;grid-template-columns:1fr}.mxnav{display:flex;gap:6px;overflow:auto;border-right:0;border-bottom:1px solid #2d2e30}.tab{min-width:max-content}.mxside{border-left:0;border-top:1px solid #2d2e30}.row{grid-template-columns:1fr}}

<script>
const AGENTS={aria:['Aria вҖ” Strateji','Reklam stratejisi ve bГјtГ§e yГ¶nГј Г§ДұkarДұr.'],nova:['Nova вҖ” Pazar AraЕҹtДұrma','Rakip, trend ve kategori fДұrsatlarДұnДұ inceler.'],orion:['Orion вҖ” Proje YГ¶netimi','Д°Еҹleri Г¶ncelik ve takip sДұrasДұna koyar.'],luna:['Luna вҖ” Д°Г§erik','Reklam metni, ГјrГјn ve kategori sГ¶ylemi Гјretir.'],pixel:['Pixel вҖ” TasarДұm','Kreatif fikir, banner ve gГ¶rsel aГ§Дұ Г¶nerir.'],rex:['Rex вҖ” Video','Reels, TikTok ve UGC video akДұЕҹДұ hazДұrlar.'],sage:['Sage вҖ” SEO','Kategori, ГјrГјn ve blog SEO fДұrsatДұ Г§ДұkarДұr.'],vibe:['Vibe вҖ” Sosyal Medya','Sosyal medya takvimi ve paylaЕҹДұm Г¶nerir.'],byte:['Byte вҖ” Web & Veri','Trafik, dГ¶nГјЕҹГјm ve site verisini yorumlar.'],hera:['Hera вҖ” Д°K','Yeni ajan adaylarДұnДұ ve gГ¶rev uyumunu deДҹerlendirir.']};
let current='aria',tab='agents',openMeetingId=null;const K='mxAj_',OLD='mxAgencyTasks_';function r(k,d){try{return JSON.parse(localStorage.getItem(K+k)||JSON.stringify(d))}catch(e){return d}}function w(k,v){localStorage.setItem(K+k,JSON.stringify(v))}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function log(x){let a=r('log',[]);a.unshift({text:x,time:new Date().toLocaleString('tr')});w('log',a.slice(0,60))}function loadCustom(){r('custom',[]).forEach(a=>AGENTS[a.id]=[a.name,a.desc])}function hist(){return r('hist_'+current,[])}function saveHist(v){w('hist_'+current,v.slice(-30))}function oldTasks(id){try{return JSON.parse(localStorage.getItem(OLD+id)||'[]')}catch(e){return []}}function tasks(id=current){let a=r('tasks_'+id,[]);let o=oldTasks(id).map(t=>({...t,status:t.status||'AГ§Дұk'}));let keys=new Set(a.map(t=>t.text+'|'+t.due));o.forEach(t=>{if(!keys.has(t.text+'|'+t.due))a.push(t)});return a}function saveTasks(v,id=current){w('tasks_'+id,v.slice(0,80))}function meta(){return r('meta',{})}function saveMeta(v){w('meta',v)}function managers(){return r('managers',{})}function saveManagers(v){w('managers',v)}function groups(){return r('groups',[])}function saveGroups(v){w('groups',v.slice(0,40))}function meetings(){return r('meetings',[])}function saveMeetings(v){w('meetings',v.slice(0,50))}function file(id=current){return localStorage.getItem(K+'file_'+id)||localStorage.getItem('mxAgencyFile_'+id)||''}function saveFile(v,id=current){localStorage.setItem(K+'file_'+id,v)}
function badges(id){let m=meta()[id]||{},man=managers(),out='';if(man[id])out+='<span class="badge bpurple">рҹ‘Ө '+esc(AGENTS[man[id]][0].split(' вҖ” ')[0])+'</span>';let ch=Object.keys(man).filter(a=>man[a]===id).length;if(ch)out+='<span class="badge bgreen">рҹ‘Ҙ '+ch+' baДҹlДұ</span>';if(m.group)out+='<span class="badge bblue">рҹҸ· '+esc(m.group)+'</span>';if(m.perm)out+='<span class="badge byellow">рҹ”җ '+esc(m.perm)+'</span>';if(m.role)out+='<span class="badge">рҹ§© '+esc(m.role)+'</span>';let tc=tasks(id).filter(t=>t.status==='AГ§Дұk').length;if(tc)out+='<span class="badge bgreen">вң… '+tc+' gГ¶rev</span>';if(localStorage.getItem(K+'tg_'+id))out+='<span class="badge bblue">вңҲпёҸ TG</span>';return '<div class="badges">'+out+'</div>'}
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render()}function selectAgent(id){current=id;render()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function render(){pageTitle.textContent={agents:'Ajanlar',groups:'ГҮalДұЕҹma GruplarДұ',meetings:'ToplantДұlar',tasks:'GГ¶revler',settings:'Ayarlar'}[tab];pageSub.textContent={agents:'Sohbet, ajan kГјnyesi ve hДұzlДұ aksiyonlar.',groups:'Grup oluЕҹtur, ajan ata, yetki ver.',meetings:'ToplantДұ kur, eski toplantДұlarДұ aГ§, konuЕҹmalДұ ilerlet.',tasks:'AГ§Дұk gГ¶revleri gГ¶r ve yГ¶net.',settings:'Dosya, Telegram ve Д°K ayarlarДұ.'}[tab];if(tab==='agents')renderAgentsView();if(tab==='groups')renderGroupsView();if(tab==='meetings')renderMeetingsView();if(tab==='tasks')renderTasksView();if(tab==='settings')renderSettingsView();renderSide()}
function renderSide(){let m=meta()[current]||{},man=managers();agentProfile.innerHTML='<b>'+AGENTS[current][0]+'</b><br>'+AGENTS[current][1]+'<br><br>Grup: '+(m.group||'Yok')+'<br>Yetki: '+(m.perm||'Yok')+'<br>GГ¶rev Grubu: '+(m.role||'Yok')+'<br>YГ¶netici: '+(man[current]?AGENTS[man[current]][0]:'Yok')+'<br>AГ§Дұk gГ¶rev: '+tasks().filter(t=>t.status==='AГ§Дұk').length+badges(current);let a=r('log',[]);activityLog.innerHTML=a.length?'':'<div class="mini">KayДұt yok.</div>';a.slice(0,10).forEach(x=>activityLog.innerHTML+='<div class="mini"><b>'+x.time+'</b><br>'+esc(x.text)+'</div>')}
function renderAgentCards(){return '<div class="grid">'+Object.keys(AGENTS).map(id=>'<button class="agent '+(id===current?'active':'')+'" onclick="selectAgent(\''+id+'\')"><b>'+esc(AGENTS[id][0])+'</b><span>'+esc(AGENTS[id][1])+'</span>'+badges(id)+'</button>').join('')+'</div>'}
function renderAgentsView(){let h=hist();view.innerHTML=renderAgentCards()+'<div class="card"><h3>'+esc(AGENTS[current][0])+' Sohbet</h3><div id="chatBox" class="chat">'+(h.length?h.map(m=>'<div class="msg '+(m.role==='user'?'u':'a')+'">'+esc((m.role==='user'?'Sen: ':'Ajan: ')+m.text)+'</div>').join(''):'<div class="msg a">Ajan odasДұ hazДұr.</div>')+'</div><div class="row" style="grid-template-columns:1fr auto;margin-top:8px"><textarea id="msgBox" placeholder="SeГ§ili ajana mesaj yaz..."></textarea><button class="btn blue" onclick="sendMsg()">GГ¶nder</button></div></div>'}
function renderGroupsView(){let gs=groups(),m=meta();view.innerHTML='<div class="card"><h3>ГҮalДұЕҹma Grubu OluЕҹtur / Ata</h3><input id="groupName" placeholder="Grup adДұ"><div class="row" style="margin-top:8px"><select id="groupAgent">'+Object.keys(AGENTS).map(id=>'<option value="'+id+'" '+(id===current?'selected':'')+'>'+AGENTS[id][0]+'</option>').join('')+'</select><select id="groupPick">'+(gs.length?gs.map(g=>'<option>'+esc(g.name)+'</option>').join(''):'<option>Genel Ekip</option>')+'</select></div><div class="row" style="margin-top:8px"><select id="agentPerm"><option>YГ¶netici</option><option>Analist</option><option>Гңretici</option><option>AraЕҹtДұrmacДұ</option><option>TakipГ§i</option></select><select id="agentRole"><option>Reklam</option><option>SEO</option><option>Sosyal</option><option>Kreatif</option><option>Video</option><option>Veri</option><option>Д°K</option></select></div><div class="row" style="margin-top:8px"><button class="btn" onclick="createGroup()">Grup OluЕҹtur</button><button class="btn blue" onclick="assignGroup()">Ajana Ata</button></div><button class="btn red" style="margin-top:8px" onclick="clearAgentGroup()">SeГ§ili AjanДұn Grup/Yetkisini KaldДұr</button></div><div class="grid">'+(gs.length?gs.map(g=>'<div class="card"><h3>рҹҸ· '+esc(g.name)+'</h3><div class="small">'+(Object.keys(m).filter(id=>m[id].group===g.name).map(id=>AGENTS[id][0]).join('<br>')||'Гңye yok')+'</div><button class="btn red xs" onclick="deleteGroup(\''+esc(g.name)+'\')">Grubu Sil</button></div>').join(''):'<div class="card">Grup yok.</div>')+'</div>'}
function renderMeetingsView(){let ms=meetings();view.innerHTML='<div class="card"><h3>ToplantДұ Kur</h3><input id="meetTopic" placeholder="ToplantДұ konusu"><select id="meetLeader" style="margin-top:8px"><option value="owner">Ben yГ¶neteyim</option><option value="current">SeГ§ili ajan yГ¶netsin</option><option value="manager">AtanmДұЕҹ yГ¶netici yГ¶netsin</option></select><div class="checks" id="meetAgents" style="margin-top:8px">'+Object.keys(AGENTS).map(id=>'<label><input type="checkbox" value="'+id+'" '+(id===current?'checked':'')+'> '+AGENTS[id][0]+'</label>').join('')+'</div><button class="btn green" style="margin-top:8px" onclick="startMeeting()">KonuЕҹmalДұ ToplantДұ BaЕҹlat</button></div><div class="grid">'+(ms.length?ms.map(mt=>'<div class="card"><h3>'+esc(mt.topic)+'</h3><div class="small">'+esc(mt.leader)+' В· '+mt.time+'<br>'+esc(mt.participants||'')+'</div><button class="btn xs" onclick="openMeeting(\''+mt.id+'\')">AГ§</button> <button class="btn red xs" onclick="deleteMeeting(\''+mt.id+'\')">Sil</button></div>').join(''):'<div class="card">Eski toplantДұ yok.</div>')+'</div>'}
function renderTasksView(){view.innerHTML='<div class="card"><h3>GГ¶rev Ata</h3><select id="taskAgent">'+Object.keys(AGENTS).map(id=>'<option value="'+id+'" '+(id===current?'selected':'')+'>'+AGENTS[id][0]+'</option>').join('')+'</select><textarea id="taskText" placeholder="GГ¶rev yaz..." style="margin-top:8px"></textarea><input id="taskDue" placeholder="Teslim: BugГјn / YarДұn" style="margin-top:8px"><button class="btn blue" style="margin-top:8px" onclick="assignTask()">GГ¶rev Ata</button></div><div class="grid">'+Object.keys(AGENTS).map(id=>'<div class="card"><h3>'+AGENTS[id][0]+'</h3>'+taskRows(id)+'</div>').join('')+'</div>'}
function taskRows(id){let ts=tasks(id);return ts.length?ts.map((t,i)=>'<div class="mini '+(t.status==='Silindi'?'muted':'')+'"><b>'+esc(t.status||'AГ§Дұk')+'</b> В· '+esc(t.due||'Teslim yok')+'<br>'+esc(t.text)+'<br><button class="btn xs" onclick="doneTask(\''+id+'\','+i+')">TamamlandДұ</button> <button class="btn red xs" onclick="deleteTask(\''+id+'\','+i+')">KaldДұr</button></div>').join(''):'<div class="mini">GГ¶rev yok.</div>'}
function renderSettingsView(){view.innerHTML='<div class="grid"><div class="card"><h3>YГ¶netici Atama</h3><select id="managerTarget">'+Object.keys(AGENTS).map(id=>'<option value="'+id+'" '+(id===current?'selected':'')+'>'+AGENTS[id][0]+'</option>').join('')+'</select><select id="managerSelect" style="margin-top:8px">'+Object.keys(AGENTS).map(id=>'<option value="'+id+'">'+AGENTS[id][0]+'</option>').join('')+'</select><button class="btn blue" style="margin-top:8px" onclick="assignManager()">YГ¶netici Ata</button><button class="btn red" style="margin-top:8px" onclick="clearManager()">YГ¶neticiyi KaldДұr</button></div><div class="card"><h3>Ajan DosyasДұ</h3><div class="mini">'+esc(file())+'</div><textarea id="fileNote" placeholder="Dosyaya not ekle..." style="margin-top:8px"></textarea><button class="btn" onclick="saveFileNote()">Kaydet</button></div><div class="card"><h3>Telegram</h3><input id="tgHandle" value="'+esc(localStorage.getItem(K+'tg_'+current)||'')+'" placeholder="@telegram_kullanici"><button class="btn" style="margin-top:8px" onclick="saveTelegram()">Kaydet</button><textarea id="tgMsg" placeholder="Telegram mesajДұ..." style="margin-top:8px"></textarea><button class="btn blue" onclick="openTelegram()">TelegramвҖҷdan Mesaj GГ¶nder</button></div></div>'}
async function ask(prompt){let payload={model:'claude-sonnet-4-5',max_tokens:1600,messages:[{role:'user',content:prompt}]};let res=await fetch('/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let d=await res.json();if(!res.ok)throw new Error((d.error&&(d.error.message||d.error))||'AI hatasДұ');return d.content&&d.content[0]?d.content[0].text:JSON.stringify(d)}function context(t){let m=meta()[current]||{};return 'Sen '+AGENTS[current][0]+' ajanДұsДұn. Grup:'+m.group+' Yetki:'+m.perm+' GГ¶rev grubu:'+m.role+' Dosya:'+file()+' GГ¶revler:'+JSON.stringify(tasks().filter(x=>x.status==='AГ§Дұk'))+' Д°stek:'+t+' TГјrkГ§e, net, aksiyon odaklДұ yaz.'}
async function sendMsg(){let t=msgBox.value.trim();if(!t)return;msgBox.value='';await sendDirect(t)}async function sendDirect(t){let h=hist();h.push({role:'user',text:t});h.push({role:'agent',text:'YazДұyor...'});saveHist(h);render();try{let ans=await ask(context(t));h=hist();h[h.length-1]={role:'agent',text:ans};saveHist(h);render()}catch(e){h=hist();h[h.length-1]={role:'agent',text:'Hata: '+e.message};saveHist(h);render()}}function dailyReport(){sendDirect('TГјm ajans iГ§in gГјnlГјk rapor hazДұrla. ГҮalДұЕҹma gruplarДұ, aГ§Дұk gГ¶revler, yГ¶neticiler ve son toplantДұlarДұ Г¶zetle.')}
function createGroup(){let n=groupName.value.trim();if(!n)return;let gs=groups();if(!gs.find(g=>g.name===n))gs.unshift({name:n});saveGroups(gs);log('Grup oluЕҹturuldu: '+n);render()}function assignGroup(){let id=groupAgent.value,m=meta();m[id]={...(m[id]||{}),group:groupPick.value,perm:agentPerm.value,role:agentRole.value};saveMeta(m);log('Ajan gruba atandДұ: '+AGENTS[id][0]);render()}function clearAgentGroup(){let m=meta();delete m[current];saveMeta(m);log('Grup/yetki kaldДұrДұldДұ: '+AGENTS[current][0]);render()}function deleteGroup(name){if(!confirm('Grup silinsin mi?'))return;saveGroups(groups().filter(g=>g.name!==name));let m=meta();Object.keys(m).forEach(id=>{if(m[id].group===name)delete m[id].group});saveMeta(m);render()}function assignManager(){let m=managers(),target=(document.getElementById('managerTarget')||{}).value||current;m[target]=managerSelect.value;saveManagers(m);log('YГ¶netici atandДұ: '+AGENTS[target][0]);render()}function clearManager(){let m=managers(),target=(document.getElementById('managerTarget')||{}).value||current;delete m[target];saveManagers(m);render()}function assignTask(){let id=(document.getElementById('taskAgent')||{}).value||current,ts=tasks(id);if(!taskText.value.trim())return;ts.unshift({text:taskText.value.trim(),due:taskDue.value||'Teslim yok',status:'AГ§Дұk'});saveTasks(ts,id);log('GГ¶rev atandДұ: '+AGENTS[id][0]);render()}function doneTask(id,i){let ts=tasks(id);if(ts[i])ts[i].status='TamamlandДұ';saveTasks(ts,id);render()}function deleteTask(id,i){let ts=tasks(id);if(ts[i])ts[i].status='Silindi';saveTasks(ts,id);render()}function saveFileNote(){let n=fileNote.value.trim();if(!n)return;saveFile((file()?file()+'\n':'')+'- '+new Date().toLocaleString('tr')+': '+n);render()}function saveTelegram(){localStorage.setItem(K+'tg_'+current,tgHandle.value.trim().replace('@',''));render()}function openTelegram(){let v=(localStorage.getItem(K+'tg_'+current)||'').replace('@',''),m=(document.getElementById('tgMsg')||{}).value||'Madmext ADS mesajДұ';try{navigator.clipboard&&navigator.clipboard.writeText(m)}catch(e){}window.open(v?'https://t.me/'+encodeURIComponent(v):'https://t.me/share/url?url=&text='+encodeURIComponent(m),'_blank')}
