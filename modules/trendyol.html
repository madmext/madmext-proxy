<style>
.ty-wrap{display:flex;flex-direction:column;height:calc(100vh - 52px);overflow:hidden}
.ty-toprow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;flex-shrink:0;gap:8px;flex-wrap:wrap}
.ty-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--m);border:none;background:transparent;transition:all .15s}
.ty-tab.active{background:#f27a1a;color:#fff}
.ty-tab:hover:not(.active){background:var(--b);color:var(--t)}
.ty-chip-group{display:flex;gap:2px;background:var(--s2);border:1px solid var(--b);border-radius:24px;padding:3px;flex-shrink:0}
.ty-chip{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:500;color:var(--m);border:1px solid transparent;background:transparent;transition:all .15s;white-space:nowrap}
.ty-chip.active{background:var(--bg);color:var(--t);border-color:var(--b2);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.ty-chip:hover:not(.active){color:var(--t)}
.ty-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:8px;flex-shrink:0}
@media(max-width:900px){.ty-summary{grid-template-columns:repeat(3,1fr)}}
.ty-card{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:10px 12px;position:relative;overflow:hidden}
.ty-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#f27a1a}
.ty-lbl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.ty-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:600}
.ty-filter-bar{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;padding-bottom:8px}
.ty-fsel{background:var(--s);border:1.5px solid var(--b2);color:var(--t);padding:6px 10px;font-size:11px;border-radius:7px;cursor:pointer;outline:none;font-family:inherit;height:32px}
.ty-fsel:focus{border-color:#f27a1a}
.ty-finput{background:var(--s);border:1.5px solid var(--b2);color:var(--t);padding:6px 10px 6px 28px;font-size:11px;border-radius:7px;outline:none;font-family:inherit;width:140px;height:32px}
.ty-finput:focus{border-color:#f27a1a}
.ty-finput-w{position:relative}
.ty-finput-w::before{content:'\U0001f50d';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
.ty-fdate{background:var(--s);border:1.5px solid var(--b2);color:var(--t);padding:6px 8px;font-size:11px;border-radius:7px;outline:none;cursor:pointer;height:32px}
.ty-fdate:focus{border-color:#f27a1a}
.ty-fbtn{background:#f27a1a;color:#fff;border:none;padding:6px 16px;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;height:32px}
.ty-fbtn:hover{opacity:.85}
.ty-freset{background:var(--s);color:var(--t);border:1.5px solid var(--b2);padding:6px 14px;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;height:32px}
.ty-freset:hover{border-color:#f27a1a;color:#f27a1a}
.ty-tbl-wrap{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:auto;flex:1;min-height:0}
.ty-tbl-wrap table{width:100%;border-collapse:collapse;font-size:11px}
.ty-tbl-wrap th{background:#0d0e0f;padding:7px 9px;text-align:left;color:var(--m);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--b);position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none;letter-spacing:.5px}
.ty-tbl-wrap th:hover{color:#f27a1a}
.ty-tbl-wrap th.s-asc::after{content:' \u25b2';color:#f27a1a}
.ty-tbl-wrap th.s-desc::after{content:' \u25bc';color:#f27a1a}
.ty-tbl-wrap td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;vertical-align:middle}
.ty-tbl-wrap tr:hover td{background:rgba(255,255,255,.02)}
.ty-bdg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-family:'DM Mono',monospace}
.ty-bdg.y{background:rgba(66,183,42,.12);color:var(--g);border:1px solid rgba(66,183,42,.3)}
.ty-bdg.b{background:rgba(138,141,145,.1);color:var(--m);border:1px solid rgba(138,141,145,.2)}
.ty-bdg.t{background:rgba(24,119,242,.1);color:var(--a);border:1px solid rgba(24,119,242,.2)}
.ty-bdg.h{background:rgba(240,180,41,.1);color:var(--y);border:1px solid rgba(240,180,41,.2)}
.ty-erow{cursor:pointer}
.ty-erow:hover td{background:rgba(242,122,26,.05)!important}
.ty-ebtn{width:18px;height:18px;border-radius:3px;border:1px solid var(--b2);background:var(--s2);color:var(--m);font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-right:5px;transition:all .15s;vertical-align:middle}
.ty-ebtn.open{background:#f27a1a;color:#fff;border-color:#f27a1a}
.ty-drow{background:rgba(242,122,26,.02)}
.ty-mo{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10001;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.ty-mb{background:var(--s);border:1px solid var(--b);border-radius:12px;width:100%;max-width:960px}
.ty-mhdr{background:var(--s2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
.ty-mbody{padding:18px;overflow-y:auto;max-height:82vh}
.ty-mtab{padding:5px 13px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;color:var(--m);border:none;background:var(--s2);transition:all .15s}
.ty-mtab.active{background:#f27a1a;color:#fff}
.ty-sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.ty-sb{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:10px 12px}
.ty-slb{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.ty-sv{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.ty-chat-wrap{display:flex;flex-direction:column;height:100%}
.ty-chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:12px;min-height:0}
.ty-chat-msg{padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.7;max-width:88%}
.ty-chat-msg.user{background:#f27a1a;color:#fff;align-self:flex-end}
.ty-chat-msg.ai{background:var(--s2);border:1px solid var(--b);align-self:flex-start}
.ty-chat-msg.sys{background:transparent;border:1px solid var(--b);color:var(--m);align-self:center;font-size:10px;text-align:center;max-width:100%}
.ty-chat-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--b);flex-shrink:0}
.ty-chat-ta{flex:1;background:var(--bg);border:1px solid var(--b);color:var(--t);padding:8px 12px;font-size:12px;border-radius:6px;resize:none;height:60px;font-family:inherit}
.ty-chat-ta:focus{outline:none;border-color:#f27a1a}
.ty-chat-send{background:#f27a1a;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;height:60px}
.ty-uz{border:2px dashed var(--b);border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin:16px}
.ty-uz:hover{border-color:#f27a1a;background:rgba(242,122,26,.04)}
</style>

<div class="ty-wrap">
  <div class="ty-toprow">
    <div style="display:flex;gap:2px;flex-wrap:wrap" id="tyTabs">
      <button class="ty-tab active" data-tab="dashboard" onclick="tyTab('dashboard',this)">&#128202; Dashboard</button>
      <button class="ty-tab" data-tab="urun" onclick="tyTab('urun',this)">&#128230; Urun Reklamlari</button>
      <button class="ty-tab" data-tab="magaza" onclick="tyTab('magaza',this)">&#127978; Magaza</button>
      <button class="ty-tab" data-tab="influencer" onclick="tyTab('influencer',this)">&#128100; Influencer</button>
      <button class="ty-tab" data-tab="meta" onclick="tyTab('meta',this)">&#128280; Meta</button>
      <button class="ty-tab" data-tab="ai" onclick="tyTab('ai',this)">&#129302; AI Asistan</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn sm sec" onclick="tyLoad()">&#128260;</button>
      <button class="btn sm sec" onclick="nav('dosyalar',null)" style="font-size:10px">&#128193; Dosya</button>
      <span id="tySt" style="font-size:10px;color:var(--m)"></span>
    </div>
  </div>
  <div class="ty-chip-group" id="tyChipGroup" style="margin-bottom:8px;align-self:flex-start;display:none">
    <button class="ty-chip active" id="chip-all" onclick="tyChip('',this)">Tumu <span id="chip-cnt-all">0</span></button>
    <button class="ty-chip" id="chip-aktif" onclick="tyChip('Yayinda',this)">Aktif <span id="chip-cnt-aktif">0</span></button>
    <button class="ty-chip" id="chip-bekliyor" onclick="tyChip('Bekliyor',this)">Islem Bekliyor <span id="chip-cnt-bekliyor">0</span></button>
    <button class="ty-chip" id="chip-biten" onclick="tyChip('biten',this)">Biten <span id="chip-cnt-biten">0</span></button>
  </div>
  <div class="ty-summary" id="tySummary" style="display:none">
    <div class="ty-card"><div class="ty-lbl">Harcama</div><div class="ty-val" id="ty-spend">-</div></div>
    <div class="ty-card"><div class="ty-lbl">Toplam Ciro</div><div class="ty-val" id="ty-rev" style="color:var(--g)">-</div></div>
    <div class="ty-card"><div class="ty-lbl">Ort. ROAS</div><div class="ty-val" id="ty-roas">-</div></div>
    <div class="ty-card"><div class="ty-lbl">Toplam Satis</div><div class="ty-val" id="ty-sales">-</div></div>
    <div class="ty-card"><div class="ty-lbl">Tiklanma</div><div class="ty-val" id="ty-clicks">-</div></div>
    <div class="ty-card"><div class="ty-lbl">Goruntulenme</div><div class="ty-val" id="ty-impr">-</div></div>
  </div>
  <div class="ty-filter-bar" id="tyFilterBar" style="display:none">
    <select class="ty-fsel" id="tyStatusF" onchange="tyStatusChange()">
      <option value="">Reklam Durumu</option>
      <option value="Yayinda">Yayinda</option>
      <option value="Duraklatildi">Duraklatildi</option>
      <option value="Tamamlandi">Tamamlandi</option>
      <option value="Sonlandiriliyor">Sonlandiriliyor</option>
      <option value="Sonlandirildi">Sonlandirildi</option>
      <option value="Isleme Alindi">Isleme Alindi</option>
    </select>
    <input type="date" class="ty-fdate" id="tyDateFrom" onchange="tyRender()">
    <span style="font-size:11px;color:var(--m)">-</span>
    <input type="date" class="ty-fdate" id="tyDateTo" onchange="tyRender()">
    <div class="ty-finput-w"><input type="text" class="ty-finput" id="tySearch" placeholder="Reklam Adi" oninput="tyRender()"></div>
    <div class="ty-finput-w"><input type="text" class="ty-finput" id="tyBarkod" placeholder="Urun Barkodu" oninput="tyRender()"></div>
    <button class="ty-fbtn" onclick="tyRender()">Filtrele</button>
    <button class="ty-freset" onclick="tyResetFilters()">Temizle</button>
  </div>
  <div id="tyContent" class="ty-tbl-wrap" style="display:flex;align-items:center;justify-content:center">
    <div style="text-align:center;color:var(--m);padding:40px">
      <div style="font-size:32px;margin-bottom:8px">&#128251;</div>
      <div>Yukleniyor...</div>
    </div>
  </div>
</div>

<div id="tyModal" style="display:none" class="ty-mo" onclick="if(event.target===this)tyMClose()">
  <div class="ty-mb">
    <div class="ty-mhdr">
      <div>
        <div style="font-size:14px;font-weight:700" id="tyMTitle">-</div>
        <div style="font-size:11px;color:var(--m);margin-top:2px" id="tyMSub">-</div>
      </div>
      <button onclick="tyMClose()" style="background:none;border:none;color:var(--m);font-size:18px;cursor:pointer;padding:4px">x</button>
    </div>
    <div class="ty-mbody">
      <div style="display:flex;gap:4px;margin-bottom:14px">
        <button class="ty-mtab active" onclick="tyMTab('genel',this)">Genel</button>
        <button class="ty-mtab" onclick="tyMTab('urunler',this)">Urunler</button>
        <button class="ty-mtab" onclick="tyMTab('grafik',this)">Grafik</button>
      </div>
      <div id="tyMContent"></div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var _tab='dashboard',_db={urun:[],magaza:[],influencer:[],meta:[],urun_detay:[]};
var _exp={},_mData=null,_mTab='genel',_chip='',_chatH=[],_chatLoading=false;
var _sort={col:'harcama',dir:'desc'};

function N(s){if(!s&&s!==0)return 0;return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;}
function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M\u20ba';if(n>=1000)return(n/1000).toFixed(0)+'K\u20ba';return n.toFixed(0)+'\u20ba';}
function fmtN(n){return(parseInt(n)||0).toLocaleString('tr');}
function rc(v){return v>=10?'var(--g)':v>=5?'var(--y)':'var(--r)';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bc(s){if(!s)return 'b';s=s.toLowerCase();if(s.includes('yayinda')||s.includes('yay\u0131nda'))return 'y';if(s.includes('tamamland'))return 't';if(s.includes('hesaplan')||s.includes('i\u015fleme'))return 'h';return 'b';}
function thC(c){return _sort.col===c?(_sort.dir==='desc'?'s-desc':'s-asc'):'';}
function sortR(rows,col){return rows.slice().sort(function(a,b){var av=N(a[col]),bv=N(b[col]);if(av===0&&bv===0){av=(a[col]||'').toLowerCase();bv=(b[col]||'').toLowerCase();}return _sort.dir==='asc'?(av>bv?1:-1):(bv>av?1:-1);});}
window.tySort=function(c){_sort.dir=_sort.col===c&&_sort.dir==='desc'?'asc':'desc';_sort.col=c;tyRender();};

window.tyTab=function(tab,el){_tab=tab;_exp={};_chip='';document.querySelectorAll('.ty-tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');_resetF();tyRender();};
function _resetF(){['tyStatusF','tySearch','tyBarkod'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});['tyDateFrom','tyDateTo'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});document.querySelectorAll('.ty-chip').forEach(function(c){c.classList.remove('active');});var ca=document.getElementById('chip-all');if(ca)ca.classList.add('active');}
window.tyResetFilters=function(){_resetF();tyRender();};
window.tyChip=function(val,el){_chip=val;document.querySelectorAll('.ty-chip').forEach(function(c){c.classList.remove('active');});el.classList.add('active');var sf=document.getElementById('tyStatusF');if(sf)sf.value='';tyRender();};
window.tyStatusChange=function(){_chip='';document.querySelectorAll('.ty-chip').forEach(function(c){c.classList.remove('active');});var ca=document.getElementById('chip-all');if(ca)ca.classList.add('active');tyRender();};
function updChips(rows){var ak=rows.filter(function(r){var s=(r.statu||'').toLowerCase();return s.includes('yay');}).length;var bt=rows.length-ak;function sc(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}sc('chip-cnt-all',rows.length);sc('chip-cnt-aktif',ak);sc('chip-cnt-bekliyor',0);sc('chip-cnt-biten',bt);}

window.tyLoad=async function(){var st=document.getElementById('tySt');if(st)st.textContent='...';try{var r=await fetch('/trendyol/data');var res=await r.json();_db.urun=res.urun||[];_db.magaza=res.magaza||[];_db.influencer=res.influencer||[];_db.meta=res.meta||[];_db.urun_detay=res.urun_detay||[];var tot=_db.urun.length+_db.magaza.length+_db.influencer.length+_db.meta.length;if(st)st.textContent=tot?'\u2713 '+tot+' kayit':'';tyRender();}catch(e){if(st)st.textContent='Hata';}};

function updCards(rows,keys){var k=keys||{spend:'harcama',rev:'toplam_ciro',roas:'roas',sales:'toplam_satis',clicks:'tiklanma',impr:'goruntulenme'};var ts=0,tr=0,tsl=0,tc=0,ti=0,rs=0,rn=0;rows.forEach(function(r){ts+=N(r[k.spend]);tr+=N(r[k.rev]||r.ciro||0);tsl+=parseInt(r[k.sales]||r.satis||0);tc+=parseInt(r[k.clicks]||r.ziyaret||0);ti+=parseInt(r[k.impr]||0);var v=N(r[k.roas]);if(v>0){rs+=v;rn++;}});function s(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}s('ty-spend',fmt(ts));s('ty-rev',fmt(tr));s('ty-roas',(rn>0?(rs/rn).toFixed(2):0)+'x');s('ty-sales',tsl.toLocaleString('tr'));s('ty-clicks',tc.toLocaleString('tr'));s('ty-impr',ti.toLocaleString('tr'));}

function tyRender(){
var content=document.getElementById('tyContent');
var summary=document.getElementById('tySummary');
var chipGroup=document.getElementById('tyChipGroup');
var filterBar=document.getElementById('tyFilterBar');
if(!content)return;
var isTable=['urun','magaza','influencer','meta'].includes(_tab);
content.style.display='';content.style.alignItems='';content.style.justifyContent='';
if(summary)summary.style.display=isTable?'grid':'none';
if(chipGroup)chipGroup.style.display=isTable?'flex':'none';
if(filterBar)filterBar.style.display=isTable?'flex':'none';
if(_tab==='dashboard'){renderDash(content);return;}
if(_tab==='ai'){renderAI(content);return;}
var q=(document.getElementById('tySearch').value||'').toLowerCase();
var bk=(document.getElementById('tyBarkod').value||'').toLowerCase();
var sf=document.getElementById('tyStatusF').value||'';
var df=document.getElementById('tyDateFrom').value||'';
var dt=document.getElementById('tyDateTo').value||'';
if(_tab==='urun')renderUrun(content,q,bk,sf,df,dt);
else if(_tab==='magaza')renderMagaza(content,q,sf,df,dt);
else if(_tab==='influencer')renderInfluencer(content,q,sf,df,dt);
else if(_tab==='meta')renderMeta(content,q,sf,df,dt);
}

function noData(content,icon,title,desc,tab){content.innerHTML='<div class="ty-uz" onclick="nav(\'dosyalar\',null)"><div style="font-size:36px;margin-bottom:10px">'+icon+'</div><div style="font-size:13px;font-weight:600;color:var(--t);margin-bottom:6px">'+title+'</div><div style="font-size:11px;color:var(--m);margin-bottom:16px">'+desc+'</div><button class="btn" style="background:#f27a1a">Dosya Yukle</button></div>';}

function renderDash(content){
var all=_db.urun.concat(_db.magaza).concat(_db.influencer).concat(_db.meta);
var now=new Date().toLocaleString('tr');
if(!all.length){content.innerHTML='<div class="ty-uz" onclick="nav(\'dosyalar\',null)"><div style="font-size:48px;margin-bottom:12px">&#128256;</div><div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--t)">Trendyol Reklam Verisi Yuklenmemis</div><div style="font-size:12px;color:var(--m);margin-bottom:20px">Dosya Yonetimi den Excel raporlarini yukle</div><button class="btn" style="background:#f27a1a">Dosya Yonetimi</button></div>';return;}
var totH=0,totC=0,totS=0,totCl=0,totIm=0,rsS=0,rsN=0;
_db.urun.forEach(function(r){totH+=N(r.harcama);totC+=N(r.toplam_ciro);totS+=parseInt(r.toplam_satis||0);totCl+=parseInt(r.tiklanma||0);totIm+=parseInt(r.goruntulenme||0);var v=N(r.roas);if(v>0){rsS+=v;rsN++;}});
var avgR=rsN>0?(rsS/rsN):0;
var uAk=_db.urun.filter(function(r){return (r.statu||'').toLowerCase().includes('yay');}).length;
var mAk=_db.magaza.filter(function(r){return (r.statu||'').toLowerCase().includes('yay');}).length;
var iAk=_db.influencer.filter(function(r){return (r.statu||'').toLowerCase().includes('yay');}).length;
var metAk=_db.meta.filter(function(r){return (r.statu||'').toLowerCase().includes('yay');}).length;
function dc(lbl,val,sub,col){return '<div style="background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+col+'"></div><div style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">'+lbl+'</div><div style="font-family:\'DM Mono\',monospace;font-size:17px;font-weight:700;color:'+col+'">'+val+'</div><div style="font-size:9px;color:var(--m);margin-top:3px">'+sub+'</div></div>';}
function pc(icon,name,total,aktif,tab){return '<div style="background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s" onclick="tyTabById(\''+tab+'\')" onmouseover="this.style.borderColor=\'#f27a1a\'" onmouseout="this.style.borderColor=\'var(--b)\'"><div style="font-size:22px;margin-bottom:8px">'+icon+'</div><div style="font-size:12px;font-weight:600;margin-bottom:6px">'+name+'</div><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--m)">Toplam</span><span style="font-family:\'DM Mono\',monospace">'+total+'</span></div><div style="display:flex;justify-content:space-between;font-size:11px;margin-top:3px"><span style="color:var(--g)">Aktif</span><span style="font-family:\'DM Mono\',monospace;color:var(--g)">'+aktif+'</span></div>'+(total===0?'<div style="font-size:10px;color:var(--m);margin-top:6px">Dosya yuklenmemis</div>':'')+'</div>';}
var top5=_db.urun.slice().sort(function(a,b){return N(b.harcama)-N(a.harcama);}).slice(0,5);
var maxH=top5.length?N(top5[0].harcama):1;
