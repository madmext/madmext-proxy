  <script>
    (function(){

      var STATUS=['Yeni Başvuru','Ön Eleme','Görüşüldü','Anlaşma / Sözleşme','Ürün Gönderilecek','İçerik Bekleniyor','İçerik Onayda','Yayında','Hakediş Devam Ediyor','Ödendi','Askıda','Reddedildi'];

      var PAYMENT_STATUS=['Hakediş Yok','Hakediş Bekliyor','Hesaplandı','Fatura Bekleniyor','Ödeme Bekliyor','Ödendi'];
      var OWNERS=['Atanmadı','Mustafa','Admin','Pazarlama','Influencer Ekibi','Müşteri Hizmetleri'];
      var DEFAULT_TODOS=['Profili ve içerik kalitesini kontrol et','Takipçi / erişim bilgisini doğrula','Teklif ve komisyon oranını netleştir','KVKK / sözleşme onayını kontrol et','Affiliate kodu veya linki oluştur','Ürün gönderimi ve içerik briefini planla','Yayın linkini ve satış takibini kaydet','Hakedişi hesapla ve ödeme durumunu kapat'];
      window.mxAffState=window.mxAffState||{records:[],selectedId:null,section:null,loaded:false};
      var S=window.mxAffState; S.section=window._affiliateSection||new URLSearchParams(location.search).get('tab')||S.section||'dashboard';
      function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
      function clean(s){return String(s==null?'':s).replace(/\s+/g,' ').trim()}
      function norm(s){return clean(s).toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c')}
      function num(v){var s=String(v==null?'':v).toLowerCase().replace(/\s/g,'').replace(/bin/g,'000').replace(/milyon/g,'000000').replace(/[^0-9,\.]/g,''); if(!s)return 0; if(s.indexOf(',')>-1&&s.indexOf('.')>-1)s=s.replace(/\./g,'').replace(',','.'); else if((s.match(/\./g)||[]).length===1){var p=s.split('.'); if(p[1]&&p[1].length===3)s=p[0]+p[1];} else s=s.replace(',','.'); var n=parseFloat(s); return isFinite(n)?Math.round(n):0}
      function money(v){var n=num(v); if(!n){var s=String(v==null?'':v).replace(/[^0-9,\.\-]/g,'').replace(',','.'); n=parseFloat(s)||0} return n}
      function pct(v){var s=String(v==null?'':v).replace('%','').replace(',','.').replace(/[^0-9.\-]/g,''); var n=parseFloat(s); return isFinite(n)?n:0}
      function fmt(n){return Number(n||0).toLocaleString('tr-TR')}
      function tl(n){return Number(n||0).toLocaleString('tr-TR',{maximumFractionDigits:0})+'₺'}
      function now(){return new Date().toISOString()}
      function plusDays(d){var x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)}
      function idFor(r){try{return 'aff_'+btoa(unescape(encodeURIComponent((r.email||'')+'|'+(r.phone||'')+'|'+(r.name||'')+'|'+(r.instagram||'')))).replace(/[^a-zA-Z0-9]/g,'').slice(0,24)}catch(e){return 'aff_'+Date.now()}}
      function field(row,keys){var names=Object.keys(row||{}); for(var k of keys){var nk=norm(k); var f=names.find(function(h){return norm(h).indexOf(nk)>-1}); if(f&&row[f]!=null&&row[f]!=='')return clean(row[f]);} return ''}
      function stageTodos(status){var map={'Yeni Başvuru':['Başvuruyu aç ve kanal bilgilerini kontrol et','Spam / eksik alan var mı bak'],'Ön Eleme':['Profil kalitesini puanla','Takipçi gerçekliği ve yorum kalitesini kontrol et'],'Görüşüldü':['WhatsApp / mail görüşme notunu ekle','Teklif beklentisini yaz'],'Anlaşma / Sözleşme':['Komisyon oranını kaydet','Sözleşme / KVKK onayını kapat'],'Ürün Gönderilecek':['Gönderilecek ürünleri belirle','Kargo durumunu takip et'],'İçerik Bekleniyor':['Brief gönder','Yayın tarihini planla'],'İçerik Onayda':['İçeriği kontrol et','Revize gerekiyorsa not düş'],'Yayında':['Canlı yayın linkini ekle','Kod/link satış takibini başlat'],'Hakediş Devam Ediyor':['Satış ve komisyonu hesapla','Fatura / IBAN bilgisini kontrol et'],'Ödendi':['Ödeme dekontunu notlara ekle','Dönem kapanışını logla']};return map[status]||DEFAULT_TODOS.slice(0,3)}
      function score(r){var f=Math.min(40,Math.log10(Math.max(1,(r.totalFollowers||0)))*8); var reach=Math.min(22,Math.log10(Math.max(1,(r.reach||0)))*5); var e=Math.min(18,(r.engagement||0)*3); var fit=norm((r.category||'')+' '+(r.niche||'')).match(/giyim|moda|kombin|erkek|kadın|kadin|stil/)?15:6; var live=(r.lastLiveUrl?5:0); return Math.round(f+reach+e+fit+live)}
      function calcPayable(r){var sales=Number(r.salesAmount||0), rate=Number(r.commissionRate||0), fixed=Number(r.fixedFee||0); return Math.round((sales*rate/100)+fixed)}
      function normalizeRecord(r){r=r||{}; r.status=r.status||'Yeni Başvuru'; r.contentStatus=r.contentStatus||'Planlanmadı'; r.paymentStatus=r.paymentStatus||'Hakediş Yok'; r.owner=r.owner||'Atanmadı'; r.priority=r.priority||'Normal'; r.commissionRate=Number(r.commissionRate||10); r.fixedFee=Number(r.fixedFee||0); r.salesAmount=Number(r.salesAmount||0); r.orderCount=Number(r.orderCount||0); r.paidAmount=Number(r.paidAmount||0); r.payableAmount=Number(r.payableAmount||calcPayable(r)); r.instagramFollowers=Number(r.instagramFollowers||0); r.tiktokFollowers=Number(r.tiktokFollowers||0); r.totalFollowers=Number(r.totalFollowers||(r.instagramFollowers+r.tiktokFollowers)); r.score=score(r); r.todos=Array.isArray(r.todos)?r.todos:DEFAULT_TODOS.map(function(t,i){return{id:'td_'+Date.now()+'_'+i,text:t,done:false,createdAt:now()}}); r.notes=Array.isArray(r.notes)?r.notes:[]; r.logs=Array.isArray(r.logs)?r.logs:[{time:now(),text:'Kayıt oluşturuldu.'}]; r.updatedAt=r.updatedAt||now(); r.createdAt=r.createdAt||now(); return r}
      function mapRow(row){var r={memberId:field(row,['üye id','uye id']),accountName:field(row,['üye adı','uye adi']),name:field(row,['ad soyad','adınız soyadınız','adiniz soyadiniz','isim']),email:field(row,['e-posta','eposta','email']),phone:field(row,['telefon','gsm']),memberEmail:field(row,['madmext üyelik e-postası','madmext uyelik epostasi']),instagram:field(row,['instagram kullanıcı','instagram kullanici','instagram']),instagramFollowersRaw:field(row,['instagram takipçi','instagram takipci']),tiktok:field(row,['tiktok kullanıcı','tiktok kullanici','tiktok']),tiktokFollowersRaw:field(row,['tiktok takipçi','tiktok takipci']),mediaKit:field(row,['medya kit','örnek içerik','ornek icerik']),otherLink:field(row,['youtube','blog','diğer link','diger link']),engagementRaw:field(row,['ortalama etkileşim','ortalama etkilesim']),reachRaw:field(row,['aylık ortalama erişim','aylik ortalama erisim','erişim','erisim']),niche:field(row,['içerik alanı','icerik alani']),category:field(row,['ana kategori','tanıtmak istediğin ana kategori','tanitmak istedigin ana kategori','kategori']),categoryDetail:field(row,['kategori detay']),collectionIdea:field(row,['koleksiyon']),iban:field(row,['iban','ödeme bilgileri','odeme bilgileri']),ibanOwner:field(row,['iban alıcı','iban alici']),bank:field(row,['banka adı','banka adi']),invoiceStatus:field(row,['fatura','makbuz']),applicantNote:field(row,['ek not','not']),contract:field(row,['sözleşme','sozlesme']),affiliateCode:field(row,['affiliate kod','kod','kupon']),lastLiveUrl:field(row,['yayın link','yayin link','canlı link','canli link']),salesAmount:money(field(row,['satış tutarı','satis tutari','ciro'])),orderCount:num(field(row,['sipariş','siparis','order'])),commissionRate:pct(field(row,['komisyon']))||10};
        r.instagramFollowers=num(r.instagramFollowersRaw); r.tiktokFollowers=num(r.tiktokFollowersRaw); r.totalFollowers=r.instagramFollowers+r.tiktokFollowers; r.reach=num(r.reachRaw); r.engagement=pct(r.engagementRaw); r.id=idFor(r); r.status=r.lastLiveUrl?'Yayında':'Yeni Başvuru'; r.contentStatus=r.lastLiveUrl?'Yayında':'Planlanmadı'; r.paymentStatus=r.salesAmount?'Hakediş Bekliyor':'Hakediş Yok'; r.priority=(r.totalFollowers>=100000||r.reach>=500000)?'Yüksek':(r.totalFollowers>=10000||r.reach>=50000?'Orta':'Normal'); r.owner='Atanmadı'; r.contentDue=plusDays(7); r.publishDate=''; r.cargoStatus='Bekliyor'; r.agreementStatus='Bekliyor'; r.campaign='Affiliate Program'; r.productPlan=''; r.logs=[{time:now(),text:'Excel ile başvuru içe aktarıldı.'}]; r.notes=r.applicantNote?[{time:now(),text:'Form notu: '+r.applicantNote}]:[]; r.todos=DEFAULT_TODOS.map(function(t,i){return{id:'td_'+Date.now()+'_'+i,text:t,done:false,createdAt:now()}}); return normalizeRecord(r)}
      function loadLocal(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]').map(normalizeRecord)}catch(e){return[]}}
      function saveLocal(){localStorage.setItem(STORAGE_KEY,JSON.stringify(S.records));}
      async function actor(){try{var r=await fetch((typeof px==='function'?px():'')+'/auth/me',{credentials:'include'}); if(r.ok)return await r.json()}catch(e){} return {name:'Sistem',email:''}}

      async function loadServerSnapshot(){try{var r=await fetch((typeof px==='function'?px():'')+'/logs',{credentials:'include'}); if(!r.ok)return null; var d=await r.json(); var logs=d.actionLog||[]; var hit=logs.find(function(x){return x.module==='affiliate_program'&&x.newData&&Array.isArray(x.newData.records)}); return hit?hit.newData.records.map(normalizeRecord):null}catch(e){return null}}

      function statusClass(s){if(['Yayında','Hakediş Devam Ediyor','Ödendi','Aktif','Kod Oluşturuldu','Link Alındı'].indexOf(s)>-1)return'good'; if(['Reddedildi','Askıda','Revize İstendi'].indexOf(s)>-1)return'bad'; if(['Yeni Başvuru','Planlanmadı'].indexOf(s)>-1)return'new'; if(['Hesaplandı','Ödeme Bekliyor','Fatura Bekleniyor','İçerik Onayda'].indexOf(s)>-1)return'info'; return'warn'}
      function openTodos(r){return (r.todos||[]).filter(function(t){return !t.done}).length}
      function isLive(r){return r.contentStatus==='Yayında'||r.contentStatus==='Link Alındı'||r.status==='Yayında'||!!r.lastLiveUrl}
      function hasEarning(r){return Number(r.payableAmount||calcPayable(r))>0||r.paymentStatus!=='Hakediş Yok'||r.status==='Hakediş Devam Ediyor'}
      function filtered(base){var q=norm(document.getElementById('mxAffSearch')?.value||''); var st=document.getElementById('mxAffStatusFilter')?.value||''; var ow=document.getElementById('mxAffOwnerFilter')?.value||''; var arr=(base||S.records).filter(function(r){var hay=norm([r.name,r.email,r.phone,r.instagram,r.tiktok,r.category,r.categoryDetail,r.niche,r.owner,r.status,r.contentStatus,r.paymentStatus,r.affiliateCode].join(' ')); return (!q||hay.indexOf(q)>-1)&&(!st||r.status===st||r.contentStatus===st||r.paymentStatus===st)&&(!ow||r.owner===ow)}); var sort=document.getElementById('mxAffSort')?.value||'score_desc'; arr.sort(function(a,b){if(sort==='newest')return String(b.createdAt).localeCompare(String(a.createdAt)); if(sort==='followers_desc')return (b.totalFollowers||0)-(a.totalFollowers||0); if(sort==='todo_desc')return openTodos(b)-openTodos(a); if(sort==='payable_desc')return (b.payableAmount||0)-(a.payableAmount||0); if(sort==='name_asc')return String(a.name||'').localeCompare(String(b.name||''),'tr'); return (b.score||0)-(a.score||0)}); return arr}

      window.mxAffSelect=function(id){S.selectedId=id; render()}
      function selected(){return S.records.find(function(x){return x.id===S.selectedId})}
      window.mxAffUpdateSelected=function(){var r=selected(); if(!r)return; var old=r.status; r.status=document.getElementById('affStatus').value; r.contentStatus=document.getElementById('affContentStatus').value; r.paymentStatus=document.getElementById('affPaymentStatus').value; r.owner=document.getElementById('affOwner').value; r.priority=document.getElementById('affPriority').value; r.affiliateCode=clean(document.getElementById('affCode').value); r.affiliateLink=clean(document.getElementById('affLink').value); r.commissionRate=Number(document.getElementById('affRate').value||0); r.fixedFee=Number(document.getElementById('affFixed').value||0); r.orderCount=Number(document.getElementById('affOrders').value||0); r.salesAmount=Number(document.getElementById('affSales').value||0); r.contentDue=document.getElementById('affDue').value; r.publishDate=document.getElementById('affPub').value; r.lastLiveUrl=clean(document.getElementById('affLive').value); r.productPlan=clean(document.getElementById('affProduct').value); r.payableAmount=calcPayable(r); if(isLive(r)&&r.paymentStatus==='Hakediş Yok')r.paymentStatus='Hakediş Bekliyor'; r.updatedAt=now(); r.score=score(r); r.logs.unshift({time:now(),text:'Süreç güncellendi: '+old+' → '+r.status}); saveLocal(); writeAction('status_update','Affiliate başvuru süreci güncellendi.',r); render(); if(typeof toast==='function')toast('Başvuru güncellendi.')}
      window.mxAffAddStageTodos=function(){var r=selected(); if(!r)return; stageTodos(r.status).forEach(function(t){r.todos.unshift({id:'td_'+Date.now()+Math.random(),text:t,done:false,createdAt:now()})}); r.logs.unshift({time:now(),text:r.status+' aşaması için to-do listesi açıldı.'}); saveLocal(); writeAction('stage_todos','Duruma göre affiliate to-do listesi açıldı.',r); render()}
      window.mxAffAddNote=function(){var r=selected(); var v=clean(document.getElementById('affNewNote')?.value); if(!r||!v)return; r.notes.unshift({time:now(),text:v}); r.logs.unshift({time:now(),text:'Not eklendi: '+v.slice(0,90)}); r.updatedAt=now(); saveLocal(); writeAction('note_added','Affiliate başvurusuna not eklendi.',r); render()}
      window.mxAffAddTodo=function(){var r=selected(); var v=clean(document.getElementById('affNewTodo')?.value); if(!r||!v)return; r.todos.unshift({id:'td_'+Date.now(),text:v,done:false,createdAt:now()}); r.logs.unshift({time:now(),text:'To-do eklendi: '+v}); saveLocal(); writeAction('todo_added','Affiliate başvurusuna to-do eklendi.',r); render()}
      window.mxAffToggleTodo=function(recordId,todoId){var r=S.records.find(function(x){return x.id===recordId})||selected(); if(!r)return; var t=(r.todos||[]).find(function(x){return x.id===todoId}); if(!t)return; t.done=!t.done; r.logs.unshift({time:now(),text:'To-do '+(t.done?'tamamlandı':'yeniden açıldı')+': '+t.text}); saveLocal(); writeAction('todo_toggle','Affiliate to-do durumu değişti.',r); render()}
      window.mxAffMarkLive=function(id){var r=S.records.find(function(x){return x.id===id}); if(!r)return; r.status='Yayında'; r.contentStatus='Yayında'; r.publishDate=r.publishDate||new Date().toISOString().slice(0,10); if(r.paymentStatus==='Hakediş Yok')r.paymentStatus='Hakediş Bekliyor'; r.logs.unshift({time:now(),text:'İçerik yayında olarak işaretlendi.'}); saveLocal(); writeAction('content_live','Affiliate içeriği yayında olarak işaretlendi.',r); render()}
      window.mxAffMarkPaid=function(id){var r=S.records.find(function(x){return x.id===id}); if(!r)return; r.payableAmount=calcPayable(r); r.paidAmount=r.payableAmount; r.paymentStatus='Ödendi'; r.status='Ödendi'; r.logs.unshift({time:now(),text:'Hakediş ödendi olarak kapatıldı: '+tl(r.paidAmount)}); saveLocal(); writeAction('payment_paid','Affiliate hakedişi ödendi olarak kapatıldı.',r); render()}
      window.mxAffAddBlank=function(){var r=normalizeRecord({id:'aff_manual_'+Date.now(),name:'Yeni Başvuru',createdAt:now(),contentDue:plusDays(7),logs:[{time:now(),text:'Manuel başvuru oluşturuldu.'}]}); S.records.unshift(r); S.selectedId=r.id; saveLocal(); writeAction('manual_create','Manuel affiliate başvurusu oluşturuldu.',r); S.section='applications'; render()}
      window.mxAffDuplicateSelected=function(){var r=selected(); if(!r)return; var c=normalizeRecord(JSON.parse(JSON.stringify(r))); c.id='aff_copy_'+Date.now(); c.name=(c.name||'Başvuru')+' Kopya'; c.status='Yeni Başvuru'; c.createdAt=now(); c.updatedAt=now(); c.logs=[{time:now(),text:'Başvuru kopyalandı.'}]; S.records.unshift(c); S.selectedId=c.id; saveLocal(); writeAction('duplicate','Affiliate başvurusu kopyalandı.',c); render()}
      window.mxAffDeleteSelected=function(){var r=selected(); if(!r||!confirm('Bu başvuruyu silmek istiyor musun?'))return; S.records=S.records.filter(function(x){return x.id!==r.id}); S.selectedId=null; saveLocal(); writeAction('delete','Affiliate başvurusu silindi.',r); render()}
      window.mxAffExportCsv=function(){var headers=['Ad Soyad','E-posta','Telefon','Instagram','Instagram Takipçi','TikTok','TikTok Takipçi','Kategori','Süreç','İçerik Durumu','Ödeme Durumu','Sorumlu','Öncelik','Affiliate Kod','Affiliate Link','Sipariş','Satış','Komisyon','Hakediş','Ödenen','Canlı Link','Açık To-do','Not Sayısı']; var lines=[headers].concat(S.records.map(function(r){return[r.name,r.email,r.phone,r.instagram,r.instagramFollowers,r.tiktok,r.tiktokFollowers,r.category||r.niche,r.status,r.contentStatus,r.paymentStatus,r.owner,r.priority,r.affiliateCode,r.affiliateLink,r.orderCount,r.salesAmount,r.commissionRate,r.payableAmount||calcPayable(r),r.paidAmount,r.lastLiveUrl,openTodos(r),(r.notes||[]).length]})); var csv=lines.map(function(row){return row.map(function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}).join(';')}).join('\n'); var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='madmext-affiliate-operasyon.csv'; a.click(); URL.revokeObjectURL(a.href)}
      window.mxAffDownloadTemplate=function(){var csv='Ad Soyad;E-posta;Telefon;Instagram Kullanıcı Adı;Instagram Takipçi Sayısı;TikTok Kullanıcı Adı;TikTok Takipçi Sayısı;Ortalama Etkileşim Oranı;Aylık Ortalama Erişim;İçerik Alanı;Tanıtmak İstediğin Ana Kategori;Kategori Detay;Koleksiyon Fikri;Affiliate Kod;Canlı Yayın Linki;Satış Tutarı;Sipariş;Komisyon;IBAN;Fatura / Makbuz Durumu;Ek Not\n'; var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='madmext-affiliate-sablon.csv'; a.click(); URL.revokeObjectURL(a.href)}
      async function init(){if(!S.loaded){var server=await loadServerSnapshot(); S.records=(server&&server.length?server:loadLocal()).map(normalizeRecord); S.loaded=true} if(S.records.length&&!S.selectedId)S.selectedId=S.records[0].id; render()}
      init();
    })();
  </script>
</section>
