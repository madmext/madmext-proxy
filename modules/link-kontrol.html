<style>
.lk-wrap{display:flex;flex-direction:column;gap:14px}.lk-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}.lk-title{font-size:18px;font-weight:800;color:var(--t)}.lk-sub{font-size:12px;color:var(--m);margin-top:4px;line-height:1.5}.lk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.lk-card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:13px;position:relative;overflow:hidden}.lk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--m)}.lk-card.ok::before{background:var(--g)}.lk-card.err::before{background:var(--r)}.lk-card.warn::before{background:var(--y)}.lk-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px}.lk-url{font-size:10px;color:var(--m);font-family:'DM Mono',monospace;margin-top:4px;word-break:break-all}.lk-row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid rgba(255,255,255,.04);padding-top:8px;margin-top:8px;font-size:11px}.lk-pill{font-size:10px;border-radius:999px;border:1px solid var(--b);padding:2px 7px;font-family:'DM Mono',monospace}.lk-pill.ok{color:var(--g);border-color:rgba(66,183,42,.3);background:rgba(66,183,42,.08)}.lk-pill.err{color:var(--r);border-color:rgba(250,62,62,.3);background:rgba(250,62,62,.08)}.lk-pill.warn{color:var(--y);border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.08)}.lk-table{width:100%;border-collapse:collapse;font-size:12px}.lk-table th{background:var(--bg);color:var(--m);font-size:9px;text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--b)}.lk-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);font-family:'DM Mono',monospace}.lk-panel{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px}.lk-log{background:#090a0b;border:1px solid var(--b);border-radius:10px;padding:10px;font-family:'DM Mono',monospace;font-size:11px;white-space:pre-wrap;max-height:280px;overflow:auto;color:#b7f7d0}
</style>
<div class="lk-wrap"><div class="lk-head"><div><div class="lk-title">🔗 Menü Link Kontrol Merkezi</div><div class="lk-sub">Paneldeki URL, modül dosyası ve refresh durumlarını hızlı kontrol eder. Eksik modüller kırmızı görünür.</div></div><div class="u-actions"><button class="btn sm" onclick="LK.run()">↻ Kontrol Et</button><button class="btn sm sec" onclick="LK.copy()">JSON Kopyala</button></div></div><div id="lkSummary" class="lk-grid"></div><div class="lk-panel"><div class="stl">Detay Liste</div><div style="overflow:auto"><table class="lk-table"><thead><tr><th>Sayfa</th><th>URL</th><th>Modül</th><th>Durum</th><th>Aksiyon</th></tr></thead><tbody id="lkRows"></tbody></table></div></div><div class="lk-panel"><div class="stl">Ham Çıktı</div><div id="lkRaw" class="lk-log">Kontrol bekleniyor...</div></div></div>
<script>
(function(){
const pages=[
 {key:'dashboard',name:'Dashboard',url:'/',module:'dashboard'},
 {key:'meta-ads',name:'Meta Ads',url:'/ads',module:'meta-ads'},
 {key:'google-ads',name:'Google Ads',url:'/google-ads',module:'google-ads'},
 {key:'trendyol',name:'Trendyol',url:'/trendyol',module:'trendyol'},
 {key:'dosyalar',name:'Dosya Yönetimi',url:'/dosyalar',module:'dosyalar'},
 {key:'analitik',name:'Analytics',url:'/analitik',module:'analitik'},
 {key:'seo',name:'SEO',url:'/seo',module:'seo'},
 {key:'raporlar',name:'Raporlar',url:'/raporlar',module:'raporlar'},
 {key:'gorevler',name:'Görevler',url:'/gorevler',module:'gorevler'},
 {key:'tasarim',name:'Tasarım',url:'/tasarim',module:'tasarim'},
 {key:'claude-chat',name:'Claude AI',url:'/ai',module:'claude-chat'},
 {key:'kullanicilar',name:'Kullanıcılar',url:'/kullanicilar',module:'kullanicilar'},
 {key:'ayarlar',name:'Ayarlar',url:'/ayarlar',module:'ayarlar'},
 {key:'admin-api',name:'API Merkezi',url:'/admin-api',module:'admin-api'},
 {key:'ai-ajans',name:'AI Ajans Merkezi',url:'/modules/ai-ajans-gpt.html',module:'ai-ajans-gpt'},
 {key:'tiktok',name:'TikTok',url:'—',module:'—',soon:true}
];
let last=[];
function esc(s){return String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function checkModule(p){if(p.soon)return {...p,status:'warn',message:'Yakında'};try{let r=await fetch('/modules/'+p.module+'.html?v='+Date.now(),{credentials:'include'});return {...p,status:r.ok?'ok':'err',http:r.status,message:r.ok?'Modül var':'Modül yok / HTTP '+r.status}}catch(e){return {...p,status:'err',message:e.message}}}
function render(){let ok=last.filter(x=>x.status==='ok').length,err=last.filter(x=>x.status==='err').length,warn=last.filter(x=>x.status==='warn').length;document.getElementById('lkSummary').innerHTML='<div class="lk-card ok"><div class="lk-name">✅ Çalışan</div><div class="lk-row"><span>Toplam</span><span class="lk-pill ok">'+ok+'</span></div></div><div class="lk-card err"><div class="lk-name">❌ Hatalı</div><div class="lk-row"><span>Toplam</span><span class="lk-pill err">'+err+'</span></div></div><div class="lk-card warn"><div class="lk-name">⏳ Yakında</div><div class="lk-row"><span>Toplam</span><span class="lk-pill warn">'+warn+'</span></div></div>';
document.getElementById('lkRows').innerHTML=last.map(x=>'<tr><td style="font-family:Inter,sans-serif;font-weight:700">'+esc(x.name)+'</td><td>'+esc(x.url)+'</td><td>'+esc(x.module)+'</td><td><span class="lk-pill '+x.status+'">'+esc(x.message)+'</span></td><td>'+(x.url&&x.url!=='—'?'<a class="btn sm sec" href="'+esc(x.url)+'" target="_blank">Aç</a>':'—')+'</td></tr>').join('');document.getElementById('lkRaw').textContent=JSON.stringify(last,null,2)}
window.LK={async run(){document.getElementById('lkRaw').textContent='Kontrol ediliyor...';last=[];for(const p of pages){last.push(await checkModule(p));render()}},copy(){navigator.clipboard.writeText(JSON.stringify(last,null,2));toast('Link kontrol çıktısı kopyalandı')}};
LK.run();
})();
</script>
