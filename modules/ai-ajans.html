<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADMEXT ADS · AI Ajans Merkezi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --purple:#534AB7;--purple-light:#7f77dd;--purple-dark:#3C3489;
    --teal:#1D9E75;--coral:#D85A30;--amber:#BA7517;
    --bg:#04030e;--surface:#0a0818;--surface2:#110f24;
    --text:#e0d8ff;--muted:#9090b8;--border:rgba(127,119,221,0.25);
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}
  
  /* ── TOP NAV ── */
  #nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(4,3,14,0.85);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border)}
  #nav .logo{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:0.04em}
  #nav .logo span{color:var(--purple-light)}
  #nav .nav-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  #nav .pill{background:rgba(83,74,183,0.2);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--purple-light);font-size:11px}
  #nav .live-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

  /* ── 3D CANVAS ── */
  #canvas-wrap{position:fixed;top:40px;left:0;right:0;bottom:0}
  canvas{display:block;width:100%;height:100%}

  /* ── SIDE PANEL ── */
  #side-panel{position:fixed;top:56px;right:16px;width:260px;background:rgba(8,6,24,0.94);border:0.5px solid var(--border);border-radius:12px;padding:0;z-index:50;overflow:hidden;display:none;max-height:calc(100vh - 80px);overflow-y:auto}
  #sp-header{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
  #sp-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  #sp-name{font-size:13px;font-weight:500;color:#e0d8ff}
  #sp-role{font-size:11px;color:var(--muted);margin-top:1px}
  #sp-body{padding:14px 16px}
  #sp-body h4{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
  #sp-tasks{list-style:none;margin-bottom:14px}
  #sp-tasks li{font-size:12px;color:#b0a8d8;padding:4px 0;border-bottom:0.5px solid rgba(127,119,221,0.1)}
  #sp-tasks li::before{content:"▸ ";color:var(--purple-light)}
  #sp-report-btn{width:100%;padding:9px;background:rgba(83,74,183,0.2);border:0.5px solid var(--purple);border-radius:8px;color:var(--purple-light);font-size:12px;cursor:pointer;margin-bottom:8px;font-family:'Inter',sans-serif}
  #sp-report-btn:hover{background:rgba(83,74,183,0.35)}
  #sp-research-btn{width:100%;padding:9px;background:rgba(29,158,117,0.15);border:0.5px solid rgba(29,158,117,0.4);border-radius:8px;color:#5dcaa5;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
  #sp-research-btn:hover{background:rgba(29,158,117,0.25)}

  /* ── REPORT OVERLAY ── */
  #report-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
  #report-box{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;width:min(600px,94vw);max-height:80vh;overflow-y:auto}
  #report-head{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  #report-head h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#e0d8ff}
  #close-report{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
  #report-body{padding:20px}
  #report-body.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  .report-section{margin-bottom:18px}
  .report-section h3{font-size:12px;font-weight:500;color:var(--purple-light);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
  .report-section p,.report-section li{font-size:13px;color:#b0a8d8;line-height:1.7}
  .report-section ul{padding-left:16px}
  .report-section li{margin-bottom:4px}
  .report-meta{font-size:11px;color:var(--muted);margin-top:14px;padding-top:10px;border-top:0.5px solid var(--border)}

  /* ── HUD ── */
  #hud-bottom{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50}
  #hud-bottom button{background:rgba(10,8,24,0.9);color:var(--muted);border:0.5px solid var(--border);padding:7px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
  #hud-bottom button:hover{color:var(--text);border-color:var(--purple)}
  #hud-left{position:fixed;bottom:14px;left:16px;z-index:50;font-size:11px;color:rgba(130,120,180,0.5);line-height:1.8}
  #hud-right{position:fixed;top:56px;left:16px;z-index:50;display:flex;flex-direction:column;gap:6px}
  .stat-pill{background:rgba(8,6,24,0.85);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .stat-pill strong{color:var(--text);font-weight:500}

  /* ── CROSSHAIR ── */
  #xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(200,192,255,0.3);font-size:16px;pointer-events:none;z-index:50;line-height:1}

  /* ── MINIMAP ── */
  #minimap{position:fixed;bottom:54px;right:16px;z-index:50;border-radius:8px;border:0.5px solid var(--border);background:rgba(8,6,24,0.8)}

  /* ── TOOLTIP ── */
  #tooltip{position:fixed;padding:6px 12px;background:rgba(8,6,24,0.95);border:0.5px solid var(--border);border-radius:6px;font-size:11px;color:var(--text);pointer-events:none;z-index:80;display:none}

  scrollbar-width:thin;
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(127,119,221,0.3);border-radius:2px}
</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div class="logo">MADMEXT <span>ADS</span> · AI Ajans</div>
  <div class="nav-right">
    <div class="live-dot"></div>
    <span>9 ajan aktif</span>
    <div class="pill">3D Çalışma Alanı</div>
  </div>
</div>

<!-- HUD -->
<div id="hud-right">
  <div class="stat-pill"><strong id="stat-agents">9</strong> AI Ajan</div>
  <div class="stat-pill"><strong id="stat-reports">0</strong> Rapor</div>
  <div class="stat-pill" id="stat-focus" style="display:none">
    <span id="stat-focus-txt">–</span>
  </div>
</div>
<div id="hud-left">WASD · hareket<br>Fare · bak<br>Tıkla · ajan bilgisi</div>
<div id="xhair">+</div>
<canvas id="minimap" width="90" height="72"></canvas>

<!-- 3D CANVAS -->
<div id="canvas-wrap"><canvas id="c"></canvas></div>

<!-- SIDE PANEL -->
<div id="side-panel">
  <div id="sp-header">
    <div id="sp-avatar"></div>
    <div>
      <div id="sp-name"></div>
      <div id="sp-role"></div>
    </div>
  </div>
  <div id="sp-body">
    <h4>Görevler</h4>
    <ul id="sp-tasks"></ul>
    <button id="sp-report-btn" onclick="requestReport()">Rapor Oluştur ↗</button>
    <button id="sp-research-btn" onclick="requestResearch()">Araştırma Başlat ↗</button>
  </div>
</div>

<!-- REPORT OVERLAY -->
<div id="report-overlay">
  <div id="report-box">
    <div id="report-head">
      <h2 id="report-title">Rapor</h2>
      <button id="close-report" onclick="closeReport()">✕</button>
    </div>
    <div id="report-body"></div>
  </div>
</div>

<!-- BOTTOM CONTROLS -->
<div id="hud-bottom">
  <button onclick="mv('left')">◀</button>
  <button onclick="mv('forward')">▲ İleri</button>
  <button onclick="mv('back')">▼ Geri</button>
  <button onclick="mv('right')">▶</button>
  <button onclick="mv('up')">↑ Yüksel</button>
  <button onclick="mv('down')">↓ İn</button>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENE SETUP ──
const cvs = document.getElementById('c');
const W = cvs.parentElement.clientWidth;
const H = cvs.parentElement.clientHeight;
const renderer = new THREE.WebGLRenderer({canvas:cvs, antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x04030e);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x04030e, 0, 60);

const cam = new THREE.PerspectiveCamera(65, W/H, 0.1, 100);
cam.position.set(0, 2.2, 20);

// LIGHTS
scene.add(new THREE.AmbientLight(0x180a30, 2.5));
function pl(c,i,d,x,y,z){const l=new THREE.PointLight(c,i,d);l.position.set(x,y,z);scene.add(l);return l;}
const mainLight = pl(0x7f77dd,4,50,0,10,0);
pl(0x1d9e75,2.5,25,-12,4,0);
pl(0xd85a30,2,22,12,4,0);
pl(0x993556,1.8,18,0,4,-10);
pl(0x185fa5,2,20,0,4,10);

// MATERIALS
function mat(color,emissive=0,emInt=0,rough=0.6,metal=0.1){
  return new THREE.MeshStandardMaterial({color,emissive,emissiveIntensity:emInt,roughness:rough,metalness:metal});
}
function addMesh(geo,m,x,y,z,ry=0){
  const o=new THREE.Mesh(geo,m);
  o.position.set(x,y,z);o.rotation.y=ry;
  o.castShadow=true;o.receiveShadow=true;scene.add(o);return o;
}

// FLOOR & GRID
addMesh(new THREE.PlaneGeometry(80,80),mat(0x060418),0,0,0,-Math.PI/2);
scene.add(new THREE.GridHelper(60,35,0x1a1040,0x0d0824));

// NEON FLOOR STRIPS
function neon(color,x1,x2,z,y=0.02){
  const g=new THREE.BoxGeometry(Math.abs(x2-x1),0.04,0.08);
  const m=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:2.5});
  const o=new THREE.Mesh(g,m);o.position.set((x1+x2)/2,y,z);scene.add(o);
}
[-15,-7.5,0,7.5,15].forEach(z=>neon(0x1a0a40,-16,16,z));
[-15,-7.5,0,7.5,15].forEach(x=>neon(0x0d0530,-16,16,0,0.02));

// CEILING
addMesh(new THREE.PlaneGeometry(80,80),mat(0x06041a),0,7,0,Math.PI/2);

// WALLS
function wall(w,h,x,y,z,ry=0){addMesh(new THREE.BoxGeometry(w,h,0.18),mat(0x0c0a1e),x,y,z,ry);}
wall(60,7,0,3.5,18);wall(60,7,0,3.5,-18);
wall(7,7,-18,3.5,0,Math.PI/2);wall(7,7,18,3.5,0,Math.PI/2);

// WALL SCREENS (decorative)
[-14,0,14].forEach(x=>{
  addMesh(new THREE.PlaneGeometry(5,2.8),new THREE.MeshStandardMaterial({color:0x0a0628,emissive:0x534ab7,emissiveIntensity:0.12}),x,4,17.85);
  addMesh(new THREE.PlaneGeometry(4,0.04),new THREE.MeshStandardMaterial({color:0x7f77dd,emissive:0x7f77dd,emissiveIntensity:1.5}),x,5.5,17.88);
  pl(0x534ab7,0.6,8,x,4.5,17);
});

// ── AGENTS ──
const agentsData = [
  {name:"Aria",role:"Strateji & Planlama",x:-11,z:-10,color:0x534ab7,emissive:0x3c3489,
   tasks:["Marka konumlandırma & mesaj","Reklam kampanya stratejisi","Hedef kitle segmentasyonu","Aylık strateji raporu"],
   specialty:"advertising_strategy"},
  {name:"Nova",role:"Pazar & Rakip Analizi",x:0,z:-10,color:0x1d9e75,emissive:0x0f6e56,
   tasks:["Rakip reklam analizi","Pazar payı takibi","Trend araştırması","Sektör karşılaştırma raporu"],
   specialty:"market_research"},
  {name:"Orion",role:"Proje & Kampanya Yönetimi",x:11,z:-10,color:0xd85a30,emissive:0x993c1d,
   tasks:["Kampanya takvimi yönetimi","Bütçe takibi","Ekip koordinasyonu","Haftalık ilerleme raporu"],
   specialty:"project_management"},
  {name:"Luna",role:"İçerik & Metin Uzmanı",x:-11,z:0,color:0x993556,emissive:0x72243e,
   tasks:["Reklam metni & başlıklar","Sosyal medya içerikleri","E-posta kampanyaları","SEO uyumlu blog içeriği"],
   specialty:"content_writing"},
  {name:"Pixel",role:"Kreatif & Görsel Yönetmen",x:0,z:0,color:0x7f77dd,emissive:0x534ab7,
   tasks:["Reklam görseli konseptleri","Marka kimliği tasarımı","AI görsel üretimi (Midjourney)","Sosyal medya şablonları"],
   specialty:"creative_design"},
  {name:"Rex",role:"Video & Medya Prodüksiyon",x:11,z:0,color:0xba7517,emissive:0x854f0b,
   tasks:["Reklam filmi konsepti","AI video üretimi (Sora/Runway)","Reel & TikTok video planı","YouTube kampanya içeriği"],
   specialty:"video_production"},
  {name:"Sage",role:"SEO & Performans Analitik",x:-11,z:10,color:0x185fa5,emissive:0x0c447c,
   tasks:["Reklam performans analizi","Google Ads optimizasyonu","Anahtar kelime araştırması","ROI & dönüşüm raporu"],
   specialty:"seo_analytics"},
  {name:"Vibe",role:"Sosyal Medya & Topluluk",x:0,z:10,color:0x639922,emissive:0x3b6d11,
   tasks:["Instagram & TikTok kampanyaları","Influencer işbirliği araştırması","Topluluk yönetimi","Engagement raporu"],
   specialty:"social_media"},
  {name:"Byte",role:"Web & Dijital Altyapı",x:11,z:10,color:0x0f6e56,emissive:0x085041,
   tasks:["Landing page optimizasyonu","Reklam tracking kurulumu","A/B test yönetimi","Teknik SEO raporu"],
   specialty:"web_dev"},
];

const clickables = [];
const floaters = [];

agentsData.forEach((d,i)=>{
  const fy = 0;
  // Desk surface
  const desk = addMesh(new THREE.BoxGeometry(3.4,0.1,2),mat(0x12102a,d.color,0.07,0.3,0.5),d.x,0.95,d.z);
  desk.userData = d;
  clickables.push(desk);

  // Desk legs
  [[1.4,0.85],[1.4,-0.85],[-1.4,0.85],[-1.4,-0.85]].forEach(([dx,dz])=>{
    addMesh(new THREE.CylinderGeometry(0.06,0.06,0.95,6),mat(0x181430),d.x+dx,0.47,d.z+dz);
  });

  // Monitor
  addMesh(new THREE.BoxGeometry(0.12,0.42,0.12),mat(0x0e0c20,0,0,0.3,0.8),d.x,1.17,d.z-0.72);
  addMesh(new THREE.BoxGeometry(0.4,0.04,0.2),mat(0x0e0c20,0,0,0.3,0.8),d.x,0.97,d.z-0.72);
  const monFrame = addMesh(new THREE.BoxGeometry(1.9,1.15,0.07),mat(0x080616,d.color,0.06,0.2,0.8),d.x,1.65,d.z-0.8);
  monFrame.userData = d; clickables.push(monFrame);
  // Screen content glow
  addMesh(new THREE.PlaneGeometry(1.65,0.98),new THREE.MeshStandardMaterial({color:d.color,emissive:d.color,emissiveIntensity:0.65,transparent:true,opacity:0.9}),d.x,1.65,d.z-0.76);

  // Keyboard
  addMesh(new THREE.BoxGeometry(1.1,0.04,0.38),mat(0x14112a,0,0,0.8,0.2),d.x,0.97,d.z-0.2);

  // Mouse
  addMesh(new THREE.BoxGeometry(0.16,0.04,0.22),mat(0x1a1530,0,0,0.6,0.3),d.x+0.72,0.97,d.z-0.18);

  // Chair seat
  addMesh(new THREE.CylinderGeometry(0.55,0.45,0.13,12),mat(0x0e0b1c,0,0,0.9),d.x,0.88,d.z+1.1);
  // Chair back
  addMesh(new THREE.BoxGeometry(1.08,0.88,0.1),mat(0x0e0b1c,0,0,0.9),d.x,1.3,d.z+1.55);
  // Chair leg
  addMesh(new THREE.CylinderGeometry(0.07,0.07,0.88,6),mat(0x1c1835,0,0,0.5,0.5),d.x,0.44,d.z+1.1);

  // Nameplate
  addMesh(new THREE.BoxGeometry(0.9,0.07,0.28),new THREE.MeshStandardMaterial({color:d.color,emissive:d.color,emissiveIntensity:0.35}),d.x-0.8,0.98,d.z+0.55);

  // Agent orb (floating)
  const orb = addMesh(new THREE.SphereGeometry(0.3,14,14),new THREE.MeshStandardMaterial({color:d.color,emissive:d.color,emissiveIntensity:1.1,transparent:true,opacity:0.9}),d.x,2.25,d.z+0.9);
  orb.userData = {isOrb:true, baseY:2.25, idx:i, dept:d};
  floaters.push(orb);
  clickables.push(orb);

  // Agent ring
  const ring = addMesh(new THREE.TorusGeometry(0.42,0.045,8,28),new THREE.MeshStandardMaterial({color:d.color,emissive:d.color,emissiveIntensity:1.6}),d.x,2.25,d.z+0.9);
  ring.userData = {isRing:true, baseY:2.25, idx:i};
  floaters.push(ring);

  // Desk point light
  const dl = new THREE.PointLight(d.color,1.8,6);
  dl.position.set(d.x,2.4,d.z+0.9); scene.add(dl);

  // Overhead light
  addMesh(new THREE.BoxGeometry(2.8,0.05,0.38),new THREE.MeshStandardMaterial({color:0xfff5e0,emissive:0xfff5e0,emissiveIntensity:0.7}),d.x,6.88,d.z);
  pl(0xfff0cc,0.5,9,d.x,6.7,d.z);

  // Partition
  if(i%3<2){
    addMesh(new THREE.BoxGeometry(0.07,1.4,2.3),mat(0x0f0d26,d.color,0.04,0.6),d.x+5.5,1.6,d.z);
  }
});

// MEETING TABLE
addMesh(new THREE.CylinderGeometry(2.2,2.2,0.12,24),mat(0x1a1638,0x534ab7,0.1,0.3,0.5),0,0.97,-15);
addMesh(new THREE.CylinderGeometry(0.1,0.1,0.97,8),mat(0x14102a),0,0.48,-15);
for(let a=0;a<6;a++){
  const ang=a/6*Math.PI*2;
  const cx=Math.cos(ang)*1.65, cz=Math.sin(ang)*1.65-15;
  addMesh(new THREE.CylinderGeometry(0.42,0.35,0.11,10),mat(0x0e0c1e),cx,0.86,cz);
  const holo=addMesh(new THREE.SphereGeometry(0.13,8,8),new THREE.MeshStandardMaterial({color:0x7f77dd,emissive:0x7f77dd,emissiveIntensity:2,transparent:true,opacity:0.75}),cx,1.55,cz);
  holo.userData={isOrb:true,baseY:1.55,idx:100+a};
  floaters.push(holo);
}
addMesh(new THREE.CylinderGeometry(0.06,0.06,1.6,6),new THREE.MeshStandardMaterial({color:0x7f77dd,emissive:0x7f77dd,emissiveIntensity:2,transparent:true,opacity:0.6}),0,1.6,-15);
pl(0x7f77dd,3.5,9,0,3,-15);

// COLUMNS
[-15,15].forEach(x=>[-16,16].forEach(z=>{
  addMesh(new THREE.CylinderGeometry(0.22,0.22,7,10),mat(0x141230,0,0,0.4,0.6),x,3.5,z);
}));

// STARS
const sv=[];for(let i=0;i<900;i++)sv.push((Math.random()-.5)*120,Math.random()*40+8,(Math.random()-.5)*120);
const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.13,transparent:true,opacity:0.45})));

// FLOATING PARTICLES
const particles=[];
for(let i=0;i<50;i++){
  const colors=[0x7f77dd,0x1d9e75,0xd85a30,0x993556,0x185fa5];
  const pc=colors[Math.floor(Math.random()*colors.length)];
  const pm=new THREE.MeshStandardMaterial({color:pc,emissive:pc,emissiveIntensity:2.5,transparent:true,opacity:0.65});
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),pm);
  p.userData={bx:(Math.random()-.5)*32,by:Math.random()*4+0.5,bz:(Math.random()-.5)*32,spd:0.25+Math.random()*0.5,off:Math.random()*6.28};
  p.position.set(p.userData.bx,p.userData.by,p.userData.bz);
  scene.add(p); particles.push(p);
}

// ── CONTROLS ──
let rotY=0.05, rotX=0.06;
let dragging=false, mx=0, my=0;
const keys={};
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.preventDefault&&e.key.startsWith('Arrow')&&e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

cvs.addEventListener('mousedown',e=>{dragging=true;mx=e.clientX;my=e.clientY;});
window.addEventListener('mouseup',e=>{
  if(dragging&&Math.abs(e.clientX-mx)<4&&Math.abs(e.clientY-my)<4) handleClick(e);
  dragging=false;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  rotY-=(e.clientX-mx)*0.007; mx=e.clientX;
  rotX-=(e.clientY-my)*0.006; my=e.clientY;
  rotX=Math.max(-0.35,Math.min(0.5,rotX));
});
cvs.addEventListener('wheel',e=>{
  const fwd=new THREE.Vector3(-Math.sin(rotY),0,-Math.cos(rotY));
  cam.position.addScaledVector(fwd,e.deltaY>0?-0.6:0.6);
  clampCam(); e.preventDefault();
},{passive:false});

cvs.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}});
cvs.addEventListener('touchend',()=>dragging=false);
cvs.addEventListener('touchmove',e=>{
  if(!dragging||e.touches.length!==1)return;
  rotY-=(e.touches[0].clientX-mx)*0.007;mx=e.touches[0].clientX;
  rotX-=(e.touches[0].clientY-my)*0.006;my=e.touches[0].clientY;
  rotX=Math.max(-0.35,Math.min(0.5,rotX));
  e.preventDefault();
},{passive:false});

function clampCam(){
  cam.position.x=Math.max(-16,Math.min(16,cam.position.x));
  cam.position.z=Math.max(-16,Math.min(17,cam.position.z));
  cam.position.y=Math.max(0.9,Math.min(6,cam.position.y));
}
function mv(dir){
  const spd=1.6;
  const fwd=new THREE.Vector3(-Math.sin(rotY),0,-Math.cos(rotY));
  const right=new THREE.Vector3(-Math.cos(rotY),0,Math.sin(rotY));
  if(dir==='forward')cam.position.addScaledVector(fwd,spd);
  if(dir==='back')cam.position.addScaledVector(fwd,-spd);
  if(dir==='left')cam.position.addScaledVector(right,-spd);
  if(dir==='right')cam.position.addScaledVector(right,spd);
  if(dir==='up')cam.position.y+=spd;
  if(dir==='down')cam.position.y-=spd;
  clampCam();
}

// ── CLICK HANDLER ──
const rc=new THREE.Raycaster();
let activeAgent=null;
let reportCount=0;

function handleClick(e){
  const rect=cvs.getBoundingClientRect();
  const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  rc.setFromCamera(mouse,cam);
  const hits=rc.intersectObjects(clickables);
  if(hits.length&&hits[0].object.userData.name){
    openAgent(hits[0].object.userData.name?hits[0].object.userData:hits[0].object.userData.dept);
  } else {
    document.getElementById('side-panel').style.display='none';
    activeAgent=null;
    document.getElementById('stat-focus').style.display='none';
  }
}

function openAgent(d){
  if(!d||!d.name)return;
  activeAgent=d;
  const hex='#'+d.color.toString(16).padStart(6,'0');
  document.getElementById('sp-avatar').style.background=hex+'33';
  document.getElementById('sp-avatar').style.color=hex;
  document.getElementById('sp-avatar').textContent=d.name[0];
  document.getElementById('sp-name').textContent=d.name+' · '+d.role;
  document.getElementById('sp-role').textContent='madmext.com AI Ajanı';
  document.getElementById('sp-tasks').innerHTML=d.tasks.map(t=>`<li>${t}</li>`).join('');
  document.getElementById('side-panel').style.display='block';
  document.getElementById('stat-focus').style.display='flex';
  document.getElementById('stat-focus-txt').textContent=d.name+' seçili';
}

// ── REPORT SYSTEM (Claude API) ──
async function requestReport(){
  if(!activeAgent)return;
  openReportOverlay('Rapor Oluşturuluyor...');
  document.getElementById('report-body').className='loading';
  document.getElementById('report-body').innerHTML='<div style="margin-bottom:12px">'+activeAgent.name+' rapor hazırlıyor...</div><div style="color:rgba(127,119,221,0.5);font-size:12px">MADMEXT ADS verilerine göre analiz yapılıyor</div>';

  const prompt=`Sen madmext.com için çalışan bir AI reklam ajansı ajanısın. Adın ${activeAgent.name}, görevin: ${activeAgent.role}.

MADMEXT ADS için kapsamlı bir ${activeAgent.role} raporu oluştur. Rapor şunları içermeli:
1. Mevcut durum özeti
2. Temel bulgular ve içgörüler (en az 4 madde)
3. Önerilen aksiyonlar (en az 3 madde)
4. Önümüzdeki 30 gün için odak alanları

Raporu Türkçe, profesyonel ve aksiyon odaklı yaz. HTML formatında değil, düz metin olarak yaz. Başlıkları ### ile belirt.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');
    renderReport(text);
    reportCount++;
    document.getElementById('stat-reports').textContent=reportCount;
  }catch(err){
    document.getElementById('report-body').innerHTML='<p style="color:#e24b4a;font-size:13px">Rapor oluşturulamadı. API bağlantısını kontrol edin.</p>';
  }
}

async function requestResearch(){
  if(!activeAgent)return;
  openReportOverlay('Araştırma Yapılıyor...');
  document.getElementById('report-body').className='loading';
  document.getElementById('report-body').innerHTML='<div style="margin-bottom:12px">'+activeAgent.name+' araştırma başlatıyor...</div><div style="color:rgba(127,119,221,0.5);font-size:12px">Sektör verileri taranıyor</div>';

  const prompt=`Sen madmext.com için çalışan ${activeAgent.name} adlı AI ajanısın. Uzmanlık alanın: ${activeAgent.role}.

MADMEXT ADS'in reklam ve moda sektöründeki konumunu güçlendirmek için ${activeAgent.specialty} alanında derinlemesine bir araştırma hazırla. İçermeli:

1. Sektör trendi analizi (güncel)
2. Rakip stratejileri (genel çerçeve)
3. Fırsat alanları (en az 3 spesifik)
4. Risk ve dikkat edilmesi gerekenler
5. Önerilen öncelikli adımlar

Türkçe, data-driven ve uygulanabilir içgörüler sun. Başlıkları ### ile belirt.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');
    renderReport(text);
    reportCount++;
    document.getElementById('stat-reports').textContent=reportCount;
  }catch(err){
    document.getElementById('report-body').innerHTML='<p style="color:#e24b4a;font-size:13px">Araştırma yapılamadı. API bağlantısını kontrol edin.</p>';
  }
}

function renderReport(text){
  const sections=text.split(/###\s*/g).filter(s=>s.trim());
  let html='';
  sections.forEach(sec=>{
    const lines=sec.trim().split('\n');
    const title=lines[0].trim();
    const body=lines.slice(1).join('\n').trim();
    const items=body.split('\n').filter(l=>l.trim()).map(l=>l.replace(/^[-*•]\s*/,'').trim());
    html+=`<div class="report-section"><h3>${title}</h3>`;
    if(items.length>1&&(body.includes('\n-')||body.includes('\n•')||body.includes('\n*'))){
      html+='<ul>'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
    }else{
      html+='<p>'+items.join(' ')+'</p>';
    }
    html+='</div>';
  });
  html+=`<div class="report-meta">Hazırlayan: ${activeAgent.name} · MADMEXT ADS AI Ajansı · ${new Date().toLocaleDateString('tr-TR')}</div>`;
  document.getElementById('report-body').className='';
  document.getElementById('report-body').innerHTML=html;
}

function openReportOverlay(title){
  document.getElementById('report-title').textContent=title+(activeAgent?' · '+activeAgent.name:'');
  document.getElementById('report-overlay').style.display='flex';
}
function closeReport(){document.getElementById('report-overlay').style.display='none';}
document.getElementById('report-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeReport();});

// ── MINIMAP ──
const mmCvs=document.getElementById('minimap');
const mmCtx=mmCvs.getContext('2d');
function drawMinimap(){
  mmCtx.clearRect(0,0,90,72);
  mmCtx.fillStyle='rgba(8,4,20,0.92)';mmCtx.fillRect(0,0,90,72);
  mmCtx.strokeStyle='rgba(83,74,183,0.3)';mmCtx.strokeRect(0,0,90,72);
  agentsData.forEach(d=>{
    const mx=(d.x/34)*80+45, my=(d.z/34)*64+36;
    mmCtx.beginPath();mmCtx.arc(mx,my,4,0,Math.PI*2);
    mmCtx.fillStyle='#'+d.color.toString(16).padStart(6,'0');mmCtx.fill();
  });
  const cpx=(cam.position.x/34)*80+45, cpy=(cam.position.z/34)*64+36;
  mmCtx.beginPath();mmCtx.arc(Math.max(4,Math.min(86,cpx)),Math.max(4,Math.min(68,cpy)),3,0,Math.PI*2);
  mmCtx.fillStyle='#ffffff';mmCtx.fill();
}

// ── CROSSHAIR DETECTION ──
const rcCenter=new THREE.Raycaster();
const sidePanel=document.getElementById('side-panel');

// ── ANIMATE ──
let t=0;
(function animate(){
  requestAnimationFrame(animate);
  t+=0.015;

  const spd=0.07;
  const fwd=new THREE.Vector3(-Math.sin(rotY),0,-Math.cos(rotY));
  const right=new THREE.Vector3(-Math.cos(rotY),0,Math.sin(rotY));
  if(keys['w']||keys['arrowup'])cam.position.addScaledVector(fwd,spd);
  if(keys['s']||keys['arrowdown'])cam.position.addScaledVector(fwd,-spd);
  if(keys['a']||keys['arrowleft'])cam.position.addScaledVector(right,-spd);
  if(keys['d']||keys['arrowright'])cam.position.addScaledVector(right,spd);
  clampCam();

  const dir=new THREE.Vector3(-Math.sin(rotY),Math.sin(rotX),-Math.cos(rotY)).normalize();
  cam.lookAt(cam.position.clone().add(dir));

  mainLight.intensity=3.5+Math.sin(t*0.8)*0.5;

  floaters.forEach(obj=>{
    if(obj.userData.isOrb)obj.position.y=obj.userData.baseY+Math.sin(t*1.5+obj.userData.idx*0.9)*0.14;
    if(obj.userData.isRing){obj.position.y=obj.userData.baseY+Math.sin(t*1.5+obj.userData.idx*0.9)*0.14;obj.rotation.y=t*1.1;}
  });

  particles.forEach(p=>{
    p.position.y=p.userData.by+Math.sin(t*p.userData.spd+p.userData.off)*0.8;
    p.position.x=p.userData.bx+Math.cos(t*0.35+p.userData.off)*0.5;
    p.material.opacity=0.35+Math.sin(t*1.6+p.userData.off)*0.3;
  });

  // Crosshair proximity detection
  rcCenter.setFromCamera(new THREE.Vector2(0,0),cam);
  const cHits=rcCenter.intersectObjects(clickables);
  if(cHits.length&&cHits[0].distance<5&&cHits[0].object.userData.name){
    document.getElementById('xhair').style.color='rgba(127,119,221,0.9)';
  } else {
    document.getElementById('xhair').style.color='rgba(200,192,255,0.25)';
  }

  drawMinimap();
  renderer.render(scene,cam);
})();

window.addEventListener('resize',()=>{
  const nW=cvs.parentElement.clientWidth, nH=cvs.parentElement.clientHeight;
  renderer.setSize(nW,nH); cam.aspect=nW/nH; cam.updateProjectionMatrix();
});
</script>
