<style>
.os-wrap{display:flex;flex-direction:column;gap:14px}.os-toolbar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}.os-actions,.os-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.os-select,.os-input{background:var(--s);color:var(--t);border:1px solid var(--b);border-radius:9px;padding:9px 11px;font-size:12px}.os-input{min-width:220px}.os-status{font-size:11px;color:var(--m);padding:8px 10px;border:1px solid var(--b);background:var(--s);border-radius:9px}.os-status.ok{color:var(--g);border-color:rgba(66,183,42,.3)}.os-status.err{color:var(--r);border-color:rgba(250,62,62,.3)}.os-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px}.os-kpi{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px}.os-kpi-label{font-size:11px;color:var(--m);margin-bottom:7px}.os-kpi-value{font-size:24px;font-weight:800;color:var(--t)}.os-kpi-sub{font-size:10px;color:var(--m);margin-top:5px}.os-panel{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px;overflow:hidden}.os-panel-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.os-title{font-size:14px;font-weight:800;color:var(--t)}.os-chart{height:220px;display:flex;align-items:flex-end;gap:5px;padding:15px 4px 4px;border-top:1px solid var(--b)}.os-bar-wrap{flex:1;min-width:6px;height:100%;display:flex;align-items:flex-end;gap:2px;position:relative}.os-bar{width:50%;min-height:2px;border-radius:3px 3px 0 0;background:var(--a)}.os-bar.click{background:var(--g)}.os-tip{display:none;position:absolute;bottom:100%;left:0;background:#111;color:#fff;padding:5px 7px;border-radius:6px;font-size:10px;white-space:nowrap;z-index:4}.os-bar-wrap:hover .os-tip{display:block}.os-table-wrap{overflow:auto;max-height:560px}.os-table{width:100%;border-collapse:collapse;min-width:1050px}.os-table th{position:sticky;top:0;background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:10px;border-bottom:1px solid var(--b)}.os-table td{padding:10px;border-bottom:1px solid var(--b);font-size:11px;color:var(--t);vertical-align:top}.os-msg-title{font-weight:700;max-width:280px}.os-msg-content{color:var(--m);margin-top:3px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.os-num{text-align:right;font-family:'DM Mono',monospace}.os-pill{display:inline-flex;padding:3px 7px;border-radius:999px;background:var(--s2);border:1px solid var(--b);font-size:9px;color:var(--m)}.os-empty{text-align:center;padding:35px;color:var(--m)}.os-error{padding:12px;border:1px solid rgba(250,62,62,.25);background:rgba(250,62,62,.08);color:var(--r);border-radius:10px;font-size:12px}.os-two{display:grid;grid-template-columns:1.6fr 1fr;gap:12px}@media(max-width:900px){.os-two{grid-template-columns:1fr}.os-input{min-width:160px}}
</style>
<div class="os-wrap">
  <div class="os-toolbar">
    <div class="os-filters">
      <select id="osDays" class="os-select" onchange="osLoad()"><option value="7">Son 7 gün</option><option value="30" selected>Son 30 gün</option><option value="90">Son 90 gün</option><option value="365">Son 1 yıl</option><option value="3650">Tüm dönem</option></select>
      <input id="osSearch" class="os-input" placeholder="Bildirim adı, başlık veya içerik ara" oninput="osDebouncedSearch()">
      <span id="osStatus" class="os-status">Bağlantı kontrol ediliyor...</span>
    </div>
    <div class="os-actions">
      <button class="btn sm sec" onclick="osExport()">⬇ CSV Aktar</button>
      <button class="btn sm" onclick="osSync()">🔄 OneSignal'dan Senkronize Et</button>
    </div>
  </div>
  <div id="osError"></div>
  <div class="os-grid" id="osKpis"></div>
  <div class="os-two">
    <div class="os-panel"><div class="os-panel-head"><div class="os-title">Gönderim ve Tıklama Trendi</div><span class="os-pill" id="osTrendLabel">—</span></div><div id="osChart" class="os-chart"></div></div>
    <div class="os-panel"><div class="os-panel-head"><div class="os-title">Performans Özeti</div></div><div id="osPerformance"></div></div>
  </div>
  <div class="os-panel">
    <div class="os-panel-head"><div class="os-title">Bildirimler</div><span class="os-pill" id="osCount">0 kayıt</span></div>
    <div class="os-table-wrap"><table class="os-table"><thead><tr><th>Tarih</th><th>Bildirim</th><th>Segment</th><th>Gönderilen</th><th>Teslim</th><th>Tıklama</th><th>CTR</th><th>Başarısız</th><th>Durum</th></tr></thead><tbody id="osRows"></tbody></table></div>
  </div>
</div>
<script>
(function(){
let searchTimer=null;
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function num(v){return new Intl.NumberFormat('tr-TR').format(Number(v||0))}
function pct(v){return Number(v||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'}
function date(v){if(!v)return '—';try{return new Date(v).toLocaleString('tr-TR')}catch(e){return v}}
function kpi(label,value,sub){return '<div class="os-kpi"><div class="os-kpi-label">'+esc(label)+'</div><div class="os-kpi-value">'+esc(value)+'</div><div class="os-kpi-sub">'+esc(sub||'')+'</div></div>'}
async function getJson(url,opt){const r=await fetch(url,Object.assign({credentials:'include'},opt||{}));const t=await r.text();let d={};try{d=JSON.parse(t)}catch(e){d={error:t}}if(!r.ok)throw new Error(d.error||('HTTP '+r.status));return d}
function showError(msg){document.getElementById('osError').innerHTML=msg?'<div class="os-error">'+esc(msg)+'</div>':''}
function renderSummary(d){const s=d.summary||{};document.getElementById('osKpis').innerHTML=[kpi('Bildirim',num(s.messages),'Seçili dönemde'),kpi('Gönderilen',num(s.sent),'Başarılı gönderim'),kpi('Teslim Edilen',num(s.received),'Onaylanan teslimat'),kpi('Tıklama',num(s.clicks),'OneSignal converted'),kpi('CTR',pct(s.ctr),'Tıklama / gönderim'),kpi('Teslimat Oranı',pct(s.delivery_rate),'Teslim / gönderim'),kpi('Başarısız',num(s.failed),'Teslim edilemeyen'),kpi('Hatalı',num(s.errored),'API/kanal hatası')].join('');renderChart(d.trend||[]);document.getElementById('osPerformance').innerHTML='<div class="api-row"><span>Son senkronizasyon</span><span>'+esc(date(d.last_sync_at))+'</span></div><div class="api-row"><span>Gönderim → teslim</span><span>'+pct(s.delivery_rate)+'</span></div><div class="api-row"><span>Gönderim → tıklama</span><span>'+pct(s.ctr)+'</span></div><div class="api-row"><span>Toplam teknik kayıp</span><span>'+num(Number(s.failed||0)+Number(s.errored||0))+'</span></div>'}
function renderChart(rows){const max=Math.max(1,...rows.map(x=>Number(x.sent||0)));document.getElementById('osTrendLabel').textContent=rows.length+' gün';document.getElementById('osChart').innerHTML=rows.length?rows.map(r=>{const sh=Math.max(2,Number(r.sent||0)/max*100),ch=Math.max(2,Number(r.clicks||0)/max*100);return '<div class="os-bar-wrap"><div class="os-tip">'+esc(r.day)+' · '+num(r.sent)+' gönderim · '+num(r.clicks)+' tıklama</div><div class="os-bar" style="height:'+sh+'%"></div><div class="os-bar click" style="height:'+ch+'%"></div></div>'}).join(''):'<div class="os-empty">Henüz trend verisi yok.</div>'}
function renderMessages(d){const rows=d.messages||[];document.getElementById('osCount').textContent=num(rows.length)+' kayıt';document.getElementById('osRows').innerHTML=rows.length?rows.map(r=>'<tr><td>'+esc(date(r.queued_at))+'</td><td><div class="os-msg-title">'+esc(r.name||r.heading||'İsimsiz bildirim')+'</div><div class="os-msg-content">'+esc(r.heading?((r.heading+' — '+(r.content||''))):(r.content||''))+'</div></td><td>'+esc((r.included_segments||[]).join(', ')||'—')+'</td><td class="os-num">'+num(r.successful)+'</td><td class="os-num">'+num(r.received)+'</td><td class="os-num">'+num(r.converted)+'</td><td class="os-num">'+pct(r.ctr)+'</td><td class="os-num">'+num(Number(r.failed||0)+Number(r.errored||0))+'</td><td><span class="os-pill">'+(r.canceled?'İptal':Number(r.remaining||0)>0?'Gönderiliyor':'Tamamlandı')+'</span></td></tr>').join(''):'<tr><td colspan="9" class="os-empty">Henüz bildirim verisi yok. OneSignal senkronizasyonunu çalıştırın.</td></tr>'}
window.osLoad=async function(){showError('');const days=document.getElementById('osDays').value,q=document.getElementById('osSearch').value.trim();try{const [status,dash,msgs]=await Promise.all([getJson('/onesignal/status'),getJson('/onesignal/dashboard?days='+days),getJson('/onesignal/messages?days='+days+'&limit=500&q='+encodeURIComponent(q))]);const el=document.getElementById('osStatus');el.textContent=status.configured?(status.database_ok?'OneSignal bağlı':'Veritabanı yok'):'API ayarları eksik';el.className='os-status '+(status.configured&&status.database_ok?'ok':'err');renderSummary(dash);renderMessages(msgs)}catch(e){showError(e.message)}}
window.osSync=async function(){showError('');const btn=event&&event.currentTarget;const old=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='⏳ Senkronize ediliyor...'}try{const d=await getJson('/onesignal/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});toast(num(d.upserted)+' bildirim güncellendi');await osLoad()}catch(e){showError(e.message)}finally{if(btn){btn.disabled=false;btn.textContent=old}}}
window.osDebouncedSearch=function(){clearTimeout(searchTimer);searchTimer=setTimeout(osLoad,350)}
window.osExport=function(){window.location.href='/onesignal/export.csv'}
setTimeout(osLoad,100)
})();
</script>
