<style>
/* ── Arena layout ── */
.arena-wrap{display:flex;flex-direction:column;height:calc(100vh - 80px);gap:0}
.arena-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;gap:10px;flex-wrap:wrap}
.arena-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.arena-models{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.model-toggle{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:var(--s2);cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s;user-select:none}
.model-toggle input{width:12px;height:12px;cursor:pointer;accent-color:var(--a)}
.model-toggle.claude-t{border-color:rgba(100,180,255,.4)}
.model-toggle.gpt-t{border-color:rgba(16,185,129,.4)}
.model-toggle.o1-t{border-color:rgba(240,180,41,.4)}
.model-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-claude{background:#64b4ff}.dot-gpt{background:#10b981}.dot-o1{background:#f0b429}

/* ── Sohbet alanı ── */
.arena-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.arena-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px}

/* ── Mesaj satırı ── */
.arena-row{display:flex;flex-direction:column;gap:6px}
.arena-user-msg{align-self:flex-end;background:var(--a);color:#fff;padding:9px 14px;border-radius:12px 2px 12px 12px;font-size:13px;line-height:1.6;max-width:70%;white-space:pre-wrap;word-break:break-word}

/* ── AI yanıtları grid ── */
.arena-responses{display:grid;gap:10px}
.arena-responses.cols-1{grid-template-columns:1fr}
.arena-responses.cols-2{grid-template-columns:1fr 1fr}
.arena-card{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.arena-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--b);font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.arena-card-hdr.claude-hdr{background:rgba(100,180,255,.07);color:#64b4ff}
.arena-card-hdr.gpt-hdr{background:rgba(16,185,129,.07);color:#10b981}
.arena-card-hdr.o1-hdr{background:rgba(240,180,41,.07);color:#f0b429}
.arena-card-body{padding:12px 14px;font-size:13px;line-height:1.7;color:var(--t)}
.arena-card-body.thinking-anim{color:var(--m);font-style:italic}

/* Denetim modu: fark highlight */
.arena-card.conflict{border-color:var(--y)}
.arena-card.agree{border-color:var(--g)}

/* ── Puan verme ── */
.arena-vote{display:flex;gap:6px;padding:6px 12px 8px;border-top:1px solid var(--b)}
.vote-btn{background:none;border:1px solid var(--b2);color:var(--m);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.vote-btn:hover{border-color:var(--a);color:var(--a)}
.vote-btn.voted{background:var(--g);border-color:var(--g);color:#000;font-weight:700}

/* ── Denetim özeti ── */
.audit-summary{background:var(--s2);border:1px solid var(--b);border-left:3px solid var(--y);border-radius:6px;padding:10px 14px;font-size:12px;line-height:1.7;margin-top:4px}
.audit-summary strong{color:var(--y)}

/* ── Alt toolbar + input ── */
.arena-toolbar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px;border-top:1px solid var(--b);background:var(--s);flex-shrink:0}
.arena-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--b);background:var(--s);flex-shrink:0}
.arena-input{flex:1;background:var(--bg);border:1px solid var(--b);color:var(--t);padding:10px 14px;font-family:Inter,sans-serif;font-size:13px;border-radius:20px;resize:none;height:44px;max-height:120px;line-height:1.4;transition:border-color .15s;outline:none}
.arena-input:focus{border-color:var(--a)}
.arena-send{width:40px;height:40px;border-radius:50%;background:var(--a);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:2px}
.arena-send:hover{background:#1565d8;transform:scale(1.05)}
.arena-send:disabled{background:var(--b2);cursor:default;transform:none}
.arena-ctx{font-size:10px;color:var(--m);padding:3px 16px;border-top:1px solid var(--b);background:var(--bg);flex-shrink:0}

/* Markdown */
.arena-card-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.arena-card-body th{background:var(--bg);padding:6px 10px;color:var(--m);font-size:10px;border:1px solid var(--b);position:static;cursor:default}
.arena-card-body td{padding:6px 10px;border:1px solid rgba(255,255,255,.06);font-family:'DM Mono',monospace}
.arena-card-body h3{color:var(--a);margin:8px 0 4px;font-size:13px;font-weight:600}
.arena-card-body strong{color:var(--y)}
.arena-card-body ul{padding-left:16px;margin:5px 0}
.arena-card-body li{margin-bottom:2px}
.arena-card-body code{background:var(--b);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:12px}
.arena-card-body hr{border:none;border-top:1px solid var(--b);margin:8px 0}

/* Skor tablosu */
.score-bar{display:flex;gap:12px;padding:6px 16px;background:var(--bg);border-top:1px solid var(--b);font-size:11px;font-family:'DM Mono',monospace;flex-shrink:0;flex-wrap:wrap}
.score-item{display:flex;align-items:center;gap:5px}
.score-label{color:var(--m)}
.score-val{font-weight:700}
</style>

<div class="arena-wrap">

  <!-- Header -->
  <div class="arena-header">
    <div class="arena-title">⚔️ AI Arena <span class="nav-ai">DENETIM</span></div>
    <div class="arena-models">
      <label class="model-toggle claude-t">
        <div class="model-dot dot-claude"></div>
        <input type="checkbox" id="useClause" checked> Claude Sonnet
      </label>
      <label class="model-toggle gpt-t">
        <div class="model-dot dot-gpt"></div>
        <input type="checkbox" id="useGpt" checked> GPT-4o
      </label>
      <label class="model-toggle o1-t">
        <div class="model-dot dot-o1"></div>
        <input type="checkbox" id="useO1"> o3-mini
      </label>
      <button class="btn sm sec" onclick="arenaClear()">🗑 Temizle</button>
      <button class="btn sm sec" onclick="arenaExport()">📋 Kopyala</button>
    </div>
  </div>

  <!-- Mesajlar -->
  <div class="arena-body">
    <div class="arena-msgs" id="arenaMsgs">
      <div style="text-align:center;color:var(--m);font-size:12px;padding:20px 0">
        Claude ve ChatGPT aynı soruya yanıt verir. Hangisi daha iyi? Oy ver, puanları takip et.<br>
        <span style="color:var(--a)">⚔️ İki AI denetimli rekabet modunda çalışıyor.</span>
      </div>
    </div>
  </div>

  <!-- Skor -->
  <div class="score-bar" id="scoreBar">
    <span class="score-item"><div class="model-dot dot-claude" style="width:6px;height:6px"></div><span class="score-label">Claude:</span><span class="score-val" id="scoreClaudeEl">0</span></span>
    <span class="score-item"><div class="model-dot dot-gpt" style="width:6px;height:6px"></div><span class="score-label">GPT-4o:</span><span class="score-val" id="scoreGptEl">0</span></span>
    <span class="score-item"><div class="model-dot dot-o1" style="width:6px;height:6px"></div><span class="score-label">o3-mini:</span><span class="score-val" id="scoreO1El">0</span></span>
    <span class="score-item" style="margin-left:auto"><span class="score-label">Toplam soru:</span><span class="score-val" id="scoreTotalEl">0</span></span>
  </div>

  <!-- Hızlı sorular -->
  <div class="arena-toolbar">
    <button class="qbtn" onclick="arenaSend('Kampanya performansımı analiz et ve en kritik 3 aksiyonu öner')">📊 Performans analizi</button>
    <button class="qbtn" onclick="arenaSend('Hangi reklam setlerinde bütçe artırmalıyım? Gerekçeli açıkla')">💰 Bütçe önerisi</button>
    <button class="qbtn" onclick="arenaSend('ROAS düşük kampanyalar için optimizasyon stratejisi')">📉 Optimizasyon</button>
    <button class="qbtn" onclick="arenaSend('Bu ay için 30 günlük reklam stratejisi öner')">🗓 Strateji</button>
    <button class="qbtn" onclick="arenaSend('En yüksek potansiyelli hedef kitle segmentleri hangileri?')">🎯 Hedef kitle</button>
  </div>

  <!-- Input -->
  <div class="arena-input-row">
    <textarea class="arena-input" id="arenaInput" placeholder="Her iki AI'a aynı soruyu sor..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();arenaSend();}"></textarea>
    <button class="arena-send" id="arenaSendBtn" onclick="arenaSend()">↑</button>
  </div>

  <div class="arena-ctx" id="arenaCtx">Bağlı değil — önce Bağlan butonuna basın</div>
</div>

<script>
(function(){

var arenaHistory = {claude:[], gpt:[], o1:[]};
var arenaScores  = {claude:0, gpt:0, o1:0, total:0};
var arenabusy    = false;
var proxyUrl     = localStorage.getItem('proxyUrl') || 'https://web-production-e5865.up.railway.app';

// ── Sistem promptu ────────────────────────────────────────────────────
function buildSys(){
  var camps  = (MX.campStore  || []).slice(0,10).map(function(r){ return {k:r.name&&r.name.slice(0,30), h:r.spend, roas:r.roas, satis:r.purchase}; });
  var adsets = (MX.adsetStore || []).slice(0,12).map(function(r){ return {k:r.name&&r.name.slice(0,30), h:r.spend, roas:r.roas}; });
  var hasMeta = camps.length > 0;
  return 'Madmext erkek/kadın tekstil e-ticaret markası için Meta Ads uzmanısın. Türkçe yanıt ver. Kısa, net, aksiyonable ol.' +
    (hasMeta ? '\nKAMPANYA VERİSİ: ' + JSON.stringify(camps) + '\nREKLAM SETİ: ' + JSON.stringify(adsets) : '\nMeta verisi yok — genel öneri yap.');
}

// ── API çağrıları ─────────────────────────────────────────────────────
async function callClaude(messages, sys){
  var r = await fetch(proxyUrl + '/claude', {
    method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1200, system:sys, messages:messages})
  });
  var d = await r.json();
  return (d.content && d.content[0] && d.content[0].text) || ('Hata: ' + JSON.stringify(d.error||d));
}

async function callGPT(messages, sys, model){
  model = model || 'gpt-4o';
  var msgs = [{role:'system', content:sys}].concat(messages);
  var r = await fetch(proxyUrl + '/openai', {
    method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
    body: JSON.stringify({model:model, max_tokens:1200, messages:msgs})
  });
  var d = await r.json();
  return (d.content && d.content[0] && d.content[0].text) || ('Hata: ' + JSON.stringify(d.error||d));
}

// ── Gönder ───────────────────────────────────────────────────────────
window.arenaSend = async function(preMsg){
  if(arenabusy) return;
  var msg = preMsg || (document.getElementById('arenaInput').value||'').trim();
  if(!msg) return;
  document.getElementById('arenaInput').value = '';

  var useC  = document.getElementById('useClause').checked;
  var useG  = document.getElementById('useGpt').checked;
  var useO  = document.getElementById('useO1').checked;
  if(!useC && !useG && !useO){ toast('En az bir model seçili olmalı'); return; }

  arenabusy = true;
  document.getElementById('arenaSendBtn').disabled = true;

  var row = document.createElement('div');
  row.className = 'arena-row';

  // Kullanıcı mesajı
  var userDiv = document.createElement('div');
  userDiv.className = 'arena-user-msg';
  userDiv.textContent = msg;
  row.appendChild(userDiv);

  // Yanıt kartları + thinking placeholder
  var cols = (useC?1:0)+(useG?1:0)+(useO?1:0);
  var grid = document.createElement('div');
  grid.className = 'arena-responses cols-' + Math.min(cols, 2);

  var cards = {};
  if(useC)  cards.claude = makeCard('claude', '🟣 Claude Sonnet', grid);
  if(useG)  cards.gpt    = makeCard('gpt',    '🟢 GPT-4o',        grid);
  if(useO)  cards.o1     = makeCard('o1',     '🟡 o3-mini',       grid);

  row.appendChild(grid);
  document.getElementById('arenaMsgs').appendChild(row);
  document.getElementById('arenaMsgs').scrollTop = 99999;

  var sys = buildSys();

  // History push
  if(useC)  arenaHistory.claude.push({role:'user', content:msg});
  if(useG)  arenaHistory.gpt.push({role:'user',    content:msg});
  if(useO)  arenaHistory.o1.push({role:'user',     content:msg});

  // Paralel istek
  var promises = [];
  if(useC) promises.push(callClaude(arenaHistory.claude.slice(-8), sys).then(function(t){ return {key:'claude', text:t}; }).catch(function(e){ return {key:'claude', text:'Hata: '+e.message}; }));
  if(useG) promises.push(callGPT(arenaHistory.gpt.slice(-8), sys, 'gpt-4o').then(function(t){ return {key:'gpt', text:t}; }).catch(function(e){ return {key:'gpt', text:'Hata: '+e.message}; }));
  if(useO) promises.push(callGPT(arenaHistory.o1.slice(-8), sys, 'o3-mini').then(function(t){ return {key:'o1', text:t}; }).catch(function(e){ return {key:'o1', text:'Hata: '+e.message}; }));

  // Her yanıt gelince anında göster (race)
  var results = {};
  var pending = promises.map(function(p){
    return p.then(function(res){
      results[res.key] = res.text;
      // Kartı güncelle
      var card = cards[res.key];
      if(card){
        var body = card.querySelector('.arena-card-body');
        body.classList.remove('thinking-anim');
        body.innerHTML = renderMD(res.text);
        // History güncelle
        arenaHistory[res.key].push({role:'assistant', content:res.text});
        // Oy butonlarını ekle
        addVoteButtons(card, res.key, row);
      }
      document.getElementById('arenaMsgs').scrollTop = 99999;
    });
  });

  await Promise.all(pending);

  // Denetim özeti: çakışma var mı?
  if(Object.keys(results).length >= 2){
    addAuditSummary(row, results, msg);
  }

  arenaScores.total++;
  updateScoreBar();
  arenabusy = false;
  document.getElementById('arenaSendBtn').disabled = false;
  document.getElementById('arenaMsgs').scrollTop = 99999;
};

// ── Kart oluştur ──────────────────────────────────────────────────────
function makeCard(key, label, grid){
  var card = document.createElement('div');
  card.className = 'arena-card';
  card.dataset.key = key;
  card.innerHTML =
    '<div class="arena-card-hdr ' + key + '-hdr">' +
      '<span>' + label + '</span>' +
      '<span style="font-size:9px;opacity:.6">düşünüyor...</span>' +
    '</div>' +
    '<div class="arena-card-body thinking-anim">▋</div>';
  grid.appendChild(card);
  return card;
}

// ── Oy butonu ekle ────────────────────────────────────────────────────
function addVoteButtons(card, key, row){
  var voteDiv = document.createElement('div');
  voteDiv.className = 'arena-vote';
  voteDiv.innerHTML =
    '<span style="font-size:10px;color:var(--m);margin-right:4px">Bu yanıt:</span>' +
    '<button class="vote-btn" onclick="arenaVote(this,\''+key+'\',\'win\',this.closest(\'.arena-row\'))">👍 Daha iyi</button>' +
    '<button class="vote-btn" onclick="arenaVote(this,\''+key+'\',\'lose\',this.closest(\'.arena-row\'))">👎 Zayıf</button>' +
    '<button class="vote-btn" onclick="arenaVote(this,\''+key+'\',\'ok\',this.closest(\'.arena-row\'))">🤝 Yeterli</button>';
  card.appendChild(voteDiv);
  // Header'daki "düşünüyor..." kaldır
  var hdr = card.querySelector('.arena-card-hdr span:last-child');
  if(hdr) hdr.textContent = '';
}

// ── Denetim özeti ─────────────────────────────────────────────────────
function addAuditSummary(row, results, question){
  // Basit çakışma tespiti: Kelime benzerliği
  var texts = Object.values(results);
  if(texts.length < 2) return;

  // Her yanıttan ilk 3 tavsiye kelimesini al ve karşılaştır
  var summary = document.createElement('div');
  summary.className = 'audit-summary';

  var keys = Object.keys(results);
  var labels = {claude:'Claude', gpt:'GPT-4o', o1:'o3-mini'};

  // Uzunluk karşılaştırması (basit farklılık sinyali)
  var wordCounts = {};
  keys.forEach(function(k){ wordCounts[k] = results[k].split(/\s+/).length; });
  var maxKey = keys.reduce(function(a,b){ return wordCounts[a]>wordCounts[b]?a:b; });
  var minKey = keys.reduce(function(a,b){ return wordCounts[a]<wordCounts[b]?a:b; });

  var hasConflict = (wordCounts[maxKey] / wordCounts[minKey]) > 1.8;

  summary.innerHTML =
    '<strong>🔍 Denetim Notu</strong> — ' +
    (hasConflict
      ? labels[maxKey] + ' daha kapsamlı yanıt verdi (' + wordCounts[maxKey] + ' kelime vs ' + wordCounts[minKey] + ' kelime). Detay farkı var — her iki yanıtı karşılaştırın.'
      : 'Her iki model benzer kapsamda yanıt verdi. Oy vererek hangisinin daha isabetli olduğunu işaretleyin.') +
    '<br><span style="font-size:10px;color:var(--m)">Oy verildikçe hangi AI bu hesaba daha uygun analiz yapıyor ölçülür.</span>';

  if(hasConflict){
    // Çakışan kartları sarıyla vurgula
    Object.keys(results).forEach(function(k){
      var card = row.querySelector('[data-key="'+k+'"]');
      if(card && k === minKey) card.classList.add('conflict');
    });
  }

  row.appendChild(summary);
}

// ── Oy ver ────────────────────────────────────────────────────────────
window.arenaVote = function(btn, key, type, row){
  // Aynı satırdaki tüm vote-btn'leri disable et
  if(row) row.querySelectorAll('.vote-btn').forEach(function(b){ b.disabled = true; });
  btn.classList.add('voted');

  if(type === 'win'){
    arenaScores[key]++;
    toast(({claude:'Claude',gpt:'GPT-4o',o1:'o3-mini'}[key]) + ' bu turda kazandı 🏆');
    // Kazanan kartı yeşil yap
    var card = btn.closest('.arena-card');
    if(card) card.classList.add('agree');
  } else if(type === 'lose'){
    toast('Geri bildirim kaydedildi 👍');
  }
  updateScoreBar();
};

// ── Skor güncelle ────────────────────────────────────────────────────
function updateScoreBar(){
  document.getElementById('scoreClaudeEl').textContent = arenaScores.claude;
  document.getElementById('scoreGptEl').textContent    = arenaScores.gpt;
  document.getElementById('scoreO1El').textContent     = arenaScores.o1;
  document.getElementById('scoreTotalEl').textContent  = arenaScores.total;
}

// ── Temizle / Kopyala ─────────────────────────────────────────────────
window.arenaClear = function(){
  arenaHistory = {claude:[], gpt:[], o1:[]};
  arenaScores  = {claude:0, gpt:0, o1:0, total:0};
  updateScoreBar();
  document.getElementById('arenaMsgs').innerHTML =
    '<div style="text-align:center;color:var(--m);font-size:12px;padding:20px 0">Arena temizlendi. Yeni soru sorabilirsiniz.</div>';
};

window.arenaExport = function(){
  var lines = [];
  Object.keys(arenaHistory).forEach(function(k){
    arenaHistory[k].forEach(function(m){
      lines.push('[' + k.toUpperCase() + '|' + m.role + '] ' + m.content);
    });
  });
  lines.push('\nSKOR — Claude:' + arenaScores.claude + ' GPT:' + arenaScores.gpt + ' o3:' + arenaScores.o1);
  navigator.clipboard.writeText(lines.join('\n\n')).then(function(){ toast('Arena sohbeti kopyalandı'); });
};

// ── Context güncelle ─────────────────────────────────────────────────
function updateCtx(){
  var camps  = (MX.campStore  || []).length;
  var adsets = (MX.adsetStore || []).length;
  var el = document.getElementById('arenaCtx');
  if(camps || adsets){
    el.textContent = camps + ' kampanya, ' + adsets + ' reklam seti yüklü — her iki AI da bu veriyi görüyor';
  } else {
    el.textContent = 'Meta verisi yok — Bağlan butonuna basın (bağlantısız da çalışır)';
  }
}

window.addEventListener('mx:connected', updateCtx);
updateCtx();

})();
</script>
