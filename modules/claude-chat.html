<style>
.cc-wrap{display:flex;flex-direction:column;height:calc(100vh - 80px);gap:0}
.cc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0}
.cc-title{display:flex;align-items:center;gap:10px}
.cc-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cc-name{font-size:14px;font-weight:600}
.cc-sub{font-size:11px;color:var(--m)}
.cc-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.cc-msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.cc-msg.user{align-self:flex-end;flex-direction:row-reverse}
.cc-msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.cc-msg.user .cc-msg-bubble{background:#1877f2;color:#fff;border-radius:12px 2px 12px 12px}
.cc-msg.ai .cc-msg-bubble{background:var(--s2);color:var(--t);border:1px solid var(--b);border-radius:2px 12px 12px 12px}
.cc-msg.sys .cc-msg-bubble{background:transparent;color:var(--m);font-size:11px;text-align:center;border:none;padding:4px}
.cc-msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.cc-thinking{display:flex;gap:4px;padding:12px 16px;align-items:center}
.cc-dot{width:6px;height:6px;border-radius:50%;background:var(--m);animation:bounce .8s infinite}
.cc-dot:nth-child(2){animation-delay:.15s}.cc-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.cc-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--b);background:var(--s);flex-shrink:0}
.cc-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--b);background:var(--s);flex-shrink:0}
.cc-input{flex:1;background:var(--bg);border:1px solid var(--b);color:var(--t);padding:10px 14px;font-family:Inter,sans-serif;font-size:13px;border-radius:20px;resize:none;height:44px;max-height:120px;line-height:1.4;transition:border-color .15s;outline:none}
.cc-input:focus{border-color:#1877f2}
.cc-send{width:40px;height:40px;border-radius:50%;background:#1877f2;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:2px}
.cc-send:hover{background:#1565d8;transform:scale(1.05)}
.cc-send:disabled{background:var(--b2);cursor:default;transform:none}
.cc-context{font-size:10px;color:var(--m);padding:4px 16px;border-top:1px solid var(--b);background:var(--bg);flex-shrink:0}
</style>

<div class="cc-wrap">
  <div class="cc-header">
    <div class="cc-title">
      <div class="cc-avatar">🤖</div>
      <div>
        <div class="cc-name">Claude AI Asistan</div>
        <div class="cc-sub" id="ccSub">Meta verilerinize erişimim var</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn sm sec" onclick="ccClear()">🗑 Temizle</button>
      <button class="btn sm sec" onclick="ccExport()">📋 Kopyala</button>
    </div>
  </div>

  <div class="cc-msgs" id="ccMsgs">
    <div class="cc-msg sys"><div class="cc-msg-bubble">Madmext Ads paneline hoş geldiniz. Meta kampanya verilerinizi analiz edebilir, bütçe önerisi yapabilir, optimizasyon uygulayabilirim. Ne yapmamı istersiniz?</div></div>
  </div>

  <div class="cc-toolbar">
    <button class="qbtn" onclick="ccSend('Kampanyalarımın genel performansını özetle')">📊 Performans özeti</button>
    <button class="qbtn" onclick="ccSend('Hangi kampanyalarda bütçe artırmalıyım?')">💰 Bütçe önerisi</button>
    <button class="qbtn" onclick="ccSend('ROAS düşük olan reklamları listele ve ne yapmalıyım söyle')">📉 Düşük ROAS</button>
    <button class="qbtn" onclick="ccSend('Bu hafta hangi reklamları kapatmalıyım?')">🔴 Kapatılacaklar</button>
    <button class="qbtn" onclick="ccSend('Hesabın toplam harcama ve gelir özeti')">💵 Harcama özeti</button>
    <button class="qbtn" onclick="ccSend('En iyi ve en kötü 3 kampanyamı karşılaştır')">⚖️ Karşılaştır</button>
  </div>

  <div class="cc-input-row">
    <textarea class="cc-input" id="ccInput" placeholder="Meta kampanyalarınız hakkında bir şey sorun..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ccSend();}"></textarea>
    <button class="cc-send" id="ccSendBtn" onclick="ccSend()">↑</button>
  </div>

  <div class="cc-context" id="ccContext">Bağlı değil — önce Bağlan butonuna basın</div>
</div>

<script>
(function(){

var ccHistory = [];
var ccTyping = false;

function updateContext(){
  var el = document.getElementById('ccContext');
  var sub = document.getElementById('ccSub');
  var camps = (MX.campStore||[]).length;
  var adsets = (MX.adsetStore||[]).length;
  var ads = (MX.adStore||[]).length;
  if(camps||adsets||ads){
    var txt = camps + ' kampanya, ' + adsets + ' reklam seti, ' + ads + ' reklam yüklü';
    el.textContent = txt;
    sub.textContent = txt;
  }
}

// ── Hazır cevaplar (token harcamaz) ──────────────────────────────
function quickReply(msg){
  var camps = MX.campStore||[];
  var adsets = MX.adsetStore||[];

  // Performans özeti
  if(msg.indexOf('Performans')!==-1 && msg.indexOf('özeti')!==-1){
    if(!adsets.length) return null;
    var totalSpend=0,totalRev=0,totalClicks=0,totalImpr=0,activeCount=0;
    adsets.forEach(function(r){
      totalSpend+=r.spend||0; totalRev+=r.revenue||0;
      totalClicks+=r.clicks||0; totalImpr+=r.impr||0;
      if((r.effectiveStatus||'').toUpperCase()==='ACTIVE') activeCount++;
    });
    var roas = totalSpend>0?(totalRev/totalSpend).toFixed(2):0;
    var ctr = totalImpr>0?(totalClicks/totalImpr*100).toFixed(2):0;
    return '**Hesap Performans Özeti**

' +
      '💰 Toplam Harcama: **' + totalSpend.toFixed(0) + ' TL**
' +
      '📈 Toplam Gelir: **' + totalRev.toFixed(0) + ' TL**
' +
      '🎯 Ortalama ROAS: **' + roas + 'x**
' +
      '🖱️ Toplam Tıklama: **' + totalClicks.toLocaleString('tr') + '**
' +
      '👁️ Gösterim: **' + (totalImpr/1000).toFixed(0) + 'K**
' +
      '📊 CTR: **%' + ctr + '**
' +
      '✅ Aktif Reklam Seti: **' + activeCount + ' / ' + adsets.length + '**';
  }

  // Harcama özeti
  if(msg.indexOf('Harcama')!==-1 && msg.indexOf('özeti')!==-1){
    if(!adsets.length) return null;
    var sorted = adsets.slice().sort(function(a,b){return (b.spend||0)-(a.spend||0);});
    var top5 = sorted.slice(0,5);
    var total = adsets.reduce(function(s,r){return s+(r.spend||0);},0);
    return '**Harcama Dağılımı**

Toplam: **' + total.toFixed(0) + ' TL**

**En Çok Harcayan 5:**
' +
      top5.map(function(r,i){
        return (i+1)+'. '+r.name.slice(0,35)+' — **'+(r.spend||0).toFixed(0)+'TL** (ROAS: '+(r.roas||0).toFixed(1)+'x)';
      }).join('
');
  }

  // Düşük ROAS
  if(msg.indexOf('ROAS')!==-1 && (msg.indexOf('düşük')!==-1||msg.indexOf('Düşük')!==-1)){
    if(!adsets.length) return null;
    var avgRoas = adsets.reduce(function(s,r){return s+(r.roas||0);},0)/adsets.length;
    var low = adsets.filter(function(r){return (r.roas||0)<avgRoas && (r.spend||0)>50;})
      .sort(function(a,b){return (a.roas||0)-(b.roas||0);}).slice(0,8);
    if(!low.length) return 'Tüm reklam setleri hesap ROAS ortalamasının (' + avgRoas.toFixed(2) + 'x) üstünde görünüyor.';
    return '**Düşük ROAS Reklam Setleri** (ort: ' + avgRoas.toFixed(2) + 'x)

' +
      low.map(function(r,i){
        return (i+1)+'. '+r.name.slice(0,35)+'
   ROAS: **'+(r.roas||0).toFixed(2)+'x** | Harcama: '+(r.spend||0).toFixed(0)+'TL';
      }).join('
');
  }

  // Kapatılacaklar
  if(msg.indexOf('kapat')!==-1||msg.indexOf('Kapat')!==-1){
    if(!adsets.length) return null;
    var avgR = adsets.reduce(function(s,r){return s+(r.roas||0);},0)/adsets.length;
    var toStop = adsets.filter(function(r){
      return (r.effectiveStatus||'').toUpperCase()==='ACTIVE' && 
             (r.roas||0) < avgR*0.5 && (r.spend||0) > 100;
    }).sort(function(a,b){return (a.roas||0)-(b.roas||0);}).slice(0,6);
    if(!toStop.length) return 'Kapatılması önerilen kritik reklam seti bulunamadı.';
    return '**Kapatılması Önerilen Reklam Setleri**
*(ROAS hesap ortalamasının %50 altı)*

' +
      toStop.map(function(r,i){
        return (i+1)+'. '+r.name.slice(0,35)+'
   ROAS: **'+(r.roas||0).toFixed(2)+'x** | Harcama: '+(r.spend||0).toFixed(0)+'TL';
      }).join('
');
  }

  // Bütçe önerisi
  if(msg.indexOf('Bütçe')!==-1 && msg.indexOf('önerisi')!==-1){
    if(!adsets.length) return null;
    var avgR2 = adsets.reduce(function(s,r){return s+(r.roas||0);},0)/adsets.length;
    var increase = adsets.filter(function(r){return (r.roas||0)>avgR2*1.5 && (r.effectiveStatus||'').toUpperCase()==='ACTIVE';})
      .sort(function(a,b){return (b.roas||0)-(a.roas||0);}).slice(0,3);
    var decrease = adsets.filter(function(r){return (r.roas||0)<avgR2*0.7 && (r.spend||0)>100;})
      .sort(function(a,b){return (a.roas||0)-(b.roas||0);}).slice(0,3);
    return '**Bütçe Optimizasyon Önerisi**

' +
      '📈 **Artırılması önerilen:**
' +
      (increase.length ? increase.map(function(r){
        return '• '+r.name.slice(0,35)+' (ROAS: '+(r.roas||0).toFixed(2)+'x) → %20 artır';
      }).join('
') : 'Yok') + '

' +
      '📉 **Azaltılması önerilen:**
' +
      (decrease.length ? decrease.map(function(r){
        return '• '+r.name.slice(0,35)+' (ROAS: '+(r.roas||0).toFixed(2)+'x) → %20 azalt';
      }).join('
') : 'Yok');
  }

  // Karşılaştır
  if(msg.indexOf('arşılaştır')!==-1||msg.indexOf('en iyi')!==-1||msg.indexOf('en kötü')!==-1){
    if(!adsets.length) return null;
    var sorted2 = adsets.slice().sort(function(a,b){return (b.roas||0)-(a.roas||0);});
    var top3 = sorted2.slice(0,3);
    var bot3 = sorted2.slice(-3).reverse();
    return '**En İyi vs En Kötü 3 Reklam Seti**

' +
      '🏆 **En İyi:**
' + top3.map(function(r,i){
        return (i+1)+'. '+r.name.slice(0,30)+' — ROAS: **'+(r.roas||0).toFixed(2)+'x**, Gelir: '+(r.revenue||0).toFixed(0)+'TL';
      }).join('
') + '

' +
      '⚠️ **En Kötü:**
' + bot3.map(function(r,i){
        return (i+1)+'. '+r.name.slice(0,30)+' — ROAS: **'+(r.roas||0).toFixed(2)+'x**, Harcama: '+(r.spend||0).toFixed(0)+'TL';
      }).join('
');
  }

  return null; // Bilinmiyor, Claude'a gönder
}

window.ccSend = function(preMsg){
  var msg = preMsg || (document.getElementById('ccInput').value||'').trim();
  if(!msg||ccTyping) return;
  document.getElementById('ccInput').value = '';

  // Hazır cevap var mı?
  var quick = quickReply(msg);
  if(quick){
    addCCMsg(msg, 'user');
    addCCMsg(quick, 'ai');
    return;
  }

  // User mesajı
  addCCMsg(msg, 'user');
  ccHistory.push({role:'user', content:msg});

  // Thinking
  var th = addCCThinking();
  ccTyping = true;
  document.getElementById('ccSendBtn').disabled = true;

  // Meta verisi yükle (yoksa API'den çek)
  ccLoadMetaAndSend(msg);
};

window.ccLoadMetaAndSend = async function(msg){
  var containerId = 'ccMsgs';
  
  // Önce mevcut store'a bak
  var campData = (MX.campStore||[]).slice(0,15).map(function(c){
    return {id:c.id, name:c.name, status:c.status, effective_status:c.effective_status};
  });
  var adsetData = (MX.adsetStore||[]).slice(0,20).map(function(r){
    return {
      id:r._budgetId, name:r.name,
      budget:parseFloat((r.budgetAmt||'0').replace(/[^\d.]/g,'')),
      roas:+(r.roas||0).toFixed(2), spend:+(r.spend||0).toFixed(0),
      revenue:+(r.revenue||0).toFixed(0), clicks:r.clicks||0,
      ctr:+(r.ctr||0).toFixed(2), cpc:+(r.cpc||0).toFixed(2),
      status:r.effectiveStatus
    };
  }).filter(function(r){return r.id;});

  // Store boşsa Meta API'den direkt çek
  if(!campData.length && window._isConnected){
    try{
      var insRes = await api(AID+'/insights',{
        fields:'campaign_id,campaign_name,spend,impressions,clicks,ctr,cpc,purchase_roas,actions,action_values',
        level:'campaign', date_preset:'last_7d', limit:20,
        action_attribution_windows:'["1d_click","7d_click"]'
      });
      if(insRes && insRes.data){
        campData = insRes.data.map(function(r){
          var roas = 0;
          if(r.purchase_roas && r.purchase_roas[0]) roas = parseFloat(r.purchase_roas[0].value||0);
          var purchase = 0;
          if(r.actions) r.actions.forEach(function(a){if(a.action_type==='purchase')purchase=parseInt(a.value||0);});
          var revenue = 0;
          if(r.action_values) r.action_values.forEach(function(a){if(a.action_type==='purchase')revenue=parseFloat(a.value||0);});
          return {
            id:r.campaign_id, name:r.campaign_name||'—',
            spend:+(parseFloat(r.spend||0)).toFixed(0),
            roas:+roas.toFixed(2), purchase:purchase, revenue:+revenue.toFixed(0),
            clicks:parseInt(r.clicks||0), ctr:+(parseFloat(r.ctr||0)).toFixed(2),
            cpc:+(parseFloat(r.cpc||0)).toFixed(2)
          };
        });
      }
      // Adset verisi de çek
      var adRes = await api(AID+'/insights',{
        fields:'adset_id,adset_name,spend,ctr,cpc,purchase_roas,actions,action_values',
        level:'adset', date_preset:'last_7d', limit:30,
        action_attribution_windows:'["1d_click","7d_click"]'
      });
      if(adRes && adRes.data){
        adsetData = adRes.data.map(function(r){
          var roas=0;
          if(r.purchase_roas&&r.purchase_roas[0])roas=parseFloat(r.purchase_roas[0].value||0);
          var revenue=0;
          if(r.action_values)r.action_values.forEach(function(a){if(a.action_type==='purchase')revenue=parseFloat(a.value||0);});
          return {
            id:r.adset_id, name:r.adset_name||'—',
            spend:+(parseFloat(r.spend||0)).toFixed(0),
            roas:+roas.toFixed(2), revenue:+revenue.toFixed(0),
            ctr:+(parseFloat(r.ctr||0)).toFixed(2), cpc:+(parseFloat(r.cpc||0)).toFixed(2)
          };
        });
      }
      updateContext();
    }catch(e){ console.log('Meta fetch err:',e); }
  }

  var dataInfo = campData.length
    ? campData.length + ' kampanya, ' + adsetData.length + ' reklam seti verisi mevcut'
    : 'Meta bağlantısı yok — önce Bağlan butonuna basın';

  var sys = "Sen Madmext reklam yöneticisinin AI asistanısın. Meta Graph API verilerine erişimin var.\n" +
    "Türkçe yanıt ver. Kısa ve net ol. Sayıları TL cinsinden göster. Tablolar kullan.\n" +
    "VERİ DURUMU: " + dataInfo + "\n" +
    "KAMPANYALAR (son 7 gün): " + JSON.stringify(campData) + "\n" +
    "REKLAM SETLERİ (son 7 gün): " + JSON.stringify(adsetData) + "\n" +
    "Bütçe değişikliği için: <!--ACTION:BUDGET_INCREASE|ID|ADI|adset|MEVCUT|YENI|PCT-->\n" +
    "SADECE gerçek ID kullan. Veri yoksa 'Bağlan butonuna basın' de.";

  // Direkt API çağrısı - shared.js bağımlılığı yok
  var proxyUrl = localStorage.getItem('proxyUrl') || 'https://web-production-e5865.up.railway.app';
  fetch(proxyUrl + '/claude', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1500,
      system: sys,
      messages: ccHistory.slice(-8)
    })
  }).then(function(r){ return r.json(); })
  .then(function(data){
    th.remove();
    ccTyping = false;
    document.getElementById('ccSendBtn').disabled = false;
    var reply = (data.content && data.content[0] && data.content[0].text) || 
                (data.error && ('Hata: ' + (data.error.message||JSON.stringify(data.error)))) || 
                'Cevap alınamadı';
    ccHistory.push({role:'assistant', content:reply});
    var clean = reply.replace(/<!--ACTION:[^>]*-->/g,'').trim();
    addCCMsg(clean, 'ai');
    if(typeof parseAndRenderActions === 'function'){
      parseAndRenderActions(reply, 'ccMsgs');
    }
    document.getElementById('ccMsgs').scrollTop = 9999;
  }).catch(function(e){
    th.remove();
    ccTyping = false;
    document.getElementById('ccSendBtn').disabled = false;
    addCCMsg('Bağlantı hatası: ' + e.message + '. Bağlan butonuna basın.', 'sys');
  });
};

function addCCMsg(text, role){
  var msgs = document.getElementById('ccMsgs');
  var div = document.createElement('div');
  div.className = 'cc-msg ' + role;
  if(role === 'user'){
    div.innerHTML = '<div class="cc-msg-bubble">' + escHtml(text) + '</div>';
  } else if(role === 'ai'){
    div.innerHTML =
      '<div class="cc-msg-avatar">🤖</div>' +
      '<div class="cc-msg-bubble">' + markdownToHtml(text) + '</div>';
  } else {
    div.innerHTML = '<div class="cc-msg-bubble">' + text + '</div>';
  }
  msgs.appendChild(div);
  msgs.scrollTop = 9999;
  return div;
}

function addCCThinking(){
  var msgs = document.getElementById('ccMsgs');
  var div = document.createElement('div');
  div.className = 'cc-msg ai';
  div.innerHTML = '<div class="cc-msg-avatar">🤖</div><div class="cc-thinking"><div class="cc-dot"></div><div class="cc-dot"></div><div class="cc-dot"></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = 9999;
  return div;
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function markdownToHtml(t){
  return escHtml(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--b);padding:1px 4px;border-radius:3px;font-family:monospace">$1</code>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n/g,'<br>');
}

window.ccClear = function(){
  ccHistory = [];
  var msgs = document.getElementById('ccMsgs');
  msgs.innerHTML = '<div class="cc-msg sys"><div class="cc-msg-bubble">Sohbet temizlendi. Yeni bir soru sorabilirsiniz.</div></div>';
};

window.ccExport = function(){
  var text = ccHistory.map(function(m){
    return (m.role==='user'?'Siz: ':'Claude: ') + m.content;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(function(){toast('Sohbet kopyalandı');});
};

// Bağlan ve Meta verilerini çek
function ccConnect(){
  var dot = document.getElementById('dot');
  var isDotGreen = dot && dot.classList.contains('green');
  
  if(window._isConnected && (MX.campStore||[]).length > 0){
    // Zaten bağlı ve veri var
    updateContext();
    return;
  }
  
  // Bağlı değilse veya veri yoksa bağlan
  document.getElementById('ccContext').textContent = 'Bağlanıyor...';
  
  // connect() shared.js'de tanımlı
  if(typeof connect === 'function'){
    connect().then(function(){
      // Bağlandı, şimdi Meta kampanya verilerini çek
      ccLoadMetaData();
    }).catch(function(){
      ccLoadMetaData(); // yine de dene
    });
  } else {
    setTimeout(function(){
      if(typeof connect === 'function') connect();
      setTimeout(ccLoadMetaData, 1500);
    }, 500);
  }
}

function ccLoadMetaData(){
  // Kampanya + Reklam Setleri + Reklamları paralel yükle
  var fns = ['loadMetaCamp','loadMetaAdsets','loadMetaAds'];
  fns.forEach(function(fn){
    if(typeof window[fn] === 'function'){
      try{ window[fn](); }catch(e){}
    }
  });
  // 4 sn bekle, sonra güncelle
  setTimeout(function(){
    var camps = (MX.campStore||[]).length;
    var adsets = (MX.adsetStore||[]).length;
    updateContext();
    var msgs = document.getElementById('ccMsgs');
    if(msgs){
      var txt = camps > 0
        ? camps + ' kampanya, ' + adsets + ' reklam seti yüklendi. Soru sorabilirsiniz.'
        : 'Meta verisi yüklenemedi. Bağlantıyı kontrol edin.';
      msgs.innerHTML = '<div class="cc-msg sys"><div class="cc-msg-bubble">'+txt+'</div></div>';
    }
  }, 4000);
}

window.addEventListener('mx:connected', function(){
  updateContext();
  ccLoadMetaData();
});

// Sayfa açılınca otomatik bağlan
setTimeout(ccConnect, 300);

})();
</script>
