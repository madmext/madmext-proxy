<!-- SEO Modülü v3 -->
<style>
#SR{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden}

/* ── TOP BAR ── */
#SR-top{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--b)}
#SR-inp{flex:1;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:10px 14px 10px 40px;font-size:13px;border-radius:10px;outline:none;font-family:inherit;transition:border-color .18s;box-sizing:border-box}
#SR-inp:focus{border-color:#3ecfa0}
#SR-sw{position:relative;flex:1}
#SR-sw::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
#SR-btn{flex-shrink:0;display:flex;align-items:center;gap:7px;background:#3ecfa0;color:#fff;border:none;padding:10px 18px;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
#SR-btn:hover{opacity:.88}
#SR-btn:disabled{opacity:.5;cursor:not-allowed}
#SR-cmp-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--s2);border:1.5px solid var(--b);color:var(--t);padding:9px 14px;font-size:12px;font-weight:600;border-radius:10px;cursor:pointer;white-space:nowrap;transition:border-color .15s}
#SR-cmp-btn:hover{border-color:#3ecfa0}

/* ── BODY ── */
#SR-body{flex:1;overflow-y:auto;padding:18px 0}

/* ── KART LİSTESİ ── */
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:11px}
.sg-card{position:relative;background:var(--s);border:1px solid var(--b);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.sg-card:hover{border-color:#3ecfa0;box-shadow:0 2px 14px rgba(62,207,160,.1)}
.sg-card.sel{border-color:#3ecfa0;background:rgba(62,207,160,.05)}
.sg-fav{width:40px;height:40px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.sg-fav img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sg-info{flex:1;min-width:0}
.sg-url{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.sg-time{font-size:11px;color:var(--m)}
.sg-ring{position:relative;width:52px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sg-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.sg-rnum{position:relative;z-index:1;font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.sg-del{position:absolute;top:7px;right:8px;background:none;border:none;color:var(--m);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s}
.sg-card:hover .sg-del{opacity:1}
.sg-del:hover{background:rgba(250,62,62,.12);color:#fa3e3e}
.sg-sel-tag{position:absolute;top:7px;left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:#3ecfa0;color:#fff}
.sg-empty{text-align:center;padding:70px 20px;color:var(--m)}

/* ── ANALİZ SAYFA ── */
#SR-detail{display:none}
.sa-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sa-back{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:border-color .15s}
.sa-back:hover{border-color:#3ecfa0}

/* Skor büyük */
.sa-hero{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:12px}
.sa-big-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;width:110px;height:110px;flex-shrink:0}
.sa-big-ring svg{transform:rotate(-90deg)}
.sa-big-num{position:absolute;font-size:30px;font-weight:800}

/* İstatistik grid */
.sa-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
@media(max-width:700px){.sa-stats{grid-template-columns:repeat(2,1fr)}}
.sa-stat{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px;text-align:center}
.sa-sv{font-size:17px;font-weight:700;font-family:'DM Mono',monospace}
.sa-sl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* Sekmeler */
.sa-tabs{display:flex;gap:2px;border-bottom:2px solid var(--b);margin-bottom:13px;overflow-x:auto}
.sa-tab{padding:8px 15px;font-size:12px;font-weight:600;color:var(--m);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.sa-tab.on{color:#3ecfa0;border-bottom-color:#3ecfa0}
.sa-tab:hover:not(.on){color:var(--t)}

/* Bölüm */
.sa-box{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.sa-bh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--m);margin-bottom:11px}

/* Kontrol */
.sa-chk{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.07)}
.sa-chk:last-child{border-bottom:none}

/* Sorun */
.sa-iss{display:flex;gap:11px;padding:10px 12px;border-radius:8px;margin-bottom:7px;border:1px solid}
.sa-iss.err{background:rgba(250,62,62,.05);border-color:rgba(250,62,62,.18)}
.sa-iss.wrn{background:rgba(240,180,41,.05);border-color:rgba(240,180,41,.18)}
.sa-iss.ok{background:rgba(62,207,160,.05);border-color:rgba(62,207,160,.18)}
.sa-iss-fix{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:5px;background:rgba(62,207,160,.08);border-left:2px solid #3ecfa0;line-height:1.6}

/* KW */
.sa-kw{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:rgba(24,119,242,.1);color:var(--a);border:1px solid rgba(24,119,242,.2);margin:3px}

/* Prog */
.sa-prog{background:var(--b2);border-radius:4px;height:8px;overflow:hidden;margin-top:3px}
.sa-pfill{height:100%;border-radius:4px;transition:width .5s}

/* Tech satır */
.sa-tr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.07);font-size:12px}
.sa-tr:last-child{border-bottom:none}

/* Google preview */
.sa-gp{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:13px 15px;margin-bottom:12px}
.sa-gp-url{font-size:11px;color:#3ecfa0;margin-bottom:3px}
.sa-gp-title{font-size:15px;color:#1a73e8;margin-bottom:3px;line-height:1.3}
.sa-gp-desc{font-size:12px;color:var(--m);line-height:1.5}

/* AI */
.sa-ai{background:linear-gradient(135deg,rgba(62,207,160,.07),rgba(24,119,242,.07));border:1px solid rgba(62,207,160,.2);border-radius:10px;padding:14px;margin-bottom:10px}
.sa-tip{padding:9px 12px 9px 14px;border-left:3px solid #3ecfa0;border-radius:0 6px 6px 0;background:rgba(62,207,160,.06);font-size:11px;line-height:1.7;margin-bottom:7px}

/* ── KARŞILAŞTIRMA ── */
#SR-cmp{display:none}
.cmp-pick{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.cmp-slot{flex:1;min-width:200px;background:var(--s);border:2px dashed var(--b);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;min-height:80px;display:flex;align-items:center;justify-content:center}
.cmp-slot.filled{border-style:solid;border-color:#3ecfa0;cursor:default;text-align:left;align-items:flex-start;flex-direction:column;gap:4px}
.cmp-slot:not(.filled):hover{border-color:#3ecfa0}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{background:var(--s2);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);border-bottom:1px solid var(--b)}
.cmp-table td{padding:9px 12px;border-bottom:1px solid rgba(128,128,128,.07)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-better{color:#3ecfa0;font-weight:700}
.cmp-worse{color:#fa3e3e;font-weight:700}
.cmp-same{color:var(--m)}

/* Spinner */
@keyframes SR-spin{to{transform:rotate(360deg)}}
.sr-spin{width:24px;height:24px;border:2.5px solid var(--b);border-top-color:#3ecfa0;border-radius:50%;animation:SR-spin .9s linear infinite}
</style>

<div id="SR">
  <!-- TOP BAR -->
  <div id="SR-top">
    <div id="SR-sw">
      <input id="SR-inp" type="text" placeholder="https://madmext.com — URL gir ve Enter'a bas..." autocomplete="off">
    </div>
    <button id="SR-btn" onclick="SR.add()">＋ Analiz Et</button>
    <button id="SR-cmp-btn" onclick="SR.showCmp()" title="Seçili siteleri karşılaştır">⇄ Karşılaştır</button>
  </div>

  <!-- BODY -->
  <div id="SR-body">

    <!-- LİSTE -->
    <div id="SR-list">
      <div id="SR-grid" class="sg-grid"></div>
      <div id="SR-empty" class="sg-empty" style="display:none">
        <div style="font-size:48px;margin-bottom:12px">🔍</div>
        <div style="font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px">Henüz analiz yapılmamış</div>
        <div style="font-size:12px;line-height:1.8">URL gir ve Enter'a bas ya da "Analiz Et" butonuna tıkla.<br>Tüm analizler otomatik kaydedilir.</div>
      </div>
    </div>

    <!-- ANALİZ DETAY -->
    <div id="SR-detail"></div>

    <!-- KARŞILAŞTIRMA -->
    <div id="SR-cmp"></div>

  </div>
</div>

<script>
(function(){
'use strict';

/* ─── YARDIMCILAR ─── */
function x(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function ago(iso){
  var d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60) return 'az önce';
  if(d<3600) return Math.floor(d/60)+' dk önce';
  if(d<86400) return Math.floor(d/3600)+' saat önce';
  return Math.floor(d/86400)+' gün önce';
}

function mkRing(skor,r,sw){
  var c=2*Math.PI*r, off=c-(skor/100)*c;
  var col=skor>=80?'#3ecfa0':skor>=60?'#f0b429':'#fa3e3e';
  var d=r*2+sw*2, cx=d/2;
  return{
    svg:'<svg width="'+d+'" height="'+d+'">'
      +'<circle stroke-width="'+sw+'" stroke="var(--b2)" fill="transparent" r="'+r+'" cx="'+cx+'" cy="'+cx+'"></circle>'
      +'<circle stroke-width="'+sw+'" stroke-linecap="round" stroke="'+col+'" fill="transparent" r="'+r+'" cx="'+cx+'" cy="'+cx+'" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"></circle>'
      +'</svg>',
    col:col
  };
}

/* ─── VERİ ─── */
var _sites=[]; // {url,skor,baslik,tarih,data}
var _sel=[];   // karşılaştırma seçililer (max 2)

function load(){ try{_sites=JSON.parse(localStorage.getItem('seo_sites')||'[]');}catch(e){_sites=[];} }
function save(){ try{localStorage.setItem('seo_sites',JSON.stringify(_sites));}catch(e){} }

/* ─── CLAUDE API ─── */
async function callClaude(prompt){
  var r=await fetch('/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
    body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:3500,
      system:'Sen bir SEO uzmanısın. SADECE geçerli JSON döndür, başka HİÇBİR şey yazma. Markdown, kod bloğu, açıklama YOK.',
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!r.ok){
    var errText=await r.text();
    // HTML gelirse daha anlaşılır hata ver
    if(errText.includes('<html') || errText.includes('<!DOCTYPE')){
      throw new Error('Sunucu hatası ('+r.status+'). Railway\'de ANTHROPIC_KEY değişkeninin tanımlı olduğundan emin olun.');
    }
    var errJson=JSON.parse(errText);
    throw new Error(errJson.error&&errJson.error.message||'HTTP '+r.status);
  }
  var res=await r.json();
  if(res.error) throw new Error(res.error.message||'Claude API hatası');
  var txt=(res.content&&res.content[0]&&res.content[0].text)||'';
  // JSON bloğunu temizle
  txt=txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  // Sadece { } arasını al
  var s=txt.indexOf('{'), e=txt.lastIndexOf('}');
  if(s>=0&&e>s) txt=txt.slice(s,e+1);
  return JSON.parse(txt);
}

function buildPrompt(url){
  return 'Şu URL için kapsamlı SEO analizi yap: '+url+'\n\n'
    +'Aşağıdaki JSON formatında yanıt ver. Tüm alanları mutlaka doldur:\n'
    +'{\n'
    +'"skor":72,\n'
    +'"url":"'+url+'",\n'
    +'"baslik":"Sayfa Başlığı",\n'
    +'"baslik_uzunluk":45,\n'
    +'"meta_desc":"Meta açıklama metni",\n'
    +'"meta_desc_uzunluk":120,\n'
    +'"h1_sayisi":1,\n'
    +'"h2_sayisi":5,\n'
    +'"h3_sayisi":3,\n'
    +'"gorsel_toplam":25,\n'
    +'"gorsel_altsiz":3,\n'
    +'"ic_link":45,\n'
    +'"dis_link":8,\n'
    +'"sayfa_boyut_kb":450,\n'
    +'"https":true,\n'
    +'"mobil_uyumlu":true,\n'
    +'"robots_txt":true,\n'
    +'"sitemap":true,\n'
    +'"favicon":true,\n'
    +'"dil":"tr",\n'
    +'"charset":"UTF-8",\n'
    +'"canonical":true,\n'
    +'"og_tags":true,\n'
    +'"yukleme_hizi":"Orta",\n'
    +'"js_erteleme":false,\n'
    +'"dom_boyutu":1200,\n'
    +'"http_istekleri":65,\n'
    +'"metin_html_oran":18,\n'
    +'"noindex":false,\n'
    +'"anahtar_kelimeler":["kelime1","kelime2","kelime3"],\n'
    +'"iyi_yonler":[\n'
    +'  {"baslik":"HTTPS Aktif","aciklama":"SSL sertifikası mevcut."},\n'
    +'  {"baslik":"Sitemap","aciklama":"XML sitemap erişilebilir."}\n'
    +'],\n'
    +'"sorunlar":[\n'
    +'  {"seviye":"hata","baslik":"H1 Eksik","aciklama":"Sayfada H1 etiketi bulunamadı.","cozum":"Her sayfaya yalnızca 1 H1 ekleyin, ana başlık hedef kelimeyi içermeli.","etki":"Yüksek"},\n'
    +'  {"seviye":"uyari","baslik":"Görsel Alt Metni","aciklama":"Bazı görsellerde alt özelliği tanımsız.","cozum":"Tüm img etiketlerine açıklayıcı alt değeri ekleyin.","etki":"Orta"}\n'
    +'],\n'
    +'"oneriler":[\n'
    +'  "Anahtar kelime yoğunluğunu artırın.",\n'
    +'  "Schema.org yapılandırılmış veri ekleyin.",\n'
    +'  "İç linkleme stratejisi geliştirin.",\n'
    +'  "Görselleri WebP formatına çevirin.",\n'
    +'  "Sayfa hızını iyileştirmek için CSS/JS minify edin."\n'
    +'],\n'
    +'"ai_analiz":"Sitenin genel SEO durumu ve önemli bulgular hakkında 2-3 cümlelik değerlendirme."\n'
    +'}';
}

/* ─── LİSTE ─── */
function showList(){
  document.getElementById('SR-list').style.display='block';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='none';
  renderGrid();
}

function renderGrid(){
  var q=(document.getElementById('SR-inp').value||'').toLowerCase();
  var grid=document.getElementById('SR-grid');
  var empty=document.getElementById('SR-empty');
  var items=q?_sites.filter(function(s){return s.url.toLowerCase().includes(q);}):_sites;
  if(!items.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=items.map(function(site,i){
    var idx=_sites.indexOf(site);
    var skor=site.skor||0;
    var rv=mkRing(skor,22,3.5);
    var host=site.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    var fav='https://www.google.com/s2/favicons?domain='+encodeURIComponent(site.url)+'&sz=64';
    var isSel=_sel.indexOf(idx)>=0;
    return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SR.open('+idx+')">'
      +(isSel?'<span class="sg-sel-tag">✓ Seçili</span>':'')
      +'<button class="sg-del" onclick="event.stopPropagation();SR.del('+idx+')" title="Sil">✕</button>'
      +'<div class="sg-fav"><img src="'+fav+'" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'
      +'<div class="sg-info"><div class="sg-url">'+x(host)+'</div><div class="sg-time">'+ago(site.tarih||new Date())+'</div></div>'
      +'<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+skor+'</span></div>'
      +'</div>';
  }).join('');
}

/* ─── EKLE ─── */
window.SR={};

SR.add=async function(){
  var inp=document.getElementById('SR-inp');
  var btn=document.getElementById('SR-btn');
  var url=inp.value.trim();
  if(!url){inp.focus();return;}
  if(!url.startsWith('http')) url='https://'+url;

  btn.disabled=true;
  btn.innerHTML='<span class="sr-spin" style="width:14px;height:14px;border-width:2px"></span> Analiz...';

  // Yükleme kartı
  var host=url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var tmpId='tmp_'+Date.now();
  var grid=document.getElementById('SR-grid');
  document.getElementById('SR-empty').style.display='none';
  document.getElementById('SR-list').style.display='block';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='none';
  grid.insertAdjacentHTML('afterbegin',
    '<div id="'+tmpId+'" class="sg-card" style="opacity:.55;pointer-events:none">'
    +'<div style="display:flex;align-items:center;justify-content:center;width:40px;height:40px"><div class="sr-spin"></div></div>'
    +'<div class="sg-info"><div class="sg-url">'+x(host)+'</div><div class="sg-time">Analiz ediliyor...</div></div>'
    +'<div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px"><div class="sr-spin"></div></div>'
    +'</div>'
  );

  try{
    var data=await callClaude(buildPrompt(url));
    var tmp=document.getElementById(tmpId);if(tmp)tmp.remove();
    var ei=_sites.findIndex(function(s){return s.url===url;});
    var obj={url:url,skor:data.skor||0,baslik:data.baslik||host,tarih:new Date().toISOString(),data:data};
    if(ei>=0)_sites[ei]=obj;else _sites.unshift(obj);
    save();
    inp.value='';
    showList();
    // Analizi hemen aç
    SR.open(0);
  }catch(e){
    var tmp=document.getElementById(tmpId);if(tmp)tmp.remove();
    renderGrid();
    alert('Analiz hatası: '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML='＋ Analiz Et';
  }
};

SR.open=function(idx){
  var site=_sites[idx];if(!site)return;
  document.getElementById('SR-list').style.display='none';
  document.getElementById('SR-detail').style.display='block';
  document.getElementById('SR-cmp').style.display='none';
  renderDetail(idx);
};

SR.back=function(){showList();};

SR.del=function(idx){
  if(!confirm('Bu analiz silinsin mi?'))return;
  _sel=_sel.filter(function(i){return i!==idx;}).map(function(i){return i>idx?i-1:i;});
  _sites.splice(idx,1);save();renderGrid();
};

SR.reload=async function(idx){
  var site=_sites[idx];if(!site)return;
  var det=document.getElementById('SR-detail');
  det.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px"><div class="sr-spin" style="width:36px;height:36px;border-width:3px"></div><div style="font-size:12px;color:var(--m)">Yeniden analiz ediliyor...</div></div>';
  try{
    var data=await callClaude(buildPrompt(site.url));
    _sites[idx].data=data;_sites[idx].skor=data.skor||0;_sites[idx].tarih=new Date().toISOString();
    save();renderDetail(idx);
  }catch(e){renderDetail(idx);alert('Hata: '+e.message);}
};

SR.toggleSel=function(idx,e){
  e.stopPropagation();
  var p=_sel.indexOf(idx);
  if(p>=0){_sel.splice(p,1);}else{if(_sel.length>=2)_sel.shift();_sel.push(idx);}
  renderGrid();
};

SR.tab=function(tab,el,idx){
  document.querySelectorAll('.sa-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  renderTab(tab,idx);
};

/* ─── ANALİZ DETAY ─── */
function renderDetail(idx){
  var site=_sites[idx];if(!site)return;
  var d=site.data||{};
  var skor=d.skor||site.skor||0;
  var rv=mkRing(skor,50,9);
  var etiket=skor>=80?'İyi':skor>=60?'Ortalama':'Zayıf';
  var ec=(d.sorunlar||[]).filter(function(s){return s.seviye==='hata';}).length;
  var wc=(d.sorunlar||[]).filter(function(s){return s.seviye==='uyari';}).length;
  var oc=(d.iyi_yonler||[]).length;

function cnt(col,ic,n,l){ return '<span style="font-size:12px;display:flex;align-items:center;gap:5px"><span style="color:'+col+'">'+ic+'</span><b>'+n+'</b><span style="color:var(--m)">'+l+'</span></span>'; }
function st(l,v,c){ return '<div class="sa-stat"><div class="sa-sv" style="color:'+c+'">'+x(v)+'</div><div class="sa-sl">'+l+'</div></div>'; }
function tb(tab,lbl,on,idx){ return '<button class="sa-tab'+(on?' on':'')+'" onclick="SR.tab(\''+tab+'\',this,'+idx+')">'+lbl+'</button>'; }

      +'</div>';

  else if(tab==='teknik'){
    tc.innerHTML=

      +tr2('JS Erteleme',d.js_erteleme?'Evet':'Hayır',d.js_erteleme?'✅':'⚠️')
      +'</div>'
      +'<div class="sa-box"><div class="sa-bh">🔒 Güvenlik & Erişim</div>'
      +tr2('HTTPS',d.https?'Evet':'Hayır',d.https?'✅':'🔴')
      +tr2('Mobil Uyumlu',d.mobil_uyumlu?'Evet':'Hayır',d.mobil_uyumlu?'✅':'🔴')
      +tr2('Robots.txt',d.robots_txt?'Erişilebilir':'Yok',d.robots_txt?'✅':'⚠️')
      +tr2('Sitemap',d.sitemap?'Mevcut':'Yok',d.sitemap?'✅':'⚠️')
      +tr2('Noindex',d.noindex?'Var (Dikkat!)':'Yok',!d.noindex?'✅':'🔴')
      +'</div>'
      +'<div class="sa-box"><div class="sa-bh">📝 Meta & İçerik</div>'
      +tr2('Dil',d.dil||'—','🌐')
      +tr2('Charset',d.charset||'—',d.charset?'✅':'⚠️')
      +tr2('Canonical',d.canonical?'Var':'Yok',d.canonical?'✅':'⚠️')
      +tr2('OG Etiketleri',d.og_tags?'Var':'Yok',d.og_tags?'✅':'⚠️')
      +tr2('Metin/HTML','%'+(d.metin_html_oran||0),(d.metin_html_oran||0)>=20?'✅':'⚠️')
      +'</div>';

  else if(tab==='oneriler'){
    var skor2=d.skor||0;

    tc.innerHTML=

      +'<div style="font-size:12px;line-height:1.8">'+x(d.ai_analiz||'—')+'</div></div>'
      +'<div class="sa-box"><div class="sa-bh">💡 Öncelikli Aksiyon Listesi</div>'
      +(d.oneriler||[]).map(function(o,i){return '<div class="sa-tip"><b>'+(i+1)+'.</b> '+x(o)+'</div>';}).join('')
      +'</div>'
      +'<div class="sa-box"><div class="sa-bh">📈 Skor Durumu</div>'
      +'<div style="font-size:12px;color:var(--m);margin-bottom:10px">'
      +(skor2<60?'<b style="color:#fa3e3e">Acil müdahale gerekiyor.</b> Ciddi hataları önce çözün.'
        :skor2<80?'<b style="color:#f0b429">İyileştirme aşamasında.</b> Uyarıları gidererek 80+ hedefleyin.'
        :'<b style="color:#3ecfa0">İyi seviyede.</b> İçerik ve backlink stratejisine odaklanın.')
      +'</div>'
      +'<div class="sa-prog"><div class="sa-pfill" style="width:'+skor2+'%;background:'+rv2.col+'"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:4px"><span>0</span><span>50</span><span>100</span></div>'

function chk(ok,l,d2,t){
  return '<div class="sa-chk"><span style="font-size:13px;flex-shrink:0;margin-top:1px">'+(ok?'✅':'⚠️')+'</span>'
    +'<div><div style="font-size:12px;font-weight:600">'+x(l)+(d2?'<span style="margin-left:7px;font-size:10px;color:var(--m);font-weight:400">'+x(d2)+'</span>':'')+'</div>'
    +'<div style="font-size:11px;color:'+(ok?'var(--m)':'#f0b429')+'">'+x(t)+'</div></div></div>';
}
function barRow(l,v,mx,c){
  var p=mx>0?Math.min(Math.round(v/mx*100),100):0;
  return '<div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">'
    +'<span style="font-size:11px;font-weight:600;min-width:24px">'+l+'</span>'
    +'<div class="sa-prog" style="flex:1;height:9px"><div class="sa-pfill" style="width:'+p+'%;background:'+c+'"></div></div>'
    +'<span style="font-size:11px;font-family:\'DM Mono\',monospace;min-width:18px;text-align:right">'+v+'</span></div>';
}
function tr2(l,v,ic){
  return '<div class="sa-tr"><span style="color:var(--m)">'+x(l)+'</span>'
    +'<span style="display:flex;align-items:center;gap:5px;font-family:\'DM Mono\',monospace;font-size:11px">'+x(v)+' <span>'+ic+'</span></span></div>';
}

SR.showCmp=function(){
  document.getElementById('SR-list').style.display='none';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='block';
  renderCmp();
};

function renderCmp(){
  var cmp=document.getElementById('SR-cmp');
  var a=_sites[_sel[0]],b=_sites[_sel[1]];

  if(_sel.length<2||!a||!b){
    // Seçici göster
    var unsel=_sites.filter(function(s,i){return _sel.indexOf(i)<0;});
    cmp.innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
      +'<button class="sa-back" onclick="SR.back()">← Geri</button>'
      +'<div style="font-size:13px;font-weight:700">⇄ Karşılaştırma</div>'
      +'</div>'
      +'<div style="font-size:12px;color:var(--m);margin-bottom:14px">'
      +(_sel.length===0?'Karşılaştırmak için 2 site seçin. Analizlerden "Karşılaştır için seç" butonuna basın ya da aşağıdan seçin.'
        :'1 site seçildi, bir tane daha seçin.')
      +'</div>'
      +'<div class="cmp-pick">'
      +(_sel[0]!==undefined?cmpSlotFilled(_sites[_sel[0]],_sel[0]):'<div class="cmp-slot" onclick="">Site 1<br><span style="font-size:10px;color:var(--m)">aşağıdan seçin</span></div>')
      +(_sel[1]!==undefined?cmpSlotFilled(_sites[_sel[1]],_sel[1]):'<div class="cmp-slot">Site 2<br><span style="font-size:10px;color:var(--m)">aşağıdan seçin</span></div>')
      +'</div>'
      +'<div class="sg-grid">'
      +_sites.map(function(s,i){
        var isSel=_sel.indexOf(i)>=0;
        var host=s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
        var rv=mkRing(s.skor||0,18,3);
        return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SR.toggleSel('+i+',event);renderCmp()">'
          +(isSel?'<span class="sg-sel-tag">✓</span>':'')
          +'<div class="sg-fav"><img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'
          +'<div class="sg-info"><div class="sg-url">'+x(host)+'</div><div class="sg-time">'+ago(s.tarih)+'</div></div>'
          +'<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+s.skor+'</span></div>'
          +'</div>';
      }).join('')
      +'</div>';
    // renderCmp'yi global yap
    window.renderCmp=renderCmp;
    return;
  }

  // İki site karşılaştırma tablosu
  var da=a.data||{},db=b.data||{};
  var ra=mkRing(a.skor||0,40,7), rb=mkRing(b.skor||0,40,7);

  var rows=[
    {l:'SEO Skoru',ka:'skor',fmt:function(d){return d.skor||0;},better:'high'},
    {l:'Başlık Uzunluğu',ka:'baslik_uzunluk',fmt:function(d){return (d.baslik_uzunluk||0)+' kr';},better:'range',min:30,max:65,raw:'baslik_uzunluk'},
    {l:'Meta Uzunluğu',ka:'meta_desc_uzunluk',fmt:function(d){return (d.meta_desc_uzunluk||0)+' kr';},better:'range',min:100,max:160,raw:'meta_desc_uzunluk'},
    {l:'H1 Sayısı',ka:'h1_sayisi',fmt:function(d){return d.h1_sayisi||0;},better:'exact',target:1,raw:'h1_sayisi'},
    {l:'H2 Sayısı',ka:'h2_sayisi',fmt:function(d){return d.h2_sayisi||0;},better:'high'},
    {l:'İç Bağlantı',ka:'ic_link',fmt:function(d){return d.ic_link||0;},better:'high'},
    {l:'Dış Bağlantı',ka:'dis_link',fmt:function(d){return d.dis_link||0;},better:'high'},
    {l:'Toplam Görsel',ka:'gorsel_toplam',fmt:function(d){return d.gorsel_toplam||0;},better:'same'},
    {l:'Alt Eksik Görsel',ka:'gorsel_altsiz',fmt:function(d){return d.gorsel_altsiz||0;},better:'low'},
    {l:'HTTP İstekleri',ka:'http_istekleri',fmt:function(d){return d.http_istekleri||0;},better:'low'},
    {l:'Metin/HTML Oranı',ka:'metin_html_oran',fmt:function(d){return '%'+(d.metin_html_oran||0);},better:'high'},
    {l:'Sayfa Boyutu',ka:'sayfa_boyut_kb',fmt:function(d){return (d.sayfa_boyut_kb||0)+' KB';},better:'low'},
    {l:'DOM Boyutu',ka:'dom_boyutu',fmt:function(d){return d.dom_boyutu||0;},better:'low'},
    {l:'HTTPS',ka:'https',fmt:function(d){return d.https?'✅':'❌';},better:'bool'},
    {l:'Mobil Uyumlu',ka:'mobil_uyumlu',fmt:function(d){return d.mobil_uyumlu?'✅':'❌';},better:'bool'},
    {l:'Robots.txt',ka:'robots_txt',fmt:function(d){return d.robots_txt?'✅':'❌';},better:'bool'},
    {l:'Sitemap',ka:'sitemap',fmt:function(d){return d.sitemap?'✅':'❌';},better:'bool'},
    {l:'Favicon',ka:'favicon',fmt:function(d){return d.favicon?'✅':'❌';},better:'bool'},
    {l:'Canonical',ka:'canonical',fmt:function(d){return d.canonical?'✅':'❌';},better:'bool'},
    {l:'OG Etiketleri',ka:'og_tags',fmt:function(d){return d.og_tags?'✅':'❌';},better:'bool'},
  ];

  function winner(row,da,db){
    var va=da[row.ka],vb=db[row.ka];
    if(row.better==='high'){return va>vb?'a':va<vb?'b':'=';}
    if(row.better==='low'){return va<vb?'a':va>vb?'b':'=';}
    if(row.better==='bool'){return va&&!vb?'a':vb&&!va?'b':'=';}
    if(row.better==='range'){var okA=va>=row.min&&va<=row.max,okB=vb>=row.min&&vb<=row.max;return okA&&!okB?'a':okB&&!okA?'b':'=';}
    if(row.better==='exact'){return va===row.target&&vb!==row.target?'a':vb===row.target&&va!==row.target?'b':'=';}
    return '=';
  }

  var tableRows=rows.map(function(row){
    var va=row.fmt(da),vb=row.fmt(db);
    var w=winner(row,da,db);
    return '<tr>'
      +'<td style="color:var(--m)">'+row.l+'</td>'
      +'<td class="'+(w==='a'?'cmp-better':w==='b'?'cmp-worse':'cmp-same')+'">'+x(String(va))+'</td>'
      +'<td class="'+(w==='b'?'cmp-better':w==='a'?'cmp-worse':'cmp-same')+'">'+x(String(vb))+'</td>'
      +'</tr>';
  }).join('');

  var aWins=rows.filter(function(r){return winner(r,da,db)==='a';}).length;
  var bWins=rows.filter(function(r){return winner(r,da,db)==='b';}).length;

  cmp.innerHTML=
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    +'<button class="sa-back" onclick="SR.back()">← Geri</button>'
    +'<div style="font-size:13px;font-weight:700">⇄ SEO Karşılaştırması</div>'
    +'<button onclick="_sel=[];SR.showCmp()" style="margin-left:auto;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px">Yeniden Seç</button>'
    +'</div>'

    // İki site özeti
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    +cmpCard(a,ra,aWins,bWins,'a')
    +cmpCard(b,rb,bWins,aWins,'b')
    +'</div>'

    // Tablo
    +'<div class="sa-box"><div class="sa-bh">Detaylı Karşılaştırma</div>'
    +'<table class="cmp-table"><thead><tr>'
    +'<th>Metrik</th>'
    +'<th>'+x(a.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'
    +'<th>'+x(b.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'
    +'</tr></thead><tbody>'+tableRows+'</tbody></table>'
    +'</div>';

  window.renderCmp=renderCmp;
}

function cmpCard(site,rv,wins,otherWins,id){
  var host=site.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var isWinner=wins>otherWins;
  return '<div style="background:var(--s);border:1.5px solid '+(isWinner?'#3ecfa0':'var(--b)')+';border-radius:10px;padding:14px">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
    +'<img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(site.url)+'&sz=64" style="width:28px;height:28px;border-radius:6px" onerror="this.style.display=\'none\'">'
    +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x(host)+'</div>'
    +'<div style="font-size:10px;color:var(--m)">'+ago(site.tarih)+'</div></div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:12px">'
    +'<div style="position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+rv.svg
    +'<span style="position:absolute;font-size:18px;font-weight:800;color:'+rv.col+'">'+site.skor+'</span></div>'
    +'<div>'
    +(isWinner?'<div style="font-size:11px;font-weight:700;color:#3ecfa0;margin-bottom:3px">🏆 Daha İyi</div>':'')
    +'<div style="font-size:11px;color:#3ecfa0">'+wins+' kategoride üstün</div>'
    +'<div style="font-size:11px;color:#fa3e3e">'+otherWins+' kategoride geride</div>'
    +'</div></div></div>';
}

function cmpSlotFilled(site,idx){
  var host=(site&&site.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
  return '<div class="cmp-slot filled">'
    +'<div style="font-size:12px;font-weight:600">'+x(host)+'</div>'
    +'<div style="font-size:10px;color:var(--m)">Skor: '+((site&&site.skor)||0)+'</div>'
    +'<button onclick="_sel=_sel.filter(function(i){return i!=='+idx+';});renderCmp()" style="margin-top:6px;background:none;border:1px solid rgba(250,62,62,.3);color:#fa3e3e;border-radius:5px;padding:2px 8px;cursor:pointer;font-size:10px">Kaldır</button>'
    +'</div>';
}

  if(e.key==='Enter') SR.add();

document.getElementById('SR-inp').addEventListener('input',function(){
  if(document.getElementById('SR-list').style.display!=='none') renderGrid();

showList();
