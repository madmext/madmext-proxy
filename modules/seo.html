<!-- SEO Modülü v9 — PageSpeed içeriği gibi tam kategori skorları -->
<style>
#SEOX{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;color:var(--t);font-family:inherit}#SEOX-top{display:flex;gap:8px;padding:12px 0;border-bottom:1px solid var(--b);align-items:center;flex-wrap:wrap}#SEOX-urlWrap{flex:1;min-width:280px;position:relative}#SEOX-urlWrap:before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.8}#SEOX-url{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:10px 14px 10px 38px;border-radius:10px;outline:none;font-weight:700}.seox-btn{border:1.5px solid var(--b);background:var(--s2);color:var(--t);padding:10px 15px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer}.seox-btn.main{background:#3ecfa0;border-color:#3ecfa0;color:#06120d}.seox-btn:disabled{opacity:.55;cursor:not-allowed}#SEOX-body{flex:1;overflow:auto;padding:16px 0 34px}.seox-empty,.seox-loading{background:var(--s);border:1px solid var(--b);border-radius:16px;min-height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--m);text-align:center}.seox-spin{width:34px;height:34px;border:3px solid var(--b2);border-top-color:#3ecfa0;border-radius:50%;animation:sp .8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.seox-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:14px}.seox-title{font-size:18px;font-weight:900}.seox-url-pill{display:inline-flex;background:var(--s2);border:1px solid var(--b);border-radius:999px;padding:6px 10px;color:var(--m);font-size:11px;margin-top:6px}.seox-grid{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:12px;margin-bottom:14px}@media(max-width:900px){.seox-grid{grid-template-columns:1fr}}.seox-card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:16px;position:relative;overflow:hidden}.seox-card.mob:before{background:#3ecfa0}.seox-card.desk:before{background:#1a73e8}.seox-card:before{content:'';position:absolute;top:0;left:0;right:0;height:3px}.seox-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.seox-device{font-size:14px;font-weight:900}.seox-status{font-size:10px;color:var(--m)}.seox-score-row{display:grid;grid-template-columns:118px 1fr;gap:16px;align-items:center}.seox-gauge{width:112px;height:112px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--clr) calc(var(--v)*1%),var(--b2) 0)}.seox-gauge:after{content:'';position:absolute;width:82px;height:82px;border-radius:50%;background:var(--s)}.seox-gauge b{position:relative;z-index:1;font-size:31px;font-family:'DM Mono',monospace;color:var(--clr)}.seox-gauge span{position:absolute;z-index:1;bottom:23px;font-size:9px;color:var(--m);font-weight:800}.seox-cats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.seox-cat{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:10px;text-align:center}.seox-cat-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace}.seox-cat-lbl{font-size:9px;color:var(--m);font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}.seox-tabs{display:flex;gap:8px;margin:12px 0}.seox-tab{flex:1;text-align:center;padding:11px;border:1.5px solid var(--b);background:var(--s);border-radius:12px;cursor:pointer;color:var(--m);font-weight:900}.seox-tab.on.mob{border-color:#3ecfa0;color:#3ecfa0}.seox-tab.on.desk{border-color:#1a73e8;color:#1a73e8}.seox-section{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:15px;margin-bottom:12px}.seox-section-title{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--m);font-weight:900;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}.seox-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b);border-radius:10px;overflow:hidden}@media(max-width:760px){.seox-metrics{grid-template-columns:repeat(2,1fr)}}.seox-metric{background:var(--s);padding:13px}.seox-metric-val{font-size:20px;font-weight:900;font-family:'DM Mono',monospace}.seox-metric-name{font-size:10px;color:var(--m);font-weight:800;margin-top:4px}.seox-field{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.seox-field-item{background:var(--bg);border:1px solid var(--b);border-radius:12px;padding:12px}.seox-field-name{font-size:11px;color:var(--m);font-weight:900}.seox-field-val{font-size:20px;font-family:'DM Mono',monospace;font-weight:900;margin-top:6px}.seox-item{border:1px solid var(--b);background:var(--bg);border-radius:10px;padding:11px 12px;margin-bottom:7px}.seox-item-title{font-size:12px;font-weight:900}.seox-item-desc{font-size:10.5px;color:var(--m);line-height:1.65;margin-top:6px}.seox-save{float:right;color:#fa3;font-size:10px;font-weight:900}.seox-error{background:rgba(250,62,62,.08);border:1px solid rgba(250,62,62,.35);color:#ff7777;border-radius:12px;padding:13px;font-size:11px;line-height:1.6}.seox-note{font-size:11px;color:var(--m);line-height:1.7}
</style>
<div id="SEOX"><div id="SEOX-top"><div id="SEOX-urlWrap"><input id="SEOX-url" placeholder="https://www.madmext.com" autocomplete="off"></div><button id="SEOX-run" class="seox-btn main" onclick="SEOX.run()">⚡ Analiz Et</button><button class="seox-btn" onclick="SEOX.demoMadmext()">Madmext'i Analiz Et</button></div><div id="SEOX-body"></div></div>
<script>
(function(){'use strict';
const API='https://www.googleapis.com/pagespeedonline/v5/runPagespeed';
const CATS=['performance','accessibility','best-practices','seo'];
const TH={fcp:[1800,3000],lcp:[2500,4000],tbt:[200,600],cls:[.1,.25],si:[3400,5800],inp:[200,500],ttfb:[800,1800]};
const state={url:'',mobile:null,desktop:null,mobileError:null,desktopError:null,active:'mobile',loading:false,loadingText:''};
function $(id){return document.getElementById(id)}function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function normalizeUrl(v){v=(v||'').trim();if(!v)return'';if(!/^https?:\/\//i.test(v))v='https://'+v;return new URL(v).href}function color(v){v=Number(v)||0;return v>=90?'#0c6':v>=50?'#fa3':'#f33'}function label(v){v=Number(v)||0;return v>=90?'İyi':v>=50?'Geliştirme Gerekir':'Zayıf'}function mcolor(v,t){if(v==null||Number.isNaN(v))return'#888';return v<=t[0]?'#0c6':v<=t[1]?'#fa3':'#f33'}function fmtMs(v){if(v==null||Number.isNaN(v))return'—';return v>=1000?(v/1000).toFixed(1).replace('.0','')+' sn.':Math.round(v)+' ms.'}function fmt(k,v,d){if(d)return d;if(k==='cls')return v==null?'—':Number(v).toFixed(3);return fmtMs(v)}
function jsonp(url,timeout=90000){return new Promise((resolve,reject)=>{const cb='__psi_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');const t=setTimeout(()=>{cleanup();reject(new Error('PageSpeed API zaman aşımı'))},timeout);function cleanup(){clearTimeout(t);try{delete window[cb]}catch(e){window[cb]=undefined}s.remove()}window[cb]=data=>{cleanup();data&&data.error?reject(new Error(data.error.message||'PageSpeed API hatası')):resolve(data)};s.onerror=()=>{cleanup();reject(new Error('PageSpeed API bağlantı hatası'))};s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;document.head.appendChild(s)})}
async function fetchJson(url){const r=await fetch(url,{cache:'no-store'});const data=await r.json();if(!r.ok||data.error)throw new Error(data?.error?.message||('HTTP '+r.status));return data}
async function fetchPSI(url,strategy){const qs=new URLSearchParams({url,strategy,locale:'tr'});CATS.forEach(c=>qs.append('category',c));const full=API+'?'+qs.toString();try{return await jsonp(full)}catch(e1){try{return await fetchJson(full)}catch(e2){try{return await fetchJson('/psi?'+qs.toString())}catch(e3){throw new Error(e3.message||e2.message||e1.message||'PageSpeed verisi alınamadı')}}}}
function scoreOf(c,k){const v=c?.[k]?.score;return typeof v==='number'?Math.round(v*100):null}function aud(a,k){return a?.[k]||{}}function parse(data){const lr=data.lighthouseResult||{},cats=lr.categories||{},a=lr.audits||{};const get=k=>{const x=aud(a,k);return{val:typeof x.numericValue==='number'?x.numericValue:null,disp:x.displayValue||null,title:x.title||''}};const metrics={fcp:{...get('first-contentful-paint'),name:'FCP',desc:'First Contentful Paint',th:TH.fcp},lcp:{...get('largest-contentful-paint'),name:'LCP',desc:'Largest Contentful Paint',th:TH.lcp},tbt:{...get('total-blocking-time'),name:'TBT',desc:'Total Blocking Time',th:TH.tbt},cls:{...get('cumulative-layout-shift'),name:'CLS',desc:'Cumulative Layout Shift',th:TH.cls},si:{...get('speed-index'),name:'Speed Index',desc:'Speed Index',th:TH.si},inp:{...get('interaction-to-next-paint'),name:'INP',desc:'Interaction to Next Paint',th:TH.inp},ttfb:{...get('server-response-time'),name:'TTFB',desc:'Time to First Byte',th:TH.ttfb}};const clean=s=>String(s||'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1');const opportunities=Object.values(a).filter(x=>x&&x.score!=null&&x.score<.9&&x.details?.type==='opportunity').map(x=>({title:x.title,desc:clean(x.description),save:x.details?.overallSavingsMs?fmtMs(x.details.overallSavingsMs)+' tasarruf':x.displayValue||'',score:x.score})).sort((x,y)=>x.score-y.score).slice(0,12);const diagnostics=Object.values(a).filter(x=>x&&x.score!=null&&x.score<.9&&x.details?.type!=='opportunity'&&!['screenshot','filmstrip','debugdata'].includes(x.details?.type)&&x.title).map(x=>({title:x.title,desc:clean(x.description),display:x.displayValue||'',score:x.score})).sort((x,y)=>x.score-y.score).slice(0,12);const passed=Object.values(a).filter(x=>x&&typeof x.score==='number'&&x.score>=.9&&x.title).slice(0,16).map(x=>x.title);const le=data.loadingExperience||{},fm=le.metrics||{};return{raw:data,finalUrl:data.id||state.url,form:lr.configSettings?.formFactor||'',scores:{performance:scoreOf(cats,'performance'),accessibility:scoreOf(cats,'accessibility'),bestPractices:scoreOf(cats,'best-practices'),seo:scoreOf(cats,'seo')},metrics,field:fm,fieldCat:le.overall_category||null,opportunities,diagnostics,passed}}
function gauge(v){v=v??0;const c=color(v);return`<div class="seox-gauge" style="--v:${v};--clr:${c}"><b>${v}</b><span>${label(v)}</span></div>`}function cat(name,v){const c=color(v);return`<div class="seox-cat"><div class="seox-cat-val" style="color:${v==null?'#f33':c}">${v??'—'}</div><div class="seox-cat-lbl">${name}</div></div>`}function card(kind,d,err){const mob=kind==='mobile',title=mob?'Mobil':'Masaüstü',ic=mob?'📱':'💻',cls=mob?'mob':'desk';if(err&&!d)return`<div class="seox-card ${cls}"><div class="seox-card-top"><div class="seox-device">${ic} ${title}</div><div class="seox-status">Hata</div></div><div class="seox-error">${esc(err)}</div></div>`;return`<div class="seox-card ${cls}"><div class="seox-card-top"><div class="seox-device">${ic} ${title}</div><div class="seox-status">${d?'Tamamlandı':'Bekliyor'}</div></div>${d?`<div class="seox-score-row">${gauge(d.scores.performance)}<div class="seox-cats">${cat('Performance',d.scores.performance)}${cat('Accessibility',d.scores.accessibility)}${cat('Best Practices',d.scores.bestPractices)}${cat('SEO',d.scores.seo)}</div></div>`:`<div class="seox-loading" style="min-height:130px"><div class="seox-spin"></div><div>${title} analizi alınıyor...</div></div>`}</div>`}
function fieldHTML(d){const fm=d.field||{};const items=[['LCP','LARGEST_CONTENTFUL_PAINT_MS','ms',TH.lcp],['INP','INTERACTION_TO_NEXT_PAINT','ms',TH.inp],['CLS','CUMULATIVE_LAYOUT_SHIFT_SCORE','',TH.cls],['FCP','FIRST_CONTENTFUL_PAINT_MS','ms',TH.fcp],['TTFB','EXPERIMENTAL_TIME_TO_FIRST_BYTE','ms',TH.ttfb]].map(([n,k,u,t])=>{const x=fm[k];if(!x)return null;const val=x.percentile;const disp=u==='ms'?fmtMs(val):Number(val).toFixed(3);return`<div class="seox-field-item"><div class="seox-field-name">${n}</div><div class="seox-field-val" style="color:${mcolor(val,t)}">${disp}</div></div>`}).filter(Boolean).join('');if(!items)return'';return`<div class="seox-section"><div class="seox-section-title">Gerçek kullanıcı verileri / Son 28 gün <span>${d.fieldCat||''}</span></div><div class="seox-field">${items}</div></div>`}
function metricsHTML(d){return`<div class="seox-section"><div class="seox-section-title">Core Web Vitals / Lab Verisi <span>${esc(d.form)}</span></div><div class="seox-metrics">${Object.entries(d.metrics).map(([k,m])=>`<div class="seox-metric"><div class="seox-metric-val" style="color:${mcolor(m.val,m.th)}">${fmt(k,m.val,m.disp)}</div><div class="seox-metric-name">${m.name}</div><div class="seox-metric-name">${m.desc}</div></div>`).join('')}</div></div>`}function list(title,arr,ok){if(!arr||!arr.length)return'';return`<div class="seox-section"><div class="seox-section-title">${title}</div>${arr.map(x=>`<div class="seox-item"><div class="seox-item-title">${ok?'✅ ':''}${esc(ok?x:x.title)}${x.save?`<span class="seox-save">${esc(x.save)}</span>`:''}</div>${x.desc?`<div class="seox-item-desc">${esc(x.desc).slice(0,260)}${x.desc.length>260?'…':''}</div>`:''}${x.display?`<div class="seox-item-desc">${esc(x.display)}</div>`:''}</div>`).join('')}</div>`}
function detail(){const d=state.active==='mobile'?state.mobile:state.desktop;if(!d)return'';return`<div class="seox-section"><div class="seox-section-title">${state.active==='mobile'?'📱 Mobil':'💻 Masaüstü'} Detay <span>${esc(d.finalUrl)}</span></div><div class="seox-cats" style="grid-template-columns:repeat(4,1fr)">${cat('Performance',d.scores.performance)}${cat('Accessibility',d.scores.accessibility)}${cat('Best Practices',d.scores.bestPractices)}${cat('SEO',d.scores.seo)}</div></div>${fieldHTML(d)}${metricsHTML(d)}${list('🚀 Fırsatlar',d.opportunities,false)}${list('🔧 Teşhis',d.diagnostics,false)}${list('✅ Başarılı Kontroller',d.passed,true)}`}
function render(){const body=$('SEOX-body');if(state.loading){body.innerHTML=`<div class="seox-loading"><div class="seox-spin"></div><b style="color:var(--t)">${esc(state.loadingText)}</b><div class="seox-note">Google PageSpeed verisi kategori skorlarıyla alınıyor.</div></div>`;return}if(!state.mobile&&!state.desktop&&!state.mobileError&&!state.desktopError){body.innerHTML=`<div class="seox-empty"><div style="font-size:42px">📊</div><b style="color:var(--t);font-size:16px">SEO / PageSpeed Analiz Paneli</b><div>Mobil ve Masaüstü skorları PageSpeed içindeki gibi gösterilir.</div></div>`;return}body.innerHTML=`<div class="seox-head"><div><div class="seox-title">SEO PageSpeed Analizi</div><div class="seox-url-pill">🌐 ${esc(state.url)}</div></div><div class="seox-note">Son analiz: ${new Date().toLocaleString('tr-TR')}</div></div><div class="seox-grid">${card('mobile',state.mobile,state.mobileError)}${card('desktop',state.desktop,state.desktopError)}</div><div class="seox-tabs"><div class="seox-tab mob ${state.active==='mobile'?'on':''}" onclick="SEOX.switch('mobile')">📱 Mobil ${state.mobile?state.mobile.scores.performance:''}</div><div class="seox-tab desk ${state.active==='desktop'?'on':''}" onclick="SEOX.switch('desktop')">💻 Masaüstü ${state.desktop?state.desktop.scores.performance:''}</div></div>${detail()}`}
async function runWithUrl(url){state.url=url;state.mobile=null;state.desktop=null;state.mobileError=null;state.desktopError=null;state.loading=true;state.loadingText='📱 Mobil PageSpeed analizi alınıyor...';render();const btn=$('SEOX-run');btn.disabled=true;btn.textContent='⏳ Analiz ediliyor...';try{state.mobile=parse(await fetchPSI(url,'mobile'));state.active='mobile'}catch(e){state.mobileError=e.message||String(e)}state.loadingText='💻 Masaüstü PageSpeed analizi alınıyor...';render();try{state.desktop=parse(await fetchPSI(url,'desktop'));if(!state.mobile)state.active='desktop'}catch(e){state.desktopError=e.message||String(e)}state.loading=false;btn.disabled=false;btn.textContent='⚡ Analiz Et';localStorage.setItem('seox_last_url',url);render()}
window.SEOX={run(){try{const url=normalizeUrl($('SEOX-url').value);if(!url){alert('URL girin');return}runWithUrl(url)}catch(e){alert('Geçerli URL girin. Örn: https://www.madmext.com')}},demoMadmext(){$('SEOX-url').value='https://www.madmext.com';this.run()},switch(v){state.active=v;render()}};setTimeout(()=>{const last=localStorage.getItem('seox_last_url')||'https://www.madmext.com';$('SEOX-url').value=last;$('SEOX-url').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();SEOX.run()}});render()},0);
})();
</script>
