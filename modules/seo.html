<!-- SEO Modülü v4 — Mobil & Masaüstü Ayrı, Gerçek PSI Verileri -->
<style>
/* ===== TEMEL ===== */
#SE{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;font-family:inherit}
#SE-top{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--b)}
#SE-body{flex:1;overflow-y:auto;padding:16px 0}

/* Search */
#SE-sw{flex:1;position:relative}
#SE-sw::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;z-index:1}
#SE-inp{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:9px 14px 9px 38px;font-size:13px;border-radius:9px;outline:none;font-family:inherit;transition:border-color .18s}
#SE-inp:focus{border-color:#3ecfa0}

/* Buttons */
.se-btn{flex-shrink:0;border:1.5px solid var(--b);color:var(--t);padding:9px 16px;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer;background:var(--s2);white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.se-btn:hover{border-color:#3ecfa0;color:#3ecfa0}
.se-btn.green{background:#3ecfa0;border-color:#3ecfa0;color:#fff}
.se-btn.green:hover{opacity:.88}
.se-btn.green:disabled{opacity:.5;cursor:not-allowed}

/* ===== KARTLAR ===== */
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.sg-card{position:relative;background:var(--s);border:1.5px solid var(--b);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.sg-card:hover{border-color:#3ecfa0;box-shadow:0 2px 14px rgba(62,207,160,.1)}
.sg-fav{width:38px;height:38px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.sg-fav img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sg-info{flex:1;min-width:0}
.sg-url{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.sg-meta{font-size:10px;color:var(--m);margin-top:1px}
.sg-ring{position:relative;width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sg-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.sg-rnum{position:relative;z-index:1;font-size:14px;font-weight:800}
.sg-del{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--m);font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;padding:2px 5px;border-radius:4px}
.sg-card:hover .sg-del{opacity:1}
.sg-del:hover{background:rgba(250,62,62,.15);color:#fa3e3e}
.sg-empty{text-align:center;padding:60px 20px;color:var(--m)}

/* ===== DETAY ===== */
#SE-det{display:none}
.sd-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sd-nav-info{flex:1;min-width:0}
.sd-nav-url{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd-nav-sub{font-size:10px;color:var(--m);margin-top:2px}

/* Device Switch */
.dev-switch{display:flex;background:var(--bg);border:1px solid var(--b);border-radius:9px;padding:3px;width:fit-content;margin-bottom:14px}
.dev-btn{padding:7px 18px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--m);border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.dev-btn.on{background:#3ecfa0;color:#fff}
.dev-btn.loading{opacity:.6;pointer-events:none}

/* Loading overlay maskelemek yerine satır içi */
.dev-loading{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--m);padding:4px 10px;background:var(--s2);border-radius:6px;margin-left:8px}

/* HERO */
.sd-hero{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:12px}
.sd-hero-top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.sd-big-ring{position:relative;width:100px;height:100px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sd-big-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.sd-big-num{position:absolute;font-size:28px;font-weight:800;z-index:1}
.sd-big-lbl{font-size:11px;font-weight:700;margin-top:6px;padding:3px 12px;border-radius:10px;display:inline-block}

/* 4 skor kutusu */
.sd-4scores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:500px){.sd-4scores{grid-template-columns:repeat(2,1fr)}}
.sd-sc{background:var(--bg);border:1px solid var(--b);border-top:3px solid;border-radius:8px;padding:10px 6px;text-align:center}
.sd-sc-v{font-size:20px;font-weight:800;margin-bottom:2px}
.sd-sc-l{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px}

/* CWV grid */
.sd-cwv{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:580px){.sd-cwv{grid-template-columns:repeat(2,1fr)}}
.sd-cwv-c{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px;text-align:center}
.sd-cwv-v{font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.sd-cwv-k{font-size:9px;font-weight:700;color:var(--m);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}
.sd-cwv-t{font-size:9px;color:var(--m);margin-top:1px;line-height:1.3}

/* Sekmeler */
.sd-tabs{display:flex;gap:0;border-bottom:2px solid var(--b);margin-bottom:12px;overflow-x:auto}
.sd-tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--m);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.sd-tab.on{color:#3ecfa0;border-bottom-color:#3ecfa0}
.sd-tab:hover:not(.on){color:var(--t)}

/* İçerik */
.sd-box{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:10px}
.sd-bh{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sd-iss{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid}
.sd-iss:last-child{margin-bottom:0}
.sd-iss.err{background:rgba(250,62,62,.05);border-color:rgba(250,62,62,.2)}
.sd-iss.wrn{background:rgba(240,180,41,.05);border-color:rgba(240,180,41,.2)}
.sd-iss.ok{background:rgba(62,207,160,.05);border-color:rgba(62,207,160,.2)}
.sd-fix{font-size:11px;margin-top:5px;padding:5px 10px;border-radius:5px;background:rgba(62,207,160,.08);border-left:2px solid #3ecfa0;line-height:1.6;color:var(--t)}
.sd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.06);font-size:12px}
.sd-row:last-child{border-bottom:none}
.sd-chk{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.06)}
.sd-chk:last-child{border-bottom:none}
.sd-tip{padding:9px 12px 9px 13px;border-left:3px solid #3ecfa0;border-radius:0 6px 6px 0;background:rgba(62,207,160,.06);font-size:11px;line-height:1.7;margin-bottom:7px}
.sd-prog{background:var(--b2);border-radius:3px;height:6px;overflow:hidden;margin-top:4px}
.sd-fill{height:100%;border-radius:3px;transition:width .6s ease}
.sd-sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--b)}

/* Karşılaştırma */
#SE-cmp{display:none}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cmp-tbl th{background:var(--s2);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--m);border-bottom:1px solid var(--b)}
.cmp-tbl td{padding:8px 12px;border-bottom:1px solid rgba(128,128,128,.06)}
.cmp-tbl tr:last-child td{border-bottom:none}
.cw{color:#3ecfa0;font-weight:700}.cl{color:#fa3e3e}.cd{color:var(--m)}

/* Spinner */
@keyframes se-spin{to{transform:rotate(360deg)}}
.se-spin{border-radius:50%;border:2.5px solid var(--b);border-top-color:#3ecfa0;animation:se-spin .8s linear infinite;flex-shrink:0}
</style>

<div id="SE">
  <div id="SE-top">
    <div id="SE-sw">
      <input id="SE-inp" type="text" placeholder="https://www.madmext.com — URL gir, Enter'a bas..." autocomplete="off">
    </div>
    <button class="se-btn green" id="SE-abtn" onclick="SE.add()">＋ Analiz Et</button>
    <button class="se-btn" onclick="SE.showCmp()">⇄ Karşılaştır</button>
  </div>
  <div id="SE-body">
    <div id="SE-list">
      <div id="SE-grid" class="sg-grid"></div>
      <div id="SE-empty" class="sg-empty" style="display:none">
        <div style="font-size:44px;margin-bottom:10px">📊</div>
        <div style="font-size:14px;font-weight:700;color:var(--t);margin-bottom:6px">Henüz analiz yok</div>
        <div style="font-size:12px;line-height:1.9">
          URL gir ve Analiz Et'e bas.<br>
          <b>Mobil</b> ve <b>Masaüstü</b> skorları ayrı ayrı gösterilir.<br>
          <span style="color:#3ecfa0">Google PageSpeed Insights</span> gerçek verisi kullanılır.
        </div>
      </div>
    </div>
    <div id="SE-det"></div>
    <div id="SE-cmp"></div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ===== UTIL ===== */
var EX = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

function ago(iso){
  var d = Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60) return 'az önce';
  if(d<3600) return Math.floor(d/60)+' dk önce';
  if(d<86400) return Math.floor(d/3600)+' saat önce';
  return Math.floor(d/86400)+' gün önce';
}

function mkRing(v, r, sw){
  var c = 2*Math.PI*r, off = c-(v/100)*c;
  var col = v>=90?'#3ecfa0':v>=50?'#f0b429':'#fa3e3e';
  var sz = (r+sw)*2, cx = sz/2;
  return {
    svg: '<svg width="'+sz+'" height="'+sz+'">'+
         '<circle stroke-width="'+sw+'" stroke="var(--b2)" fill="none" r="'+r+'" cx="'+cx+'" cy="'+cx+'"/>'+
         '<circle stroke-width="'+sw+'" stroke-linecap="round" stroke="'+col+'" fill="none" r="'+r+'" cx="'+cx+'" cy="'+cx+'"'+
         ' stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>',
    col: col
  };
}

function colV(v){ return v>=90?'#3ecfa0':v>=50?'#f0b429':'#fa3e3e'; }
function icoV(v){ return v>=90?'🟢':v>=50?'🟡':'🔴'; }

function fmtMs(ms){
  if(!ms && ms!==0) return '-';
  return ms >= 1000 ? (ms/1000).toFixed(1)+' sn' : Math.round(ms)+' ms';
}
function fmtKb(b){
  if(!b) return '-';
  return b>=1048576 ? (b/1048576).toFixed(1)+' MB' : b>=1024 ? Math.round(b/1024)+' KB' : b+' B';
}

/* ===== VERİ DEPOSU ===== */
var _db = [];
var _sel = [];
var _curDev = 'mob'; // 'mob' | 'desk'

function dbLoad(){ try{ _db = JSON.parse(localStorage.getItem('seo_v4')||'[]'); }catch(e){ _db=[]; } }
function dbSave(){ try{ localStorage.setItem('seo_v4', JSON.stringify(_db)); }catch(e){} }

/* ===== PSI API ===== */
/* 
  SORUN: Mobil + Desktop = 2 API çağrısı = ~20-40 sn toplam
  ÇÖZÜM: Önce mobilI göster (hemen), desktop arka planda çek
*/

function psiURL(url, strategy){
  var base = window.location.origin;
  return base+'/psi?url='+encodeURIComponent(url)+'&strategy='+strategy+
    '&category=performance&category=seo&category=accessibility&category=best-practices';
}

async function fetchSingle(url, strategy){
  /* Her istek için kendi timeout'u var (55 saniye — Railway sınırı altında) */
  var controller = new AbortController();
  var timer = setTimeout(function(){ controller.abort(); }, 55000);
  try{
    var r = await fetch(psiURL(url, strategy), { signal: controller.signal });
    clearTimeout(timer);
    if(!r.ok){
      var txt = await r.text();
      var msg = 'HTTP '+r.status;
      try{ var j = JSON.parse(txt); msg = (j.error&&j.error.message)||msg; }catch(e){}
      throw new Error(msg);
    }
    var json = await r.json();
    if(json.error) throw new Error(json.error.message||'PageSpeed API hatası');
    return json;
  } catch(e){
    clearTimeout(timer);
    if(e.name === 'AbortError') throw new Error('Zaman aşımı (55sn). PSI API yavaş yanıt verdi. Tekrar deneyin.');
    throw e;
  }
}

/* LighthouseResult → kullanılabilir veri */
function parseLHR(lhrFull){
  if(!lhrFull || !lhrFull.lighthouseResult) return null;
  var lhr = lhrFull.lighthouseResult;
  var cats = lhr.categories || {};
  var a = lhr.audits || {};

  function sc(cat){ return Math.round(((cats[cat]&&cats[cat].score)||0)*100); }
  function ms(k){ return a[k]&&a[k].numericValue ? Math.round(a[k].numericValue) : 0; }
  function dv(k){ return a[k]&&a[k].displayValue ? a[k].displayValue : '-'; }

  /* Sorunlar */
  var sorunlar=[], iyiler=[];
  var cozumler = {
    'is-on-https': 'SSL sertifikası ekleyin.',
    'is-crawlable': 'robots.txt ve meta robots etiketlerini kontrol edin.',
    'document-title': '<title> etiketi ekleyin, 30-65 karakter arası.',
    'meta-description': '<meta name="description"> ekleyin, 100-160 karakter.',
    'canonical': '<link rel="canonical"> etiketi ekleyin.',
    'image-alt': 'Tüm <img> etiketlerine açıklayıcı alt özelliği ekleyin.',
    'viewport': '<meta name="viewport"> etiketini ekleyin.',
    'tap-targets': 'Buton/linkleri min 44×44px yapın.',
    'render-blocking-resources': 'Kritik olmayan CSS/JS\'yi erteleyin, async/defer kullanın.',
    'unused-javascript': 'Kullanılmayan JS kütüphanelerini kaldırın, kod bölme uygulayın.',
    'unused-css-rules': 'PurgeCSS ile kullanılmayan CSS\'yi temizleyin.',
    'uses-webp-images': 'Görselleri WebP/AVIF formatına dönüştürün.',
    'offscreen-images': 'Görsellere loading="lazy" ekleyin.',
    'uses-text-compression': 'Sunucuda gzip/brotli sıkıştırma aktif edin.',
    'uses-optimized-images': 'Görselleri sıkıştırın ve optimize edin.',
    'heading-order': 'Başlık hiyerarşisini H1→H2→H3 sırasında kullanın.'
  };

  Object.keys(cozumler).forEach(function(k){
    var au = a[k]; if(!au) return;
    if(au.score === 1 || au.score === null){
      iyiler.push({ baslik: au.title, aciklama: au.description||'' });
    } else if(typeof au.score === 'number' && au.score < 1){
      sorunlar.push({
        baslik: au.title,
        aciklama: au.displayValue||'',
        cozum: cozumler[k],
        etki: au.score < 0.5 ? 'Yüksek' : 'Orta',
        sev: au.score < 0.5 ? 'err' : 'wrn'
      });
    }
  });

  /* Fırsatlar */
  var opps = [];
  Object.keys(a).forEach(function(k){
    var au = a[k];
    if(au && typeof au.score==='number' && au.score<1 && au.score!==null){
      var sav = 0;
      if(au.details&&au.details.overallSavingsMs) sav = au.details.overallSavingsMs;
      if(au.details&&au.details.overallSavingsBytes) sav += au.details.overallSavingsBytes/500;
      if(sav > 0) opps.push({ title:au.title, display:au.displayValue, savings:sav, score:au.score, desc:au.description||'' });
    }
  });
  opps.sort(function(a,b){ return b.savings-a.savings; });

  return {
    perf: sc('performance'),
    seo: sc('seo'),
    a11y: sc('accessibility'),
    bp: sc('best-practices'),
    fcp: dv('first-contentful-paint'),  fcp_ms: ms('first-contentful-paint'),
    lcp: dv('largest-contentful-paint'), lcp_ms: ms('largest-contentful-paint'),
    tbt: dv('total-blocking-time'),      tbt_ms: ms('total-blocking-time'),
    cls: dv('cumulative-layout-shift'),  cls_val: a['cumulative-layout-shift']&&a['cumulative-layout-shift'].numericValue||0,
    si:  dv('speed-index'),
    tti: dv('interactive'),
    ttfb: dv('server-response-time'),    ttfb_ms: ms('server-response-time'),
    sorunlar: sorunlar,
    iyiler: iyiler,
    opps: opps,
    _a: a   /* ham audit erişimi */
  };
}

/* ===== LİSTE ===== */
function showList(){
  document.getElementById('SE-list').style.display='block';
  document.getElementById('SE-det').style.display='none';
  document.getElementById('SE-cmp').style.display='none';
  renderGrid();
}

function renderGrid(){
  var grid = document.getElementById('SE-grid');
  var empty = document.getElementById('SE-empty');
  if(!_db.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = _db.map(function(s,i){
    var genel = s.genel||0;
    var rv = mkRing(genel, 20, 3.5);
    var host = s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    var mob = s.mob||{}, desk = s.desk||{};
    var fav = 'https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64';
    var mobTag = mob.perf!=null ? '📱'+mob.perf : '📱…';
    var deskTag = desk.perf!=null ? ' · 💻'+desk.perf : (s._deskLoading?' · 💻…':'');
    return '<div class="sg-card" onclick="SE.open('+i+')">'+
      '<button class="sg-del" onclick="event.stopPropagation();SE.del('+i+')" title="Sil">✕</button>'+
      '<div class="sg-fav"><img src="'+fav+'" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'+
      '<div class="sg-info">'+
        '<div class="sg-url">'+EX(host)+'</div>'+
        '<div class="sg-meta">'+mobTag+deskTag+' · SEO:'+( mob.seo||0)+'</div>'+
        '<div class="sg-meta">'+ago(s.tarih)+'</div>'+
      '</div>'+
      '<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+genel+'</span></div>'+
      '</div>';
  }).join('');
}

/* ===== ANA FONKSİYON ===== */
window.SE = {};

SE.add = async function(){
  var inp = document.getElementById('SE-inp');
  var btn = document.getElementById('SE-abtn');
  var url = (inp.value||'').trim();
  if(!url){ inp.focus(); return; }
  if(!url.startsWith('http')) url = 'https://'+url;

  btn.disabled = true;
  btn.textContent = 'Mobil analiz ediliyor...';

  var host = url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var tmpId = 'tmp_'+Date.now();

  /* Geçici kart */
  var grid = document.getElementById('SE-grid');
  document.getElementById('SE-list').style.display='block';
  document.getElementById('SE-det').style.display='none';
  document.getElementById('SE-cmp').style.display='none';
  document.getElementById('SE-empty').style.display='none';
  grid.insertAdjacentHTML('afterbegin',
    '<div id="'+tmpId+'" class="sg-card" style="opacity:.6;pointer-events:none">'+
    '<div style="display:flex;align-items:center;justify-content:center;width:38px;height:38px"><div class="se-spin" style="width:22px;height:22px"></div></div>'+
    '<div class="sg-info">'+
      '<div class="sg-url">'+EX(host)+'</div>'+
      '<div class="sg-meta" id="'+tmpId+'_s">📱 Mobil analiz başlatıldı...</div>'+
    '</div>'+
    '<div class="sg-ring"><div class="se-spin" style="width:20px;height:20px"></div></div>'+
    '</div>');

  var stepEl = document.getElementById(tmpId+'_s');
  function setStep(t){ if(stepEl) stepEl.textContent = t; }

  try{
    /* ADIM 1: Mobil veriyi çek */
    setStep('📱 Adım 1/2: Mobil analiz yapılıyor (~10-20 sn)...');
    var mobRaw = await fetchSingle(url, 'mobile');
    var mobData = parseLHR(mobRaw);

    setStep('💻 Adım 2/2: Masaüstü analiz yapılıyor (~10-20 sn)...');
    btn.textContent = 'Masaüstü analiz ediliyor...';

    /* ADIM 2: Desktop veriyi çek */
    var deskRaw = await fetchSingle(url, 'desktop');
    var deskData = parseLHR(deskRaw);

    /* Kaydet */
    var tmp = document.getElementById(tmpId); if(tmp) tmp.remove();
    var genel = mobData ? Math.round(mobData.seo*0.5 + mobData.perf*0.3 + mobData.a11y*0.2) : 0;

    var ei = _db.findIndex(function(s){ return s.url===url; });
    var obj = { url:url, genel:genel, tarih:new Date().toISOString(), mob:mobData, desk:deskData };
    if(ei>=0) _db[ei]=obj; else _db.unshift(obj);
    if(_db.length>20) _db = _db.slice(0,20);
    dbSave();

    inp.value = '';
    _curDev = 'mob';
    showList();
    SE.open(0);

  } catch(e){
    var tmp2 = document.getElementById(tmpId); if(tmp2) tmp2.remove();
    renderGrid();
    alert('Analiz hatası: '+e.message+'\n\nÇözüm önerileri:\n• URL\'yi https:// ile yazın\n• Birkaç dakika bekleyip tekrar deneyin\n• PSI API bazen yavaş yanıt veriyor');
  } finally{
    btn.disabled = false;
    btn.textContent = '＋ Analiz Et';
  }
};

SE.del = function(i){
  if(!confirm('Silinsin mi?')) return;
  _sel = _sel.filter(function(x){ return x!==i; }).map(function(x){ return x>i?x-1:x; });
  _db.splice(i,1); dbSave(); renderGrid();
};

SE.open = function(i){
  var s = _db[i]; if(!s) return;
  document.getElementById('SE-list').style.display='none';
  document.getElementById('SE-det').style.display='block';
  document.getElementById('SE-cmp').style.display='none';
  _curDev = 'mob';
  renderDetail(i);
};

SE.back = function(){ showList(); };

SE.reload = async function(i){
  var s = _db[i]; if(!s) return;
  var det = document.getElementById('SE-det');
  det.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px">'+
    '<div class="se-spin" style="width:36px;height:36px;border-width:3px"></div>'+
    '<div style="font-size:12px;color:var(--m)">Yeniden analiz ediliyor...</div></div>';
  try{
    var mobRaw = await fetchSingle(s.url, 'mobile');
    var mobData = parseLHR(mobRaw);
    var deskRaw = await fetchSingle(s.url, 'desktop');
    var deskData = parseLHR(deskRaw);
    var genel = mobData ? Math.round(mobData.seo*0.5+mobData.perf*0.3+mobData.a11y*0.2) : 0;
    _db[i] = { url:s.url, genel:genel, tarih:new Date().toISOString(), mob:mobData, desk:deskData };
    dbSave(); renderDetail(i);
  } catch(e){ renderDetail(i); alert('Hata: '+e.message); }
};

SE.switchDev = function(mode, i){
  _curDev = mode;
  document.querySelectorAll('.dev-btn').forEach(function(b){
    b.classList.toggle('on', b.dataset.m===mode);
  });
  var d = getCurData(i);
  renderHeroScores(d);
  renderCWVGrid(d);
  var activeTab = document.querySelector('.sd-tab.on');
  if(activeTab) SE.tab(activeTab.dataset.t, i);
};

SE.tab = function(t, i){
  document.querySelectorAll('.sd-tab').forEach(function(b){ b.classList.toggle('on', b.dataset.t===t); });
  renderTabContent(t, i);
};

SE.showCmp = function(){
  document.getElementById('SE-list').style.display='none';
  document.getElementById('SE-det').style.display='none';
  document.getElementById('SE-cmp').style.display='block';
  renderCmp();
};

SE.toggleSel = function(i){
  var p = _sel.indexOf(i);
  if(p>=0) _sel.splice(p,1);
  else{ if(_sel.length>=2) _sel.shift(); _sel.push(i); }
  renderCmp();
};

/* ===== DETAY RENDER ===== */

  var s = _db[i]; if(!s) return {};
  return _curDev==='mob' ? (s.mob||{}) : (s.desk||{});
}

function renderHeroScores(d){
  var el = document.getElementById('sd-scores'); if(!el) return;
  var items = [
    {l:'Performans', v:d.perf||0},
    {l:'SEO', v:d.seo||0},
    {l:'Erişilebilirlik', v:d.a11y||0},
    {l:'Best Practices', v:d.bp||0}
  ];
  el.innerHTML = items.map(function(it){
    var col = colV(it.v);
    return '<div class="sd-sc" style="border-top-color:'+col+'">'+
      '<div class="sd-sc-v" style="color:'+col+'">'+it.v+'</div>'+
      '<div class="sd-sc-l">'+EX(it.l)+'</div>'+
      '</div>';
  }).join('');
}

function renderCWVGrid(d){
  var el = document.getElementById('sd-cwv'); if(!el) return;
  var items = [
    {k:'FCP', v:d.fcp||'-', ms:d.fcp_ms||0, thr:[1800,3000], tip:'İlk İçerik Boyama'},
    {k:'LCP', v:d.lcp||'-', ms:d.lcp_ms||0, thr:[2500,4000], tip:'En Büyük İçerik Boyama'},
    {k:'TBT', v:d.tbt||'-', ms:d.tbt_ms||0, thr:[200,600],   tip:'Toplam Bloklama Süresi'},
    {k:'CLS', v:d.cls||'-', ms:(d.cls_val||0)*1000, thr:[100,250], tip:'Kümülatif Düzen Kayması'},
    {k:'SI',  v:d.si||'-',  ms:0, thr:null, tip:'Hız İndeksi'},
    {k:'TTI', v:d.tti||'-', ms:0, thr:null, tip:'Etkileşime Hazır Olma'}
  ];
  el.innerHTML = items.map(function(it){
    var col = 'var(--m)';
    if(it.thr && it.ms>0) col = it.ms<=it.thr[0]?'#3ecfa0':it.ms<=it.thr[1]?'#f0b429':'#fa3e3e';
    return '<div class="sd-cwv-c" title="'+EX(it.tip)+'">'+
      '<div class="sd-cwv-v" style="color:'+col+'">'+EX(it.v)+'</div>'+
      '<div class="sd-cwv-k">'+it.k+'</div>'+
      '<div class="sd-cwv-t">'+EX(it.tip)+'</div>'+
      '</div>';
  }).join('');
}

function updateCounts(d){
  var ss = d.sorunlar||[];
  var ec = ss.filter(function(x){return x.sev==='err';}).length;
  var wc = ss.filter(function(x){return x.sev==='wrn';}).length;
  var oc = (d.iyiler||[]).length;
  var eEl=document.getElementById('sd-ec'), wEl=document.getElementById('sd-wc'), oEl=document.getElementById('sd-oc');
  if(eEl) eEl.textContent=ec;
  if(wEl) wEl.textContent=wc;
  if(oEl) oEl.textContent=oc;
}

/* ===== SEKME İÇERİKLERİ ===== */
function renderTabContent(t, i){
  var d = getCurData(i);
  var tc = document.getElementById('sd-tc'); if(!tc) return;
  var devLbl = _curDev==='mob'?'📱 Mobil':'💻 Masaüstü';
  updateCounts(d);

  if(t==='sorunlar'){
    var ss = d.sorunlar||[];
    var hh = ss.filter(function(x){return x.sev==='err';});
    var ww = ss.filter(function(x){return x.sev==='wrn';});
    if(!ss.length){
      tc.innerHTML = '<div style="text-align:center;padding:50px;color:#3ecfa0;font-size:14px;font-weight:600">✅ '+devLbl+' için sorun tespit edilmedi!</div>';
      return;
    }
    var h = '<div class="sd-box">';
    h += '<div class="sd-bh">'+devLbl+' Sorunlar</div>';
    if(hh.length){
      h += '<div class="sd-sec-hdr" style="color:#fa3e3e">🔴 Ciddi Sorunlar — '+hh.length+' adet</div>';
      hh.forEach(function(s){
        h += '<div class="sd-iss err"><span style="font-size:16px;flex-shrink:0">🔴</span>'+
          '<div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:3px">'+EX(s.baslik)+
          '<span style="margin-left:7px;font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(250,62,62,.2);color:#fa3e3e;font-weight:600">'+EX(s.etki)+'</span></div>'+
          '<div style="font-size:11px;color:var(--m);line-height:1.6">'+EX(s.aciklama)+'</div>'+
          '<div class="sd-fix">💡 Çözüm: '+EX(s.cozum)+'</div></div></div>';
      });
    }
    if(ww.length){
      h += '<div class="sd-sec-hdr" style="color:#f0b429;margin-top:14px">⚠️ Uyarılar — '+ww.length+' adet</div>';
      ww.forEach(function(s){
        h += '<div class="sd-iss wrn"><span style="font-size:16px;flex-shrink:0">🟡</span>'+
          '<div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:3px">'+EX(s.baslik)+
          '<span style="margin-left:7px;font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(240,180,41,.2);color:#f0b429;font-weight:600">'+EX(s.etki)+'</span></div>'+
          '<div style="font-size:11px;color:var(--m);line-height:1.6">'+EX(s.aciklama)+'</div>'+
          '<div class="sd-fix">💡 Çözüm: '+EX(s.cozum)+'</div></div></div>';
      });
    }
    tc.innerHTML = h+'</div>';
  }

  else if(t==='basari'){
    var iy = d.iyiler||[];
    if(!iy.length){ tc.innerHTML='<div style="color:var(--m);padding:20px;font-size:12px">'+devLbl+' başarılı kontrol bulunamadı.</div>'; return; }
    tc.innerHTML = '<div class="sd-box"><div class="sd-bh">'+devLbl+' Başarılı Kontroller</div>'+
      iy.map(function(x){
        return '<div class="sd-iss ok"><span style="font-size:16px;flex-shrink:0">✅</span>'+
          '<div><div style="font-size:12px;font-weight:600;margin-bottom:1px">'+EX(x.baslik)+'</div>'+
          '<div style="font-size:11px;color:var(--m);line-height:1.5">'+EX((x.aciklama||'').slice(0,160))+'</div></div></div>';
      }).join('')+'</div>';
  }

  else if(t==='perf'){
    var lhr = d._a||{};

    /* Kaynak dağılımı */
    var rs = lhr['resource-summary'];
    var resHtml = '';
    if(rs&&rs.details&&rs.details.items){
      var items = rs.details.items.filter(function(x){return x.label!=='Total';});
      var tot = rs.details.items.find(function(x){return x.label==='Total';});
      var maxSz = tot?tot.size:1;
      resHtml = '<div class="sd-box"><div class="sd-bh">Kaynak Dağılımı'+
        (tot?' — Toplam: '+fmtKb(tot.size)+' ('+tot.requestCount+' istek)':'')+
        '</div>'+
        items.map(function(it){
          var pct = maxSz>0?Math.min(Math.round(it.size/maxSz*100),100):0;
          var col = it.label==='Script'?'#f0b429':it.label==='Image'?'#3ecfa0':it.label==='Stylesheet'?'#1a73e8':'var(--m)';
          return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11px">'+
            '<span style="min-width:75px;color:var(--m)">'+EX(it.label)+'</span>'+
            '<div style="flex:1"><div class="sd-prog"><div class="sd-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>'+
            '<span style="min-width:60px;text-align:right;font-family:monospace;font-size:10px">'+fmtKb(it.size)+'</span>'+
            '<span style="min-width:35px;text-align:right;font-size:10px;color:var(--m)">'+it.requestCount+'</span>'+
            '</div>';
        }).join('')+'</div>';
    }

    /* Fırsat listesi */
    var oppKeys=['render-blocking-resources','unused-javascript','unused-css-rules','uses-optimized-images','uses-webp-images','offscreen-images','uses-text-compression','efficient-animated-content','uses-http2'];
    var oppRows = oppKeys.map(function(k){
      var au = lhr[k]; if(!au||au.score===null||au.score===1) return '';
      var col = au.score<0.5?'#fa3e3e':'#f0b429';
      return '<div class="sd-row"><span style="color:var(--m);flex:1">'+EX(au.title)+'</span>'+
        '<span style="font-size:11px;color:'+col+';font-weight:600">'+EX(au.displayValue||'Sorun')+'</span></div>';
    }).join('');

    function cwvRow(lbl, val, ms, thr, tip){
      var col='var(--m)', ico='📊';
      if(thr && ms>0){
        if(ms<=thr[0]){col='#3ecfa0';ico='✅';}
        else if(ms<=thr[1]){col='#f0b429';ico='🟡';}
        else{col='#fa3e3e';ico='🔴';}
      }
      return '<div class="sd-row" title="'+EX(tip)+'">'+
        '<span style="color:var(--m);flex:1">'+EX(lbl)+'</span>'+
        '<span style="font-family:monospace;font-size:11px;color:'+col+'">'+EX(val)+'</span>'+
        '<span style="margin-left:6px">'+ico+'</span></div>';
    }

    tc.innerHTML =
      '<div class="sd-box"><div class="sd-bh">'+devLbl+' Core Web Vitals</div>'+
        cwvRow('TTFB', d.ttfb||'-', d.ttfb_ms||0, [800,1800], 'İlk byte süresi. ≤800ms: İyi')+
        cwvRow('FCP',  d.fcp||'-',  d.fcp_ms||0,  [1800,3000],'İlk içerik boyama. ≤1.8sn: İyi')+
        cwvRow('LCP',  d.lcp||'-',  d.lcp_ms||0,  [2500,4000],'En büyük içerik boyama. ≤2.5sn: İyi')+
        cwvRow('TBT',  d.tbt||'-',  d.tbt_ms||0,  [200,600],  'Bloklama süresi. ≤200ms: İyi')+
        cwvRow('CLS',  d.cls||'-',  (d.cls_val||0)*1000,[100,250],'Düzen kayması. ≤0.10: İyi')+
        cwvRow('Hız İndeksi', d.si||'-', 0, null, 'Görsel yüklenme hızı')+
        cwvRow('TTI',  d.tti||'-',  0, null, 'Etkileşime hazır olma süresi')+
      '</div>'+
      (oppRows?'<div class="sd-box"><div class="sd-bh">'+devLbl+' Performans Fırsatları</div>'+oppRows+'</div>':'')+
      resHtml;
  }

  else if(t==='teknik'){
    var a2 = d._a||{};
    var seoKeys=['document-title','meta-description','is-crawlable','canonical','hreflang','link-text','image-alt','robots-txt','font-size','structured-data'];
    var techKeys=['is-on-https','uses-http2','viewport','charset','errors-in-console','no-document-write','tap-targets'];

    function auditChk(k){
      var au = a2[k]; if(!au) return '';
      var ok = au.score===1||au.score===null;
      var ico = ok?'✅':au.score<0.5?'🔴':'⚠️';
      return '<div class="sd-chk"><span style="font-size:14px;flex-shrink:0;margin-top:1px">'+ico+'</span>'+
        '<div><div style="font-size:12px;font-weight:600">'+EX(au.title)+'</div>'+
        '<div style="font-size:11px;color:var(--m);line-height:1.5">'+EX((au.displayValue||au.description||'').slice(0,160))+'</div></div></div>';
    }

    tc.innerHTML =
      '<div class="sd-box"><div class="sd-bh">'+devLbl+' SEO Kontrolleri</div>'+
      (seoKeys.map(auditChk).join('')||'<div style="color:var(--m);font-size:12px">Veri bulunamadı.</div>')+
      '</div>'+
      '<div class="sd-box"><div class="sd-bh">'+devLbl+' Teknik Kontroller</div>'+
      (techKeys.map(auditChk).join('')||'<div style="color:var(--m);font-size:12px">Veri bulunamadı.</div>')+
      '</div>';
  }

  else if(t==='opps'){
    var opps = d.opps||[];
    if(!opps.length){ tc.innerHTML='<div style="color:var(--m);padding:20px;font-size:12px">'+devLbl+' için öncelik bulunamadı.</div>'; return; }
    tc.innerHTML = '<div class="sd-box"><div class="sd-bh">'+devLbl+' Öncelikli Aksiyonlar — Beklenen Kazanıma Göre Sıralı</div>'+
      opps.slice(0,12).map(function(p,idx){
        var col = p.score<0.5?'#fa3e3e':'#f0b429';
        return '<div class="sd-tip">'+
          '<b style="color:'+col+'">'+(idx+1)+'.</b> <b>'+EX(p.title)+'</b>'+
          (p.display?'<span style="color:#3ecfa0;margin-left:8px;font-size:10px;font-weight:600">'+EX(p.display)+'</span>':'')+
          '<br><span style="color:var(--m);font-size:11px">'+EX((p.desc||'').slice(0,140))+'</span></div>';
      }).join('')+'</div>';
  }
}

/* ===== KARŞILAŞTIRMA ===== */
function renderCmp(){
  var cmp = document.getElementById('SE-cmp');
  var nav = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'+
    '<button class="se-btn" onclick="SE.back()">← Geri</button>'+
    '<div style="font-size:13px;font-weight:700;flex:1">Karşılaştırma</div>'+
    '</div>';

  if(_db.length < 2){
    cmp.innerHTML = nav+'<div style="font-size:12px;color:var(--m);padding:20px">Karşılaştırmak için en az 2 analiz gerekli.</div>';
    return;
  }

  if(_sel.length < 2){
    cmp.innerHTML = nav+
      '<div style="font-size:12px;color:var(--m);margin-bottom:12px">Karşılaştırmak için 2 site seçin:</div>'+
      '<div class="sg-grid">'+
      _db.map(function(s,i){
        var isSel = _sel.indexOf(i)>=0;
        var rv = mkRing(s.genel||0, 18, 3);
        var host = s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
        return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SE.toggleSel('+i+')" '+
          'style="'+(isSel?'border-color:#3ecfa0;background:rgba(62,207,160,.05)':'')+'">'+
          (isSel?'<span style="position:absolute;top:6px;left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:#3ecfa0;color:#fff">✓ Seçildi</span>':'')+
          '<div class="sg-fav"><img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'+
          '<div class="sg-info"><div class="sg-url">'+EX(host)+'</div><div class="sg-meta">Skor: '+s.genel+'</div></div>'+
          '<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+(s.genel||0)+'</span></div></div>';
      }).join('')+
      '</div>';
    return;
  }

  var a=_db[_sel[0]], b=_db[_sel[1]];
  var am=a.mob||{}, ad=a.desk||{};
  var bm=b.mob||{}, bd=b.desk||{};

  function cmpClass(va,vb,lower){ return (lower?(va<vb):(va>vb))?'cw':(lower?(va>vb):(va<vb))?'cl':'cd'; }

  var rows=[
    {l:'Genel Skor',           va:a.genel||0,  vb:b.genel||0,  lo:false, f:String},
    {l:'📱 Performans',        va:am.perf||0,  vb:bm.perf||0,  lo:false, f:function(v){return v+'/100';}},
    {l:'💻 Performans',        va:ad.perf||0,  vb:bd.perf||0,  lo:false, f:function(v){return v+'/100';}},
    {l:'SEO',                  va:am.seo||0,   vb:bm.seo||0,   lo:false, f:function(v){return v+'/100';}},
    {l:'Erişilebilirlik',      va:am.a11y||0,  vb:bm.a11y||0,  lo:false, f:function(v){return v+'/100';}},
    {l:'Best Practices',       va:am.bp||0,    vb:bm.bp||0,    lo:false, f:function(v){return v+'/100';}},
    {l:'📱 FCP',               va:am.fcp_ms||0,vb:bm.fcp_ms||0,lo:true,  f:fmtMs},
    {l:'📱 LCP',               va:am.lcp_ms||0,vb:bm.lcp_ms||0,lo:true,  f:fmtMs},
    {l:'📱 TBT',               va:am.tbt_ms||0,vb:bm.tbt_ms||0,lo:true,  f:fmtMs},
    {l:'💻 FCP',               va:ad.fcp_ms||0,vb:bd.fcp_ms||0,lo:true,  f:fmtMs},
    {l:'💻 LCP',               va:ad.lcp_ms||0,vb:bd.lcp_ms||0,lo:true,  f:fmtMs},
    {l:'CLS (Mobil)',          va:Math.round((am.cls_val||0)*1000),vb:Math.round((bm.cls_val||0)*1000),lo:true,f:function(v){return (v/1000).toFixed(3);}},
    {l:'TTFB (Mobil)',         va:am.ttfb_ms||0,vb:bm.ttfb_ms||0,lo:true,f:fmtMs},
  ];

  var aw=0,bw=0;
  rows.forEach(function(r){ var c=cmpClass(r.va,r.vb,r.lo); if(c==='cw')aw++; if(c==='cl')bw++; });

  function cmpCard(s, mob, desk, wins, loses){
    var rv = mkRing(s.genel||0, 28, 5);
    var host = s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    return '<div style="background:var(--s);border:1.5px solid '+(wins>loses?'#3ecfa0':'var(--b)')+';border-radius:10px;padding:14px">'+
      '<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">'+
      '<img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" style="width:24px;height:24px;border-radius:5px" onerror="this.style.display=\'none\'">'+
      '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+EX(host)+'</div>'+
      '<div style="font-size:10px;color:var(--m)">'+ago(s.tarih)+'</div></div></div>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
      '<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:66px;height:66px;flex-shrink:0">'+rv.svg+
      '<span style="position:absolute;font-size:16px;font-weight:800;color:'+rv.col+'">'+s.genel+'</span></div>'+
      '<div>'+(wins>loses?'<div style="font-size:11px;font-weight:700;color:#3ecfa0;margin-bottom:2px">🏆 Daha İyi</div>':'')+
      '<div style="font-size:11px;color:#3ecfa0">'+wins+' metrikte üstün</div>'+
      '<div style="font-size:11px;color:#fa3e3e">'+loses+' metrikte geride</div>'+
      '</div></div></div>';
  }

  cmp.innerHTML = nav+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
    cmpCard(a,am,ad,aw,bw)+cmpCard(b,bm,bd,bw,aw)+
    '</div>'+
    '<div class="sd-box"><div class="sd-bh">Detaylı Karşılaştırma</div>'+
    '<table class="cmp-tbl"><thead><tr>'+
    '<th>Metrik</th>'+
    '<th>'+EX(a.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'+
    '<th>'+EX(b.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'+
    '</tr></thead><tbody>'+
    rows.map(function(r){
      var ca=cmpClass(r.va,r.vb,r.lo), cb=cmpClass(r.vb,r.va,r.lo);
      return '<tr><td style="color:var(--m)">'+EX(r.l)+'</td>'+
        '<td class="'+ca+'">'+EX(r.f(r.va))+'</td>'+
        '<td class="'+cb+'">'+EX(r.f(r.vb))+'</td></tr>';
    }).join('')+
    '</tbody></table></div>'+
    '<button class="se-btn" style="margin-top:10px" onclick="_sel=[];renderCmp()">↩ Farklı Site Seç</button>';

  window.renderCmp = renderCmp;
  window._sel = _sel;
}

  if(e.key==='Enter') SE.add();
});

dbLoad();
showList();

})();
