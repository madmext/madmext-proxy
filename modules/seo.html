<!-- SEO Modülü v5 — Tek İstek Stratejisi, Timeout Sorunu Çözüldü -->
<style>
#SE{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;font-family:inherit}
#SE-top{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--b)}
#SE-body{flex:1;overflow-y:auto;padding:16px 0}
#SE-sw{flex:1;position:relative}
#SE-sw::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;z-index:1}
#SE-inp{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:9px 14px 9px 38px;font-size:13px;border-radius:9px;outline:none;font-family:inherit;transition:border-color .18s}
#SE-inp:focus{border-color:#3ecfa0}

/* Butonlar */
.se-btn{flex-shrink:0;border:1.5px solid var(--b);color:var(--t);padding:8px 14px;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer;background:var(--s2);white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.se-btn:hover{border-color:#3ecfa0;color:#3ecfa0}
.se-btn.g{background:#3ecfa0;border-color:#3ecfa0;color:#fff}
.se-btn.g:hover{opacity:.88}
.se-btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* Kartlar */
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.sg-card{position:relative;background:var(--s);border:1.5px solid var(--b);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .15s}
.sg-card:hover{border-color:#3ecfa0;box-shadow:0 2px 14px rgba(62,207,160,.1)}
.sg-fav{width:36px;height:36px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden}
.sg-fav img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sg-info{flex:1;min-width:0}
.sg-url{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sg-meta{font-size:10px;color:var(--m);margin-top:2px}
.sg-ring{position:relative;width:46px;height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sg-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.sg-rnum{position:relative;z-index:1;font-size:13px;font-weight:800}
.sg-del{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--m);font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;padding:2px 5px;border-radius:4px}
.sg-card:hover .sg-del{opacity:1}
.sg-del:hover{background:rgba(250,62,62,.15);color:#fa3e3e}
.sg-empty{text-align:center;padding:60px 20px;color:var(--m)}

/* Detay */
#SE-det{display:none}
.sd-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sd-nav-info{flex:1;min-width:0}
.sd-nav-url{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd-nav-sub{font-size:10px;color:var(--m);margin-top:2px}

/* Device paneli — iki bağımsız panel */
.dev-panel{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:10px}
.dev-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.dev-panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.dev-panel-skor{display:flex;align-items:center;gap:6px}

/* Skor kutuları */
.s4g{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:11px}
@media(max-width:480px){.s4g{grid-template-columns:repeat(2,1fr)}}
.s4c{background:var(--bg);border:1px solid var(--b);border-top:3px solid;border-radius:8px;padding:9px 5px;text-align:center}
.s4v{font-size:19px;font-weight:800}
.s4l{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* CWV */
.cwvg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
@media(max-width:500px){.cwvg{grid-template-columns:repeat(2,1fr)}}
.cwvc{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:9px;text-align:center}
.cwvv{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.cwvk{font-size:9px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.cwvt{font-size:9px;color:var(--m);margin-top:1px;line-height:1.3}

/* Loading inline */
.dev-loading{display:flex;flex-direction:column;align-items:center;padding:30px 20px;gap:10px}
.dev-empty{display:flex;flex-direction:column;align-items:center;padding:24px 20px;gap:8px;color:var(--m)}

/* Sekmeler */
.sd-tabs{display:flex;border-bottom:2px solid var(--b);margin-bottom:12px;overflow-x:auto}
.sd-tab{padding:7px 13px;font-size:12px;font-weight:600;color:var(--m);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.sd-tab.on{color:#3ecfa0;border-bottom-color:#3ecfa0}
.sd-tab:hover:not(.on){color:var(--t)}

/* İçerik */
.sd-box{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:10px}
.sd-bh{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m);margin-bottom:11px}
.sd-iss{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid}
.sd-iss.err{background:rgba(250,62,62,.05);border-color:rgba(250,62,62,.2)}
.sd-iss.wrn{background:rgba(240,180,41,.05);border-color:rgba(240,180,41,.2)}
.sd-iss.ok{background:rgba(62,207,160,.05);border-color:rgba(62,207,160,.2)}
.sd-fix{font-size:11px;margin-top:5px;padding:5px 9px;border-radius:5px;background:rgba(62,207,160,.08);border-left:2px solid #3ecfa0;line-height:1.6}
.sd-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(128,128,128,.06);font-size:12px}
.sd-row:last-child{border-bottom:none}
.sd-chk{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid rgba(128,128,128,.06)}
.sd-chk:last-child{border-bottom:none}
.sd-tip{padding:8px 12px 8px 12px;border-left:3px solid #3ecfa0;border-radius:0 6px 6px 0;background:rgba(62,207,160,.06);font-size:11px;line-height:1.7;margin-bottom:6px}
.sd-prog{background:var(--b2);border-radius:3px;height:5px;overflow:hidden;margin-top:3px}
.sd-fill{height:100%;border-radius:3px}

/* Karşılaştırma */
#SE-cmp{display:none}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cmp-tbl th{background:var(--s2);padding:8px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--m);border-bottom:1px solid var(--b)}
.cmp-tbl td{padding:8px 11px;border-bottom:1px solid rgba(128,128,128,.06)}
.cmp-tbl tr:last-child td{border-bottom:none}
.cw{color:#3ecfa0;font-weight:700}.cl{color:#fa3e3e}.cd{color:var(--m)}

/* Spinner */
@keyframes se-sp{to{transform:rotate(360deg)}}
.se-spin{border-radius:50%;border:2.5px solid var(--b);border-top-color:#3ecfa0;animation:se-sp .8s linear infinite;flex-shrink:0}

/* Progress bar (analiz adımları) */
.se-progress{background:var(--b2);border-radius:6px;height:4px;overflow:hidden;margin-top:6px}
.se-pfill{height:100%;border-radius:6px;background:#3ecfa0;transition:width .4s ease}
</style>

<div id="SE">
  <div id="SE-top">
    <div id="SE-sw">
      <input id="SE-inp" type="text" placeholder="https://www.madmext.com — URL gir, Enter'a bas..." autocomplete="off">
    </div>
    <button class="se-btn g" id="SE-abtn" onclick="SE.add()">＋ Analiz Et</button>

        <div style="font-size:14px;font-weight:700;color:var(--t);margin-bottom:6px">Henüz analiz yok</div>
        <div style="font-size:12px;line-height:1.9;color:var(--m)">
          URL gir ve analiz et.<br>
          <b>Mobil</b> ve <b>Masaüstü</b> bağımsız analiz edilir.<br>
          Her biri ayrı ayrı çekildiği için daha güvenilir.
        </div>
      </div>
    </div>
    <div id="SE-det"></div>
    <div id="SE-cmp"></div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ===== UTIL ===== */
var EX = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

function ago(iso){
  var d = Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60) return 'az önce';
  if(d<3600) return Math.floor(d/60)+' dk önce';
  if(d<86400) return Math.floor(d/3600)+' saat önce';
  return Math.floor(d/86400)+' gün önce';
}

function mkRing(v, r, sw){
  var c=2*Math.PI*r, off=c-(v/100)*c;
  var col=v>=90?'#3ecfa0':v>=50?'#f0b429':'#fa3e3e';
  var sz=(r+sw)*2, cx=sz/2;
  return{
    svg:'<svg width="'+sz+'" height="'+sz+'">'+
        '<circle stroke-width="'+sw+'" stroke="var(--b2)" fill="none" r="'+r+'" cx="'+cx+'" cy="'+cx+'"/>'+
        '<circle stroke-width="'+sw+'" stroke-linecap="round" stroke="'+col+'" fill="none" r="'+r+'" cx="'+cx+'" cy="'+cx+'"'+
        ' stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>',
    col:col
  };
}
function colV(v){ return v>=90?'#3ecfa0':v>=50?'#f0b429':'#fa3e3e'; }
function fmtMs(ms){
  if(!ms && ms!==0) return '-';
  return ms>=1000?(ms/1000).toFixed(1)+' sn':Math.round(ms)+' ms';
}
function fmtKb(b){
  if(!b) return '-';
  return b>=1048576?(b/1048576).toFixed(1)+' MB':b>=1024?Math.round(b/1024)+' KB':b+' B';
}

/* ===== VERİ ===== */
var _db   = [];
var _sel  = [];
var _curTab = 'sorunlar';

function dbLoad(){ try{ _db=JSON.parse(localStorage.getItem('seo_v5')||'[]'); }catch(e){ _db=[]; } }
function dbSave(){ try{ localStorage.setItem('seo_v5',JSON.stringify(_db)); }catch(e){} }

/* ===== PSI ÇEKME — TEK İSTEK STRATEJİSİ ===== */
/*
  SORUN: PSI mobil + desktop = 2 istek = ~30-60sn → Railway 30sn timeout ile keser
  ÇÖZÜM: Her cihaz için TEK ayrı istek. Kullanıcı önce mobilin gelmesini bekler,
         ardından masaüstü butonu tetiklenir. Hiçbir zaman 2 istek aynı anda olmaz.
*/

async function fetchPSI(url, strategy, onProgress){
  var base = window.location.origin;
  var qs = '?url='+encodeURIComponent(url)+'&strategy='+strategy+
            '&category=performance&category=seo&category=accessibility&category=best-practices';
  
  if(onProgress) onProgress(10, 'API bağlantısı kuruluyor...');

  /* AbortController ile 58 saniye frontend timeout */
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 58000);

  try{
    if(onProgress) onProgress(25, 'PageSpeed analizi çalışıyor...');
    
    var r = await fetch(base+'/psi'+qs, { signal: ctrl.signal });
    clearTimeout(timer);
    
    if(onProgress) onProgress(80, 'Veri işleniyor...');

    if(!r.ok){
      var txt = await r.text();
      var msg = 'Sunucu hatası: HTTP '+r.status;
      try{ var j=JSON.parse(txt); msg=(j.error&&j.error.message)||msg; }catch(e){}
      throw new Error(msg);
    }
    var json = await r.json();
    if(json.error) throw new Error(json.error.message||'PageSpeed API hatası');
    
    if(onProgress) onProgress(100, 'Tamamlandı!');
    return json;

  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError') throw new Error('Zaman aşımı (58sn). PSI API bu URL için çok yavaş yanıtladı. Birkaç dakika bekleyip tekrar deneyin.');
    throw e;
  }
}

/* LighthouseResult parse et */
function parseLHR(raw){
  if(!raw||!raw.lighthouseResult) return null;
  var lhr = raw.lighthouseResult;
  var cats = lhr.categories||{};
  var a    = lhr.audits||{};

  function sc(cat){ return Math.round(((cats[cat]&&cats[cat].score)||0)*100); }
  function ms(k){ return a[k]&&a[k].numericValue?Math.round(a[k].numericValue):0; }
  function dv(k){ return a[k]&&a[k].displayValue?a[k].displayValue:'-'; }

  /* Sorun ve iyi kontroller */
  var sorunlar=[], iyiler=[];
  var kontroller={
    'is-on-https':              'SSL sertifikası ekleyin.',
    'is-crawlable':             'robots.txt ve meta robots kontrolü yapın.',
    'document-title':           '<title> etiketi ekleyin (30-65 karakter).',
    'meta-description':         '<meta name="description"> ekleyin (100-160 karakter).',
    'canonical':                '<link rel="canonical"> etiketi ekleyin.',
    'image-alt':                'Tüm görsellere açıklayıcı alt özelliği ekleyin.',
    'viewport':                 '<meta name="viewport"> etiketini ekleyin.',
    'tap-targets':              'Buton/linkleri min 44×44px yapın.',
    'render-blocking-resources':'Kritik olmayan CSS/JS\'yi erteleyin veya async/defer kullanın.',
    'unused-javascript':        'Kullanılmayan JS kütüphanelerini kaldırın, kod bölme uygulayın.',
    'unused-css-rules':         'PurgeCSS ile kullanılmayan CSS\'yi temizleyin.',
    'uses-webp-images':         'Görselleri WebP/AVIF formatına dönüştürün.',
    'offscreen-images':         'Görsellere loading="lazy" ekleyin.',
    'uses-text-compression':    'Sunucuda gzip/brotli sıkıştırma aktif edin.',
    'uses-optimized-images':    'Görselleri optimize edip sıkıştırın.',
    'heading-order':            'Başlıkları H1→H2→H3 sırasıyla kullanın.'
  };

  Object.keys(kontroller).forEach(function(k){
    var au=a[k]; if(!au) return;
    if(au.score===1||au.score===null){
      iyiler.push({baslik:au.title, aciklama:au.description||''});
    } else if(typeof au.score==='number' && au.score<1){
      sorunlar.push({
        baslik:  au.title,
        aciklama:au.displayValue||'',
        cozum:   kontroller[k],
        etki:    au.score<0.5?'Yüksek':'Orta',
        sev:     au.score<0.5?'err':'wrn'
      });
    }
  });

  /* Fırsatlar (kazanıma göre sıralı) */
  var opps=[];
  Object.keys(a).forEach(function(k){
    var au=a[k];
    if(au&&typeof au.score==='number'&&au.score<1&&au.score!==null){
      var sav=0;
      if(au.details&&au.details.overallSavingsMs)   sav=au.details.overallSavingsMs;
      if(au.details&&au.details.overallSavingsBytes) sav+=au.details.overallSavingsBytes/500;
      if(sav>0) opps.push({title:au.title,display:au.displayValue,savings:sav,score:au.score,desc:au.description||''});
    }
  });
  opps.sort(function(a,b){ return b.savings-a.savings; });

  return {
    perf:sc('performance'), seo:sc('seo'), a11y:sc('accessibility'), bp:sc('best-practices'),
    fcp:dv('first-contentful-paint'),   fcp_ms:ms('first-contentful-paint'),
    lcp:dv('largest-contentful-paint'),  lcp_ms:ms('largest-contentful-paint'),
    tbt:dv('total-blocking-time'),       tbt_ms:ms('total-blocking-time'),
    cls:dv('cumulative-layout-shift'),   cls_val:a['cumulative-layout-shift']&&a['cumulative-layout-shift'].numericValue||0,
    si: dv('speed-index'),
    tti:dv('interactive'),
    ttfb:dv('server-response-time'),     ttfb_ms:ms('server-response-time'),
    sorunlar:sorunlar, iyiler:iyiler, opps:opps,
    _a:a
  };
}

/* ===== LİSTE ===== */
function showList(){
  document.getElementById('SE-list').style.display='block';
  document.getElementById('SE-det').style.display='none';
  document.getElementById('SE-cmp').style.display='none';
  renderGrid();
}

function renderGrid(){
  var grid=document.getElementById('SE-grid');
  var empty=document.getElementById('SE-empty');
  if(!_db.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML=_db.map(function(s,i){
    var genel=s.genel||0;
    var rv=mkRing(genel,20,3.5);
    var host=s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    var fav='https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64';
    var mob=s.mob, desk=s.desk;
    var tags='';
    if(mob)  tags+='<span style="color:#3ecfa0">📱'+mob.perf+'</span> · ';
    else     tags+='<span style="color:var(--m)">📱—</span> · ';
    if(desk) tags+='<span style="color:#1a73e8">💻'+desk.perf+'</span> · ';
    else     tags+='<span style="color:var(--m)">💻—</span> · ';
    if(mob)  tags+='SEO:'+mob.seo;
    return '<div class="sg-card" onclick="SE.open('+i+')">'+
      '<button class="sg-del" onclick="event.stopPropagation();SE.del('+i+')" title="Sil">✕</button>'+
      '<div class="sg-fav"><img src="'+fav+'" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'+
      '<div class="sg-info">'+
        '<div class="sg-url">'+EX(host)+'</div>'+
        '<div class="sg-meta">'+tags+'</div>'+
        '<div class="sg-meta">'+ago(s.tarih)+'</div>'+
      '</div>'+
      '<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+genel+'</span></div>'+
      '</div>';
  }).join('');
}

/* ===== ANA OBJEKTİF ===== */
window.SE={};

/* Analiz ekle — SADECE MOBİL çeker */
SE.add=async function(){
  var inp=document.getElementById('SE-inp');
  var btn=document.getElementById('SE-abtn');
  var url=(inp.value||'').trim();
  if(!url){ inp.focus(); return; }
  if(!url.startsWith('http')) url='https://'+url;

  btn.disabled=true;
  btn.textContent='Analiz ediliyor...';

  /* Mevcut kaydı bul veya oluştur */
  var ei=_db.findIndex(function(s){ return s.url===url; });
  var idx;
  if(ei>=0){
    idx=ei;
  } else {
    _db.unshift({url:url, genel:0, tarih:new Date().toISOString(), mob:null, desk:null});
    idx=0;
  }
  dbSave();

  document.getElementById('SE-list').style.display='none';
  document.getElementById('SE-det').style.display='block';
  document.getElementById('SE-cmp').style.display='none';
  _curTab='sorunlar';
  renderDetail(idx);

  /* Mobil analiz başlat */
  await SE._fetchDev(idx, 'mob');

  btn.disabled=false;
  btn.textContent='＋ Analiz Et';
  inp.value='';
  renderGrid();
};

/* Belirli bir cihaz için analiz çek */
SE._fetchDev=async function(i, dev){
  var s=_db[i]; if(!s) return;
  var devLbl=dev==='mob'?'Mobil':'Masaüstü';
  var strategy=dev==='mob'?'mobile':'desktop';

  /* Panel'i yükleme moduna al */
  updateDevPanel(i, dev, 'loading', null, 0, 'Başlatılıyor...');

  try{
    var raw=await fetchPSI(s.url, strategy, function(pct, msg){
      updateDevPanel(i, dev, 'loading', null, pct, msg);
    });
    var data=parseLHR(raw);
    _db[i][dev]=data;
    _db[i].tarih=new Date().toISOString();

    /* Genel skoru güncelle (mobil baz) */
    if(_db[i].mob){
      var m=_db[i].mob;
      _db[i].genel=Math.round(m.seo*0.5+m.perf*0.3+m.a11y*0.2);
    }
    dbSave();
    updateDevPanel(i, dev, 'ready', data, 100, 'Tamamlandı');
    renderTabContent(i);

  }catch(e){
    updateDevPanel(i, dev, 'error', null, 0, e.message);
  }
};

/* Tek cihaz yenile */
SE.reloadDev=async function(i, dev){
  await SE._fetchDev(i, dev);
};

SE.del=function(i){
  if(!confirm('Silinsin mi?')) return;
  _sel=_sel.filter(function(x){ return x!==i; }).map(function(x){ return x>i?x-1:x; });
  _db.splice(i,1); dbSave(); renderGrid();
};

SE.open=function(i){
  var s=_db[i]; if(!s) return;
  document.getElementById('SE-list').style.display='none';
  document.getElementById('SE-det').style.display='block';
  document.getElementById('SE-cmp').style.display='none';
  _curTab='sorunlar';
  renderDetail(i);
};

SE.back=function(){ showList(); };

SE.tab=function(t,i){
  _curTab=t;
  document.querySelectorAll('.sd-tab').forEach(function(b){ b.classList.toggle('on',b.dataset.t===t); });
  renderTabContent(i);
};

SE.showCmp=function(){
  document.getElementById('SE-list').style.display='none';
  document.getElementById('SE-det').style.display='none';
  document.getElementById('SE-cmp').style.display='block';
  renderCmp();
};
SE.toggleSel=function(i){
  var p=_sel.indexOf(i);
  if(p>=0) _sel.splice(p,1);
  else{ if(_sel.length>=2) _sel.shift(); _sel.push(i); }
  renderCmp();
};

/* Bir device panelini güncelle */
function updateDevPanel(i, dev, state, data, pct, msg){
  var elId='sd-'+(dev==='mob'?'mob':'desk')+'-panel';
  var el=document.getElementById(elId); if(!el) return;
  var s=_db[i]; if(!s) return;

  var devLbl=dev==='mob'?'📱 Mobil':'💻 Masaüstü';
  var devColor=dev==='mob'?'#3ecfa0':'#1a73e8';

  if(state==='loading'){
    el.innerHTML=
      '<div class="dev-panel">'+
        '<div class="dev-panel-hdr">'+
          '<div class="dev-panel-title" style="color:'+devColor+'">'+devLbl+'</div>'+
          '<div class="dev-loading" style="padding:0">'+
            '<div class="se-spin" style="width:14px;height:14px;border-width:2px"></div>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--m);margin-bottom:5px">'+EX(msg||'...')+'</div>'+
        '<div class="se-progress"><div class="se-pfill" style="width:'+pct+'%"></div></div>'+
      '</div>';
    return;
  }

  if(state==='empty'){
    el.innerHTML=
      '<div class="dev-panel" style="border-style:dashed">'+
        '<div class="dev-panel-hdr">'+
          '<div class="dev-panel-title" style="color:'+devColor+'">'+devLbl+'</div>'+
        '</div>'+
        '<div class="dev-empty">'+
          '<div style="font-size:28px">⏳</div>'+
          '<div style="font-size:12px;text-align:center;line-height:1.6">Bu cihaz için analiz yapılmadı</div>'+
          '<button class="se-btn g" onclick="SE._fetchDev('+i+',\''+dev+'\')">'+devLbl+' Analiz Et</button>'+
        '</div>'+
      '</div>';
    return;
  }

  if(state==='error'){
    el.innerHTML=
      '<div class="dev-panel" style="border-color:rgba(250,62,62,.3)">'+
        '<div class="dev-panel-hdr">'+
          '<div class="dev-panel-title" style="color:'+devColor+'">'+devLbl+'</div>'+
          '<button class="se-btn" style="font-size:10px;padding:5px 9px" onclick="SE._fetchDev('+i+',\''+dev+'\')">🔄 Tekrar</button>'+
        '</div>'+
        '<div style="font-size:11px;color:#fa3e3e;line-height:1.6;padding:8px;background:rgba(250,62,62,.05);border-radius:6px;border:1px solid rgba(250,62,62,.2)">'+
          '<b>Hata:</b> '+EX(msg||'Bilinmeyen hata')+'<br>'+
          '<span style="color:var(--m)">Birkaç dakika bekleyip Tekrar butonuna basın.</span>'+
        '</div>'+
      '</div>';
    return;
  }

  /* ready — veriyi göster */
  if(!data) return;
  var pc=colV(data.perf), sc=colV(data.seo), ac=colV(data.a11y), bc=colV(data.bp);

  var cwvItems=[
    {k:'FCP', v:data.fcp||'-', ms:data.fcp_ms||0, thr:[1800,3000]},
    {k:'LCP', v:data.lcp||'-', ms:data.lcp_ms||0, thr:[2500,4000]},
    {k:'TBT', v:data.tbt||'-', ms:data.tbt_ms||0, thr:[200,600]},
    {k:'CLS', v:data.cls||'-', ms:(data.cls_val||0)*1000, thr:[100,250]},
    {k:'SI',  v:data.si||'-',  ms:0, thr:null},
    {k:'TTI', v:data.tti||'-', ms:0, thr:null}
  ];

  el.innerHTML=
    '<div class="dev-panel">'+
      '<div class="dev-panel-hdr">'+
        '<div class="dev-panel-title" style="color:'+devColor+'">'+devLbl+'</div>'+
        '<button class="se-btn" style="font-size:10px;padding:5px 9px" onclick="SE.reloadDev('+i+',\''+dev+'\')">🔄 Yenile</button>'+
      '</div>'+

      /* 4 skor */
      '<div class="s4g">'+
        sCube('Perf',data.perf,pc)+
        sCube('SEO',data.seo,sc)+
        sCube('Erişim',data.a11y,ac)+
        sCube('BP',data.bp,bc)+
      '</div>'+

      /* CWV */
      '<div class="cwvg">'+
        cwvItems.map(function(it){
          var col='var(--m)';
          if(it.thr&&it.ms>0) col=it.ms<=it.thr[0]?'#3ecfa0':it.ms<=it.thr[1]?'#f0b429':'#fa3e3e';
          return '<div class="cwvc"><div class="cwvv" style="color:'+col+'">'+EX(it.v)+'</div>'+
                 '<div class="cwvk">'+it.k+'</div></div>';
        }).join('')+
      '</div>'+
    '</div>';
}

function sCube(l,v,col){
  return '<div class="s4c" style="border-top-color:'+col+'">'+
    '<div class="s4v" style="color:'+col+'">'+v+'</div>'+
    '<div class="s4l">'+l+'</div></div>';
}

          '<div style="font-size:11px;color:var(--m);line-height:1.6">'+EX(x.aciklama)+'</div>'+

    if(mob&&desk){

        ['Performans', mob.perf, desk.perf, false],
        ['SEO',mob.seo,desk.seo,false],
        ['Erişilebilirlik',mob.a11y,desk.a11y,false],

        mets.map(function(m){
          var va=typeof m[1]==='number'?m[1]:(m[4]||0);
          var vb=typeof m[2]==='number'?m[2]:(m[5]||0);

          var ca=lower?(va<vb?'#3ecfa0':va>vb?'#fa3e3e':'var(--t)'):(va>vb?'#3ecfa0':va<vb?'#fa3e3e':'var(--t)');
          var cb=lower?(vb<va?'#3ecfa0':vb>va?'#fa3e3e':'var(--t)'):(vb>va?'#3ecfa0':vb<va?'#fa3e3e':'var(--t)');
          return '<tr style="border-bottom:1px solid rgba(128,128,128,.06)">'+
            '<td style="padding:6px 8px;color:var(--m)">'+EX(m[0])+'</td>'+
            '<td style="padding:6px 8px;text-align:center;font-weight:600;color:'+ca+'">'+EX(String(m[1]))+'</td>'+
            '<td style="padding:6px 8px;text-align:center;font-weight:600;color:'+cb+'">'+EX(String(m[2]))+'</td></tr>';
        }).join('')+
        '</table></div>';

    /* Fırsatlar */
    var oppKeys=['render-blocking-resources','unused-javascript','unused-css-rules','uses-optimized-images','uses-webp-images','offscreen-images','uses-text-compression'];

            '<span style="min-width:30px;text-align:right;font-size:10px;color:var(--m)">'+it.requestCount+'</span></div>';
        }).join('')+'</div>';

    tc.innerHTML=cmpHtml+(oppH?'<div class="sd-box"><div class="sd-bh">📱 Performans Fırsatları</div>'+oppH+'</div>':'')+resH;

  else if(t==='teknik'){

        '<div style="font-size:11px;color:var(--m);line-height:1.5">'+EX((au.displayValue||au.description||'').slice(0,160))+'</div></div></div>';

  else if(t==='opps'){

    tc.innerHTML='<div class="sd-box"><div class="sd-bh">💡 Öncelikli Aksiyonlar — Kazanıma Göre Sıralı</div>'+

      }).join('')+'</div>';

}

      '<div style="font-size:12px;color:var(--m);margin-bottom:12px">Karşılaştırmak için 2 site seçin:</div>'+
      '<div class="sg-grid">'+
      _db.map(function(s,i){
        var isSel=_sel.indexOf(i)>=0;
        var rv=mkRing(s.genel||0,18,3);
        var host=s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
        return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SE.toggleSel('+i+')" '+
          'style="'+(isSel?'border-color:#3ecfa0;background:rgba(62,207,160,.05)':'')+'">'+
          (isSel?'<span style="position:absolute;top:6px;left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:#3ecfa0;color:#fff">✓</span>':'')+
          '<div class="sg-fav"><img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'+
          '<div class="sg-info"><div class="sg-url">'+EX(host)+'</div><div class="sg-meta">Skor: '+s.genel+'</div></div>'+
          '<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+(s.genel||0)+'</span></div></div>';
      }).join('')+'</div>';
    return;
  }

  var a=_db[_sel[0]], b=_db[_sel[1]];
  var am=a.mob||{}, ad=a.desk||{};
  var bm=b.mob||{}, bd=b.desk||{};

  function ccls(va,vb,lo){ return (lo?(va<vb):(va>vb))?'cw':(lo?(va>vb):(va<vb))?'cl':'cd'; }
  function mk(l,va,vb,lo,f){ f=f||String; var ca=ccls(va,vb,lo), cb=ccls(vb,va,lo);
    return '<tr><td style="color:var(--m)">'+EX(l)+'</td><td class="'+ca+'">'+EX(f(va))+'</td><td class="'+cb+'">'+EX(f(vb))+'</td></tr>'; }

  var rows=[
    mk('Genel Skor',a.genel||0,b.genel||0,false),
    mk('📱 Performans',am.perf||0,bm.perf||0,false,function(v){return v+'/100';}),
    mk('💻 Performans',ad.perf||0,bd.perf||0,false,function(v){return v+'/100';}),
    mk('SEO',am.seo||0,bm.seo||0,false,function(v){return v+'/100';}),
    mk('Erişilebilirlik',am.a11y||0,bm.a11y||0,false,function(v){return v+'/100';}),
    mk('Best Practices',am.bp||0,bm.bp||0,false,function(v){return v+'/100';}),
    mk('📱 FCP',am.fcp_ms||0,bm.fcp_ms||0,true,fmtMs),
    mk('📱 LCP',am.lcp_ms||0,bm.lcp_ms||0,true,fmtMs),
    mk('📱 TBT',am.tbt_ms||0,bm.tbt_ms||0,true,fmtMs),
    mk('💻 FCP',ad.fcp_ms||0,bd.fcp_ms||0,true,fmtMs),
    mk('💻 LCP',ad.lcp_ms||0,bd.lcp_ms||0,true,fmtMs),
    mk('CLS',Math.round((am.cls_val||0)*1000),Math.round((bm.cls_val||0)*1000),true,function(v){return (v/1000).toFixed(3);}),
  ];

  var aHost=a.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var bHost=b.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var ra=mkRing(a.genel||0,26,5), rb=mkRing(b.genel||0,26,5);

  function cCard(s,rv){
    var host=s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    return '<div style="background:var(--s);border:1px solid var(--b);border-radius:10px;padding:13px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" style="width:22px;height:22px;border-radius:5px" onerror="this.style.display=\'none\'">'+
      '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+EX(host)+'</div></div>'+
      '<div style="position:relative;width:60px;height:60px;display:inline-flex;align-items:center;justify-content:center">'+
      rv.svg+'<span style="position:absolute;font-size:14px;font-weight:800;color:'+rv.col+'">'+s.genel+'</span></div>'+
      '</div></div>';
  }

  cmp.innerHTML=nav+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
    cCard(a,ra)+cCard(b,rb)+'</div>'+
    '<div class="sd-box"><div class="sd-bh">Karşılaştırma</div>'+
    '<table class="cmp-tbl"><thead><tr><th>Metrik</th><th>'+EX(aHost)+'</th><th>'+EX(bHost)+'</th></tr></thead>'+
    '<tbody>'+rows.join('')+'</tbody></table></div>'+
    '<button class="se-btn" style="margin-top:10px" onclick="_sel=[];renderCmp()">↩ Farklı Seç</button>';

  window.renderCmp=renderCmp; window._sel=_sel;
}

/* ===== EVENTLER ===== */
document.getElementById('SE-inp').addEventListener('keydown',function(e){ if(e.key==='Enter') SE.add(); });

/* ===== BAŞLAT ===== */
dbLoad(); showList();

})();
</script>
