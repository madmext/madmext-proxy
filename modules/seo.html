<!-- SEO Modülü v10 minimal -->
<style>
#seoTool{padding:12px 0;color:var(--t)}.seoTop{display:flex;gap:8px;border-bottom:1px solid var(--b);padding-bottom:12px}.seoTop input{flex:1;background:var(--bg);border:1px solid var(--b2);color:var(--t);border-radius:10px;padding:11px 14px;font-weight:700}.seoTop button{background:#3ecfa0;border:0;border-radius:10px;padding:11px 18px;font-weight:900;cursor:pointer}.seoBody{padding-top:16px}.seoLoading,.seoEmpty{background:var(--s);border:1px solid var(--b);border-radius:16px;min-height:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--m)}.seoGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.seoGrid{grid-template-columns:1fr}}.seoCard,.seoSection{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:16px;margin-bottom:12px}.seoCard.mobile{border-top:3px solid #3ecfa0}.seoCard.desktop{border-top:3px solid #1a73e8}.seoCardTop{display:flex;justify-content:space-between;margin-bottom:12px}.seoDevice{font-weight:900}.seoScoreRow{display:grid;grid-template-columns:105px 1fr;gap:16px;align-items:center}.seoGauge{width:100px;height:100px;border-radius:50%;background:conic-gradient(var(--c) calc(var(--v)*1%),var(--b2) 0);display:flex;align-items:center;justify-content:center;position:relative}.seoGauge:after{content:'';position:absolute;width:74px;height:74px;border-radius:50%;background:var(--s)}.seoGauge b{position:relative;z-index:1;font-size:28px;color:var(--c)}.seoCats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.seoCat{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:10px;text-align:center}.seoVal{font-size:22px;font-weight:900}.seoLbl{font-size:9px;color:var(--m);font-weight:900;text-transform:uppercase}.seoTabs{display:flex;gap:8px;margin:12px 0}.seoTabs button{flex:1;background:var(--s);border:1px solid var(--b);color:var(--m);border-radius:10px;padding:10px;font-weight:900;cursor:pointer}.seoTabs button.on{border-color:#3ecfa0;color:#3ecfa0}.seoMetricGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b);border-radius:10px;overflow:hidden}.seoMetric{background:var(--s);padding:12px}.seoMetric b{font-size:18px}.seoSmall{font-size:10px;color:var(--m);margin-top:4px}.seoErr{background:rgba(250,62,62,.08);border:1px solid rgba(250,62,62,.35);color:#ff7777;border-radius:12px;padding:12px;font-size:12px}.seoItem{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:10px;margin-bottom:6px}.seoItem b{font-size:12px}.seoItem div{font-size:10px;color:var(--m);margin-top:5px;line-height:1.5}
</style>
<div id="seoTool"><div class="seoTop"><input id="seoUrl" value="https://www.madmext.com"><button id="seoBtn" onclick="SEO.run()">⚡ Analiz Et</button></div><div id="seoBody" class="seoBody"></div></div>
<script>
(function(){
const api='https://www.googleapis.com/pagespeedonline/v5/runPagespeed';
const categories=['PERFORMANCE','ACCESSIBILITY','BEST_PRACTICES','SEO'];
const state={url:'',mobile:null,desktop:null,me:null,de:null,active:'mobile',loading:false,text:''};
function el(id){return document.getElementById(id)}
function safe(x){return String(x||'').split('<').join('&lt;').split('>').join('&gt;')}
function color(v){v=Number(v)||0;return v>=90?'#0c6':v>=50?'#fa3':'#f33'}
function score(c,k){const v=c&&c[k]&&c[k].score;return typeof v==='number'?Math.round(v*100):null}
function norm(u){u=(u||'').trim();if(!u)return'';if(u.indexOf('http')!==0)u='https://'+u;return new URL(u).href}
async function json(url){const r=await fetch(url,{cache:'no-store'});const j=await r.json();if(!r.ok||j.error)throw new Error((j.error&&j.error.message)||('HTTP '+r.status));return j}
async function psi(url,strategy){const q=new URLSearchParams();q.set('url',url);q.set('strategy',strategy);q.set('locale','tr');categories.forEach(c=>q.append('category',c));return json(api+'?'+q.toString())}
function parse(j){const lr=j.lighthouseResult||{};const cats=lr.categories||{};const audits=lr.audits||{};function audit(k){return audits[k]||{}}function metric(k,n){const a=audit(k);return{name:n,val:a.displayValue||'-'}}const bad=Object.values(audits).filter(a=>a&&a.score!==null&&a.score!==undefined&&a.score<0.9&&a.title).slice(0,12).map(a=>({t:a.title,d:a.description||'',v:a.displayValue||''}));return{url:j.id||state.url,form:(lr.configSettings&&lr.configSettings.formFactor)||'',scores:{p:score(cats,'performance'),a:score(cats,'accessibility'),b:score(cats,'best-practices'),s:score(cats,'seo')},metrics:[metric('first-contentful-paint','FCP'),metric('largest-contentful-paint','LCP'),metric('total-blocking-time','TBT'),metric('cumulative-layout-shift','CLS'),metric('speed-index','Speed Index'),metric('interaction-to-next-paint','INP'),metric('server-response-time','TTFB')],bad:bad}}
function gauge(v){const c=color(v);return '<div class="seoGauge" style="--v:'+(v||0)+';--c:'+c+'"><b>'+((v==null)?'-':v)+'</b></div>'}
function cat(n,v){return '<div class="seoCat"><div class="seoVal" style="color:'+((v==null)?'#f33':color(v))+'">'+((v==null)?'-':v)+'</div><div class="seoLbl">'+n+'</div></div>'}
function card(kind,d,err){const isM=kind==='mobile';let h='<div class="seoCard '+kind+'"><div class="seoCardTop"><div class="seoDevice">'+(isM?'📱 Mobil':'💻 Masaüstü')+'</div><div class="seoSmall">'+(d?'Tamamlandı':err?'Hata':'Bekliyor')+'</div></div>';if(err&&!d)return h+'<div class="seoErr">'+safe(err)+'</div></div>';if(!d)return h+'<div class="seoLoading">Bekliyor</div></div>';return h+'<div class="seoScoreRow">'+gauge(d.scores.p)+'<div class="seoCats">'+cat('Performance',d.scores.p)+cat('Accessibility',d.scores.a)+cat('Best Practices',d.scores.b)+cat('SEO',d.scores.s)+'</div></div></div>'}
function detail(){const d=state.active==='mobile'?state.mobile:state.desktop;if(!d)return'';let h='<div class="seoSection"><b>'+(state.active==='mobile'?'📱 Mobil':'💻 Masaüstü')+' Detay</b><div class="seoCats" style="grid-template-columns:repeat(4,1fr);margin-top:12px">'+cat('Performance',d.scores.p)+cat('Accessibility',d.scores.a)+cat('Best Practices',d.scores.b)+cat('SEO',d.scores.s)+'</div></div>';h+='<div class="seoSection"><b>Core Web Vitals / Lab Verisi</b><div class="seoMetricGrid" style="margin-top:12px">'+d.metrics.map(m=>'<div class="seoMetric"><b>'+safe(m.val)+'</b><div class="seoSmall">'+m.name+'</div></div>').join('')+'</div></div>';h+='<div class="seoSection"><b>Fırsatlar ve Teşhisler</b><div style="margin-top:12px">'+d.bad.map(i=>'<div class="seoItem"><b>'+safe(i.t)+'</b><div>'+safe(i.v)+'</div></div>').join('')+'</div></div>';return h}
function render(){const b=el('seoBody');if(state.loading){b.innerHTML='<div class="seoLoading"><b style="color:var(--t)">'+safe(state.text)+'</b><div>Performance + Accessibility + Best Practices + SEO kategorileri alınıyor.</div></div>';return}if(!state.mobile&&!state.desktop&&!state.me&&!state.de){b.innerHTML='<div class="seoEmpty"><b style="color:var(--t)">SEO / PageSpeed Analiz Paneli</b><div>URL girip analiz et.</div></div>';return}b.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><h2 style="margin:0">SEO PageSpeed Analizi</h2><div class="seoSmall">🌐 '+safe(state.url)+'</div></div><div class="seoSmall">Son analiz: '+new Date().toLocaleString('tr-TR')+'</div></div><div class="seoGrid">'+card('mobile',state.mobile,state.me)+card('desktop',state.desktop,state.de)+'</div><div class="seoTabs"><button class="'+(state.active==='mobile'?'on':'')+'" onclick="SEO.switchTab(\'mobile\')">📱 Mobil</button><button class="'+(state.active==='desktop'?'on':'')+'" onclick="SEO.switchTab(\'desktop\')">💻 Masaüstü</button></div>'+detail()}
async function run(url){state.url=url;state.mobile=null;state.desktop=null;state.me=null;state.de=null;state.loading=true;state.text='📱 Mobil analiz alınıyor';render();el('seoBtn').disabled=true;try{state.mobile=parse(await psi(url,'MOBILE'));state.active='mobile'}catch(e){state.me=e.message||String(e)}state.text='💻 Masaüstü analiz alınıyor';render();try{state.desktop=parse(await psi(url,'DESKTOP'));if(!state.mobile)state.active='desktop'}catch(e){state.de=e.message||String(e)}state.loading=false;el('seoBtn').disabled=false;localStorage.setItem('seo_last_url',url);render()}
window.SEO={run:function(){try{const u=norm(el('seoUrl').value);if(!u){alert('URL girin');return}run(u)}catch(e){alert('Geçerli URL girin')}},switchTab:function(t){state.active=t;render()}};
setTimeout(function(){el('seoUrl').value=localStorage.getItem('seo_last_url')||'https://www.madmext.com';el('seoUrl').addEventListener('keydown',function(e){if(e.key==='Enter')SEO.run()});render()},0);
})();
</script>
