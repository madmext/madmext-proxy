<!-- SEO Modülü - PageSpeed Insights API -->
<style>
#SR{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;font-family:inherit}
#SR-top{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--b)}
#SR-sw{flex:1;position:relative}
#SR-sw::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
#SR-inp{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:10px 14px 10px 40px;font-size:13px;border-radius:10px;outline:none;font-family:inherit;transition:border-color .18s}
#SR-inp:focus{border-color:#3ecfa0}
#SR-btn{flex-shrink:0;display:flex;align-items:center;gap:7px;background:#3ecfa0;color:#fff;border:none;padding:10px 20px;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
#SR-btn:hover{opacity:.88}
#SR-btn:disabled{opacity:.5;cursor:not-allowed}
#SR-cmp-btn{flex-shrink:0;background:var(--s2);border:1.5px solid var(--b);color:var(--t);padding:9px 14px;font-size:12px;font-weight:600;border-radius:10px;cursor:pointer;white-space:nowrap;transition:border-color .15s}
#SR-cmp-btn:hover{border-color:#3ecfa0}
#SR-body{flex:1;overflow-y:auto;padding:18px 0}

/* Kartlar */
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:11px}
.sg-card{position:relative;background:var(--s);border:1px solid var(--b);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.sg-card:hover{border-color:#3ecfa0;box-shadow:0 2px 14px rgba(62,207,160,.1)}
.sg-card.sel{border-color:#3ecfa0;background:rgba(62,207,160,.05)}
.sg-fav{width:40px;height:40px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.sg-fav img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sg-info{flex:1;min-width:0}
.sg-url{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.sg-time{font-size:11px;color:var(--m)}
.sg-ring{position:relative;width:52px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sg-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.sg-rnum{position:relative;z-index:1;font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.sg-del{position:absolute;top:7px;right:8px;background:none;border:none;color:var(--m);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s}
.sg-card:hover .sg-del{opacity:1}
.sg-del:hover{background:rgba(250,62,62,.12);color:#fa3e3e}
.sg-sel-tag{position:absolute;top:7px;left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:#3ecfa0;color:#fff}
.sg-empty{text-align:center;padding:70px 20px;color:var(--m)}

/* Analiz */
#SR-detail{display:none}
.sa-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sa-back{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:border-color .15s}
.sa-back:hover{border-color:#3ecfa0}
.sa-hero{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:12px}
.sa-big-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;width:110px;height:110px;flex-shrink:0}
.sa-big-ring svg{transform:rotate(-90deg)}
.sa-big-num{position:absolute;font-size:30px;font-weight:800}
.sa-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
@media(max-width:700px){.sa-stats{grid-template-columns:repeat(2,1fr)}}
.sa-stat{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px;text-align:center}
.sa-sv{font-size:17px;font-weight:700;font-family:'DM Mono',monospace}
.sa-sl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.sa-tabs{display:flex;gap:2px;border-bottom:2px solid var(--b);margin-bottom:13px;overflow-x:auto}
.sa-tab{padding:8px 15px;font-size:12px;font-weight:600;color:var(--m);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.sa-tab.on{color:#3ecfa0;border-bottom-color:#3ecfa0}
.sa-tab:hover:not(.on){color:var(--t)}
.sa-box{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.sa-bh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--m);margin-bottom:11px}
.sa-chk{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.07)}
.sa-chk:last-child{border-bottom:none}
.sa-iss{display:flex;gap:11px;padding:10px 12px;border-radius:8px;margin-bottom:7px;border:1px solid}
.sa-iss.err{background:rgba(250,62,62,.05);border-color:rgba(250,62,62,.18)}
.sa-iss.wrn{background:rgba(240,180,41,.05);border-color:rgba(240,180,41,.18)}
.sa-iss.ok{background:rgba(62,207,160,.05);border-color:rgba(62,207,160,.18)}
.sa-iss-fix{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:5px;background:rgba(62,207,160,.08);border-left:2px solid #3ecfa0;line-height:1.6}
.sa-kw{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:rgba(24,119,242,.1);color:var(--a);border:1px solid rgba(24,119,242,.2);margin:3px}
.sa-prog{background:var(--b2);border-radius:4px;height:8px;overflow:hidden}
.sa-pfill{height:100%;border-radius:4px;transition:width .6s}
.sa-tr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(128,128,128,.07);font-size:12px}
.sa-tr:last-child{border-bottom:none}
.sa-gp{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:13px 15px;margin-bottom:12px}
.sa-gp-url{font-size:11px;color:#3ecfa0;margin-bottom:3px}
.sa-gp-title{font-size:15px;color:#1a73e8;margin-bottom:3px}
.sa-gp-desc{font-size:12px;color:var(--m);line-height:1.5}
.sa-tip{padding:9px 12px 9px 14px;border-left:3px solid #3ecfa0;border-radius:0 6px 6px 0;background:rgba(62,207,160,.06);font-size:11px;line-height:1.7;margin-bottom:7px}

/* Karsilastirma */
#SR-cmp{display:none}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{background:var(--s2);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);border-bottom:1px solid var(--b)}
.cmp-table td{padding:9px 12px;border-bottom:1px solid rgba(128,128,128,.07)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-better{color:#3ecfa0;font-weight:700}
.cmp-worse{color:#fa3e3e}
.cmp-same{color:var(--m)}

/* Spinner */
@keyframes SR-spin{to{transform:rotate(360deg)}}
.sr-spin{border-radius:50%;border:2.5px solid var(--b);border-top-color:#3ecfa0;animation:SR-spin .9s linear infinite}

/* Hiz gostergesi */
.speed-gauge{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:8px}
.speed-gauge.fast{background:rgba(62,207,160,.1);color:#3ecfa0;border:1px solid rgba(62,207,160,.2)}
.speed-gauge.avg{background:rgba(240,180,41,.1);color:#f0b429;border:1px solid rgba(240,180,41,.2)}
.speed-gauge.slow{background:rgba(250,62,62,.1);color:#fa3e3e;border:1px solid rgba(250,62,62,.2)}

/* Kaynak liste */
.res-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(128,128,128,.06);font-size:11px}
.res-item:last-child{border-bottom:none}
.res-bar-wrap{flex:1;margin:0 10px}
</style>

<div id="SR">
  <div id="SR-top">
    <div id="SR-sw">
      <input id="SR-inp" type="text" placeholder="https://madmext.com — URL gir, Enter'a bas..." autocomplete="off">
    </div>
    <button id="SR-btn" onclick="SR.add()">＋ Analiz Et</button>
    <button id="SR-cmp-btn" onclick="SR.showCmp()">⇄ Karsilastir</button>
  </div>
  <div id="SR-body">
    <div id="SR-list">
      <div id="SR-grid" class="sg-grid"></div>
      <div id="SR-empty" class="sg-empty" style="display:none">
        <div style="font-size:48px;margin-bottom:12px">🔍</div>
        <div style="font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px">Henuz analiz yapilmamis</div>
        <div style="font-size:12px;line-height:1.8">URL gir, Enter'a bas veya "Analiz Et" butonuna tikla.<br>Google PageSpeed Insights gercek verileri kullanilir.</div>
      </div>
    </div>
    <div id="SR-detail"></div>
    <div id="SR-cmp"></div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── YARDIMCILAR ── */
function ex(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function ago(iso){
  var d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60) return 'az once';
  if(d<3600) return Math.floor(d/60)+' dk once';
  if(d<86400) return Math.floor(d/3600)+' saat once';
  return Math.floor(d/86400)+' gun once';
}

function mkRing(skor,r,sw){
  var c=2*Math.PI*r, off=c-(skor/100)*c;
  var col=skor>=90?'#3ecfa0':skor>=50?'#f0b429':'#fa3e3e';
  var sz=r*2+sw*2, cx=sz/2;
  return{
    svg:'<svg width="'+sz+'" height="'+sz+'"><circle stroke-width="'+sw+'" stroke="var(--b2)" fill="transparent" r="'+r+'" cx="'+cx+'" cy="'+cx+'"></circle><circle stroke-width="'+sw+'" stroke-linecap="round" stroke="'+col+'" fill="transparent" r="'+r+'" cx="'+cx+'" cy="'+cx+'" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"></circle></svg>',
    col:col
  };
}

function fmtMs(ms){
  if(!ms && ms!==0) return '-';
  if(ms>=1000) return (ms/1000).toFixed(1)+'s';
  return Math.round(ms)+'ms';
}
function fmtKb(bytes){
  if(!bytes && bytes!==0) return '-';
  if(bytes>=1048576) return (bytes/1048576).toFixed(1)+' MB';
  if(bytes>=1024) return Math.round(bytes/1024)+' KB';
  return bytes+' B';
}

/* ── VERİ ── */
var _sites=[];
var _sel=[];

function load(){ try{_sites=JSON.parse(localStorage.getItem('seo_sites2')||'[]');}catch(e){_sites=[];} }
function save(){ try{localStorage.setItem('seo_sites2',JSON.stringify(_sites));}catch(e){} }

/* ── PAGESPEED API ── */
async function fetchPSI(url){
  var apiBase='https://www.googleapis.com/pagespeedonline/v5/runPagespeed';
  // Her iki strateji paralel cek
  var [mobRes, deskRes] = await Promise.all([
    fetch(apiBase+'?url='+encodeURIComponent(url)+'&strategy=mobile&locale=tr').then(function(r){return r.json();}),
    fetch(apiBase+'?url='+encodeURIComponent(url)+'&strategy=desktop&locale=tr').then(function(r){return r.json();})
  ]);

  if(mobRes.error){ throw new Error(mobRes.error.message||'PageSpeed API hatasi'); }

  return parsePSI(url, mobRes, deskRes);
}

function parsePSI(url, mob, desk){
  var lhr = mob.lighthouseResult || {};
  var cats = lhr.categories || {};
  var auds = lhr.audits || {};
  var meta = mob.id || url;

  // Skorlar (0-100)
  var perfScore  = Math.round((cats.performance  && cats.performance.score  || 0)*100);
  var seoScore   = Math.round((cats.seo          && cats.seo.score          || 0)*100);
  var a11yScore  = Math.round((cats.accessibility&& cats.accessibility.score|| 0)*100);
  var bpScore    = Math.round((cats['best-practices']&&cats['best-practices'].score||0)*100);
  var deskPerf   = Math.round(((desk.lighthouseResult&&desk.lighthouseResult.categories&&desk.lighthouseResult.categories.performance&&desk.lighthouseResult.categories.performance.score)||0)*100);

  // Core Web Vitals
  var fcp  = auds['first-contentful-paint'];
  var lcp  = auds['largest-contentful-paint'];
  var tbt  = auds['total-blocking-time'];
  var cls  = auds['cumulative-layout-shift'];
  var si   = auds['speed-index'];
  var tti  = auds['interactive'];
  var ttfb = auds['server-response-time'];

  // Meta bilgiler
  var titleAud = auds['document-title'];
  var metaAud  = auds['meta-description'];
  var h1Aud    = auds['heading-order'];
  var imgAlt   = auds['image-alt'];
  var robotsAud= auds['is-crawlable'];
  var canonAud = auds['canonical'];
  var hreflang = auds['hreflang'];
  var linkText = auds['link-text'];
  var tapAud   = auds['tap-targets'];
  var viewAud  = auds['viewport'];
  var charAud  = auds['charset'];
  var httpsAud = auds['is-on-https'];
  var redirectAud = auds['redirects'];
  var jsBootup = auds['bootup-time'];
  var unusedJs = auds['unused-javascript'];
  var unusedCss= auds['unused-css-rules'];
  var imgSize  = auds['uses-optimized-images'];
  var modernImg= auds['uses-webp-images'];
  var renderBlock=auds['render-blocking-resources'];
  var offscreen= auds['offscreen-images'];

  // Sayfa bilgisi
  var pageStats = lhr.audits && lhr.audits['network-requests'];
  var reqCount = 0;
  if(pageStats && pageStats.details && pageStats.details.items){
    reqCount = pageStats.details.items.length;
  }

  // Sorunlari topla
  var sorunlar = [];
  var iyiler   = [];

  function checkAudit(aud, iyi_mesaj, sorun_mesaj, cozum, seviye){
    if(!aud) return;
    if(aud.score === 1 || aud.score === null){
      iyiler.push({baslik: aud.title||iyi_mesaj, aciklama: iyi_mesaj});
    } else if(aud.score !== undefined && aud.score < 1){
      sorunlar.push({
        seviye: (aud.score < 0.5) ? seviye||'hata' : 'uyari',
        baslik: aud.title||sorun_mesaj,
        aciklama: sorun_mesaj + (aud.displayValue ? ' ('+aud.displayValue+')' : ''),
        cozum: cozum,
        etki: (aud.score < 0.5) ? 'Yuksek' : 'Orta'
      });
    }
  }

  checkAudit(httpsAud,'HTTPS aktif, guvenli baglanti.','Sayfa HTTPS kullanmiyor.','SSL sertifikasi ekleyin.','hata');
  checkAudit(robotsAud,'Sayfa arama motorlarina acik.','Sayfa indekslenemiyor (noindex veya robots engeli).','robots.txt ve meta robots etiketlerini kontrol edin.','hata');
  checkAudit(canonAud,'Canonical tag dogru ayarli.','Canonical etiket eksik veya hatali.','<link rel="canonical"> etiketi ekleyin.','uyari');
  checkAudit(titleAud,'Sayfa basligi mevcut.','Sayfa basligi eksik veya uygunsuz.','<title> etiketi ekleyin, 30-65 karakter arasi olsun.','hata');
  checkAudit(metaAud,'Meta aciklama mevcut.','Meta aciklama eksik.','<meta name="description"> ekleyin, 100-160 karakter arasi olsun.','hata');
  checkAudit(imgAlt,'Tum gorsellerde alt metni var.','Bazi gorsellerde alt metni eksik.','Tum <img> etiketlerine aciklayici alt ozelligi ekleyin.','uyari');
  checkAudit(viewAud,'Viewport meta etiketi dogru.','Viewport meta etiketi eksik.','<meta name="viewport"> ekleyin.','hata');
  checkAudit(tapAud,'Dokunma hedefleri yeterli boyutta.','Bazi dokunma hedefleri cok kucuk (mobil sorun).','Buton ve linklerin minimum 44x44px olmasini saglayin.','uyari');
  checkAudit(renderBlock,'Render bloklayan kaynak yok.','Render bloklayan CSS/JS var.','Kritik olmayan CSS/JS\'yi ertelein veya async/defer kullanin.','uyari');
  checkAudit(unusedJs,'Kullanilmayan JS yok.','Kullanilmayan JavaScript var.','Gereksiz JS kutuphanelerini kaldirin, kod bolme uygulayain.','uyari');
  checkAudit(unusedCss,'Kullanilmayan CSS yok.','Kullanilmayan CSS kurallari var.','PurgeCSS gibi araclarla kullanilmayan CSS\'yi temizleyin.','uyari');
  checkAudit(modernImg,'Gorsel formatlar modern.','Gorsel WebP/AVIF formati kullanilmiyor.','Gorselleri WebP formatina donusturun, %25-35 boyut tasarrufu saglar.','uyari');
  checkAudit(offscreen,'Gorsel lazy loading aktif.','Ekran disi gorseller on yukleniyor.','Gorsellere loading="lazy" ozelligi ekleyin.','uyari');
  checkAudit(h1Aud,'Baslik sirasi dogru.','Baslik hiyerarsisi bozuk (H1/H2/H3 sirasi yanlis).','Baslik etiketlerini dogru hiyerarsik sirada kullanin.','uyari');

  // Genel skor = SEO + Perf ortalama agirlikli
  var genelSkor = Math.round(seoScore * 0.6 + perfScore * 0.4);

  return {
    url: url,
    skor: genelSkor,
    perf_mob: perfScore,
    perf_desk: deskPerf,
    seo_skor: seoScore,
    a11y_skor: a11yScore,
    bp_skor: bpScore,
    // Core Web Vitals
    fcp: fcp && fcp.displayValue || '-',
    fcp_ms: fcp && fcp.numericValue || 0,
    lcp: lcp && lcp.displayValue || '-',
    lcp_ms: lcp && lcp.numericValue || 0,
    tbt: tbt && tbt.displayValue || '-',
    tbt_ms: tbt && tbt.numericValue || 0,
    cls: cls && cls.displayValue || '-',
    cls_val: cls && cls.numericValue || 0,
    si: si && si.displayValue || '-',
    tti: tti && tti.displayValue || '-',
    ttfb: ttfb && ttfb.displayValue || '-',
    ttfb_ms: ttfb && ttfb.numericValue || 0,
    // Meta
    req_count: reqCount,
    // Auditler
    sorunlar: sorunlar,
    iyi_yonler: iyiler,
    // Raw audit access
    _mob: mob,
    _desk: desk
  };
}

/* ── LİSTE ── */
function showList(){
  document.getElementById('SR-list').style.display='block';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='none';
  renderGrid();
}

function renderGrid(){
  var q=(document.getElementById('SR-inp').value||'').toLowerCase();
  var grid=document.getElementById('SR-grid');
  var empty=document.getElementById('SR-empty');
  var items=q?_sites.filter(function(s){return s.url.toLowerCase().includes(q);}):_sites;
  if(!items.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=items.map(function(site){
    var idx=_sites.indexOf(site);
    var skor=site.skor||0;
    var rv=mkRing(skor,22,3.5);
    var host=site.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    var fav='https://www.google.com/s2/favicons?domain='+encodeURIComponent(site.url)+'&sz=64';
    var isSel=_sel.indexOf(idx)>=0;
    return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SR.open('+idx+')">'
      +(isSel?'<span class="sg-sel-tag">Secildi</span>':'')
      +'<button class="sg-del" onclick="event.stopPropagation();SR.del('+idx+')" title="Sil">x</button>'
      +'<div class="sg-fav"><img src="'+fav+'" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'
      +'<div class="sg-info"><div class="sg-url">'+ex(host)+'</div><div class="sg-time">'+ago(site.tarih||new Date().toISOString())+'</div></div>'
      +'<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+skor+'</span></div>'
      +'</div>';
  }).join('');
}

/* ── EKLE ── */
window.SR={};

SR.add=async function(){
  var inp=document.getElementById('SR-inp');
  var btn=document.getElementById('SR-btn');
  var url=inp.value.trim();
  if(!url){inp.focus();return;}
  if(!url.startsWith('http')) url='https://'+url;

  btn.disabled=true;
  btn.textContent='Analiz ediliyor...';

  var host=url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  var tmpId='tmp_'+Date.now();
  var grid=document.getElementById('SR-grid');
  document.getElementById('SR-empty').style.display='none';
  document.getElementById('SR-list').style.display='block';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='none';
  grid.insertAdjacentHTML('afterbegin',
    '<div id="'+tmpId+'" class="sg-card" style="opacity:.55;pointer-events:none">'
    +'<div style="display:flex;align-items:center;justify-content:center;width:40px;height:40px"><div class="sr-spin" style="width:24px;height:24px"></div></div>'
    +'<div class="sg-info"><div class="sg-url">'+ex(host)+'</div><div class="sg-time">PageSpeed analiz ediliyor...</div></div>'
    +'<div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px"><div class="sr-spin" style="width:22px;height:22px"></div></div>'
    +'</div>'
  );

  try{
    var data=await fetchPSI(url);
    document.getElementById(tmpId).remove();
    var ei=_sites.findIndex(function(s){return s.url===url;});
    var obj={url:url,skor:data.skor,tarih:new Date().toISOString(),data:data};
    if(ei>=0)_sites[ei]=obj;else _sites.unshift(obj);
    if(_sites.length>20)_sites=_sites.slice(0,20);
    save();
    inp.value='';
    showList();
    SR.open(0);
  }catch(e){
    var tmp=document.getElementById(tmpId);if(tmp)tmp.remove();
    renderGrid();
    alert('Analiz hatasi: '+e.message+'\n\nURL dogru girildiginden emin olun (https:// ile baslayarak).');
  }finally{
    btn.disabled=false;
    btn.textContent='+ Analiz Et';
  }
};

SR.open=function(idx){
  var site=_sites[idx];if(!site)return;
  document.getElementById('SR-list').style.display='none';
  document.getElementById('SR-detail').style.display='block';
  document.getElementById('SR-cmp').style.display='none';
  renderDetail(idx);
};
SR.back=function(){showList();};
SR.del=function(idx){
  if(!confirm('Bu analiz silinsin mi?'))return;
  _sel=_sel.filter(function(i){return i!==idx;}).map(function(i){return i>idx?i-1:i;});
  _sites.splice(idx,1);save();renderGrid();
};
SR.reload=async function(idx){
  var site=_sites[idx];if(!site)return;
  var det=document.getElementById('SR-detail');
  det.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px"><div class="sr-spin" style="width:36px;height:36px;border-width:3px"></div><div style="font-size:12px;color:var(--m)">Yeniden analiz ediliyor...</div></div>';
  try{
    var data=await fetchPSI(site.url);
    _sites[idx].data=data;_sites[idx].skor=data.skor;_sites[idx].tarih=new Date().toISOString();
    save();renderDetail(idx);
  }catch(e){renderDetail(idx);alert('Hata: '+e.message);}
};
SR.toggleSel=function(idx,e){
  if(e)e.stopPropagation();
  var p=_sel.indexOf(idx);
  if(p>=0)_sel.splice(p,1);else{if(_sel.length>=2)_sel.shift();_sel.push(idx);}
  renderGrid();
};
SR.tab=function(tab,el,idx){
  document.querySelectorAll('.sa-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  renderTab(tab,idx);
};
SR.showCmp=function(){
  document.getElementById('SR-list').style.display='none';
  document.getElementById('SR-detail').style.display='none';
  document.getElementById('SR-cmp').style.display='block';
  renderCmp();
};

/* ── ANALİZ DETAY ── */
function renderDetail(idx){
  var site=_sites[idx];if(!site)return;
  var d=site.data||{};
  var skor=d.skor||0;
  var rv=mkRing(skor,50,9);
  var etiket=skor>=90?'Mukemmel':skor>=70?'Iyi':skor>=50?'Ortalama':'Zayif';
  var isSel=_sel.indexOf(idx)>=0;
  var ec=(d.sorunlar||[]).filter(function(s){return s.seviye==='hata';}).length;
  var wc=(d.sorunlar||[]).filter(function(s){return s.seviye==='uyari';}).length;
  var oc=(d.iyi_yonler||[]).length;

  var det=document.getElementById('SR-detail');
  det.innerHTML=
    '<div class="sa-nav">'
    +'<button class="sa-back" onclick="SR.back()">← Geri</button>'
    +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex(site.url)+'</div>'
    +'<div style="font-size:10px;color:var(--m)">'+ago(site.tarih)+' · Google PageSpeed Insights gercek verisi</div></div>'
    +'<button onclick="SR.toggleSel('+idx+',event);SR.open('+idx+')" style="background:'+(isSel?'rgba(62,207,160,.15)':'var(--s2)')+';border:1.5px solid '+(isSel?'#3ecfa0':'var(--b)')+';color:'+(isSel?'#3ecfa0':'var(--t)')+';padding:7px 13px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600">'+(isSel?'Karsilastirmada':'Karsilastir Sec')+'</button>'
    +'<button onclick="SR.reload('+idx+')" style="background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600">Yenile</button>'
    +'</div>'

    // HERO - 4 skor + ozet
    +'<div class="sa-hero">'
    +'<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'
    +'<div style="text-align:center;flex-shrink:0">'
    +'<div class="sa-big-ring">'+rv.svg+'<span class="sa-big-num" style="color:'+rv.col+'">'+skor+'</span></div>'
    +'<div style="display:inline-block;margin-top:7px;padding:3px 12px;border-radius:10px;font-size:11px;font-weight:700;background:'+(skor>=90?'rgba(62,207,160,.15)':skor>=50?'rgba(240,180,41,.15)':'rgba(250,62,62,.15)')+';color:'+rv.col+'">'+etiket+'</div>'
    +'</div>'
    +'<div style="flex:1;min-width:180px">'
    // 4 Lighthouse skoru
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">'
    +scoreBox('Perf',d.perf_mob)+scoreBox('SEO',d.seo_skor)+scoreBox('Eris',d.a11y_skor)+scoreBox('BP',d.bp_skor)
    +'</div>'
    +'<div style="display:flex;gap:14px;flex-wrap:wrap">'
    +'<span style="font-size:12px;display:flex;align-items:center;gap:5px"><span style="color:#fa3e3e">!</span><b>'+ec+'</b><span style="color:var(--m)">Hata</span></span>'
    +'<span style="font-size:12px;display:flex;align-items:center;gap:5px"><span style="color:#f0b429">△</span><b>'+wc+'</b><span style="color:var(--m)">Uyari</span></span>'
    +'<span style="font-size:12px;display:flex;align-items:center;gap:5px"><span style="color:#3ecfa0">✓</span><b>'+oc+'</b><span style="color:var(--m)">Iyi</span></span>'
    +'</div></div></div>'
    // Core Web Vitals
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px">'
    +cwv('FCP',d.fcp,d.fcp_ms,[1800,3000],'Ilk Icerik Boyama')
    +cwv('LCP',d.lcp,d.lcp_ms,[2500,4000],'En Buyuk Icerik Boyama')
    +cwv('TBT',d.tbt,d.tbt_ms,[200,600],'Toplam Bloklama Suresi')
    +cwv('CLS',d.cls,d.cls_val*1000,[100,250],'Kumulatif Duzen Kayması (x1000)')
    +cwv('SI',d.si,0,null,'Hiz Indeksi')
    +cwv('TTI',d.tti,0,null,'Etkilesime Hazir Olma')
    +'</div>'
    +'</div>'

    +'<div class="sa-tabs">'
    +tb('sorunlar','Sorunlar ('+ec+'+'+wc+')',true,idx)
    +tb('basari','Basarili ('+oc+')',false,idx)
    +tb('perf','Performans',false,idx)
    +tb('teknik','Teknik SEO',false,idx)
    +tb('oneriler','Oncelikli Aksiyonlar',false,idx)
    +'</div>'
    +'<div id="sa-tc"></div>';

  renderTab('sorunlar',idx);
}

function scoreBox(lbl,val){
  var v=val||0;
  var col=v>=90?'#3ecfa0':v>=50?'#f0b429':'#fa3e3e';
  return '<div style="text-align:center;background:var(--bg);border:1px solid var(--b);border-radius:7px;padding:7px">'
    +'<div style="font-size:18px;font-weight:700;color:'+col+'">'+v+'</div>'
    +'<div style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px">'+lbl+'</div>'
    +'</div>';
}

function cwv(lbl,display,ms,thresholds,title){
  var col='var(--m)';
  if(thresholds && ms>0){
    col=ms<=thresholds[0]?'#3ecfa0':ms<=thresholds[1]?'#f0b429':'#fa3e3e';
  }
  return '<div style="background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px 12px;text-align:center" title="'+title+'">'
    +'<div style="font-size:14px;font-weight:700;font-family:\'DM Mono\',monospace;color:'+col+'">'+ex(display||'-')+'</div>'
    +'<div style="font-size:9px;color:var(--m);font-weight:600;margin-top:2px">'+lbl+'</div>'
    +'</div>';
}

function tb(tab,lbl,on,idx){
  return '<button class="sa-tab'+(on?' on':'')+'" onclick="SR.tab(\''+tab+'\',this,'+idx+')">'+lbl+'</button>';
}

/* ── SEKME İÇERİKLERİ ── */
function renderTab(tab,idx){
  var site=_sites[idx];if(!site)return;
  var d=site.data||{};
  var tc=document.getElementById('sa-tc');if(!tc)return;

  if(tab==='sorunlar'){
    var ss=d.sorunlar||[];
    var hh=ss.filter(function(s){return s.seviye==='hata';});
    var ww=ss.filter(function(s){return s.seviye==='uyari';});
    if(!ss.length){tc.innerHTML='<div style="text-align:center;padding:40px;color:#3ecfa0;font-size:14px">Tespit edilen sorun yok!</div>';return;}
    var html='';
    if(hh.length){
      html+='<div style="font-size:10px;font-weight:700;color:#fa3e3e;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Ciddi Sorunlar - '+hh.length+' adet</div>';
      hh.forEach(function(s){
        html+='<div class="sa-iss err"><span style="font-size:16px;flex-shrink:0">🔴</span>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:600;margin-bottom:3px">'+ex(s.baslik)+'<span style="margin-left:7px;font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(250,62,62,.2);color:#fa3e3e">'+ex(s.etki||'Yuksek')+'</span></div>'
          +'<div style="font-size:11px;color:var(--m);line-height:1.6">'+ex(s.aciklama)+'</div>'
          +'<div class="sa-iss-fix">Cozum: '+ex(s.cozum)+'</div>'
          +'</div></div>';
      });
    }
    if(ww.length){
      html+='<div style="font-size:10px;font-weight:700;color:#f0b429;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">Uyarilar - '+ww.length+' adet</div>';
      ww.forEach(function(s){
        html+='<div class="sa-iss wrn"><span style="font-size:16px;flex-shrink:0">🟡</span>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:600;margin-bottom:3px">'+ex(s.baslik)+'<span style="margin-left:7px;font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(240,180,41,.2);color:#f0b429">'+ex(s.etki||'Orta')+'</span></div>'
          +'<div style="font-size:11px;color:var(--m);line-height:1.6">'+ex(s.aciklama)+'</div>'
          +'<div class="sa-iss-fix">Cozum: '+ex(s.cozum)+'</div>'
          +'</div></div>';
      });
    }
    tc.innerHTML='<div class="sa-box"><div class="sa-bh">Tespit Edilen Sorunlar</div>'+html+'</div>';
  }

  else if(tab==='basari'){
    var iy=d.iyi_yonler||[];
    if(!iy.length){tc.innerHTML='<div style="color:var(--m);font-size:12px;padding:20px">Henuz iyi yon bulunamadi.</div>';return;}
    tc.innerHTML='<div class="sa-box"><div class="sa-bh">Basarili Kontroller</div>'
      +iy.map(function(i){return '<div class="sa-iss ok"><span style="font-size:16px;flex-shrink:0">🟢</span><div><div style="font-size:12px;font-weight:600;margin-bottom:2px">'+ex(i.baslik)+'</div><div style="font-size:11px;color:var(--m);line-height:1.6">'+ex(i.aciklama)+'</div></div></div>';}).join('')
      +'</div>';
  }

  else if(tab==='perf'){
    var lhr=(d._mob&&d._mob.lighthouseResult)||{};
    var auds=lhr.audits||{};

    // Kaynak agirlik
    var resourceSummary=auds['resource-summary'];
    var resSummaryHtml='';
    if(resourceSummary&&resourceSummary.details&&resourceSummary.details.items){
      var items=resourceSummary.details.items.filter(function(i){return i.label!=='Total';});
      var total=resourceSummary.details.items.find(function(i){return i.label==='Total';});
      var maxSize=total?total.size:1;
      resSummaryHtml='<div class="sa-bh" style="margin-top:14px">Kaynak Dagilimi</div>';
      resSummaryHtml+=items.map(function(it){
        var pct=maxSize>0?Math.min(Math.round(it.size/maxSize*100),100):0;
        var col=it.label==='Script'?'#f0b429':it.label==='Image'?'#3ecfa0':'var(--a)';
        return '<div class="res-item"><span style="min-width:60px;color:var(--m)">'+ex(it.label)+'</span>'
          +'<div class="res-bar-wrap"><div class="sa-prog"><div class="sa-pfill" style="width:'+pct+'%;background:'+col+'"></div></div></div>'
          +'<span style="min-width:60px;text-align:right;font-family:\'DM Mono\',monospace;font-size:10px">'+fmtKb(it.size)+'</span>'
          +'</div>';
      }).join('');
    }

    // Performans firsatlari
    var opps=['render-blocking-resources','unused-javascript','unused-css-rules','uses-optimized-images','uses-webp-images','offscreen-images','uses-text-compression','efficient-animated-content'];
    var oppHtml=opps.map(function(key){
      var a=auds[key];if(!a||a.score===null||a.score===1)return '';
      var saved=a.details&&a.details.overallSavingsMs?'~'+fmtMs(a.details.overallSavingsMs)+' tasarruf':'';
      var col=a.score<0.5?'#fa3e3e':'#f0b429';
      return '<div class="sa-tr"><span style="color:var(--m);flex:1">'+ex(a.title)+'</span><span style="font-size:11px;font-weight:600;color:'+col+'">'+ex(a.displayValue||saved||'Sorun')+'</span></div>';
    }).join('');

    tc.innerHTML=
      '<div class="sa-box"><div class="sa-bh">Core Web Vitals Detay</div>'
      +tr2('TTFB (Sunucu Yanit)',ex(d.ttfb||'-'),(d.ttfb_ms||0)<=800?'✅':'⚠️')
      +tr2('FCP',ex(d.fcp||'-'),(d.fcp_ms||0)<=1800?'✅':(d.fcp_ms||0)<=3000?'⚠️':'🔴')
      +tr2('LCP',ex(d.lcp||'-'),(d.lcp_ms||0)<=2500?'✅':(d.lcp_ms||0)<=4000?'⚠️':'🔴')
      +tr2('TBT',ex(d.tbt||'-'),(d.tbt_ms||0)<=200?'✅':(d.tbt_ms||0)<=600?'⚠️':'🔴')
      +tr2('CLS',ex(d.cls||'-'),(d.cls_val||0)<=0.1?'✅':(d.cls_val||0)<=0.25?'⚠️':'🔴')
      +tr2('Hiz Indeksi',ex(d.si||'-'),'📊')
      +tr2('TTI',ex(d.tti||'-'),'📊')
      +'</div>'
      +'<div class="sa-box"><div class="sa-bh">Mobil vs Masaustu Performans</div>'
      +tr2('Mobil Perf Skoru',(d.perf_mob||0)+'/100',scoreCol(d.perf_mob))
      +tr2('Masaustu Perf Skoru',(d.perf_desk||0)+'/100',scoreCol(d.perf_desk))
      +'</div>'
      +(oppHtml?'<div class="sa-box"><div class="sa-bh">Performans Firsatlari</div>'+oppHtml+'</div>':'')
      +(resSummaryHtml?'<div class="sa-box">'+resSummaryHtml+'</div>':'');
  }

  else if(tab==='teknik'){
    var lhr2=(d._mob&&d._mob.lighthouseResult)||{};
    var auds2=lhr2.audits||{};

    var seoAuds=['document-title','meta-description','is-crawlable','canonical','hreflang','link-text','image-alt','robots-txt','structured-data'];
    var seoRows=seoAuds.map(function(key){
      var a=auds2[key];if(!a)return '';
      var ok=a.score===1||a.score===null;
      var ic=ok?'✅':(a.score<0.5?'🔴':'⚠️');
      return '<div class="sa-chk"><span style="font-size:13px;flex-shrink:0;margin-top:1px">'+ic+'</span><div><div style="font-size:12px;font-weight:600">'+ex(a.title)+'</div><div style="font-size:11px;color:var(--m)">'+ex(a.displayValue||a.description||'')+'</div></div></div>';
    }).join('');

    var perfAuds2=['is-on-https','uses-http2','viewport','charset','errors-in-console'];
    var perfRows2=perfAuds2.map(function(key){
      var a=auds2[key];if(!a)return '';
      var ok=a.score===1||a.score===null;
      var ic=ok?'✅':(a.score<0.5?'🔴':'⚠️');
      return '<div class="sa-chk"><span style="font-size:13px;flex-shrink:0;margin-top:1px">'+ic+'</span><div><div style="font-size:12px;font-weight:600">'+ex(a.title)+'</div><div style="font-size:11px;color:var(--m)">'+ex(a.displayValue||a.description||'')+'</div></div></div>';
    }).join('');

    tc.innerHTML=
      '<div class="sa-box"><div class="sa-bh">SEO Kontrolleri</div>'+(seoRows||'<div style="color:var(--m);font-size:12px">Veri yok</div>')+'</div>'
      +'<div class="sa-box"><div class="sa-bh">Teknik Kontroller</div>'+(perfRows2||'<div style="color:var(--m);font-size:12px">Veri yok</div>')+'</div>';
  }

  else if(tab==='oneriler'){
    // Oncelik sirasina gore duzelt
    var lhr3=(d._mob&&d._mob.lighthouseResult)||{};
    var auds3=lhr3.audits||{};
    // Potansiyel kazanim buyuk olan audit'leri bul
    var prioritized=[];
    Object.keys(auds3).forEach(function(key){
      var a=auds3[key];
      if(a.score!==null&&a.score<1&&a.details){
        var savings=0;
        if(a.details.overallSavingsMs) savings=a.details.overallSavingsMs;
        if(a.details.overallSavingsBytes) savings+=a.details.overallSavingsBytes/1000;
        prioritized.push({title:a.title,desc:a.description,display:a.displayValue,savings:savings,score:a.score});
      }
    });
    prioritized.sort(function(a,b){return b.savings-a.savings;});

    var tips=prioritized.slice(0,10).map(function(p,i){
      return '<div class="sa-tip"><b>'+(i+1)+'.</b> <b>'+ex(p.title)+'</b>'
        +(p.display?'<span style="color:#3ecfa0;margin-left:6px;font-size:10px">'+ex(p.display)+'</span>':'')
        +'<br><span style="color:var(--m)">'+ex((p.desc||'').slice(0,120))+(p.desc&&p.desc.length>120?'...':'')+'</span>'
        +'</div>';
    }).join('');

    var skor2=d.skor||0;
    var rv3=mkRing(skor2,40,7);

    tc.innerHTML=
      '<div class="sa-box"><div class="sa-bh">Oncelikli Aksiyonlar (Kazanima Gore Siralandi)</div>'
      +(tips||'<div style="color:var(--m);font-size:12px">Oneri bulunamadi.</div>')
      +'</div>'
      +'<div class="sa-box"><div class="sa-bh">Skor Durumu</div>'
      +'<div style="font-size:12px;color:var(--m);margin-bottom:10px">'
      +(skor2<50?'<b style="color:#fa3e3e">Acil mudahale gerekiyor.</b> Ciddi hatalari once cozun.'
        :skor2<75?'<b style="color:#f0b429">Iyilestirme asamasinda.</b> Uyarilari gidererek skoru artirin.'
        :'<b style="color:#3ecfa0">Iyi seviyede.</b> Ince ayarlarla mukemmele ulasabilirsiniz.')
      +'</div>'
      +'<div class="sa-prog"><div class="sa-pfill" style="width:'+skor2+'%;background:'+rv3.col+'"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:4px"><span>0</span><span>50</span><span>100</span></div>'
      +'</div>';
  }
}

function tr2(l,v,ic){
  return '<div class="sa-tr"><span style="color:var(--m)">'+ex(l)+'</span><span style="display:flex;align-items:center;gap:5px;font-family:\'DM Mono\',monospace;font-size:11px">'+ex(String(v))+' <span>'+ex(String(ic))+'</span></span></div>';
}
function scoreCol(v){
  return v>=90?'✅':v>=50?'⚠️':'🔴';
}

/* ── KARŞILAŞTIRMA ── */
function renderCmp(){
  var cmp=document.getElementById('SR-cmp');
  var a=_sites[_sel[0]],b=_sites[_sel[1]];

  var backBtn='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button class="sa-back" onclick="SR.back()">← Geri</button><div style="font-size:13px;font-weight:700">Karsilastirma</div>';

  if(_sel.length<2||!a||!b){
    cmp.innerHTML=backBtn+'</div>'
      +'<div style="font-size:12px;color:var(--m);margin-bottom:14px">Karsilastirmak icin 2 site secin. Analiz sayfalarindan "Karsilastir Sec" butonuna basin.</div>'
      +'<div class="sg-grid">'
      +_sites.map(function(s,i){
        var isSel=_sel.indexOf(i)>=0;
        var host=s.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
        var rv=mkRing(s.skor||0,18,3);
        return '<div class="sg-card'+(isSel?' sel':'')+'" onclick="SR.toggleSel('+i+',null);renderCmp()">'
          +(isSel?'<span class="sg-sel-tag">✓</span>':'')
          +'<div class="sg-fav"><img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(s.url)+'&sz=64" onerror="this.parentNode.innerHTML=\'🌐\'"></div>'
          +'<div class="sg-info"><div class="sg-url">'+ex(host)+'</div><div class="sg-time">Skor: '+s.skor+'</div></div>'
          +'<div class="sg-ring">'+rv.svg+'<span class="sg-rnum" style="color:'+rv.col+'">'+s.skor+'</span></div>'
          +'</div>';
      }).join('')
      +'</div>';
    window.renderCmp=renderCmp;
    return;
  }

  var da=a.data||{},db=b.data||{};
  var ra=mkRing(a.skor||0,38,7),rb=mkRing(b.skor||0,38,7);

  function cmpVal(va,vb,lower){
    if(lower) return va<vb?'a':va>vb?'b':'=';
    return va>vb?'a':va<vb?'b':'=';
  }

  var metrics=[
    {l:'Genel Skor',va:da.skor||0,vb:db.skor||0,lower:false,fmt:function(v){return String(v);}},
    {l:'Performans (Mobil)',va:da.perf_mob||0,vb:db.perf_mob||0,lower:false,fmt:function(v){return v+'/100';}},
    {l:'Performans (Masaustu)',va:da.perf_desk||0,vb:db.perf_desk||0,lower:false,fmt:function(v){return v+'/100';}},
    {l:'SEO Skoru',va:da.seo_skor||0,vb:db.seo_skor||0,lower:false,fmt:function(v){return v+'/100';}},
    {l:'Erisebilirlik',va:da.a11y_skor||0,vb:db.a11y_skor||0,lower:false,fmt:function(v){return v+'/100';}},
    {l:'Best Practices',va:da.bp_skor||0,vb:db.bp_skor||0,lower:false,fmt:function(v){return v+'/100';}},
    {l:'FCP',va:da.fcp_ms||0,vb:db.fcp_ms||0,lower:true,fmt:function(v){return fmtMs(v);}},
    {l:'LCP',va:da.lcp_ms||0,vb:db.lcp_ms||0,lower:true,fmt:function(v){return fmtMs(v);}},
    {l:'TBT',va:da.tbt_ms||0,vb:db.tbt_ms||0,lower:true,fmt:function(v){return fmtMs(v);}},
    {l:'CLS',va:Math.round((da.cls_val||0)*1000),vb:Math.round((db.cls_val||0)*1000),lower:true,fmt:function(v){return (v/1000).toFixed(3);}},
    {l:'TTFB',va:da.ttfb_ms||0,vb:db.ttfb_ms||0,lower:true,fmt:function(v){return fmtMs(v);}},
    {l:'HTTP Istekleri',va:da.req_count||0,vb:db.req_count||0,lower:true,fmt:function(v){return String(v);}},
  ];

  var aWins=0,bWins=0;
  metrics.forEach(function(m){var w=cmpVal(m.va,m.vb,m.lower);if(w==='a')aWins++;if(w==='b')bWins++;});

  var tableRows=metrics.map(function(m){
    var w=cmpVal(m.va,m.vb,m.lower);
    return '<tr>'
      +'<td style="color:var(--m)">'+m.l+'</td>'
      +'<td class="'+(w==='a'?'cmp-better':w==='b'?'cmp-worse':'cmp-same')+'">'+ex(m.fmt(m.va))+'</td>'
      +'<td class="'+(w==='b'?'cmp-better':w==='a'?'cmp-worse':'cmp-same')+'">'+ex(m.fmt(m.vb))+'</td>'
      +'</tr>';
  }).join('');

  function cmpCard(site,rv,wins,other){
    var host=site.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    return '<div style="background:var(--s);border:1.5px solid '+(wins>other?'#3ecfa0':'var(--b)')+';border-radius:10px;padding:14px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      +'<img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(site.url)+'&sz=64" style="width:28px;height:28px;border-radius:6px" onerror="this.style.display=\'none\'">'
      +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex(host)+'</div><div style="font-size:10px;color:var(--m)">'+ago(site.tarih)+'</div></div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +'<div style="position:relative;width:60px;height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+rv.svg+'<span style="position:absolute;font-size:17px;font-weight:800;color:'+rv.col+'">'+site.skor+'</span></div>'
      +'<div>'+(wins>other?'<div style="font-size:11px;font-weight:700;color:#3ecfa0;margin-bottom:3px">🏆 Daha Iyi</div>':'')
      +'<div style="font-size:11px;color:#3ecfa0">'+wins+' kategoride ustun</div>'
      +'<div style="font-size:11px;color:#fa3e3e">'+other+' kategoride geride</div>'
      +'</div></div></div>';
  }

  cmp.innerHTML=backBtn
    +'<button onclick="_sel=[];renderCmp()" style="margin-left:auto;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px">Yeniden Sec</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    +cmpCard(a,ra,aWins,bWins)
    +cmpCard(b,rb,bWins,aWins)
    +'</div>'
    +'<div class="sa-box"><div class="sa-bh">Detayli Karsilastirma</div>'
    +'<table class="cmp-table"><thead><tr>'
    +'<th>Metrik</th>'
    +'<th>'+ex(a.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'
    +'<th>'+ex(b.url.replace(/^https?:\/\//,'').replace(/\/$/,''))+'</th>'
    +'</tr></thead><tbody>'+tableRows+'</tbody></table>'
    +'</div>';

  window.renderCmp=renderCmp;
  window._sel=_sel;
}
