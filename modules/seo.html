<style>
#seo{padding:8px 0 40px;color:var(--t)}.box{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:14px}.top{display:flex;gap:10px}.top input{flex:1;background:var(--bg);border:1px solid var(--b2);border-radius:10px;color:var(--t);padding:12px}.top button,.btn{background:#3ecfa0;color:#07110e;border:0;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer}.btn.gray{background:var(--s2);color:var(--t);border:1px solid var(--b)}.muted{color:var(--m);font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.site{display:flex;align-items:center;gap:12px;cursor:pointer}.site:hover{border-color:#3ecfa0}.fav{width:44px;height:44px;border-radius:50%;background:var(--s2);overflow:hidden}.fav img{width:100%;height:100%}.info{flex:1;min-width:0}.u{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.circle{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--c) calc(var(--v)*1%),var(--b2) 0);position:relative}.circle:after{content:'';position:absolute;width:40px;height:40px;border-radius:50%;background:var(--s)}.circle b{z-index:1;color:var(--c)}.detail{display:none}.head{display:flex;justify-content:space-between;gap:12px;margin-bottom:14px}.cards{display:grid;grid-template-columns:180px 1fr;gap:12px}.big{display:flex;align-items:center;justify-content:center;flex-direction:column}.big .circle{width:118px;height:118px}.big .circle:after{width:86px;height:86px}.big b{font-size:34px}.cats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.cat{text-align:center}.catv{font-size:24px;font-weight:900}.catl{font-size:10px;text-transform:uppercase;color:var(--m);font-weight:900}.cols{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.check{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}.dot{width:10px;height:10px;border-radius:50%;margin-top:5px}.ok{background:#0c6}.warn{background:#fa3}.bad{background:#f33}.check b{font-size:12px}.check p{margin:2px 0 0;color:var(--m);font-size:11px}.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);padding:8px 0;font-size:12px}.err{background:rgba(250,62,62,.08);border:1px solid rgba(250,62,62,.3);color:#ff7777;border-radius:10px;padding:12px}.spin{padding:42px;text-align:center;color:var(--m)}@media(max-width:900px){.top,.cards,.cols{grid-template-columns:1fr;display:grid}.cats{grid-template-columns:repeat(2,1fr)}}
</style>
<div id="seo"><div id="list"><div class="box"><h2 style="margin:0">SEO</h2><div class="muted">İnternet sitenizin SEO analizini alın.</div><br><form class="top" onsubmit="SEOX.add(event)"><input id="url" value="https://www.madmext.com/" placeholder="https://site.com"><button id="run">Yeni Site Ekle</button></form></div><div class="box"><h3 style="margin:0 0 4px">Kayıtlı Siteler</h3><div class="muted">Kartlara tıklayarak detayları açın.</div><br><div id="sites" class="grid"></div></div></div><div id="detail" class="detail"></div></div>
<script>
(function(){
const K='mx_seo_sites3';let sites=[],active=-1;
function $(id){return document.getElementById(id)}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function norm(u){u=(u||'').trim();if(!u)return'';if(!/^https?:\/\//i.test(u))u='https://'+u;return new URL(u).href}function host(u){try{return new URL(u).hostname.replace(/^www\./,'')}catch(e){return u}}function color(v){v=Number(v)||0;return v>=85?'#0c6':v>=60?'#fa3':'#f33'}function circ(v){return `<div class="circle" style="--v:${v||0};--c:${color(v)}"><b>${v??'-'}</b></div>`}function save(){localStorage.setItem(K,JSON.stringify(sites))}function load(){try{sites=JSON.parse(localStorage.getItem(K)||'[]')}catch(e){sites=[]}}
async function pagespeed(url,strategy){let q=new URLSearchParams({url, strategy, locale:'tr'});['performance','accessibility','best-practices','seo'].forEach(c=>q.append('category',c));let r=await fetch('https://pagespeedonline.googleapis.com/pagespeedonline/v5/runPagespeed?'+q,{cache:'no-store'});let j=await r.json();if(!r.ok||j.error)throw new Error(j?.error?.message||'PageSpeed hata');return j}
function sc(c,k){let v=c?.[k]?.score;return typeof v==='number'?Math.round(v*100):null}function parse(j){let lr=j.lighthouseResult||{},c=lr.categories||{},a=lr.audits||{};let bad=Object.values(a).filter(x=>x&&x.score!==null&&x.score!==undefined&&x.score<.9&&x.title).slice(0,12);return {scores:{p:sc(c,'performance'),a:sc(c,'accessibility'),b:sc(c,'best-practices'),s:sc(c,'seo')},bad,metrics:a,final:j.id}}
async function analyze(url){let m=null,d=null,me='',de='';try{m=parse(await pagespeed(url,'mobile'))}catch(e){me=e.message}try{d=parse(await pagespeed(url,'desktop'))}catch(e){de=e.message}let base=m||d;if(!base)throw new Error(me||de||'Analiz alınamadı');let vals=[base.scores.p,base.scores.a,base.scores.b,base.scores.s].filter(x=>x!==null);let score=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);return {url,host:host(url),score,m,d,me,de,ts:Date.now()}}
function renderList(){sites.sort((a,b)=>b.ts-a.ts);$('sites').innerHTML=sites.map((s,i)=>`<div class="box site" onclick="SEOX.open(${i})"><div class="fav"><img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(s.url)}&sz=128"></div><div class="info"><div class="u">${esc(s.host)}</div><div class="muted">${new Date(s.ts).toLocaleDateString('tr-TR')} eklendi</div></div>${circ(s.score)}</div>`).join('')||'<div class="muted">Henüz site eklenmedi.</div>'}
function cat(n,v){return `<div class="box cat"><div class="catv" style="color:${color(v)}">${v??'-'}</div><div class="catl">${n}</div></div>`}function row(t,d,l){return `<div class="check"><span class="dot ${l}"></span><div><b>${esc(t)}</b><p>${esc(d||'')}</p></div></div>`}
function met(a,k){return a?.[k]?.displayValue||'-'}function renderDetail(s){let x=s.m||s.d;let a=x.metrics||{};$('list').style.display='none';$('detail').style.display='block';$('detail').innerHTML=`<div class="head"><div><button class="btn gray" onclick="SEOX.back()">← Geri</button><h2>${esc(s.host)}</h2><div class="muted">${esc(s.url)}</div></div><button class="btn" onclick="SEOX.refresh()">Analizi Yenile</button></div><div class="cards"><div class="box big">${circ(s.score)}<div class="muted">Genel SEO Skoru</div></div><div class="cats">${cat('Performans',x.scores.p)}${cat('Erişilebilirlik',x.scores.a)}${cat('En iyi',x.scores.b)}${cat('SEO',x.scores.s)}</div></div><div class="cols"><div class="box"><h3>Fırsatlar ve Teşhisler</h3>${(x.bad||[]).map(b=>row(b.title,b.displayValue||b.description,'warn')).join('')||row('Sorun yok','Önemli uyarı bulunmadı.','ok')}</div><div><div class="box"><h3>Lab Verileri</h3><div class="kv"><span>FCP</span><b>${met(a,'first-contentful-paint')}</b></div><div class="kv"><span>LCP</span><b>${met(a,'largest-contentful-paint')}</b></div><div class="kv"><span>TBT</span><b>${met(a,'total-blocking-time')}</b></div><div class="kv"><span>CLS</span><b>${met(a,'cumulative-layout-shift')}</b></div><div class="kv"><span>Speed Index</span><b>${met(a,'speed-index')}</b></div></div>${s.me?'<div class="err">Mobil: '+esc(s.me)+'</div>':''}${s.de?'<div class="err">Masaüstü: '+esc(s.de)+'</div>':''}</div></div>`}
window.SEOX={async add(e){e&&e.preventDefault();let btn=$('run');try{let u=norm($('url').value);btn.disabled=true;btn.textContent='Analiz ediliyor...';let r=await analyze(u);let i=sites.findIndex(x=>x.url===u);if(i>-1)sites[i]=r;else sites.unshift(r);save();renderList();this.open(0)}catch(err){alert('Analiz alınamadı: '+err.message)}finally{btn.disabled=false;btn.textContent='Yeni Site Ekle'}},open(i){active=i;renderDetail(sites[i])},back(){active=-1;$('detail').style.display='none';$('list').style.display='block';renderList()},async refresh(){if(active<0)return;let s=sites[active];$('detail').innerHTML='<div class="box spin">Analiz yenileniyor...</div>';let r=await analyze(s.url);sites[active]=r;save();renderDetail(r)}};
load();renderList();
})();
</script>
