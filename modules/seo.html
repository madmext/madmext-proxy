<!-- SEO Modülü v7 — PageSpeed benzeri Mobil + Masaüstü analiz -->
<style>
#SEOX{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden;font-family:inherit;color:var(--t)}
#SEOX-top{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--b);flex-shrink:0;flex-wrap:wrap}
#SEOX-urlWrap{flex:1;min-width:260px;position:relative}
#SEOX-urlWrap:before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.8}
#SEOX-url{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--b2);color:var(--t);padding:10px 14px 10px 38px;font-size:13px;border-radius:10px;outline:none;font-family:inherit}
#SEOX-url:focus{border-color:#3ecfa0}
.seox-btn{border:1.5px solid var(--b);background:var(--s2);color:var(--t);padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.seox-btn:hover{border-color:#3ecfa0;color:#3ecfa0}.seox-btn.main{background:#3ecfa0;border-color:#3ecfa0;color:#07110e}.seox-btn:disabled{opacity:.5;cursor:not-allowed}
#SEOX-body{flex:1;overflow:auto;padding:16px 0 30px}
.seox-empty{text-align:center;color:var(--m);padding:70px 20px;background:var(--s);border:1px dashed var(--b2);border-radius:16px}.seox-empty b{color:var(--t)}
.seox-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}.seox-title{font-size:17px;font-weight:800}.seox-sub{font-size:11px;color:var(--m);margin-top:4px;line-height:1.5}.seox-mini{font-size:10px;color:var(--m)}
.seox-summary{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:12px;margin-bottom:14px}@media(max-width:820px){.seox-summary{grid-template-columns:1fr}}
.seox-device-card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:16px;position:relative;overflow:hidden}.seox-device-card.mob:before{background:#3ecfa0}.seox-device-card.desk:before{background:#1a73e8}.seox-device-card:before{content:'';position:absolute;left:0;right:0;top:0;height:3px}
.seox-device-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.seox-device-name{font-size:13px;font-weight:800}.seox-device-status{font-size:10px;color:var(--m)}
.seox-score-row{display:grid;grid-template-columns:110px 1fr;gap:16px;align-items:center}@media(max-width:520px){.seox-score-row{grid-template-columns:1fr}.seox-gauge{margin:auto}}
.seox-gauge{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--score-color) calc(var(--score)*1%), var(--b2) 0)}.seox-gauge:after{content:'';position:absolute;width:82px;height:82px;background:var(--s);border-radius:50%}.seox-gauge b{position:relative;z-index:1;font-size:31px;color:var(--score-color);font-family:'DM Mono',monospace}.seox-gauge span{position:absolute;z-index:1;bottom:24px;font-size:9px;color:var(--m);font-weight:700}
.seox-cats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.seox-cat{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:10px;text-align:center}.seox-cat-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace}.seox-cat-lbl{font-size:9px;color:var(--m);font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.seox-tabs{display:flex;gap:8px;margin:12px 0}.seox-tab{flex:1;text-align:center;padding:10px 12px;border:1.5px solid var(--b);background:var(--s);border-radius:12px;cursor:pointer;color:var(--m);font-size:12px;font-weight:800}.seox-tab.on.mob{border-color:#3ecfa0;color:#3ecfa0;background:rgba(62,207,160,.08)}.seox-tab.on.desk{border-color:#1a73e8;color:#1a73e8;background:rgba(26,115,232,.08)}
.seox-section{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:15px;margin-bottom:12px}.seox-section-title{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.7px;font-weight:900;margin-bottom:12px;display:flex;justify-content:space-between;gap:8px}.seox-section-title span{color:var(--t);text-transform:none;letter-spacing:0;font-weight:700}
.seox-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b);overflow:hidden;border-radius:10px}@media(max-width:720px){.seox-metrics{grid-template-columns:repeat(2,1fr)}}.seox-metric{background:var(--s);padding:13px 12px}.seox-metric-val{font-size:20px;font-weight:900;font-family:'DM Mono',monospace}.seox-metric-name{font-size:10px;color:var(--m);font-weight:700;margin-top:4px}.seox-metric-desc{font-size:9px;color:var(--m);margin-top:3px;line-height:1.4}
.seox-list{display:flex;flex-direction:column;gap:7px}.seox-item{border:1px solid var(--b);background:var(--bg);border-radius:10px;padding:11px 12px}.seox-item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.seox-item-name{font-size:12px;font-weight:800;line-height:1.45}.seox-save{font-size:10px;font-weight:900;color:#fa3;white-space:nowrap}.seox-item-desc{font-size:10.5px;color:var(--m);line-height:1.65;margin-top:6px}.seox-ok{display:flex;align-items:center;gap:8px;font-size:11px;padding:6px 0;color:var(--m)}
.seox-loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;min-height:260px;color:var(--m);background:var(--s);border:1px solid var(--b);border-radius:16px}.seox-spin{width:34px;height:34px;border:3px solid var(--b2);border-top-color:#3ecfa0;border-radius:50%;animation:seoxSpin .8s linear infinite}@keyframes seoxSpin{to{transform:rotate(360deg)}}.seox-error{padding:18px;border:1px solid rgba(250,62,62,.35);background:rgba(250,62,62,.08);color:#ff7777;border-radius:14px;font-size:12px;line-height:1.7}
.seox-url-pill{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b);border-radius:999px;padding:6px 10px;font-size:11px;color:var(--m)}
</style>

<div id="SEOX">
  <div id="SEOX-top">
    <div id="SEOX-urlWrap"><input id="SEOX-url" type="text" placeholder="https://www.madmext.com — URL gir, Enter'a bas" autocomplete="off"></div>
    <button id="SEOX-run" class="seox-btn main" onclick="SEOX.run()">⚡ Analiz Et</button>
    <button class="seox-btn" onclick="SEOX.demoMadmext()">Madmext'i Analiz Et</button>
  </div>
  <div id="SEOX-body"></div>
</div>

<script>
(function(){
'use strict';
const API = 'https://www.googleapis.com/pagespeedonline/v5/runPagespeed';
const CATS = ['performance','accessibility','best-practices','seo'];
const TH = {fcp:[1800,3000],lcp:[2500,4000],tbt:[200,600],cls:[0.1,0.25],si:[3400,5800],inp:[200,500],ttfb:[800,1800]};
const state = {url:'', mobile:null, desktop:null, active:'mobile', loading:false};
function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function normalizeUrl(v){v=(v||'').trim(); if(!v) return ''; if(!/^https?:\/\//i.test(v)) v='https://'+v; const u=new URL(v); return u.href}
function color(score){score=Number(score)||0; return score>=90?'#0c6':score>=50?'#fa3':'#f33'}
function label(score){score=Number(score)||0; return score>=90?'İyi':score>=50?'Geliştirme Gerekir':'Zayıf'}
function metricColor(v,t){if(v===null||v===undefined||Number.isNaN(v))return '#888'; return v<=t[0]?'#0c6':v<=t[1]?'#fa3':'#f33'}
function fmtMs(v){if(v===null||v===undefined||Number.isNaN(v))return '—'; if(v>=1000)return (v/1000).toFixed(1).replace('.0','')+' sn'; return Math.round(v)+' ms'}
function fmtMetric(k,v,display){if(display)return display; if(k==='cls')return v===null||v===undefined?'—':Number(v).toFixed(3); return fmtMs(v)}
async function fetchPSI(url,strategy){
  const qs = new URLSearchParams({url, strategy, locale:'tr'});
  CATS.forEach(c=>qs.append('category',c));
  const directUrl = API + '?' + qs.toString();
  try{
    const r = await fetch(directUrl, {cache:'no-store'});
    const data = await r.json();
    if(!r.ok || data.error) throw new Error(data?.error?.message || ('HTTP '+r.status));
    return data;
  }catch(e){
    const r = await fetch('/psi?' + qs.toString(), {cache:'no-store'});
    const data = await r.json();
    if(!r.ok || data.error) throw new Error(data?.error?.message || e.message || ('HTTP '+r.status));
    return data;
  }
}
function scoreOf(cats,k){const v=cats?.[k]?.score; return typeof v==='number'?Math.round(v*100):null}
function audit(aud,key){return aud?.[key]||{}}
function parse(data){
  const lr=data.lighthouseResult||{}, cats=lr.categories||{}, aud=lr.audits||{};
  const get=(k)=>{const a=audit(aud,k); return {val:typeof a.numericValue==='number'?a.numericValue:null, disp:a.displayValue||null, title:a.title||''}};
  const m={
    fcp:{...get('first-contentful-paint'), name:'FCP', desc:'İlk içerikli boyama', th:TH.fcp},
    lcp:{...get('largest-contentful-paint'), name:'LCP', desc:'En büyük içerikli boyama', th:TH.lcp},
    tbt:{...get('total-blocking-time'), name:'TBT', desc:'Toplam engelleme süresi', th:TH.tbt},
    cls:{...get('cumulative-layout-shift'), name:'CLS', desc:'Sayfa kayması', th:TH.cls},
    si:{...get('speed-index'), name:'Speed Index', desc:'Hız endeksi', th:TH.si},
    inp:{...get('interaction-to-next-paint'), name:'INP', desc:'Etkileşim gecikmesi', th:TH.inp},
    ttfb:{...get('server-response-time'), name:'TTFB', desc:'Sunucu yanıt süresi', th:TH.ttfb}
  };
  const opportunities = Object.values(aud).filter(a=>a && a.score!==null && a.score!==undefined && a.score<0.9 && a.details?.type==='opportunity')
    .map(a=>({title:a.title,desc:String(a.description||'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1'),save:a.details?.overallSavingsMs?fmtMs(a.details.overallSavingsMs)+' tasarruf':(a.displayValue||''),score:a.score}))
    .sort((a,b)=>a.score-b.score).slice(0,10);
  const diagnostics = Object.values(aud).filter(a=>a && a.score!==null && a.score!==undefined && a.score<0.9 && a.details?.type!=='opportunity' && !['screenshot','filmstrip','debugdata'].includes(a.details?.type) && a.title)
    .map(a=>({title:a.title,desc:String(a.description||'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1'),display:a.displayValue||'',score:a.score})).sort((a,b)=>a.score-b.score).slice(0,10);
  const passed = Object.values(aud).filter(a=>a && typeof a.score==='number' && a.score>=0.9 && a.title).slice(0,14).map(a=>a.title);
  return {raw:data, finalUrl:data.id||state.url, fetched:lr.fetchTime||new Date().toISOString(), scores:{performance:scoreOf(cats,'performance'),accessibility:scoreOf(cats,'accessibility'),bestPractices:scoreOf(cats,'best-practices'),seo:scoreOf(cats,'seo')}, metrics:m, opportunities, diagnostics, passed};
}
function gauge(score){score=score??0; const c=color(score); return `<div class="seox-gauge" style="--score:${score};--score-color:${c}"><b>${score}</b><span>${label(score)}</span></div>`}
function catCard(name,val){const v=val??0,c=color(v);return `<div class="seox-cat"><div class="seox-cat-val" style="color:${c}">${val??'—'}</div><div class="seox-cat-lbl">${name}</div></div>`}
function deviceCard(kind,d){const isMob=kind==='mobile', icon=isMob?'📱':'💻', cls=isMob?'mob':'desk', title=isMob?'Mobil':'Masaüstü'; const perf=d?.scores?.performance; return `<div class="seox-device-card ${cls}"><div class="seox-device-top"><div class="seox-device-name">${icon} ${title}</div><div class="seox-device-status">${d?'Tamamlandı':'Bekliyor'}</div></div>${d?`<div class="seox-score-row">${gauge(perf)}<div class="seox-cats">${catCard('Performance',d.scores.performance)}${catCard('SEO',d.scores.seo)}${catCard('Accessibility',d.scores.accessibility)}${catCard('Best Practices',d.scores.bestPractices)}</div></div>`:`<div class="seox-loading" style="min-height:130px"><div class="seox-spin"></div><div>${title} analizi alınıyor...</div></div>`}</div>`}
function metricsHTML(d){const items=Object.entries(d.metrics);return `<div class="seox-section"><div class="seox-section-title">Core Web Vitals / Lab Verisi <span>${d.raw.lighthouseResult?.configSettings?.formFactor||''}</span></div><div class="seox-metrics">${items.map(([k,m])=>{const val=fmtMetric(k,m.val,m.disp), c=metricColor(m.val,m.th);return `<div class="seox-metric"><div class="seox-metric-val" style="color:${c}">${val}</div><div class="seox-metric-name">${m.name}</div><div class="seox-metric-desc">${m.desc}</div></div>`}).join('')}</div></div>`}
function listHTML(title,items,type){if(!items||!items.length)return '';return `<div class="seox-section"><div class="seox-section-title">${title}</div><div class="seox-list">${items.map(x=>`<div class="seox-item"><div class="seox-item-top"><div class="seox-item-name">${type==='ok'?'✅ ':''}${esc(type==='ok'?x:x.title)}</div>${x.save?`<div class="seox-save">${esc(x.save)}</div>`:''}</div>${x.desc?`<div class="seox-item-desc">${esc(x.desc).slice(0,260)}${x.desc.length>260?'…':''}</div>`:''}${x.display?`<div class="seox-item-desc">${esc(x.display)}</div>`:''}</div>`).join('')}</div></div>`}
function detailHTML(){const d=state.active==='mobile'?state.mobile:state.desktop; if(!d)return ''; const title=state.active==='mobile'?'📱 Mobil Detay':'💻 Masaüstü Detay'; return `<div class="seox-section"><div class="seox-section-title">${title}<span>${esc(d.finalUrl)}</span></div><div class="seox-cats" style="grid-template-columns:repeat(4,1fr)">${catCard('Performance',d.scores.performance)}${catCard('SEO',d.scores.seo)}${catCard('Accessibility',d.scores.accessibility)}${catCard('Best Practices',d.scores.bestPractices)}</div></div>${metricsHTML(d)}${listHTML('🚀 Fırsatlar — Hızı artırabilecek öneriler',d.opportunities,'opp')}${listHTML('🔧 Teşhis — Ek iyileştirme alanları',d.diagnostics,'diag')}${listHTML('✅ Başarılı Kontroller',d.passed,'ok')}`}
function render(){const body=$('SEOX-body'); if(state.loading){body.innerHTML=`<div class="seox-loading"><div class="seox-spin"></div><div style="font-weight:800;color:var(--t)">Mobil ve Masaüstü PageSpeed analizi alınıyor...</div><div style="font-size:11px">Google PageSpeed Insights verileri çekiliyor</div></div>`; return;} if(!state.mobile&&!state.desktop){body.innerHTML=`<div class="seox-empty"><div style="font-size:44px;margin-bottom:10px">📊</div><div style="font-size:16px;font-weight:900;color:var(--t);margin-bottom:8px">SEO / PageSpeed Analiz Paneli</div><div>URL girince aynı anda <b>Mobil</b> ve <b>Masaüstü</b> performans verileri gelir.<br>Performance, SEO, Accessibility ve Best Practices skorları ayrı gösterilir.</div></div>`;return;} body.innerHTML=`<div class="seox-head"><div><div class="seox-title">SEO PageSpeed Analizi</div><div class="seox-sub"><span class="seox-url-pill">🌐 ${esc(state.url)}</span></div></div><div class="seox-mini">Son analiz: ${new Date().toLocaleString('tr-TR')}</div></div><div class="seox-summary">${deviceCard('mobile',state.mobile)}${deviceCard('desktop',state.desktop)}</div><div class="seox-tabs"><div class="seox-tab mob ${state.active==='mobile'?'on':''}" onclick="SEOX.switch('mobile')">📱 Mobil ${state.mobile?state.mobile.scores.performance:''}</div><div class="seox-tab desk ${state.active==='desktop'?'on':''}" onclick="SEOX.switch('desktop')">💻 Masaüstü ${state.desktop?state.desktop.scores.performance:''}</div></div>${detailHTML()}`}
async function runWithUrl(url){state.url=url;state.mobile=null;state.desktop=null;state.loading=true;render();const btn=$('SEOX-run');btn.disabled=true;btn.textContent='⏳ Analiz ediliyor...';try{const [mob,desk]=await Promise.all([fetchPSI(url,'mobile'),fetchPSI(url,'desktop')]);state.mobile=parse(mob);state.desktop=parse(desk);state.active='mobile';localStorage.setItem('seox_last_url',url);}catch(e){$('SEOX-body').innerHTML=`<div class="seox-error"><b>Analiz alınamadı.</b><br>${esc(e.message||e)}<br><br>URL doğruysa tekrar deneyin. Google PageSpeed API geçici limit veya bağlantı hatası vermiş olabilir.</div>`;state.loading=false;btn.disabled=false;btn.textContent='⚡ Analiz Et';return;}state.loading=false;btn.disabled=false;btn.textContent='⚡ Analiz Et';render();}
window.SEOX={run(){try{const url=normalizeUrl($('SEOX-url').value); if(!url){alert('URL girin');return;} runWithUrl(url);}catch(e){alert('Geçerli URL girin. Örn: https://www.madmext.com')}},demoMadmext(){ $('SEOX-url').value='https://www.madmext.com'; this.run();},switch(v){state.active=v;render();}};
setTimeout(()=>{const last=localStorage.getItem('seox_last_url')||'https://www.madmext.com';$('SEOX-url').value=last;$('SEOX-url').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();SEOX.run();}});render();},0);
})();
</script>
