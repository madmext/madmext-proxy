<div class="arow">
  <button class="btn sm" onclick="loadUsers()">↻ Yenile</button>
  <button class="btn sm grn" onclick="showAddUser()">+ Kullanıcı Ekle</button>
</div>

<!-- Şifre Talepleri -->
<div id="resetRequestsWrap" style="display:none;margin-bottom:20px">
  <div class="stl">⚠ Bekleyen Şifre Sıfırlama Talepleri</div>
  <div id="resetRequestsList"></div>
</div>

<!-- Kullanıcılar Tablosu -->
<div class="stl">Kullanıcılar</div>
<div class="twrap" style="max-height:320px;margin-bottom:20px">
  <table><thead><tr>
    <th>Ad</th><th>Email</th><th>Rol</th><th>İşlem</th>
  </tr></thead>
  <tbody id="userTableBody">
    <tr><td colspan="4" style="text-align:center;padding:20px;color:var(--m)">Yükleniyor...</td></tr>
  </tbody></table>
</div>

<!-- Kullanıcı Ekle Modal -->
<div class="moverlay" id="addUserModal" style="display:none">
  <div class="modal" style="max-width:400px">
    <h3>+ Yeni Kullanıcı</h3>
    <div class="cform" style="grid-template-columns:1fr;gap:12px;padding:0;background:none;border:none">
      <div class="fg"><label>Ad Soyad</label><input type="text" id="newUserName" placeholder="Ad Soyad"></div>
      <div class="fg"><label>Email</label><input type="email" id="newUserEmail" placeholder="email@domain.com"></div>
      <div class="fg"><label>Şifre</label><input type="password" id="newUserPass" placeholder="En az 6 karakter"></div>
      <div class="fg"><label>Rol</label>
        <select id="newUserRole">
          <option value="user">Kullanıcı</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div id="addUserErr" style="color:var(--r);font-size:12px;margin-top:8px;display:none"></div>
    <div class="mbtns" style="margin-top:16px">
      <button class="btn sec" onclick="closeAddUser()">İptal</button>
      <button class="btn grn" onclick="doAddUser()">Ekle</button>
    </div>
  </div>
</div>

<!-- Şifre Sıfırla Modal -->
<div class="moverlay" id="resetPassModal" style="display:none">
  <div class="modal" style="max-width:360px">
    <h3>🔑 Şifre Sıfırla</h3>
    <div id="resetPassTarget" style="font-size:12px;color:var(--m);margin-bottom:12px"></div>
    <div class="fg"><label>Yeni Şifre</label><input type="password" id="newPassInput" placeholder="Yeni şifre"></div>
    <div class="mbtns" style="margin-top:16px">
      <button class="btn sec" onclick="document.getElementById('resetPassModal').style.display='none'">İptal</button>
      <button class="btn yel" onclick="doResetPass()">Kaydet</button>
    </div>
  </div>
</div>

<script>
var _resetTarget = null;

async function loadUsers(){
  try{
    var r = await fetch('/admin/users',{credentials:'include'});
    var users = await r.json();
    var me = window._currentUser?.email||'';
    var tbody = document.getElementById('userTableBody');
    if(!users.length){
      tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--m)">Kullanıcı yok</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(function(u){
      var isMe = u.email.toLowerCase()===me.toLowerCase();
      var roleLabel = u.role==='admin'
        ? '<span class="bge" style="background:rgba(24,119,242,.12);color:#64b4ff;border:1px solid rgba(24,119,242,.3)">Admin</span>'
        : '<span class="bge" style="background:rgba(66,183,42,.08);color:var(--g);border:1px solid rgba(66,183,42,.2)">Kullanıcı</span>';
      var actions = isMe ? '<span style="font-size:11px;color:var(--m)">— (Siz)</span>' : `
        <div style="display:flex;gap:4px">
          <button class="btn sm yel" onclick="showResetPass('${u.email}')">🔑 Şifre</button>
          <button class="btn sm sec" onclick="toggleRole('${u.email}','${u.role}')">⇄ Rol</button>
          <button class="btn sm dng" onclick="deleteUser('${u.email}')">🗑</button>
        </div>`;
      return `<tr>
        <td style="font-family:'Inter',sans-serif">${u.name||'—'}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px">${u.email}</td>
        <td>${roleLabel}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
  }catch(e){ toast('Hata: '+e.message); }
  loadResetRequests();
}

async function loadResetRequests(){
  try{
    var r = await fetch('/admin/reset-requests',{credentials:'include'});
    var reqs = await r.json();
    var pending = reqs.filter(function(x){return x.status==='pending';});
    var wrap = document.getElementById('resetRequestsWrap');
    var list = document.getElementById('resetRequestsList');
    if(!pending.length){ wrap.style.display='none'; return; }
    wrap.style.display='';
    list.innerHTML = pending.map(function(req, i){
      var t = new Date(req.time).toLocaleString('tr');
      return `<div class="lcard neu" style="margin-bottom:8px">
        <div style="flex:1">
          <div class="lname">${req.email}</div>
          <div class="lmeta">${t} · ${req.message||'Şifremi unuttum'}</div>
          ${req.user_exists?'<div class="lmeta" style="color:var(--g)">✓ Sistemde kayıtlı kullanıcı</div>':'<div class="lmeta" style="color:var(--r)">✗ Sistemde kayıtlı değil</div>'}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="btn sm grn" onclick="resolveRequest(${i},'${req.email}')">Çözüldü</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){}
}

async function resolveRequest(idx, email){
  await fetch('/admin/reset-requests/'+idx+'/resolve',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:'{}'});
  toast(email+' talebi çözüldü olarak işaretlendi');
  loadResetRequests();
}

function showAddUser(){
  document.getElementById('addUserModal').style.display='flex';
  document.getElementById('addUserErr').style.display='none';
}
function closeAddUser(){
  document.getElementById('addUserModal').style.display='none';
  ['newUserName','newUserEmail','newUserPass'].forEach(function(id){document.getElementById(id).value='';});
}

async function doAddUser(){
  var name = document.getElementById('newUserName').value.trim();
  var email = document.getElementById('newUserEmail').value.trim();
  var pass = document.getElementById('newUserPass').value;
  var role = document.getElementById('newUserRole').value;
  var err = document.getElementById('addUserErr');
  err.style.display='none';
  if(!email||!pass){err.style.display='';err.textContent='Email ve şifre zorunlu';return;}
  if(pass.length<6){err.style.display='';err.textContent='Şifre en az 6 karakter olmalı';return;}
  var r = await fetch('/admin/users',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pass,role})});
  var d = await r.json();
  if(d.ok){ toast('Kullanıcı eklendi ✓'); closeAddUser(); loadUsers(); }
  else{ err.style.display=''; err.textContent=d.error||'Hata'; }
}

function showResetPass(email){
  _resetTarget = email;
  document.getElementById('resetPassTarget').textContent=email;
  document.getElementById('newPassInput').value='';
  document.getElementById('resetPassModal').style.display='flex';
}

async function doResetPass(){
  var pass = document.getElementById('newPassInput').value;
  if(!pass||pass.length<6){toast('En az 6 karakter');return;}
  var r = await fetch('/admin/users/'+encodeURIComponent(_resetTarget)+'/reset',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
  var d = await r.json();
  if(d.ok){ toast('Şifre güncellendi ✓'); document.getElementById('resetPassModal').style.display='none'; }
  else toast('Hata: '+(d.error||'?'));
}

async function toggleRole(email, currentRole){
  var newRole = currentRole==='admin'?'user':'admin';
  if(!confirm(email+' kullanıcısının rolü '+newRole+' yapılsın mı?')) return;
  var r = await fetch('/admin/users/'+encodeURIComponent(email)+'/role',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:newRole})});
  var d = await r.json();
  if(d.ok){ toast('Rol güncellendi ✓'); loadUsers(); }
  else toast('Hata: '+(d.error||'?'));
}

async function deleteUser(email){
  if(!confirm(email+' silinsin mi? Bu işlem geri alınamaz.')) return;
  var r = await fetch('/admin/users/'+encodeURIComponent(email),{method:'DELETE',credentials:'include'});
  var d = await r.json();
  if(d.ok){ toast('Kullanıcı silindi'); loadUsers(); }
  else toast('Hata: '+(d.error||'?'));
}

loadUsers();
</script>
