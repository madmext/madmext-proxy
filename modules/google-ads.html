<style>
.gads-wrap{display:flex;flex-direction:column;height:calc(100vh - 52px);overflow:hidden}
.gads-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;flex-shrink:0;gap:8px;flex-wrap:wrap}
.gads-tabs{display:flex;gap:1px}
.gads-tab{padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--m);border:none;background:transparent;transition:all .15s}
.gads-tab.active{background:var(--g);color:#000}
.gads-tab:hover:not(.active){background:var(--b);color:var(--t)}
.gads-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px;flex-shrink:0}
@media(max-width:900px){.gads-summary{grid-template-columns:repeat(3,1fr)}}
.gads-card{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:10px 12px;position:relative;overflow:hidden}
.gads-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g)}
.gads-label{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.gads-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600}
.gads-tbl-wrap{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:auto;flex:1;min-height:0}
.gads-tbl-wrap table{width:100%;border-collapse:collapse;font-size:11px}
.gads-tbl-wrap th{background:#111;padding:8px 10px;text-align:left;color:var(--m);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--b);position:sticky;top:0;white-space:nowrap}
.gads-tbl-wrap td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;vertical-align:middle}
.gads-tbl-wrap tr:hover td{background:rgba(255,255,255,.02)}
.gads-status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-family:'DM Mono',monospace}
.gads-status-badge.aktif{background:rgba(66,183,42,.12);color:var(--g);border:1px solid rgba(66,183,42,.3)}
.gads-status-badge.pasif{background:rgba(138,141,145,.1);color:var(--m);border:1px solid rgba(138,141,145,.2)}
.gads-status-badge.sinirli{background:rgba(240,180,41,.12);color:var(--y);border:1px solid rgba(240,180,41,.3)}
.gads-type-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-family:'DM Mono',monospace;background:rgba(24,119,242,.1);color:var(--a);border:1px solid rgba(24,119,242,.2)}
.gads-connect-box{background:var(--s);border:2px dashed var(--b);border-radius:12px;padding:40px;text-align:center;margin:20px}
.gads-setup-steps{text-align:left;max-width:460px;margin:16px auto 0;font-size:12px;color:var(--m);line-height:2}
.gads-setup-steps b{color:var(--t)}
.gads-err-box{background:rgba(250,62,62,.08);border:1px solid rgba(250,62,62,.2);border-radius:8px;padding:14px 16px;margin:16px;font-size:12px;color:var(--r)}
.gads-row-actions{display:flex;gap:6px}
</style>

<div class="gads-wrap">
  <!-- Sekme + Tarih Satırı -->
  <div class="gads-row1">
    <div class="gads-tabs">
      <button class="gads-tab active" onclick="gadsTabSwitch('camp',this)">📊 Kampanyalar</button>
      <button class="gads-tab" onclick="gadsTabSwitch('adgroup',this)">📁 Reklam Grupları</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn sm sec" onclick="gadsLoad()">🔄 Yenile</button>
      <button class="dp-btn" id="gadsDpTrigger" onclick="gadsDpToggle()">
        <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14" style="flex-shrink:0;opacity:.8"><g clip-path="url(#gdpc)"><path d="M12.517 2.047h-.564v-.762a.764.764 0 0 0-1.524 0v.762H5.858v-.762a.764.764 0 0 0-1.524 0v.762h-.549a2.263 2.263 0 0 0-2.27 2.035 43.35 43.35 0 0 0 0 8.891 2.268 2.268 0 0 0 2.27 2.034h8.709a2.277 2.277 0 0 0 2.278-2.05c.305-3.146.312-6.133.015-8.89-.122-1.151-1.097-2.012-2.27-2.012v-.008zM3.03 4.234a.758.758 0 0 1 .754-.663h8.732c.38 0 .716.29.754.655.053.534.091 1.082.13 1.63H2.908c.03-.54.068-1.081.122-1.622zm2.064 9.242h-1.31a.753.753 0 0 1-.754-.663 38.75 38.75 0 0 1-.122-1.623h2.194v2.286h-.008zm0-3.81H2.84a38.099 38.099 0 0 1 0-2.285h2.256v2.285zm4.572 3.81H6.62V11.19h3.048v2.286zm0-3.81H6.62V7.381h3.048v2.285zm3.581 3.14a.767.767 0 0 1-.762.67h-1.303V11.19h2.18c-.039.533-.07 1.067-.123 1.615h.008zm.19-3.14h-2.247V7.381h2.263c.015.746.015 1.508-.016 2.285z"></path></g><defs><clipPath id="gdpc"><path d="M0 0H16V16H0z"></path></clipPath></defs></svg>
        <span id="gadsDpLabel">Son 7 gün</span>
        <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12" style="flex-shrink:0;opacity:.7"><path d="M12 6a.667.667 0 0 1 .49 1.12l-4 4.332a.667.667 0 0 1-.98 0l-4-4.333A.667.667 0 0 1 4 6h8z"></path></svg>
      </button>
      <input type="hidden" id="gadsPreset" value="LAST_7_DAYS">
      <span id="gadsStatus" style="font-size:11px;color:var(--m)"></span>
    </div>
  </div>

  <!-- Özet Kartlar -->
  <div class="gads-summary">
    <div class="gads-card"><div class="gads-label">Harcama</div><div class="gads-val" id="gads-spend">—</div></div>
    <div class="gads-card"><div class="gads-label">Dönüşüm</div><div class="gads-val" id="gads-conv" style="color:var(--g)">—</div></div>
    <div class="gads-card"><div class="gads-label">EBM</div><div class="gads-val" id="gads-cpa">—</div></div>
    <div class="gads-card"><div class="gads-label">Tıklama</div><div class="gads-val" id="gads-clicks">—</div></div>
    <div class="gads-card"><div class="gads-label">CTR</div><div class="gads-val" id="gads-ctr">—</div></div>
    <div class="gads-card"><div class="gads-label">Gösterim</div><div class="gads-val" id="gads-impr">—</div></div>
  </div>

  <!-- Tablo -->
  <div class="gads-tbl-wrap" id="gadsTblWrap">
    <div style="text-align:center;padding:60px;color:var(--m)">⏳ Yükleniyor...</div>
  </div>
</div>

<!-- Bütçe Düzenleme Modal -->
<div class="moverlay" id="gadsBModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>💰 Google Ads Bütçe Değişikliği</h3>
    <div class="mdet" id="gadsBDet" style="margin:12px 0;font-size:13px;line-height:1.8"></div>
    <div style="margin:14px 0">
      <label style="font-size:11px;color:var(--m);display:block;margin-bottom:6px">Yeni Günlük Bütçe (₺)</label>
      <input type="number" id="gadsBInput" min="1" step="1"
        style="width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--t);padding:10px 14px;border-radius:6px;font-size:15px;font-family:'DM Mono',monospace;outline:none"
        oninput="gadsBPreview()">
      <div id="gadsBPreviewTxt" style="font-size:11px;color:var(--m);margin-top:6px"></div>
    </div>
    <div class="mbtns">
      <button class="btn sec" onclick="document.getElementById('gadsBModal').style.display='none'">İptal</button>
      <button class="btn yel" onclick="gadsBApprove()">✓ Onayla</button>
    </div>
  </div>
</div>

<!-- Date Picker Popup -->
<div id="gadsDpPopup" style="display:none;position:fixed;z-index:99999">
  <div class="dp-popup-wrap">
    <div class="dp-preset-section">
      <div class="dp-preset-lbl">Hızlı Seçim</div>
      <div id="gadsDpPresets"></div>
    </div>
    <div class="dp-custom-section">
      <div class="dp-custom-lbl">Özel Aralık</div>
      <div class="dp-inputs-row">
        <div class="dp-input-group"><label>Başlangıç</label><input type="date" id="gadsDpFrom"></div>
        <div class="dp-arrow">→</div>
        <div class="dp-input-group"><label>Bitiş</label><input type="date" id="gadsDpTo"></div>
      </div>
    </div>
    <div class="dp-footer-row">
      <div class="dp-range-info" id="gadsDpRangeInfo"></div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="dp-btn-cancel" onclick="gadsDpClose()">İptal</button>
        <button class="dp-btn-apply" onclick="gadsDpApply()">Güncelle</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
var gadsTab = 'camp';
var gadsCampStore = [];
var gadsAgStore = [];
var _gadsConfigured = null; // null=bilinmiyor, true=OK, false=eksik

// ── DATE PICKER ──────────────────────────────────────────
var _gadsDpOpen = false;
var GADS_PRESETS = [
  {v:'TODAY',l:'Bugün',api:'TODAY'},
  {v:'YESTERDAY',l:'Dün',api:'YESTERDAY'},
  {v:'LAST_7_DAYS',l:'Son 7 gün',api:'LAST_7_DAYS'},
  {v:'LAST_14_DAYS',l:'Son 14 gün',api:'LAST_14_DAYS'},
  {v:'LAST_30_DAYS',l:'Son 30 gün',api:'LAST_30_DAYS'},
  {v:'THIS_MONTH',l:'Bu ay',api:'THIS_MONTH'},
  {v:'LAST_MONTH',l:'Geçen ay',api:'LAST_MONTH'},
];

function _gdpToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _gdpOffset(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _gdpFmt(iso){if(!iso)return'';var p=iso.split('-');return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('tr',{day:'numeric',month:'short',year:'numeric'});}

window.gadsDpToggle = function(){
  var pop=document.getElementById('gadsDpPopup');
  if(!pop)return;
  if(_gadsDpOpen){gadsDpClose();return;}
  var presetsEl=document.getElementById('gadsDpPresets');
  if(presetsEl&&!presetsEl.children.length){
    GADS_PRESETS.forEach(function(p){
      var row=document.createElement('div');row.className='dp-preset-item';
      var dot=document.createElement('span');dot.className='dp-preset-dot';dot.id='gdpDot_'+p.v;
      var txt=document.createElement('span');txt.textContent=p.l;
      row.appendChild(dot);row.appendChild(txt);
      row.onclick=function(){_gdpPick(p);};
      presetsEl.appendChild(row);
    });
  }
  var fi=document.getElementById('gadsDpFrom'),ti=document.getElementById('gadsDpTo');
  if(fi)fi.value=_gdpOffset(6);if(ti)ti.value=_gdpToday();
  _gdpDots('LAST_7_DAYS');
  var btn=document.getElementById('gadsDpTrigger'),rect=btn.getBoundingClientRect();
  var pw=330,left=Math.min(rect.right-pw,window.innerWidth-pw-8);if(left<8)left=8;
  if(window.innerWidth<=700){pop.style.cssText='display:block;position:fixed;bottom:0;left:0;width:100%;z-index:99999';}
  else{pop.style.cssText='display:block;position:fixed;top:'+(rect.bottom+6)+'px;left:'+left+'px;width:'+pw+'px;z-index:99999';}
  _gadsDpOpen=true;
  setTimeout(function(){document.addEventListener('mousedown',_gdpOut);},10);
};
function _gdpDots(active){
  GADS_PRESETS.forEach(function(p){
    var d=document.getElementById('gdpDot_'+p.v);
    if(d){d.style.background=p.v===active?'#1877f2':'transparent';d.style.borderColor=p.v===active?'#1877f2':'transparent';}
  });
}
function _gdpPick(p){
  document.getElementById('gadsPreset').value=p.api;
  document.getElementById('gadsDpLabel').textContent=p.l;
  gadsDpClose();
  setTimeout(gadsLoad,50);
}
window.gadsDpClose=function(){
  var pop=document.getElementById('gadsDpPopup');if(pop)pop.style.display='none';
  _gadsDpOpen=false;document.removeEventListener('mousedown',_gdpOut);
};
function _gdpOut(e){
  var pop=document.getElementById('gadsDpPopup'),btn=document.getElementById('gadsDpTrigger');
  if(pop&&!pop.contains(e.target)&&btn&&!btn.contains(e.target))gadsDpClose();
}
window.gadsDpApply=function(){
  var fi=document.getElementById('gadsDpFrom'),ti=document.getElementById('gadsDpTo');
  if(!fi||!ti||!fi.value||!ti.value){toast('Tarih seçin');return;}
  if(fi.value>ti.value){toast('Bitiş tarihi başlangıçtan önce olamaz');return;}
  // Custom range için BETWEEN formatı
  document.getElementById('gadsPreset').value='BETWEEN_'+fi.value+'_'+ti.value;
  document.getElementById('gadsDpLabel').textContent=_gdpFmt(fi.value)+' - '+_gdpFmt(ti.value);
  gadsDpClose();
  setTimeout(gadsLoad,50);
};

// ── TABS ─────────────────────────────────────────────────
window.gadsTabSwitch=function(tab,el){
  gadsTab=tab;
  document.querySelectorAll('.gads-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  gadsRender();
};

// ── LOAD ─────────────────────────────────────────────────
window.gadsLoad = async function(){
  var st=document.getElementById('gadsStatus');
  if(st)st.textContent='⏳ Yükleniyor...';
  var wrap=document.getElementById('gadsTblWrap');
  wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--m)"><div class="thinking"><div class="d"></div><div class="d"></div><div class="d"></div><span style="margin-left:8px">Google Ads verisi çekiliyor...</span></div></div>';

  var presetRaw=document.getElementById('gadsPreset').value||'LAST_7_DAYS';
  var payload={date_range: presetRaw};

  // Custom range ise BETWEEN_2024-01-01_2024-01-31 formatını parse et
  if(presetRaw.startsWith('BETWEEN_')){
    var parts=presetRaw.replace('BETWEEN_','').split('_');
    payload={date_range:'LAST_7_DAYS'}; // fallback, API'ye from/to göndereceğiz
    payload.date_from=parts[0];
    payload.date_to=parts[1];
  }

  try{
    var r=await fetch('/gads/campaigns',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    var data=await r.json();

    if(data.error){
      if(!data.configured){
        gadsShowSetup(data.error);
      } else {
        wrap.innerHTML='<div class="gads-err-box">⚠️ Google Ads API Hatası:<br><br>'+data.error+'</div>';
      }
      if(st)st.textContent='';
      return;
    }

    _gadsConfigured=true;
    var rows=data.rows||[];
    gadsCampStore=rows;

    // Özet kartları güncelle
    var totCost=0,totConv=0,totClicks=0,totImpr=0,totConvVal=0;
    rows.forEach(function(r){
      totCost+=r.cost||0;
      totConv+=r.conversions||0;
      totClicks+=r.clicks||0;
      totImpr+=r.impressions||0;
      totConvVal+=r.conversions_value||0;
    });
    var avgCTR=totImpr>0?(totClicks/totImpr*100):0;
    var avgCPA=totConv>0?(totCost/totConv):0;

    document.getElementById('gads-spend').textContent=totCost.toFixed(0)+'₺';
    document.getElementById('gads-conv').textContent=totConv.toFixed(0);
    document.getElementById('gads-cpa').textContent=avgCPA>0?avgCPA.toFixed(1)+'₺':'—';
    document.getElementById('gads-clicks').textContent=totClicks.toLocaleString('tr');
    document.getElementById('gads-ctr').textContent=avgCTR.toFixed(2)+'%';
    document.getElementById('gads-impr').textContent=totImpr.toLocaleString('tr');

    if(st)st.textContent='✓ '+rows.length+' kampanya · '+new Date().toLocaleTimeString('tr');
    gadsRender();

    // Reklam gruplarını arka planda çek
    if(gadsTab==='adgroup') gadsLoadAdgroups(presetRaw);
    else gadsLoadAdgroups(presetRaw); // önceden yükle

  }catch(e){
    wrap.innerHTML='<div class="gads-err-box">🔴 Bağlantı hatası: '+e.message+'</div>';
    if(st)st.textContent='Hata';
  }
};

// ── BÜTÇE DÜZENLEME ──────────────────────────────────────────────────
var _gadsBPending = null;

window.gadsProposeB = function(campId, name, curBudgetTL){
  _gadsBPending = {campId: campId, name: name, curTL: parseFloat(curBudgetTL)};
  var det = document.getElementById('gadsBDet');
  if(det) det.innerHTML = '<strong>'+name+'</strong><br>Mevcut bütçe: <b style="color:var(--y)">'+curBudgetTL+'₺/gün</b>';
  var inp = document.getElementById('gadsBInput');
  if(inp){ inp.value = curBudgetTL; inp.focus(); }
  document.getElementById('gadsBPreviewTxt').textContent = '';
  document.getElementById('gadsBModal').style.display = 'flex';
};

window.gadsBPreview = function(){
  if(!_gadsBPending) return;
  var inp = document.getElementById('gadsBInput');
  var newTL = parseFloat(inp.value);
  if(isNaN(newTL) || newTL <= 0) return;
  var diff = newTL - _gadsBPending.curTL;
  var pct = (_gadsBPending.curTL > 0 ? (diff/_gadsBPending.curTL*100) : 0);
  var col = diff > 0 ? 'var(--g)' : diff < 0 ? 'var(--r)' : 'var(--m)';
  document.getElementById('gadsBPreviewTxt').innerHTML =
    _gadsBPending.curTL.toFixed(0)+'₺ → <b style="color:'+col+'">'+newTL.toFixed(0)+'₺/gün</b>' +
    ' (<span style="color:'+col+'">'+(diff>=0?'+':'')+pct.toFixed(1)+'%</span>)';
};

window.gadsBApprove = async function(){
  if(!_gadsBPending) return;
  var inp = document.getElementById('gadsBInput');
  var newTL = parseFloat(inp.value);
  if(isNaN(newTL) || newTL <= 0){ toast('Geçersiz tutar'); return; }
  document.getElementById('gadsBModal').style.display = 'none';
  var st = document.getElementById('gadsStatus');
  if(st) st.textContent = '⏳ Bütçe güncelleniyor...';
  try{
    var r = await fetch('/gads/budget', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({budget_id: _gadsBPending.campId, amount_tl: newTL})
    });
    var res = await r.json();
    if(res.success){
      toast('✓ Bütçe güncellendi: '+newTL.toFixed(0)+'₺/gün');
      setTimeout(gadsLoad, 800);
    } else {
      toast('⚠️ Hata: '+(res.error||'Bilinmeyen hata'));
      if(st) st.textContent = 'Hata';
    }
  } catch(e){
    toast('Bağlantı hatası: '+e.message);
    if(st) st.textContent = '';
  }
  _gadsBPending = null;
};

// ── DURUM DEĞİŞTİR (Pause/Enable) ────────────────────────────────────
window.gadsToggleStatus = async function(campId, currentStatus){
  var newStatus = currentStatus === 'ENABLED' ? 'PAUSED' : 'ENABLED';
  var label = newStatus === 'PAUSED' ? 'duraklatılacak' : 'aktif edilecek';
  if(!confirm('Kampanya '+label+'?')) return;
  var st = document.getElementById('gadsStatus');
  if(st) st.textContent = '⏳ Güncelleniyor...';
  try{
    var r = await fetch('/gads/toggle', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({campaign_id: campId, status: newStatus})
    });
    var res = await r.json();
    if(res.success){
      toast(newStatus === 'PAUSED' ? '⏸ Kampanya duraklatıldı' : '▶ Kampanya aktif edildi');
      setTimeout(gadsLoad, 800);
    } else {
      toast('⚠️ Hata: '+(res.error||'API hatası'));
    }
  } catch(e){ toast('Bağlantı hatası: '+e.message); }
  if(st) st.textContent = '';
};

async function gadsLoadAdgroups(dateRange){
  try{
    var r=await fetch('/gads/adgroups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date_range:dateRange})});
    var data=await r.json();
    if(!data.error) gadsAgStore=data.rows||[];
    if(gadsTab==='adgroup') gadsRender();
  }catch(e){}
}

// ── RENDER ───────────────────────────────────────────────
function gadsRender(){
  var wrap=document.getElementById('gadsTblWrap');
  if(gadsTab==='camp') gadsCampRender(wrap);
  else gadsAgRender(wrap);
}

function statusBadge(s){
  var map={'ENABLED':'aktif','PAUSED':'pasif','REMOVED':'pasif','LIMITED':'sinirli'};
  var lbl={'ENABLED':'Aktif','PAUSED':'Pasif','REMOVED':'Silindi','LIMITED':'Sınırlı'};
  var cls=map[s]||'pasif';
  return '<span class="gads-status-badge '+cls+'">'+(lbl[s]||s)+'</span>';
}
function typeBadge(t){
  var map={SEARCH:'Arama',DISPLAY:'Görüntülü',SHOPPING:'Shopping',VIDEO:'Video',PERFORMANCE_MAX:'PMax',SMART:'Smart'};
  return '<span class="gads-type-badge">'+(map[t]||t||'—')+'</span>';
}
function roasColor(roas){return roas>=3?'var(--g)':roas>=1.5?'var(--y)':'var(--r)';}

function gadsCampRender(wrap){
  if(!gadsCampStore.length){
    wrap.innerHTML='<div style="text-align:center;padding:60px;color:var(--m)">📭 Kampanya verisi bulunamadı. Farklı tarih aralığı deneyin.</div>';
    return;
  }
  wrap.innerHTML='<table><thead><tr>'+
    '<th style="min-width:220px">Kampanya</th>'+
    '<th>Durum</th><th>Tür</th><th>Bütçe/Gün</th>'+
    '<th>Harcama</th><th>Dönüşüm</th><th>ROAS</th><th>EBM</th>'+
    '<th>Tıklama</th><th>CTR</th><th>Gösterim</th><th></th>'+
    '</tr></thead><tbody>'+
    gadsCampStore.map(function(r){
      var roas=r.cost>0&&r.conversions_value>0?(r.conversions_value/r.cost):0;
      var budget=r.budget_micros>0?(r.budget_micros/1000000).toFixed(0)+'₺':'—';
      return '<tr>'+
        '<td style="font-family:\'Inter\',sans-serif;font-size:12px;font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis" title="'+r.name+'">'+r.name+'</td>'+
        '<td>'+statusBadge(r.status)+'</td>'+
        '<td>'+typeBadge(r.type)+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+budget+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.cost.toFixed(0)+'₺</td>'+
        '<td style="font-family:\'DM Mono\',monospace;color:var(--g)">'+r.conversions.toFixed(0)+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace;color:'+roasColor(roas)+'">'+( roas>0?roas.toFixed(2)+'x':'—')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+( r.cpa>0?r.cpa.toFixed(1)+'₺':'—')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.clicks.toLocaleString('tr')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.ctr.toFixed(2)+'%</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.impressions.toLocaleString('tr')+'</td>'+
        '<td><div style="display:flex;gap:4px">'+
        (r.budget_micros>0?'<button class="btn sm yel" onclick="gadsProposeB(\''+r.id+'\',\''+r.name.slice(0,30)+'\',\''+Math.round(r.budget_micros/1000000)+'\')">✏️</button>':'')+
        '</div></td>'+
        '</tr>';
    }).join('')+
    '</tbody></table>';
}

  if(!gadsAgStore.length){
    wrap.innerHTML='<div style="text-align:center;padding:60px;color:var(--m)">⏳ Reklam grupları yükleniyor...</div>';
    return;
  }
  wrap.innerHTML='<table><thead><tr>'+
    '<th style="min-width:200px">Reklam Grubu</th>'+
    '<th style="min-width:180px">Kampanya</th>'+
    '<th>Durum</th><th>Harcama</th>'+
    '<th>Dönüşüm</th><th>EBM</th><th>Tıklama</th><th>CTR</th>'+
    '</tr></thead><tbody>'+
    gadsAgStore.map(function(r){
      return '<tr>'+
        '<td style="font-family:\'Inter\',sans-serif;font-size:12px;font-weight:500">'+r.name+'</td>'+
        '<td style="font-size:11px;color:var(--m)">'+r.campaign_name+'</td>'+
        '<td>'+statusBadge(r.status)+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.cost.toFixed(0)+'₺</td>'+
        '<td style="font-family:\'DM Mono\',monospace;color:var(--g)">'+r.conversions.toFixed(0)+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+(r.cpa>0?r.cpa.toFixed(1)+'₺':'—')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.clicks.toLocaleString('tr')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace">'+r.ctr.toFixed(2)+'%</td>'+
        '</tr>';
    }).join('')+
    '</tbody></table>';
}
