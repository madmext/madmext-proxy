<style>
.gads-wrap{display:flex;flex-direction:column;height:calc(100vh - 52px);overflow:hidden}
.gads-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;flex-shrink:0;gap:8px}
.gads-tabs{display:flex;gap:1px}
.gads-tab{padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--m);border:none;background:transparent;transition:all .15s}
.gads-tab.active{background:var(--g);color:#000}
.gads-tab:hover:not(.active){background:var(--b);color:var(--t)}
.gads-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px;flex-shrink:0}
@media(max-width:900px){.gads-summary{grid-template-columns:repeat(3,1fr)}}
.gads-card{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:10px 12px;position:relative;overflow:hidden}
.gads-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g)}
.gads-label{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.gads-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600}
.gads-tbl-wrap{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:auto;flex:1;min-height:0}
.gads-tbl-wrap table{width:100%;border-collapse:collapse;font-size:11px}
.gads-tbl-wrap th{background:#111;padding:8px 10px;text-align:left;color:var(--m);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--b);position:sticky;top:0;white-space:nowrap}
.gads-tbl-wrap td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;vertical-align:middle}
.gads-tbl-wrap tr:hover td{background:rgba(255,255,255,.02)}
.gads-status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-family:'DM Mono',monospace}
.gads-status-badge.aktif{background:rgba(66,183,42,.12);color:var(--g);border:1px solid rgba(66,183,42,.3)}
.gads-status-badge.pasif{background:rgba(138,141,145,.1);color:var(--m);border:1px solid rgba(138,141,145,.2)}
.gads-status-badge.sinirli{background:rgba(240,180,41,.12);color:var(--y);border:1px solid rgba(240,180,41,.3)}
.gads-empty{text-align:center;padding:60px 20px;color:var(--m)}
.gads-empty h3{font-size:16px;margin-bottom:8px;color:var(--t)}
.gads-connect-box{background:var(--s);border:2px dashed var(--b);border-radius:12px;padding:40px;text-align:center;margin:20px 0}
</style>

<div class="gads-wrap">
  <!-- Sekme Satırı -->
  <div class="gads-row1">
    <div class="gads-tabs">
      <button class="gads-tab active" id="gadsTabCamp" onclick="gadsTabSwitch('camp',this)">📊 Kampanyalar</button>
      <button class="gads-tab" id="gadsTabAdGroup" onclick="gadsTabSwitch('adgroup',this)">📁 Reklam Grupları</button>
      <button class="gads-tab" id="gadsTabAd" onclick="gadsTabSwitch('ad',this)">🖼 Reklamlar</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn sm sec" onclick="gadsLoad()">🔄 Yenile</button>
      <button class="dp-btn" id="gadsDpTrigger" onclick="gadsDpToggle()">
        <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14" style="flex-shrink:0;opacity:.8"><g clip-path="url(#gdpc)"><path d="M12.517 2.047h-.564v-.762a.764.764 0 0 0-1.524 0v.762H5.858v-.762a.764.764 0 0 0-1.524 0v.762h-.549a2.263 2.263 0 0 0-2.27 2.035 43.35 43.35 0 0 0 0 8.891 2.268 2.268 0 0 0 2.27 2.034h8.709a2.277 2.277 0 0 0 2.278-2.05c.305-3.146.312-6.133.015-8.89-.122-1.151-1.097-2.012-2.27-2.012v-.008zM3.03 4.234a.758.758 0 0 1 .754-.663h8.732c.38 0 .716.29.754.655.053.534.091 1.082.13 1.63H2.908c.03-.54.068-1.081.122-1.622zm2.064 9.242h-1.31a.753.753 0 0 1-.754-.663 38.75 38.75 0 0 1-.122-1.623h2.194v2.286h-.008zm0-3.81H2.84a38.099 38.099 0 0 1 0-2.285h2.256v2.285zm4.572 3.81H6.62V11.19h3.048v2.286zm0-3.81H6.62V7.381h3.048v2.285zm3.581 3.14a.767.767 0 0 1-.762.67h-1.303V11.19h2.18c-.039.533-.07 1.067-.123 1.615h.008zm.19-3.14h-2.247V7.381h2.263c.015.746.015 1.508-.016 2.285z"></path></g><defs><clipPath id="gdpc"><path d="M0 0H16V16H0z"></path></clipPath></defs></svg>
        <span id="gadsDpLabel">Son 7 gün</span>
        <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12" style="flex-shrink:0;opacity:.7"><path d="M12 6a.667.667 0 0 1 .49 1.12l-4 4.332a.667.667 0 0 1-.98 0l-4-4.333A.667.667 0 0 1 4 6h8z"></path></svg>
      </button>
      <input type="hidden" id="gadsPreset" value="last_7d">
      <input type="hidden" id="gadsFrom">
      <input type="hidden" id="gadsTo">
    </div>
  </div>

  <!-- Özet Kartlar -->
  <div class="gads-summary">
    <div class="gads-card"><div class="gads-label">Harcama</div><div class="gads-val" id="gads-spend">—</div></div>
    <div class="gads-card"><div class="gads-label">Dönüşüm</div><div class="gads-val" id="gads-conv" style="color:var(--g)">—</div></div>
    <div class="gads-card"><div class="gads-label">EBM</div><div class="gads-val" id="gads-cpa">—</div></div>
    <div class="gads-card"><div class="gads-label">Tıklama</div><div class="gads-val" id="gads-clicks">—</div></div>
    <div class="gads-card"><div class="gads-label">CTR</div><div class="gads-val" id="gads-ctr">—</div></div>
    <div class="gads-card"><div class="gads-label">Gösterim</div><div class="gads-val" id="gads-impr">—</div></div>
  </div>

  <!-- Tablo -->
  <div class="gads-tbl-wrap" id="gadsTblWrap">
    <div class="gads-connect-box">
      <div style="font-size:32px;margin-bottom:12px">🟢</div>
      <h3>Google Ads Entegrasyonu</h3>
      <p style="font-size:12px;color:var(--m);margin-bottom:20px;max-width:400px;margin-left:auto;margin-right:auto">Google Ads kampanyalarınızı buradan yönetmek için entegrasyon yapılandırmanız gerekiyor. Şu an demo verisi gösterilmektedir.</p>
      <button class="btn" onclick="gadsLoadDemo()">📊 Demo Veriyi Göster</button>
    </div>
  </div>
</div>

<script>
(function(){
var gadsTab = 'camp';
var gadsData = {camp:[], adgroup:[], ad:[]};

window.gadsTabSwitch = function(tab, el){
  gadsTab = tab;
  document.querySelectorAll('.gads-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  gadsRender();
};

window.gadsLoad = function(){
  // Gerçek Google Ads API entegrasyonu için placeholder
  // Şimdilik demo göster
};

window.gadsLoadDemo = function(){
  // Demo veri
  gadsData.camp = [
    {name:'Erkek Giyim - Search', status:'ENABLED', budget:'500₺/gün', spend:'3.240', conv:'89', cpa:'36.4', clicks:'1.240', ctr:'4.8%', impr:'25.800'},
    {name:'Kadın Giyim - Shopping', status:'ENABLED', budget:'750₺/gün', spend:'4.890', conv:'134', cpa:'36.5', clicks:'2.100', ctr:'3.2%', impr:'65.600'},
    {name:'Brand Kampanyası', status:'ENABLED', budget:'200₺/gün', spend:'890', conv:'42', cpa:'21.2', clicks:'580', ctr:'12.4%', impr:'4.700'},
    {name:'Remarketing - Sepet', status:'ENABLED', budget:'300₺/gün', spend:'1.240', conv:'56', cpa:'22.1', clicks:'340', ctr:'8.9%', impr:'3.820'},
    {name:'Sezon Sonu İndirim', status:'PAUSED', budget:'400₺/gün', spend:'0', conv:'0', cpa:'—', clicks:'0', ctr:'0%', impr:'0'},
  ];
  // Toplam hesapla
  var totSpend=0,totConv=0,totClicks=0,totImpr=0;
  gadsData.camp.forEach(function(r){
    totSpend+=parseFloat(r.spend.replace(',','.')||0);
    totConv+=parseInt(r.conv||0);
    totClicks+=parseInt(r.clicks.replace(',','.')||0);
    totImpr+=parseInt(r.impr.replace(',','.')||0);
  });
  var avgCTR=totImpr>0?(totClicks/totImpr*100):0;
  var avgCPA=totConv>0?(totSpend/totConv):0;

  document.getElementById('gads-spend').textContent=totSpend.toFixed(0)+'₺';
  document.getElementById('gads-conv').textContent=totConv;
  document.getElementById('gads-cpa').textContent=avgCPA.toFixed(1)+'₺';
  document.getElementById('gads-clicks').textContent=totClicks.toLocaleString('tr');
  document.getElementById('gads-ctr').textContent=avgCTR.toFixed(1)+'%';
  document.getElementById('gads-impr').textContent=totImpr.toLocaleString('tr');

  gadsRender();
};

function gadsRender(){
  var wrap = document.getElementById('gadsTblWrap');
  var data = gadsData[gadsTab]||[];
  if(!data.length){
    wrap.innerHTML = '<div class="gads-connect-box"><div style="font-size:32px;margin-bottom:12px">🟢</div><h3>Google Ads Entegrasyonu</h3><p style="font-size:12px;color:var(--m);margin-bottom:20px">Google Ads kampanyalarınızı yönetmek için entegrasyon yapılandırın.</p><button class="btn" onclick="gadsLoadDemo()">📊 Demo Veriyi Göster</button></div>';
    return;
  }
  if(gadsTab==='camp'){
    wrap.innerHTML = `<table><thead><tr>
      <th style="min-width:240px">Kampanya</th>
      <th>Durum</th><th>Bütçe</th><th>Harcama</th>
      <th>Dönüşüm</th><th>EBM</th><th>Tıklama</th><th>CTR</th><th>Gösterim</th>
    </tr></thead><tbody>${data.map(function(r){
      var active = r.status==='ENABLED';
      return `<tr>
        <td style="font-family:'Inter',sans-serif;font-size:12px;font-weight:500">${r.name}</td>
        <td><span class="gads-status-badge ${active?'aktif':'pasif'}">${active?'Aktif':'Pasif'}</span></td>
        <td>${r.budget}</td>
        <td>${r.spend}₺</td>
        <td style="color:var(--g)">${r.conv}</td>
        <td>${r.cpa}₺</td>
        <td>${r.clicks}</td>
        <td>${r.ctr}</td>
        <td>${r.impr}</td>
      </tr>`;}).join('')}</tbody></table>`;
  }
}
})();

// ── Google Ads Date Picker ────────────────────────────────
var _gadsDpOpen = false;
var GADS_PRESETS = [
  {v:'today',l:'Bugün'},{v:'yesterday',l:'Dün'},
  {v:'last_7d',l:'Son 7 gün'},{v:'last_14d',l:'Son 14 gün'},
  {v:'last_30d',l:'Son 30 gün'},{v:'this_month',l:'Bu ay'},
  {v:'last_month',l:'Geçen ay'},{v:'maximum',l:'Maksimum'}
];
function _gadsDpToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _gadsDpOffset(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _gadsDpFmt(iso){if(!iso)return'';var p=iso.split('-');return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('tr',{day:'numeric',month:'short',year:'numeric'});}

window.gadsDpToggle = function(){
  var pop = document.getElementById('gadsDpPopup');
  if(!pop) return;
  if(_gadsDpOpen){gadsDpClose();return;}
  // Presetleri oluştur
  var presetsEl = document.getElementById('gadsDpPresets');
  if(presetsEl && !presetsEl.children.length){
    GADS_PRESETS.forEach(function(p){
      var row=document.createElement('div');row.className='dp-preset-item';
      var dot=document.createElement('span');dot.className='dp-preset-dot';dot.id='gadsDpDot_'+p.v;
      var txt=document.createElement('span');txt.textContent=p.l;
      row.appendChild(dot);row.appendChild(txt);
      row.onclick=function(){_gadsDpPick(p.v,p.l);};
      presetsEl.appendChild(row);
    });
  }
  var fi=document.getElementById('gadsDpFrom'),ti=document.getElementById('gadsDpTo');
  if(fi)fi.value=_gadsDpOffset(6);if(ti)ti.value=_gadsDpToday();
  _gadsDpDots('last_7d');
  var btn=document.getElementById('gadsDpTrigger'),rect=btn.getBoundingClientRect();
  var pw=330,left=Math.min(rect.right-pw,window.innerWidth-pw-8);if(left<8)left=8;
  if(window.innerWidth<=700){pop.style.cssText='display:block;position:fixed;bottom:0;left:0;width:100%;z-index:99999';}
  else{pop.style.cssText='display:block;position:fixed;top:'+(rect.bottom+6)+'px;left:'+left+'px;width:'+pw+'px;z-index:99999';}
  _gadsDpOpen=true;
  setTimeout(function(){document.addEventListener('mousedown',_gadsDpOut);},10);
};

function _gadsDpDots(active){
  GADS_PRESETS.forEach(function(p){
    var d=document.getElementById('gadsDpDot_'+p.v);
    if(d){d.style.background=p.v===active?'#1877f2':'transparent';d.style.borderColor=p.v===active?'#1877f2':'transparent';}
  });
}

function _gadsDpPick(val,label){
  var from='',to=_gadsDpToday();
  if(val==='today'){from=to;}
  else if(val==='yesterday'){from=_gadsDpOffset(1);to=_gadsDpOffset(1);}
  else if(val==='last_7d'){from=_gadsDpOffset(6);}
  else if(val==='last_14d'){from=_gadsDpOffset(13);}
  else if(val==='last_30d'){from=_gadsDpOffset(29);}
  else if(val==='this_month'){var n=new Date();from=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01';}
  else if(val==='last_month'){var n=new Date();n.setDate(0);to=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');n.setDate(1);from=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01';}
  else if(val==='maximum'){from='2020-01-01';}
  var pre=document.getElementById('gadsPreset'),mFr=document.getElementById('gadsFrom'),mTo=document.getElementById('gadsTo');
  if(pre)pre.value=val;if(mFr)mFr.value='';if(mTo)mTo.value='';
  var lbl=document.getElementById('gadsDpLabel');if(lbl)lbl.textContent=label;
  gadsDpClose();
  setTimeout(gadsLoadDemo,50);
}

window.gadsDpClose = function(){
  var pop=document.getElementById('gadsDpPopup');if(pop)pop.style.display='none';
  _gadsDpOpen=false;document.removeEventListener('mousedown',_gadsDpOut);
};
function _gadsDpOut(e){
  var pop=document.getElementById('gadsDpPopup'),btn=document.getElementById('gadsDpTrigger');
  if(pop&&!pop.contains(e.target)&&btn&&!btn.contains(e.target))gadsDpClose();
}
window.gadsDpApply = function(){
  var fi=document.getElementById('gadsDpFrom'),ti=document.getElementById('gadsDpTo');
  if(!fi||!ti||!fi.value||!ti.value){toast('Tarih seçin');return;}
  if(fi.value>ti.value){toast('Bitiş tarihi başlangıçtan önce olamaz');return;}
  var pre=document.getElementById('gadsPreset'),mFr=document.getElementById('gadsFrom'),mTo=document.getElementById('gadsTo');
  if(pre)pre.value='custom';if(mFr)mFr.value=fi.value;if(mTo)mTo.value=ti.value;
  var lbl=document.getElementById('gadsDpLabel');if(lbl)lbl.textContent=_gadsDpFmt(fi.value)+' - '+_gadsDpFmt(ti.value);
  gadsDpClose();
  setTimeout(gadsLoadDemo,50);
};
</script>

<!-- Google Ads Date Picker Popup -->
<div id="gadsDpPopup" style="display:none;position:fixed;z-index:99999">
  <div class="dp-popup-wrap">
    <div class="dp-preset-section">
      <div class="dp-preset-lbl">Hızlı Seçim</div>
      <div id="gadsDpPresets"></div>
    </div>
    <div class="dp-custom-section">
      <div class="dp-custom-lbl">Özel Aralık</div>
      <div class="dp-inputs-row">
        <div class="dp-input-group"><label>Başlangıç</label><input type="date" id="gadsDpFrom"></div>
        <div class="dp-arrow">→</div>
        <div class="dp-input-group"><label>Bitiş</label><input type="date" id="gadsDpTo"></div>
      </div>
    </div>
    <div class="dp-footer-row">
      <div class="dp-range-info" id="gadsDpRangeInfo"></div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="dp-btn-cancel" onclick="gadsDpClose()">İptal</button>
        <button class="dp-btn-apply" onclick="gadsDpApply()">Güncelle</button>
      </div>
    </div>
  </div>
</div>
