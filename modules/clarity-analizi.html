<style>
.cl-wrap{display:flex;flex-direction:column;gap:14px}.cl-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.cl-status{margin-left:auto;font:11px 'DM Mono',monospace;color:var(--m)}.cl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.cl-card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;position:relative;overflow:hidden}.cl-card:before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--a)}.cl-card.warn:before{background:var(--y)}.cl-card.bad:before{background:var(--r)}.cl-card.good:before{background:var(--g)}.cl-label{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.8px}.cl-value{font:22px 'DM Mono',monospace;margin-top:5px}.cl-note{font-size:11px;color:var(--m);line-height:1.6;margin-top:5px}.cl-tabs{display:flex;gap:6px;overflow:auto;padding-bottom:2px}.cl-tab{border:1px solid var(--b);background:var(--s);color:var(--m);padding:7px 10px;border-radius:6px;white-space:nowrap;cursor:pointer;font-size:11px}.cl-tab.active,.cl-tab:hover{color:var(--t);border-color:var(--a)}.cl-panel{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px}.cl-table{background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:auto;max-height:560px}.cl-empty{padding:30px;text-align:center;color:var(--m)}.cl-pill{display:inline-block;padding:2px 6px;border-radius:4px;background:var(--s2);border:1px solid var(--b);font:10px 'DM Mono',monospace}.cl-error{color:var(--r)}.cl-ok{color:var(--g)}.cl-warn{color:var(--y)}.cl-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.cl-filter input{background:var(--s2);border:1px solid var(--b2);color:var(--t);padding:7px 10px;border-radius:5px;min-width:220px}.cl-insights{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}.cl-insight{background:var(--bg);border:1px solid var(--b);border-left:3px solid var(--a);border-radius:6px;padding:12px}.cl-insight.warn{border-left-color:var(--y)}.cl-insight.bad{border-left-color:var(--r)}.cl-insight strong{display:block;margin-bottom:5px}.cl-insight p{color:var(--m);font-size:11px;line-height:1.6}.cl-mono{font-family:'DM Mono',monospace}.cl-progress{height:7px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:7px}.cl-progress>span{display:block;height:100%;background:var(--a)}
</style>
<div class="cl-wrap">
  <div class="cl-toolbar">
    <select id="clDays"><option value="3">Son 3 gün</option><option value="2">Son 2 gün</option><option value="1">Son 1 gün</option></select>
    <button class="btn sm" id="clRefresh">↻ Paneli Yenile</button>
    <button class="btn sm sec" id="clSync">Clarity'den Tam Senkronizasyon</button>
    <span class="cl-status" id="clStatusText">Durum kontrol ediliyor…</span>
  </div>
  <div class="cl-tabs" id="clTabs"></div>
  <div class="cl-grid" id="clCards"></div>
  <div class="cl-panel" id="clInsightPanel"></div>
  <div class="cl-panel cl-filter">
    <input id="clSearch" placeholder="Metrik, URL, kaynak, kampanya veya cihaz ara…">
    <select id="clMetricFilter"><option value="">Tüm metrikler</option></select>
    <button class="btn sm sec" id="clClear">Temizle</button>
    <span class="cl-status" id="clResultCount"></span>
  </div>
  <div class="cl-table" id="clTable"><div class="cl-empty">Clarity verileri yükleniyor…</div></div>
</div>
<script>
(function(){
var sections={overview:'Genel Bakış',friction:'Etkileşim Sorunları',pages:'Sayfa & URL Analizi',traffic:'Trafik Kaynakları',technology:'Cihaz & Teknoloji',geography:'Ülke & Bölge',campaigns:'Kampanya Analizi',raw:'Ham Veri Gezgini',sync:'Senkronizasyon',health:'Veri Sağlığı'};
var sectionDimensions={pages:'URL',traffic:'Source',technology:'Device',geography:'Country/Region',campaigns:'Campaign'};
var state={status:null,rows:[],visible:[]};
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function sec(){return window._moduleSection||'overview'}
function lower(v){return String(v==null?'':v).toLowerCase()}
function metricVal(row,names){var m=row.metrics||{};for(var i=0;i<names.length;i++){for(var k in m){if(lower(k)===lower(names[i])&&!isNaN(Number(m[k])))return Number(m[k]);}}return 0}
function sum(names,rows){return (rows||state.rows).reduce(function(a,r){return a+metricVal(r,names)},0)}
function renderTabs(){var el=document.getElementById('clTabs');el.innerHTML=Object.keys(sections).map(function(k){return '<button class="cl-tab '+(sec()===k?'active':'')+'" data-s="'+k+'">'+sections[k]+'</button>'}).join('');el.querySelectorAll('button').forEach(function(b){b.onclick=function(){nav('clarity-analizi',null,b.dataset.s)}})}
function renderStatus(){var s=state.status||{};document.getElementById('clStatusText').innerHTML=s.ok?'<span class="cl-ok">● Bağlı</span> · Kota '+(s.used_today||0)+'/'+(s.daily_limit||10)+' · Son: '+esc(s.last_run&&s.last_run.completed_at||'Henüz yok'):'<span class="cl-error">● Bağlantı sorunu</span>'}
function baseRows(){var d=sectionDimensions[sec()];if(!d)return state.rows;return state.rows.filter(function(r){return r.dimension1===d})}
function applyFilters(){var q=lower(document.getElementById('clSearch').value);var mf=document.getElementById('clMetricFilter').value;state.visible=baseRows().filter(function(r){if(mf&&r.metric_name!==mf)return false;if(!q)return true;return lower(JSON.stringify(r)).indexOf(q)>-1});document.getElementById('clResultCount').textContent=state.visible.length+' kayıt';renderTable()}
function renderMetricOptions(){var set={};state.rows.forEach(function(r){set[r.metric_name]=1});var el=document.getElementById('clMetricFilter'),cur=el.value;el.innerHTML='<option value="">Tüm metrikler</option>'+Object.keys(set).sort().map(function(k){return '<option>'+esc(k)+'</option>'}).join('');el.value=cur}
function renderCards(){var rows=baseRows(),s=state.status||{};var metrics={};rows.forEach(function(r){metrics[r.metric_name]=1});var rage=sum(['Rage Clicks','Rage Click'],rows),dead=sum(['Dead Clicks','Dead Click'],rows),quick=sum(['Quick Backs','Quickback','Quick Back'],rows),errors=sum(['Script Errors','Script Error','Error Clicks'],rows);var cards=[['Kayıt',rows.length,''],['Metrik Türü',Object.keys(metrics).length,''],['Kalan Kota',s.remaining_today==null?'—':s.remaining_today,s.remaining_today===0?'bad':s.remaining_today<4?'warn':'good'],['Rage Click',rage,rage>0?'warn':'good'],['Dead Click',dead,dead>0?'warn':'good'],['Quick Back',quick,quick>0?'warn':'good'],['Script / Error',errors,errors>0?'bad':'good']];document.getElementById('clCards').innerHTML=cards.map(function(c){return '<div class="cl-card '+c[2]+'"><div class="cl-label">'+c[0]+'</div><div class="cl-value">'+c[1]+'</div></div>'}).join('')}
function renderInsights(){var rows=baseRows(),html=[];var rage=sum(['Rage Clicks','Rage Click'],rows),dead=sum(['Dead Clicks','Dead Click'],rows),quick=sum(['Quick Backs','Quickback','Quick Back'],rows),errors=sum(['Script Errors','Script Error','Error Clicks'],rows);if(!rows.length)html.push(['warn','Veri bekleniyor','Tam senkronizasyon çalıştırıldığında bu bölüm davranış sinyallerinden otomatik bulgular üretecek.']);if(rage>0)html.push(['bad','Rage click tespit edildi',rage+' adet rage click sinyali var. Tıklanabilir alanlar, varyant seçimi ve mobil butonlar incelenmeli.']);if(dead>0)html.push(['warn','Dead click tespit edildi',dead+' adet sonuç üretmeyen tıklama var. Kullanıcıların buton sandığı fakat çalışmayan alanlar olabilir.']);if(quick>0)html.push(['warn','Hızlı geri dönüş var',quick+' quick back sinyali reklam vaadi ile açılış sayfası uyumsuzluğuna işaret edebilir.']);if(errors>0)html.push(['bad','Teknik hata sinyali',errors+' script/error click kaydı var. Cihaz ve browser kırılımıyla teknik inceleme yapılmalı.']);if(rows.length&&!html.length)html.push(['','Davranış görünümü sağlıklı','Seçili kırılımda kritik sürtünme sinyali bulunmadı. Trend değişimleri düzenli izlenmeli.']);document.getElementById('clInsightPanel').innerHTML='<div class="stl">Otomatik İçgörüler</div><div class="cl-insights">'+html.map(function(x){return '<div class="cl-insight '+x[0]+'"><strong>'+x[1]+'</strong><p>'+x[2]+'</p></div>'}).join('')+'</div>'}
function renderTable(){var section=sec(),rows=state.visible;if(section==='health'||section==='sync'){var s=state.status||{};document.getElementById('clTable').innerHTML='<div style="padding:18px"><div class="stl">'+sections[section]+'</div><div class="channel-row"><span>Entegrasyon</span><span>'+esc(s.configured?'Yapılandırıldı':'Eksik')+'</span></div><div class="channel-row"><span>Senkronizasyon</span><span>'+esc(s.enabled?'Aktif':'Kapalı')+'</span></div><div class="channel-row"><span>Günlük kota</span><span>'+esc((s.used_today||0)+' / '+(s.daily_limit||10))+'</span></div><div class="channel-row"><span>Kalan kota</span><span>'+esc(s.remaining_today==null?'—':s.remaining_today)+'</span></div><div class="channel-row"><span>Boyutlar</span><span>'+esc((s.published_dimensions||[]).join(', '))+'</span></div><div class="channel-row"><span>Son çalışma</span><span>'+esc(s.last_run&&s.last_run.status||'Henüz yok')+'</span></div></div>';return}
if(!rows.length){document.getElementById('clTable').innerHTML='<div class="cl-empty">Bu bölüm için veri yok. Senkronizasyonu çalıştırın veya filtreleri temizleyin.</div>';return}
var body=rows.slice(0,1000).map(function(r){return '<tr><td>'+esc(r.request_date)+'</td><td>'+esc(r.metric_name)+'</td><td><span class="cl-pill">'+esc(r.dimension1||'Genel')+'</span></td><td>'+esc(JSON.stringify(r.dimension_values||{}))+'</td><td>'+esc(JSON.stringify(r.metrics||{}))+'</td></tr>'}).join('');document.getElementById('clTable').innerHTML='<table><thead><tr><th>Tarih</th><th>Metrik</th><th>Boyut</th><th>Boyut Değeri</th><th>Metrikler</th></tr></thead><tbody>'+body+'</tbody></table>'}
async function load(){renderTabs();document.getElementById('clTable').innerHTML='<div class="cl-empty">Yükleniyor…</div>';try{var sr=await fetch('/api/clarity/status',{credentials:'include',cache:'no-store'});state.status=await sr.json();var dim=sectionDimensions[sec()]||'';var url='/api/clarity/metrics?limit=2000'+(dim?'&dimension='+encodeURIComponent(dim):'');var mr=await fetch(url,{credentials:'include',cache:'no-store'});var md=await mr.json();if(!mr.ok)throw new Error(md.error||'Veri alınamadı');state.rows=md.rows||[];renderStatus();renderMetricOptions();renderCards();renderInsights();applyFilters()}catch(e){document.getElementById('clTable').innerHTML='<div class="cl-empty cl-error">'+esc(e.message)+'</div>'}}
async function sync(){var b=document.getElementById('clSync'),old=b.textContent;b.disabled=true;b.textContent='Senkronize ediliyor…';try{var r=await fetch('/api/clarity/sync',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({num_days:Number(document.getElementById('clDays').value)})});var d=await r.json();if(!r.ok)throw new Error(d.error||'Senkronizasyon başarısız');toast('Clarity tam senkronizasyon tamamlandı');await load()}catch(e){toast('Clarity: '+e.message)}finally{b.disabled=false;b.textContent=old}}
document.getElementById('clRefresh').onclick=load;document.getElementById('clSync').onclick=sync;document.getElementById('clSearch').oninput=applyFilters;document.getElementById('clMetricFilter').onchange=applyFilters;document.getElementById('clClear').onclick=function(){document.getElementById('clSearch').value='';document.getElementById('clMetricFilter').value='';applyFilters()};window.addEventListener('mx:section-change',function(e){if(e.detail&&e.detail.page==='clarity-analizi')load()});load();
})();
</script>
