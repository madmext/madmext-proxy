<style>
.rb-wrap{display:grid;gap:14px}.rb-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.rb-title{font-size:20px;font-weight:800}.rb-sub{font-size:12px;color:var(--m);margin-top:4px}.rb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}.rb-role{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;display:grid;gap:11px}.rb-role-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.rb-role-name{font-weight:700}.rb-system{font:9px 'DM Mono',monospace;color:var(--a);border:1px solid rgba(24,119,242,.3);border-radius:3px;padding:2px 5px}.rb-count{font-size:11px;color:var(--m)}.rb-actions{display:flex;gap:7px}.rb-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:10000;display:none;align-items:center;justify-content:center;padding:16px}.rb-modal.open{display:flex}.rb-box{width:min(760px,96vw);max-height:90vh;overflow:auto;background:var(--s);border:1px solid var(--b2);border-radius:12px;padding:20px}.rb-box h3{margin-bottom:14px}.rb-field{display:grid;gap:5px;margin-bottom:12px}.rb-field label{font-size:10px;color:var(--m);text-transform:uppercase}.rb-field input{background:var(--bg);border:1px solid var(--b2);color:var(--t);padding:10px;border-radius:6px}.rb-perms{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:14px 0}.rb-perm{display:flex;gap:9px;align-items:flex-start;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px}.rb-perm input{margin-top:2px}.rb-perm b{display:block;font-size:12px}.rb-perm small{color:var(--m);font-size:10px}.rb-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}@media(max-width:600px){.rb-grid,.rb-perms{grid-template-columns:1fr}.rb-head .btn{width:100%}}
</style>
<div class="rb-wrap" id="rbRoot">
 <div class="rb-head"><div><div class="rb-title">Yetki Yönetimi</div><div class="rb-sub">Yeni roller oluşturun ve modül/işlem yetkilerini yönetin</div></div><button class="btn grn" onclick="RBAC.openNew()">＋ Yeni Rol Ekle</button></div>
 <div class="rb-grid" id="rbGrid"><div class="module-loading">Roller yükleniyor…</div></div>
</div>
<div class="rb-modal" id="rbModal"><div class="rb-box"><h3 id="rbModalTitle">Rol Düzenle</h3><div id="rbNewFields"><div class="rb-field"><label>Rol anahtarı</label><input id="rbKey" placeholder="ornek: pazaryeri_uzmani"></div><div class="rb-field"><label>Rol adı</label><input id="rbName" placeholder="Pazaryeri Uzmanı"></div><div class="rb-field"><label>Açıklama</label><input id="rbDescription" placeholder="Bu rolün kullanım amacı"></div></div><div class="rb-perms" id="rbPerms"></div><div class="rb-foot"><button class="btn sec" onclick="RBAC.close()">Vazgeç</button><button class="btn" onclick="RBAC.save()">Kaydet</button></div></div></div>
<script>
window.RBAC=(function(){var roles=[],perms=[],editing=null;function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}async function api(url,opt){var r=await fetch(url,Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}},opt||{}));var d=await r.json();if(!r.ok)throw new Error(d.error||'İşlem hatası');return d}async function load(){try{var all=await Promise.all([api('/admin/roles'),api('/admin/permissions')]);roles=all[0];perms=all[1];render()}catch(e){document.getElementById('rbGrid').innerHTML='<div class="api-denied">'+esc(e.message)+'</div>'}}function render(){document.getElementById('rbGrid').innerHTML=roles.map(function(r){return'<div class="rb-role"><div class="rb-role-head"><div class="rb-role-name">'+esc(r.name)+'</div>'+(r.system?'<span class="rb-system">Sistem</span>':'')+'</div><div class="rb-count">'+(r.permissions||[]).length+' yetki tanımlı</div><div class="rb-actions"><button class="btn sm sec" onclick="RBAC.edit(\''+esc(r.key)+'\')">▤ Yetkiler</button><button class="btn sm" onclick="RBAC.edit(\''+esc(r.key)+'\')">✎ Düzenle</button></div></div>'}).join('')||'<div class="module-loading">Rol bulunamadı.</div>'}function drawPerms(selected){document.getElementById('rbPerms').innerHTML=perms.map(function(p){return'<label class="rb-perm"><input type="checkbox" value="'+esc(p.key)+'" '+(selected.indexOf(p.key)>-1?'checked':'')+'><span><b>'+esc(p.name)+'</b><small>'+esc(p.key)+'</small></span></label>'}).join('')}function openNew(){editing=null;document.getElementById('rbModalTitle').textContent='Yeni Rol Ekle';document.getElementById('rbNewFields').style.display='block';rbKey.value='';rbName.value='';rbDescription.value='';drawPerms([]);rbModal.classList.add('open')}function edit(key){editing=roles.find(function(r){return r.key===key});if(!editing)return;document.getElementById('rbModalTitle').textContent=editing.name+' — Yetkiler';document.getElementById('rbNewFields').style.display='none';drawPerms(editing.permissions||[]);rbModal.classList.add('open')}function close(){rbModal.classList.remove('open')}async function save(){try{var selected=Array.prototype.slice.call(document.querySelectorAll('#rbPerms input:checked')).map(function(x){return x.value});var key;if(!editing){key=rbKey.value.trim().toLowerCase();await api('/admin/roles',{method:'POST',body:JSON.stringify({key:key,name:rbName.value.trim(),description:rbDescription.value.trim()})})}else key=editing.key;await api('/admin/roles/'+encodeURIComponent(key)+'/permissions',{method:'PUT',body:JSON.stringify({permissions:selected})});close();toast('Rol ve yetkiler kaydedildi');await load()}catch(e){alert(e.message)}}setTimeout(load,50);return{load:load,openNew:openNew,edit:edit,close:close,save:save}})();
</script>
