<!-- Ticimax Katalog Modülü -->
<div class="arow">
  <button class="btn sm" onclick="loadTicimax()">🔄 Ticimax'tan Yükle</button>
  <button class="btn sm sec" onclick="matchMeta()" id="matchMetaBtn" style="display:none">🔗 Meta ile Eşleştir</button>
  <button class="btn sm sec" onclick="showSetBuilder()" id="setBuilderBtn" style="display:none">📦 Set Oluştur</button>
  <span id="ticStatus" style="font-size:11px;color:var(--m)"></span>
</div>

<div class="dash-grid" id="ticCards" style="display:none">
  <div class="dash-card" style="border-top:2px solid var(--a)"><div class="dash-label">Toplam Ürün</div><div class="dash-val" id="tic-total">—</div></div>
  <div class="dash-card" style="border-top:2px solid var(--g)"><div class="dash-label">Aktif</div><div class="dash-val" id="tic-active">—</div></div>
  <div class="dash-card" style="border-top:2px solid var(--r)"><div class="dash-label">Stokta Yok</div><div class="dash-val" id="tic-nostock">—</div></div>
  <div class="dash-card" style="border-top:2px solid var(--y)"><div class="dash-label">Kritik Stok</div><div class="dash-val" id="tic-critical">—</div></div>
  <div class="dash-card" style="border-top:2px solid #a855f7"><div class="dash-label">30g Toplam Satış</div><div class="dash-val" id="tic-sales">—</div></div>
  <div class="dash-card" style="border-top:2px solid var(--bl)"><div class="dash-label">Reklam Alan</div><div class="dash-val" id="tic-withad">—</div></div>
</div>

<div class="arow" id="ticFilters" style="display:none">
  <select class="flt" id="ticFilterStatus" onchange="filterTic()">
    <option value="">Tüm Durumlar</option>
    <option value="active">Aktif</option>
    <option value="nostock">Stokta Yok</option>
    <option value="critical">Kritik Stok</option>
    <option value="nosales">0 Satış</option>
  </select>
  <select class="flt" id="ticFilterCat" onchange="filterTic()" style="max-width:200px">
    <option value="">Tüm Kategoriler</option>
  </select>
  <select class="flt" id="ticSort" onchange="filterTic()">
    <option value="sales_desc">Satış (Çok→Az)</option>
    <option value="sales_asc">Satış (Az→Çok)</option>
    <option value="stock_asc">Stok (Az→Çok)</option>
    <option value="roas_desc">ROAS (Yüksek→Düşük)</option>
    <option value="date_desc">Yayın Tarihi (Yeni→Eski)</option>
    <option value="price_desc">Fiyat (Yüksek→Düşük)</option>
  </select>
  <input type="text" id="ticSearch" placeholder="Ürün/barkod ara..." onkeyup="filterTic()" style="background:var(--bg);border:1px solid var(--b);color:var(--t);padding:6px 10px;font-family:'DM Mono',monospace;font-size:12px;border-radius:5px;width:180px">
  <span id="ticCount" style="font-size:11px;color:var(--m)"></span>
</div>

<div id="ticAI" style="display:none;margin-bottom:14px">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    <button class="qbtn" onclick="ticAIChat('Satış performansına göre en iyi ve en kötü ürünleri analiz et. Reklam stratejisi öner.')">🏆 Satış analizi</button>
    <button class="qbtn" onclick="ticAIChat('Stokta olmayan ürünlere reklam veriliyorsa tespit et ve uyar.')">⚠️ Stok uyarıları</button>
    <button class="qbtn" onclick="ticAIChat('Son 30 günde hiç satmayan ürünleri listele. Bu ürünler için ne yapılmalı?')">📉 Satmayan ürünler</button>
    <button class="qbtn" onclick="ticAIChat('Yeni eklenen ürünleri tespit et. Bu ürünler için reklam seti önerisi yap.')">✨ Yeni ürünler</button>
    <button class="qbtn" onclick="ticAIChat('Kategorilere göre satış ve reklam performansı analizi yap.')">📊 Kategori analizi</button>
  </div>
  <div class="chat-msgs" id="ticMsgs" style="height:140px">
    <div class="msg sys">Ticimax verisi yüklendi. AI analizi için yukarıdaki butonları kullanın.</div>
  </div>
</div>

<div id="setBuilder" style="display:none;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px;margin-bottom:14px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600">📦 Ürün Seti Oluştur → Meta'ya Gönder</div>
    <button class="btn sm sec" onclick="document.getElementById('setBuilder').style.display='none'">✕</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
    <div class="fg"><label>Set Adı</label><input type="text" id="setName" placeholder="örn: Yeni Sezon Erkek Tişört"></div>
    <div class="fg"><label>Kategori</label><select id="setFilterCat"><option value="">Tümü</option></select></div>
    <div class="fg"><label>Stok Durumu</label>
      <select id="setFilterStock">
        <option value="">Tümü</option>
        <option value="instock">Sadece Stokta Olanlar</option>
        <option value="nostock">Stokta Olmayanlar</option>
      </select>
    </div>
    <div class="fg"><label>Min Satış (30g)</label><input type="number" id="setMinSales" placeholder="0"></div>
    <div class="fg"><label>Max Satış (30g)</label><input type="number" id="setMaxSales" placeholder="9999"></div>
    <div class="fg"><label>Son X Gün İçinde Yayınlanan</label><input type="number" id="setDaysSince" placeholder="örn: 30"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
    <button class="btn sm sec" onclick="previewSet()">👁 Önizle</button>
    <button class="btn sm grn" onclick="saveSet()">💾 Kaydet</button>
    <button class="btn sm" style="background:#a855f7;color:#fff" onclick="sendToMeta()">🚀 Meta'ya Gönder</button>
    <span id="setPreviewCount" style="font-size:11px;color:var(--m)"></span>
  </div>
  <div id="savedSets"></div>
</div>

<div class="twrap" id="ticWrap" style="display:none">
  <table>
    <thead><tr>
      <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
      <th>Görsel</th><th>Ürün</th><th>Kategori</th><th>Fiyat</th>
      <th>Stok</th><th>30g Satış</th><th>Yayın Tarihi</th><th>ROAS</th><th>Meta Harcama</th>
    </tr></thead>
    <tbody id="ticTB"></tbody>
  </table>
  <div id="ticPagination" style="padding:10px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap"></div>
</div>

<script>
let ticProducts=[], ticSets=JSON.parse(localStorage.getItem('ticSets')||'[]'), selectedProducts=new Set();
const TIC_PAGE=100; let ticFiltered=[];

async function loadTicimax(){
  document.getElementById('ticStatus').textContent='⏳ Ticimax\'tan yükleniyor...';
  try{
    const [pr,or]=await Promise.all([
      fetch(`${px()}/ticimax/products`).then(r=>r.json()),
      fetch(`${px()}/ticimax/orders`).then(r=>r.json()).catch(()=>({orders:[]}))
    ]);
    if(pr.error){toast('Hata: '+pr.error);document.getElementById('ticStatus').textContent='Hata: '+pr.error;return;}
    const salesMap={};
    (or.orders||[]).forEach(o=>(o.items||o.urunler||[]).forEach(i=>{
      const pid=i.product_id||i.urun_id||i.stok_kodu;
      if(pid) salesMap[pid]=(salesMap[pid]||0)+(parseInt(i.quantity||i.adet||1));
    }));
    ticProducts=(pr.products||[]).map(p=>({...p,
      sales30:salesMap[p.id]||salesMap[p.stok_kodu]||0,
      roas:null,spend:null
    }));
    renderTicSummary();filterTic();
    document.getElementById('ticAI').style.display='';
    document.getElementById('matchMetaBtn').style.display='';
    document.getElementById('setBuilderBtn').style.display='';
    document.getElementById('ticStatus').textContent=`✓ ${ticProducts.length} ürün yüklendi`;
    toast(`${ticProducts.length} ürün yüklendi ✓`);
  }catch(e){toast('Hata: '+e.message);document.getElementById('ticStatus').textContent='Hata: '+e.message;}
}

async function matchMeta(){
  document.getElementById('ticStatus').textContent='⏳ Meta ile eşleştiriliyor...';
  const d=await api(`${AID}/insights`,{fields:'spend,purchase_roas,actions',date_preset:'last_30d',level:'ad',action_attribution_windows:ATTR,limit:500});
  if(d?.data){
    const mm={};
    d.data.forEach(r=>{const n=(r.ad_name||'').toLowerCase();mm[n]={roas:groas(r),spend:parseFloat(r.spend||0),purchase:gav(r.actions,'purchase')};});
    ticProducts.forEach(p=>{
      const key=(p.title||p.name||'').toLowerCase().slice(0,15);
      const match=Object.entries(mm).find(([k])=>k.includes(p.id||(key&&k.includes(key))));
      if(match){p.roas=match[1].roas;p.spend=match[1].spend;p.purchase=match[1].purchase;}
    });
    filterTic();renderTicSummary();
    toast('Meta eşleştirmesi tamamlandı ✓');
  }
  document.getElementById('ticStatus').textContent='✓ Meta eşleştirmesi yapıldı';
}

function renderTicSummary(){
  const total=ticProducts.length;
  const active=ticProducts.filter(p=>p.aktif||p.active||p.durum==='Aktif'||p.status==='active').length;
  const nostock=ticProducts.filter(p=>(p.stok||p.stock||0)<=0).length;
  const critical=ticProducts.filter(p=>{const s=p.stok||p.stock||0;return s>0&&s<=5;}).length;
  const totalSales=ticProducts.reduce((a,p)=>a+(p.sales30||0),0);
  const withAd=ticProducts.filter(p=>p.spend>0).length;
  document.getElementById('tic-total').textContent=total.toLocaleString('tr');
  document.getElementById('tic-active').textContent=active.toLocaleString('tr');
  document.getElementById('tic-nostock').textContent=nostock.toLocaleString('tr');
  document.getElementById('tic-critical').textContent=critical.toLocaleString('tr');
  document.getElementById('tic-sales').textContent=totalSales.toLocaleString('tr');
  document.getElementById('tic-withad').textContent=withAd>0?withAd.toLocaleString('tr'):'—';
  document.getElementById('ticCards').style.display='';
  document.getElementById('ticFilters').style.display='';
  document.getElementById('ticWrap').style.display='';
  const cats=[...new Set(ticProducts.map(p=>(p.kategori||p.category||'Diğer').split('>')[0].trim()))].sort();
  ['ticFilterCat','setFilterCat'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    s.innerHTML='<option value="">Tümü</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  });
}

function filterTic(){
  const status=document.getElementById('ticFilterStatus').value;
  const cat=document.getElementById('ticFilterCat').value;
  const sort=document.getElementById('ticSort').value;
  const search=document.getElementById('ticSearch').value.toLowerCase();
  ticFiltered=ticProducts.filter(p=>{
    const stock=p.stok||p.stock||0;
    if(status==='active'&&!(p.aktif||p.active||p.durum==='Aktif'))return false;
    if(status==='nostock'&&stock>0)return false;
    if(status==='critical'&&!(stock>0&&stock<=5))return false;
    if(status==='nosales'&&(p.sales30||0)>0)return false;
    if(cat&&!(p.kategori||p.category||'').startsWith(cat))return false;
    if(search&&!(p.title||p.name||'').toLowerCase().includes(search)&&!(p.id||'').toLowerCase().includes(search)&&!(p.stok_kodu||'').toLowerCase().includes(search))return false;
    return true;
  });
  ticFiltered.sort((a,b)=>{
    if(sort==='sales_desc')return(b.sales30||0)-(a.sales30||0);
    if(sort==='sales_asc')return(a.sales30||0)-(b.sales30||0);
    if(sort==='stock_asc')return(a.stok||a.stock||0)-(b.stok||b.stock||0);
    if(sort==='roas_desc')return(b.roas||0)-(a.roas||0);
    if(sort==='date_desc')return new Date(b.yayin_tarihi||b.publish_date||0)-new Date(a.yayin_tarihi||a.publish_date||0);
    if(sort==='price_desc')return(b.fiyat||b.price||0)-(a.fiyat||a.price||0);
    return 0;
  });
  document.getElementById('ticCount').textContent=`${ticFiltered.length} ürün`;
  renderTicTable(ticFiltered,0);
}

function renderTicTable(data,page=0){
  const start=page*TIC_PAGE;
  document.getElementById('ticTB').innerHTML=data.slice(start,start+TIC_PAGE).map(p=>{
    const stock=p.stok||p.stock||0;
    const sc=stock<=0?'var(--r)':stock<=5?'var(--y)':'var(--g)';
    const price=p.fiyat||p.price||0;
    const img=(p.resim||p.image)?`<img src="${p.resim||p.image}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--b)" onerror="this.style.display='none'">`:'—';
    const rH=p.roas!=null?`<span style="color:${roasColor(p.roas)}">${p.roas.toFixed(2)}x</span>`:'<span style="color:var(--m)">—</span>';
    const cat=(p.kategori||p.category||'—').split('>')[0].trim().slice(0,20);
    const d=p.yayin_tarihi||p.publish_date?new Date(p.yayin_tarihi||p.publish_date).toLocaleDateString('tr'):'—';
    return`<tr><td><input type="checkbox" ${selectedProducts.has(p.id)?'checked':''} onchange="selectedProducts[this.checked?'add':'delete']('${p.id}')"></td>
    <td>${img}</td>
    <td style="max-width:200px;white-space:normal;font-family:'Inter',sans-serif;font-size:12px">${(p.title||p.name||'—').slice(0,55)}</td>
    <td style="color:var(--m);font-size:11px">${cat}</td>
    <td>${price>0?price.toFixed(0)+'₺':'—'}</td>
    <td><span style="color:${sc}">${stock}</span></td>
    <td style="color:${(p.sales30||0)>0?'var(--g)':'var(--m)'}">${p.sales30||0}</td>
    <td style="font-size:11px;color:var(--m)">${d}</td>
    <td>${rH}</td>
    <td>${p.spend!=null?p.spend.toFixed(0)+'₺':'—'}</td></tr>`;
  }).join('');
  const pages=Math.ceil(data.length/TIC_PAGE);
  const pg=document.getElementById('ticPagination');pg.innerHTML='';
  if(pages>1){
    for(let i=0;i<Math.min(pages,20);i++){const b=document.createElement('button');b.className=`btn sm ${i===page?'':'sec'}`;b.textContent=i+1;b.onclick=()=>renderTicTable(data,i);pg.appendChild(b);}
    const info=document.createElement('span');info.style.cssText='font-size:11px;color:var(--m);margin-left:8px';
    info.textContent=`${data.length.toLocaleString('tr')} ürün · Sayfa ${page+1}/${pages}`;pg.appendChild(info);
  }
}

function toggleSelectAll(cb){document.querySelectorAll('#ticTB input[type=checkbox]').forEach(c=>{c.checked=cb.checked;});}
function showSetBuilder(){document.getElementById('setBuilder').style.display='';renderSavedSets();}

function getSetProducts(){
  const cat=document.getElementById('setFilterCat').value;
  const stockF=document.getElementById('setFilterStock').value;
  const minS=parseInt(document.getElementById('setMinSales').value||'0');
  const maxS=parseInt(document.getElementById('setMaxSales').value||'99999');
  const days=parseInt(document.getElementById('setDaysSince').value||'0');
  const cutoff=days>0?new Date(Date.now()-days*86400000):null;
  return ticProducts.filter(p=>{
    const stock=p.stok||p.stock||0;
    const sales=p.sales30||0;
    const pd=p.yayin_tarihi||p.publish_date;
    if(cat&&!(p.kategori||p.category||'').startsWith(cat))return false;
    if(stockF==='instock'&&stock<=0)return false;
    if(stockF==='nostock'&&stock>0)return false;
    if(sales<minS||sales>maxS)return false;
    if(cutoff&&pd&&new Date(pd)<cutoff)return false;
    return true;
  });
}

function previewSet(){const p=getSetProducts();document.getElementById('setPreviewCount').textContent=`${p.length} ürün eşleşti`;}

function saveSet(){
  const name=document.getElementById('setName').value.trim();
  if(!name){toast('Set adı girin');return;}
  const products=getSetProducts();
  if(!products.length){toast('Eşleşen ürün yok');return;}
  const set={id:Date.now(),name,productIds:products.map(p=>p.id),count:products.length,createdAt:new Date().toISOString(),
    filters:{cat:document.getElementById('setFilterCat').value,stock:document.getElementById('setFilterStock').value,
      minSales:document.getElementById('setMinSales').value,maxSales:document.getElementById('setMaxSales').value,
      daysSince:document.getElementById('setDaysSince').value}};
  ticSets.unshift(set);localStorage.setItem('ticSets',JSON.stringify(ticSets));
  renderSavedSets();toast(`"${name}" seti kaydedildi (${products.length} ürün) ✓`);
}

async function sendToMeta(setId){
  const set=setId?ticSets.find(s=>s.id===setId):{name:document.getElementById('setName').value,productIds:getSetProducts().map(p=>p.id)};
  if(!set?.productIds?.length){toast('Önce set oluştur');return;}
  if(!confirm(`"${set.name}" → Meta'da ürün seti oluşturulsun mu?\n${set.productIds.length} ürün`))return;
  toast('Meta\'ya gönderiliyor...');
  const d=await api(`${AID}/product_sets`,{name:set.name,filter:JSON.stringify({retailer_id:{is_any:set.productIds.slice(0,500)}}),'POST');
  if(d?.id){toast(`Ürün seti oluşturuldu ✓`);addClaudeMsg(`✅ **${set.name}** Meta'ya gönderildi.\nID: \`${d.id}\`\n${set.productIds.length} ürün`,'ticMsgs');}
  else toast('Hata: '+(d?.error?.message||'Meta kataloğu bağlı değil olabilir'));
}

function renderSavedSets(){
  const el=document.getElementById('savedSets');
  if(!ticSets.length){el.innerHTML='<div style="color:var(--m);font-size:11px;margin-top:8px">Henüz kayıtlı set yok.</div>';return;}
  el.innerHTML='<div class="stl" style="margin-top:10px">Kayıtlı Setler</div>'+
    ticSets.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--b)">
      <span style="flex:1;font-size:12px"><strong>${s.name}</strong> <span style="color:var(--m)">(${s.count} ürün · ${new Date(s.createdAt).toLocaleDateString('tr')})</span></span>
      <button class="btn sm" style="background:#a855f7;color:#fff" onclick="sendToMeta(${s.id})">🚀 Meta'ya Gönder</button>
      <button class="btn sm sec" onclick="ticSets=ticSets.filter(x=>x.id!==${s.id});localStorage.setItem('ticSets',JSON.stringify(ticSets));renderSavedSets()">🗑</button>
    </div>`).join('');
}

async function ticAIChat(msg){
  if(!ticProducts.length){toast('Önce Ticimax\'tan yükle');return;}
  addMsg(msg,'user','ticMsgs');const th=addThinking('ticMsgs');
  const stats={total:ticProducts.length,
    nostock:ticProducts.filter(p=>(p.stok||p.stock||0)<=0).length,
    totalSales:ticProducts.reduce((a,p)=>a+(p.sales30||0),0),
    topSellers:ticProducts.sort((a,b)=>(b.sales30||0)-(a.sales30||0)).slice(0,10).map(p=>({name:(p.title||p.name||'').slice(0,30),sales:p.sales30,stock:p.stok||p.stock})),
    noSales:ticProducts.filter(p=>!p.sales30).length
  };
  const sys=`Madmext e-ticaret uzmanısın. Türkçe kısa yanıt ver. Ürün istatistikleri: ${JSON.stringify(stats)}`;
  if(!MX.chatH.ticimax)MX.chatH.ticimax=[];
  MX.chatH.ticimax.push({role:'user',content:msg});
  const reply=await claude(MX.chatH.ticimax.slice(-4),sys);
  th.remove();MX.chatH.ticimax.push({role:'assistant',content:reply});
  addClaudeMsg(reply,'ticMsgs');
}
</script>
