<style>
.pm-wrap{display:grid;gap:14px}.pm-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.pm-title{font-size:20px;font-weight:800}.pm-sub{font-size:12px;color:var(--m);margin-top:4px}.pm-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.pm-market{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;text-align:left;color:var(--t);cursor:pointer;display:grid;gap:10px}.pm-market:hover,.pm-market.active{border-color:var(--a);background:var(--s2)}.pm-market-head{display:flex;justify-content:space-between;align-items:center;gap:8px}.pm-name{font-weight:700}.pm-status{font:10px 'DM Mono',monospace;color:var(--m);display:flex;align-items:center;gap:5px}.pm-dot{width:7px;height:7px;border-radius:50%;background:var(--m)}.pm-dot.on{background:var(--g);box-shadow:0 0 6px var(--g)}.pm-dot.warn{background:var(--y)}.pm-tags{display:flex;gap:5px;flex-wrap:wrap}.pm-tag{font:9px 'DM Mono',monospace;background:var(--bg);border:1px solid var(--b);border-radius:999px;padding:3px 7px;color:var(--m)}.pm-detail{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(260px,.6fr);gap:12px}.pm-card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:16px}.pm-card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.pm-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.pm-metric{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:12px}.pm-metric span{display:block;color:var(--m);font-size:10px;margin-bottom:5px}.pm-metric b{font:18px 'DM Mono',monospace}.pm-source{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--b)}.pm-source:last-child{border:0}.pm-source small{display:block;color:var(--m);margin-top:3px}.pm-history{display:grid;gap:12px}.pm-event{border-left:2px solid var(--b);padding-left:10px;font-size:12px}.pm-event span{display:block;color:var(--m);font-size:10px;margin-top:4px}.pm-state{margin-top:12px;color:var(--m);font-size:11px}.pm-empty{color:var(--m);font-size:12px;padding:14px 0}@media(max-width:800px){.pm-grid{grid-template-columns:repeat(2,1fr)}.pm-detail{grid-template-columns:1fr}}@media(max-width:520px){.pm-grid,.pm-metrics{grid-template-columns:1fr}.pm-head .btn{width:100%}.pm-source{grid-template-columns:1fr}.pm-source .btn{width:100%}}
</style>
<div class="pm-wrap" id="pmRoot">
  <div class="pm-head"><div><div class="pm-title">Pazaryeri Merkezi</div><div class="pm-sub">API, Excel/CSV ve XML kaynaklarını tek merkezden yönet</div></div><button class="btn" id="pmRefreshAll">↻ Tüm Son Verileri Çek</button></div>
  <div class="pm-grid" id="pmMarkets"></div>
  <div class="pm-detail">
    <section class="pm-card"><div class="pm-card-head"><div><div class="pm-title" id="pmSelected">Trendyol</div><div class="pm-sub">Veri kaynakları ve son senkronizasyon</div></div><button class="btn" id="pmRefreshOne">↻ Son Veriyi Çek</button></div><div class="pm-metrics"><div class="pm-metric"><span>Toplam kayıt</span><b id="pmRecords">—</b></div><div class="pm-metric"><span>Aktif reklam</span><b id="pmActive">—</b></div><div class="pm-metric"><span>Veri kalitesi</span><b id="pmQuality">—</b></div></div><div id="pmSources"></div><div class="pm-state" id="pmState">Kaynak durumu kontrol ediliyor…</div></section>
    <aside class="pm-card"><div class="pm-title" style="font-size:15px;margin-bottom:14px">Son Hareketler</div><div class="pm-history" id="pmHistory"><div class="pm-empty">Henüz hareket kaydı yok.</div></div></aside>
  </div>
</div>
<script>
(function(){
var root=document.getElementById('pmRoot');if(!root||root.__ready)return;root.__ready=true;
var markets=[
 {id:'trendyol',name:'Trendyol',icon:'🟠',state:'Bağlı',cls:'on',sources:['API','Excel/CSV','XML'],records:'—',active:'—',quality:'Kontrol'},
 {id:'hepsiburada',name:'Hepsiburada',icon:'🟠',state:'Kurulum',cls:'warn',sources:['API','Dosya'],records:'0',active:'0',quality:'—'},
 {id:'n11',name:'N11',icon:'🔴',state:'Kapalı',cls:'',sources:['API','XML'],records:'0',active:'0',quality:'—'},
 {id:'amazon',name:'Amazon',icon:'📦',state:'Kapalı',cls:'',sources:['API','Dosya'],records:'0',active:'0',quality:'—'},
 {id:'lcw',name:'LC Waikiki',icon:'🔵',state:'Kapalı',cls:'',sources:['Dosya','XML'],records:'0',active:'0',quality:'—'},
 {id:'flo',name:'FLO',icon:'🟡',state:'Kapalı',cls:'',sources:['Dosya','XML'],records:'0',active:'0',quality:'—'}
];var selected='trendyol';
function esc(v){return String(v||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function current(){return markets.find(function(x){return x.id===selected})}
function drawMarkets(){document.getElementById('pmMarkets').innerHTML=markets.map(function(m){return '<button class="pm-market '+(m.id===selected?'active':'')+'" data-id="'+m.id+'"><span class="pm-market-head"><span class="pm-name">'+m.icon+' '+esc(m.name)+'</span><span class="pm-status"><i class="pm-dot '+m.cls+'"></i>'+m.state+'</span></span><span class="pm-tags">'+m.sources.map(function(s){return'<span class="pm-tag">'+esc(s)+'</span>'}).join('')+'</span><span class="pm-sub">'+(m.id==='trendyol'?'Veri kaynakları hazır':'Bağlantı yapılandırması bekleniyor')+'</span></button>'}).join('');document.querySelectorAll('#pmMarkets [data-id]').forEach(function(b){b.onclick=function(){selected=b.dataset.id;render()}})}
function drawSources(m){var rows=m.sources.map(function(s){var ok=m.id==='trendyol';return '<div class="pm-source"><div><b>'+esc(s)+' kaynağı</b><small>'+(s==='API'?'Otomatik performans ve reklam verileri':s.indexOf('XML')>-1?'Ürün, stok ve fiyat akışı':'Manuel rapor yükleme')+'</small></div>'+(ok?'<span class="pm-status"><i class="pm-dot on"></i>Hazır</span>':'<button class="btn sm sec" disabled>Yakında</button>')+'</div>'}).join('');document.getElementById('pmSources').innerHTML=rows}
function render(){var m=current();drawMarkets();document.getElementById('pmSelected').textContent=m.name;document.getElementById('pmRecords').textContent=m.records;document.getElementById('pmActive').textContent=m.active;document.getElementById('pmQuality').textContent=m.quality;document.getElementById('pmState').textContent=m.id==='trendyol'?'Son veriyi çekerek güncel kayıtları görüntüleyin.':'Bu pazaryeri sonraki entegrasyon aşamasında bağlanacak.';drawSources(m);document.getElementById('pmRefreshOne').disabled=m.id!=='trendyol'}
async function refresh(btn,all){var old=btn.textContent;btn.disabled=true;btn.textContent='↻ Güncelleniyor…';try{if(all||selected==='trendyol'){var r=await fetch('/trendyol/data',{credentials:'include'});if(!r.ok)throw new Error('HTTP '+r.status);var d=await r.json();var count=(d.urun||[]).length+(d.magaza||[]).length+(d.influencer||[]).length+(d.meta||[]).length;var t=markets[0];t.records=count.toLocaleString('tr-TR');t.active=String((d.urun||[]).filter(function(x){return /aktif|active|yay/i.test(x.statu||'')}).length);t.quality=count?'%100':'Veri yok';document.getElementById('pmHistory').innerHTML='<div class="pm-event"><b>Trendyol verileri güncellendi</b><span>'+(window._currentUser&&window._currentUser.email||'Kullanıcı')+' · '+new Date().toLocaleString('tr-TR')+' · '+count+' kayıt</span></div>'+document.getElementById('pmHistory').innerHTML;document.getElementById('pmState').textContent='Güncelleme tamamlandı · '+count+' kayıt işlendi';if(typeof logAction==='function')logAction({module:'marketplace',action:'data_refreshed',entityType:'marketplace',entityId:'trendyol',entityName:'Trendyol',description:'Son pazaryeri verileri çekildi',newData:{recordCount:count}});render()}}catch(e){document.getElementById('pmState').textContent='Güncelleme hatası: '+e.message;toast('Pazaryeri verisi alınamadı')}finally{btn.disabled=false;btn.textContent=old}}
document.getElementById('pmRefreshOne').onclick=function(){refresh(this,false)};document.getElementById('pmRefreshAll').onclick=function(){refresh(this,true)};render();
})();
</script>
