<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Madmext Ads — Şifre Yenile</title><style>*{box-sizing:border-box}body{margin:0;background:#0f1011;color:#e4e6eb;font-family:Inter,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.wrap{width:100%;max-width:420px;padding:20px}.card{background:#1a1b1d;border:1px solid #2d2e30;border-radius:12px;padding:28px}.logo{text-align:center;font-size:24px;font-weight:800;margin-bottom:26px}.logo span{color:#1877f2}.title{font-size:18px;font-weight:800;margin-bottom:6px}.sub{font-size:12px;color:#8a8d91;margin-bottom:18px;line-height:1.5}.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.fg label{font-size:10px;color:#8a8d91;text-transform:uppercase;letter-spacing:1px}.fg input{background:#0f1011;border:1px solid #3a3b3c;color:#e4e6eb;padding:11px 13px;border-radius:7px;font-size:13px}.btn{width:100%;background:#1877f2;color:#fff;border:0;border-radius:7px;padding:12px;font-weight:800;cursor:pointer}.msg{display:none;margin-bottom:14px;padding:10px 12px;border-radius:7px;font-size:12px;line-height:1.5}.msg.err{display:block;color:#fa3e3e;background:rgba(250,62,62,.1);border:1px solid rgba(250,62,62,.25)}.msg.ok{display:block;color:#42b72a;background:rgba(66,183,42,.1);border:1px solid rgba(66,183,42,.25)}a{color:#1877f2;text-decoration:none}</style></head><body><div class="wrap"><div class="logo">Madmext <span>Ads</span></div><div class="card"><div class="title">Şifre Yenile</div><div class="sub" id="info">Bağlantı kontrol ediliyor...</div><div id="msg" class="msg"></div><div class="fg"><label>Yeni Şifre</label><input id="p1" type="password" placeholder="Yeni şifre"></div><div class="fg"><label>Yeni Şifre Tekrar</label><input id="p2" type="password" placeholder="Tekrar yazın"></div><button class="btn" onclick="savePass()">Şifreyi Değiştir</button><div class="sub" style="margin-top:16px;margin-bottom:0"><a href="/login">Giriş sayfasına dön</a></div></div></div><script>const token=new URLSearchParams(location.search).get('token')||'';const msg=document.getElementById('msg');function show(t,ok){msg.className='msg '+(ok?'ok':'err');msg.textContent=t}async function init(){if(!token){show('Geçersiz bağlantı.',false);return}try{let r=await fetch('/auth/reset-info?token='+encodeURIComponent(token));let d=await r.json();if(!r.ok||d.error){show(d.error||'Bağlantı doğrulanamadı.',false);return}document.getElementById('info').textContent=d.email+' için yeni şifre belirleyin.'}catch(e){show('Sunucu hatası: '+e.message,false)}}async function savePass(){let p1=document.getElementById('p1').value,p2=document.getElementById('p2').value;if(!p1||p1.length<6){show('Şifre en az 6 karakter olmalı.',false);return}if(p1!==p2){show('Şifreler eşleşmiyor.',false);return}try{let r=await fetch('/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:p1})});let d=await r.json();if(!r.ok||d.error){show(d.error||'Şifre değiştirilemedi.',false);return}show('Şifreniz değiştirildi. Giriş sayfasına yönlendiriliyorsunuz.',true);setTimeout(()=>location.href='/login',1800)}catch(e){show('Sunucu hatası: '+e.message,false)}}init();</script></body></html>
